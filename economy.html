<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Economy - Live Market</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:13px;height:100vh;display:flex;flex-direction:column}
a{color:#4fc3f7;text-decoration:none}a:hover{text-decoration:underline}
#docnav .dnl{font-size:12px;color:#8aa0b8;text-decoration:none;padding:5px 12px;border:1px solid #1a2844;border-radius:3px;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;transition:all .15s}
#docnav .dnl:hover{color:#4fc3f7;border-color:#4fc3f7;background:#0d1a2f}
#docnav .dnl.active{color:#4fc3f7;border-color:#4fc3f7}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;min-width:280px;border-right:1px solid #1a2844;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:8px 12px;border-bottom:1px solid #1a2844;background:#0a0e18}
.sidebar-header input{width:100%;background:#05080f;border:1px solid #1a2844;border-radius:3px;padding:5px 8px;color:#c8d4e0;font-family:inherit;font-size:12px;outline:none}
.sidebar-header input:focus{border-color:#4fc3f7}
.tree-wrap{flex:1;overflow-y:auto;padding:4px 0}
.tree-node{cursor:pointer;user-select:none}
.tree-label{display:flex;align-items:center;padding:3px 8px;padding-left:calc(8px + var(--depth,0) * 16px);gap:4px;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-label:hover{background:#0d1a2f}
.tree-label.selected{color:#4fc3f7;background:#0a1a30}
.tree-toggle{width:14px;font-size:10px;color:#8aa0b8;flex-shrink:0;text-align:center}
.tree-count{color:#8aa0b8;font-size:10px;margin-left:auto;flex-shrink:0}
.main-content{flex:1;display:flex;flex-direction:column;overflow-y:auto}
.toolbar{display:flex;align-items:center;gap:12px;padding:6px 12px;border-bottom:1px solid #1a2844;background:#0a0e18;flex-wrap:wrap}
.toolbar label{color:#8aa0b8;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.toolbar select{background:#05080f;border:1px solid #1a2844;border-radius:3px;padding:3px 6px;color:#c8d4e0;font-family:inherit;font-size:12px}
.pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:200px}
.pane-header{padding:6px 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#4fc3f7;background:#0a0e18;border-bottom:1px solid #1a2844;flex-shrink:0}
.pane-body{flex:1;overflow-y:auto;max-height:35vh}
table{width:100%;border-collapse:collapse}
th{position:sticky;top:0;background:#0a0e18;padding:4px 8px;text-align:left;font-size:11px;color:#8aa0b8;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1a2844;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:#4fc3f7}
th .sort-arrow{margin-left:2px;font-size:9px}
td{padding:3px 8px;border-bottom:1px solid #0d1420;white-space:nowrap}
td.num{text-align:right;font-variant-numeric:tabular-nums}
tr:hover td{background:#0a1020}
.status-bar{padding:4px 12px;font-size:10px;color:#8aa0b8;border-top:1px solid #1a2844;background:#0a0e18;display:flex;gap:16px}
.ships-section{border-top:2px solid #1a2844}
.ships-section .pane-header{color:#ffd54f}
</style>
</head>
<body>
<div id="docnav" style="position:sticky;top:0;z-index:100;background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 24px;height:48px;gap:12px;flex-wrap:wrap">
<a href="/" class="dnl">Game</a><a href="/docs" class="dnl">Hub</a><span style="color:#1a2844">|</span>
<a href="/items" class="dnl">Items DB</a><a href="/ships_db" class="dnl">Ships DB</a><a href="/chain" class="dnl">Chain Calc</a><a href="/factions" class="dnl">Factions</a><a href="/ships" class="dnl">Ships 3D</a><a href="/fitting" class="dnl">Fitting</a><span style="color:#1a2844">|</span>
<a href="/design" class="dnl">Design</a><a href="/universe" class="dnl">Universe</a><a href="/economy" class="dnl active">Economy</a><a href="/resources" class="dnl">Resources</a><a href="/materials" class="dnl">Materials</a><a href="/products" class="dnl">Products</a><span style="color:#1a2844">|</span>
<a href="/debug" class="dnl">Dashboard</a>
</div>
<div class="layout">
<div class="sidebar">
  <div class="sidebar-header"><input id="treeSearch" placeholder="Search items..." /></div>
  <div class="tree-wrap" id="treeWrap"></div>
</div>
<div class="main-content">
  <div class="toolbar">
    <label>Group by:</label>
    <select id="groupBy"><option value="none">None</option><option value="item">Item</option><option value="region">Region</option><option value="system">System</option><option value="station">Station</option></select>
    <span id="filterLabel" style="color:#4fc3f7;font-size:11px"></span>
  </div>
  <div class="pane" style="border-bottom:2px solid #1a2844">
    <div class="pane-header">Buy Orders</div>
    <div class="pane-body"><table><thead id="buyHead"></thead><tbody id="buyBody"></tbody></table></div>
  </div>
  <div class="pane">
    <div class="pane-header">Sell Orders</div>
    <div class="pane-body"><table><thead id="sellHead"></thead><tbody id="sellBody"></tbody></table></div>
  </div>
  <div class="pane ships-section">
    <div class="pane-header">Ships Market</div>
    <div class="pane-body"><table><thead id="shipsHead"></thead><tbody id="shipsBody"></tbody></table></div>
  </div>
  <div class="status-bar"><span id="statusTick"></span><span id="statusOrders"></span><span id="statusRefresh"></span></div>
</div>
</div>
<script>
(function(){
const COLS = ['item','qty','price','station','system','region'];
const SHIP_COLS = ['name','hull_class','price','build_time','shipyard_system','shipyard_station'];
let commodities = [], commodityMap = {}, treeData = [];
let buyOrders = [], sellOrders = [], shipsData = [];
let selectedFilter = null; // {type:'category'|'subcategory'|'group', value:...}
let sortCol = 'price', sortDir = 1, shipSortCol = 'name', shipSortDir = 1;
let refreshTimer = null, lastTick = 0;

// Fetch commodity list for tree
async function loadCommodities(){
  const res = await fetch('/api/data/commodities');
  commodities = await res.json();
  commodityMap = {};
  commodities.forEach(c => { commodityMap[c.id] = c; });
  buildTree();
}

function buildTree(){
  const tree = {};
  commodities.forEach(c => {
    if(!tree[c.category]) tree[c.category] = {};
    if(!tree[c.category][c.subcategory]) tree[c.category][c.subcategory] = {};
    if(!tree[c.category][c.subcategory][c.group_name]) tree[c.category][c.subcategory][c.group_name] = [];
    tree[c.category][c.subcategory][c.group_name].push(c.id);
  });
  treeData = tree;
  renderTree();
}

function renderTree(filter){
  const wrap = document.getElementById('treeWrap');
  const f = (filter || '').toLowerCase();
  let html = '';
  const cats = Object.keys(treeData).sort();
  cats.forEach(cat => {
    const subs = treeData[cat];
    let catCount = 0, catHtml = '';
    Object.keys(subs).sort().forEach(sub => {
      const groups = subs[sub];
      let subCount = 0, subHtml = '';
      Object.keys(groups).sort().forEach(grp => {
        const ids = groups[grp];
        const cnt = ids.length;
        subCount += cnt;
        if(f && !grp.toLowerCase().includes(f) && !sub.toLowerCase().includes(f) && !cat.toLowerCase().includes(f)) return;
        subHtml += `<div class="tree-node"><div class="tree-label${isSelected('group',cat,sub,grp)}" style="--depth:2" data-type="group" data-cat="${cat}" data-sub="${sub}" data-grp="${grp}"><span class="tree-toggle"></span><span>${grp}</span><span class="tree-count">${cnt}</span></div></div>`;
      });
      catCount += subCount;
      if(f && !subHtml && !sub.toLowerCase().includes(f) && !cat.toLowerCase().includes(f)) return;
      catHtml += `<div class="tree-node"><div class="tree-label${isSelected('subcategory',cat,sub)}" style="--depth:1" data-type="subcategory" data-cat="${cat}" data-sub="${sub}"><span class="tree-toggle">${subHtml?'\u25B6':''}</span><span>${sub}</span><span class="tree-count">${subCount}</span></div><div class="tree-children" style="display:none">${subHtml}</div></div>`;
    });
    if(f && !catHtml && !cat.toLowerCase().includes(f)) return;
    html += `<div class="tree-node"><div class="tree-label${isSelected('category',cat)}" style="--depth:0" data-type="category" data-cat="${cat}"><span class="tree-toggle">${catHtml?'\u25B6':''}</span><span>${cat}</span><span class="tree-count">${catCount}</span></div><div class="tree-children" style="display:none">${catHtml}</div></div>`;
  });
  // Ships category
  const hullClasses = [...new Set(shipsData.map(s=>s.hull_class))].sort();
  let shipsHtml = '';
  hullClasses.forEach(hc => {
    const cnt = shipsData.filter(s=>s.hull_class===hc).length / Math.max(1, [...new Set(shipsData.map(s=>s.shipyard_system))].length);
    shipsHtml += `<div class="tree-node"><div class="tree-label${isSelected('hull_class','Ships','Ships',hc)}" style="--depth:2" data-type="hull_class" data-grp="${hc}"><span class="tree-toggle"></span><span>${hc}</span></div></div>`;
  });
  html += `<div class="tree-node"><div class="tree-label${isSelected('category','Ships')}" style="--depth:0" data-type="category" data-cat="Ships"><span class="tree-toggle">\u25B6</span><span>Ships</span></div><div class="tree-children" style="display:none">${shipsHtml}</div></div>`;
  wrap.innerHTML = html;
  // Attach events
  wrap.querySelectorAll('.tree-label').forEach(el => {
    el.addEventListener('click', onTreeClick);
  });
}

function isSelected(type, cat, sub, grp){
  if(!selectedFilter) return '';
  if(type==='category' && selectedFilter.type==='category' && selectedFilter.cat===cat) return ' selected';
  if(type==='subcategory' && selectedFilter.type==='subcategory' && selectedFilter.cat===cat && selectedFilter.sub===sub) return ' selected';
  if(type==='group' && selectedFilter.type==='group' && selectedFilter.cat===cat && selectedFilter.sub===sub && selectedFilter.grp===grp) return ' selected';
  if(type==='hull_class' && selectedFilter.type==='hull_class' && selectedFilter.grp===grp) return ' selected';
  return '';
}

function onTreeClick(e){
  const el = e.currentTarget;
  const type = el.dataset.type;
  const children = el.nextElementSibling;
  // Toggle expand
  if(children && children.classList.contains('tree-children')){
    const open = children.style.display !== 'none';
    children.style.display = open ? 'none' : 'block';
    const tog = el.querySelector('.tree-toggle');
    if(tog) tog.textContent = open ? '\u25B6' : '\u25BC';
  }
  // Set filter
  if(type==='category') selectedFilter = {type:'category', cat:el.dataset.cat};
  else if(type==='subcategory') selectedFilter = {type:'subcategory', cat:el.dataset.cat, sub:el.dataset.sub};
  else if(type==='group') selectedFilter = {type:'group', cat:el.dataset.cat, sub:el.dataset.sub, grp:el.dataset.grp};
  else if(type==='hull_class') selectedFilter = {type:'hull_class', grp:el.dataset.grp};
  document.getElementById('filterLabel').textContent = selectedFilter.grp || selectedFilter.sub || selectedFilter.cat || '';
  renderTree(document.getElementById('treeSearch').value);
  renderOrders();
}

function getFilteredIds(){
  if(!selectedFilter) return null;
  const f = selectedFilter;
  if(f.type==='category'){
    if(f.cat==='Ships') return 'ships';
    return commodities.filter(c=>c.category===f.cat).map(c=>c.id);
  }
  if(f.type==='subcategory') return commodities.filter(c=>c.category===f.cat && c.subcategory===f.sub).map(c=>c.id);
  if(f.type==='group') return commodities.filter(c=>c.category===f.cat && c.subcategory===f.sub && c.group_name===f.grp).map(c=>c.id);
  if(f.type==='hull_class') return 'hull:'+f.grp;
  return null;
}

async function loadMarketData(){
  try{
    const [dbg, ships] = await Promise.all([fetch('/api/debug').then(r=>r.json()), fetch('/api/market/ships').then(r=>r.json())]);
    lastTick = dbg.tick || 0;
    shipsData = ships;
    parseOrders(dbg);
    renderOrders();
    renderShips();
    document.getElementById('statusTick').textContent = 'Tick: ' + lastTick;
    document.getElementById('statusOrders').textContent = `Buy: ${buyOrders.length} | Sell: ${sellOrders.length} | Ships: ${shipsData.length}`;
  }catch(e){ console.error('Market fetch error', e); }
  document.getElementById('statusRefresh').textContent = 'Updated: ' + new Date().toLocaleTimeString();
}

function parseOrders(dbg){
  buyOrders = []; sellOrders = [];
  const systems = dbg.systems || {};
  for(const sid in systems){
    const sys = systems[sid];
    const region = sys.region || '';
    const sysName = sys.name || sid;
    (sys.stations||[]).forEach(st => {
      (st.sell_orders||[]).forEach(o => {
        sellOrders.push({item: commodityMap[o.commodity]?.name || o.commodity, itemId: o.commodity, qty: o.qty, price: o.price, station: st.name, system: sysName, region});
      });
      (st.buy_orders||[]).forEach(o => {
        buyOrders.push({item: commodityMap[o.commodity]?.name || o.commodity, itemId: o.commodity, qty: o.qty, price: o.price, station: st.name, system: sysName, region});
      });
    });
  }
}

function renderOrders(){
  renderTable('buy', buyOrders, sortCol, sortDir);
  renderTable('sell', sellOrders, sortCol, sortDir);
}

function renderTable(prefix, orders, col, dir){
  const headEl = document.getElementById(prefix+'Head');
  const bodyEl = document.getElementById(prefix+'Body');
  // Header
  headEl.innerHTML = '<tr>' + COLS.map(c => `<th data-col="${c}" data-prefix="${prefix}">${c}<span class="sort-arrow">${col===c?(dir>0?'\u25B2':'\u25BC'):''}</span></th>`).join('') + '</tr>';
  headEl.querySelectorAll('th').forEach(th => th.addEventListener('click', onSortClick));
  // Filter
  let filtered = orders;
  const ids = getFilteredIds();
  if(ids === 'ships'){ bodyEl.innerHTML = ''; return; }
  if(typeof ids === 'string' && ids.startsWith('hull:')){ bodyEl.innerHTML = ''; return; }
  if(Array.isArray(ids)) filtered = orders.filter(o => ids.includes(o.itemId));
  // Search filter
  const search = document.getElementById('treeSearch').value.toLowerCase();
  if(search) filtered = filtered.filter(o => o.item.toLowerCase().includes(search) || o.system.toLowerCase().includes(search) || o.station.toLowerCase().includes(search));
  // Sort
  filtered.sort((a,b) => {
    let va = a[col], vb = b[col];
    if(typeof va === 'number') return (va - vb) * dir;
    return String(va).localeCompare(String(vb)) * dir;
  });
  // Group
  const groupBy = document.getElementById('groupBy').value;
  let rows = '';
  if(groupBy !== 'none'){
    const groups = {};
    filtered.forEach(o => { const k = o[groupBy] || 'Unknown'; if(!groups[k]) groups[k]=[]; groups[k].push(o); });
    Object.keys(groups).sort().forEach(g => {
      rows += `<tr><td colspan="6" style="color:#4fc3f7;padding:6px 8px;background:#0a1020;font-size:11px;letter-spacing:1px">${g} (${groups[g].length})</td></tr>`;
      groups[g].slice(0,200).forEach(o => { rows += orderRow(o); });
    });
  } else {
    filtered.slice(0,500).forEach(o => { rows += orderRow(o); });
  }
  bodyEl.innerHTML = rows || '<tr><td colspan="6" style="color:#8aa0b8;padding:12px">No orders</td></tr>';
}

function orderRow(o){
  return `<tr><td>${o.item}</td><td class="num">${fmtNum(o.qty)}</td><td class="num">${fmtNum(o.price)}</td><td>${o.station}</td><td>${o.system}</td><td>${o.region}</td></tr>`;
}

function renderShips(){
  const headEl = document.getElementById('shipsHead');
  const bodyEl = document.getElementById('shipsBody');
  headEl.innerHTML = '<tr>' + SHIP_COLS.map(c => `<th data-col="${c}" data-prefix="ships">${c.replace(/_/g,' ')}<span class="sort-arrow">${shipSortCol===c?(shipSortDir>0?'\u25B2':'\u25BC'):''}</span></th>`).join('') + '</tr>';
  headEl.querySelectorAll('th').forEach(th => th.addEventListener('click', onShipSortClick));
  let filtered = shipsData;
  const ids = getFilteredIds();
  if(typeof ids === 'string' && ids.startsWith('hull:')) filtered = shipsData.filter(s=>s.hull_class===ids.slice(5));
  else if(ids === 'ships') { /* show all */ }
  else if(Array.isArray(ids)) { bodyEl.innerHTML = '<tr><td colspan="6" style="color:#8aa0b8;padding:12px">Select Ships category</td></tr>'; return; }
  const search = document.getElementById('treeSearch').value.toLowerCase();
  if(search) filtered = filtered.filter(s => s.name.toLowerCase().includes(search) || s.hull_class.toLowerCase().includes(search));
  filtered.sort((a,b) => { let va=a[shipSortCol],vb=b[shipSortCol]; if(typeof va==='number') return (va-vb)*shipSortDir; return String(va).localeCompare(String(vb))*shipSortDir; });
  // Deduplicate by ship id (show one row per unique ship, pick first shipyard)
  const seen = new Set();
  let rows = '';
  filtered.forEach(s => {
    if(seen.has(s.id)) return;
    seen.add(s.id);
    rows += `<tr><td>${s.name}</td><td>${s.hull_class}</td><td class="num">${fmtNum(s.price)}</td><td class="num">${s.build_time}s</td><td>${s.shipyard_system}</td><td>${s.shipyard_station}</td></tr>`;
  });
  bodyEl.innerHTML = rows || '<tr><td colspan="6" style="color:#8aa0b8;padding:12px">No ships</td></tr>';
}

function onSortClick(e){
  const col = e.currentTarget.dataset.col;
  if(sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  renderOrders();
}
function onShipSortClick(e){
  const col = e.currentTarget.dataset.col;
  if(shipSortCol === col) shipSortDir *= -1;
  else { shipSortCol = col; shipSortDir = 1; }
  renderShips();
}

function fmtNum(n){ return typeof n==='number' ? n.toLocaleString(undefined,{maximumFractionDigits:1}) : n; }

document.getElementById('treeSearch').addEventListener('input', function(){
  renderTree(this.value);
  renderOrders();
  renderShips();
});
document.getElementById('groupBy').addEventListener('change', renderOrders);

// Init
loadCommodities().then(loadMarketData);
refreshTimer = setInterval(loadMarketData, 10000);
})();
</script>
</body>
</html>
