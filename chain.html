const lookup = {};
items.forEach(i => lookup[i.id] = i);
const categories = [...new Set(items.map(i=>i.category))];

function buildList(filter) {
  const el = document.getElementById('list');
  const f = (filter||'').toLowerCase();
  let html = '';
  for (const cat of categories) {
    const catItems = items.filter(i => i.category === cat && (!f || i.name.toLowerCase().includes(f)));
    if (!catItems.length) continue;
    html += `<div class="side-cat${f?' open':''}" onclick="this.classList.toggle('open')">${cat} (${catItems.length})</div><div class="side-items">`;
    const subs = [...new Set(catItems.map(i=>i.sub).filter(Boolean))];
    if (subs.length > 0) {
      for (const sub of subs) {
        const subItems = catItems.filter(i=>i.sub===sub);
        html += `<div class="side-cat${f?' open':''}" style="padding-left:8px;font-size:9px" onclick="event.stopPropagation();this.classList.toggle('open')">${sub} (${subItems.length})</div><div class="side-items">`;
        for (const i of subItems) html += `<div class="side-item" onclick="showChain('${i.id}');document.querySelectorAll('.side-item').forEach(b=>b.classList.remove('active'));this.classList.add('active')">${i.name}</div>`;
        html += '</div>';
      }
      const noSub = catItems.filter(i=>!i.sub);
      for (const i of noSub) html += `<div class="side-item" onclick="showChain('${i.id}');document.querySelectorAll('.side-item').forEach(b=>b.classList.remove('active'));this.classList.add('active')">${i.name}</div>`;
    } else {
      for (const i of catItems) html += `<div class="side-item" onclick="showChain('${i.id}');document.querySelectorAll('.side-item').forEach(b=>b.classList.remove('active'));this.classList.add('active')">${i.name}</div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html;
  if (f) document.querySelectorAll('.side-cat').forEach(c => c.classList.add('open'));
}
document.getElementById('search').addEventListener('input', e => buildList(e.target.value));
buildList('');

function getFullTree(id, qty, depth) {
  if (depth > 12) return [];
  const item = lookup[id];
  if (!item || !item.recipe || Object.keys(item.recipe).length === 0)
    return [{id, name: names[id]||item?.name||id, qty, depth, raw: true}];
  let rows = [{id, name: names[id]||item.name, qty, depth, raw: false}];
  for (const [inp, inpQty] of Object.entries(item.recipe))
    rows = rows.concat(getFullTree(inp, inpQty * qty, depth + 1));
  return rows;
}

function getRawTotals(id, qty) {
  const item = lookup[id];
  if (!item || !item.recipe || Object.keys(item.recipe).length === 0) return {[id]: qty};
  let totals = {};
  for (const [inp, inpQty] of Object.entries(item.recipe)) {
    const sub = getRawTotals(inp, inpQty * qty);
    for (const [k, v] of Object.entries(sub)) totals[k] = (totals[k]||0) + v;
  }
  return totals;
}

function showChain(id) {
  const item = lookup[id];
  if (!item) return;
  const tree = getFullTree(id, 1, 0);
  const rawTotals = getRawTotals(id, 1);
  const sorted = Object.entries(rawTotals).sort((a,b) => b[1] - a[1]);
  const el = document.getElementById('content');

  el.innerHTML = `
    <div class="item-title">${item.name}</div>
    <div class="totals">
      <div class="totals-title">Total Raw Materials Required</div>
      ${sorted.map(([rid,qty]) => `<div class="total-row"><span class="qty">${qty}x</span><span class="name">${(names[rid]||rid).replace(/_/g,' ').replace(/\\b\\w/g,c=>c.toUpperCase())}</span></div>`).join('')}
    </div>
    <div class="chain-wrap">
      <div class="chain-title">Production Chain</div>
      ${buildTreeHtml(id, 1, 0)}
    </div>`;
}

function buildTreeHtml(id, qty, depth) {
  if (depth > 12) return '';
  const item = lookup[id];
  if (!item) return `<div class="chain-row" style="padding-left:${depth*8}px"><span class="chain-qty">${qty}x</span><span class="chain-raw">${(names[id]||id).replace(/_/g,' ').replace(/\\b\\w/g,c=>c.toUpperCase())}</span></div>`;
  if (!item.recipe || Object.keys(item.recipe).length === 0) {
    return `<div class="chain-row" style="padding-left:${depth*8}px"><span class="chain-qty">${qty}x</span><span class="chain-raw">${(names[id]||item.name).replace(/_/g,' ').replace(/\\b\\w/g,c=>c.toUpperCase())}</span></div>`;
  }
  const name = (names[id]||item.name).replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  let children = '';
  for (const [inp, inpQty] of Object.entries(item.recipe)) {
    children += buildTreeHtml(inp, inpQty * qty, depth + 1);
  }
  return `<div style="padding-left:${depth*8}px">
    <div class="chain-row" style="cursor:pointer" onclick="const s=this.nextElementSibling;s.style.display=s.style.display==='none'?'block':'none';this.querySelector('.tog').textContent=s.style.display==='none'?'▶':'▼'">
      <span class="chain-qty">${qty}x</span><span class="tog" style="color:#8aa0b8;margin-right:4px">▼</span><span class="chain-name">${name}</span>
    </div>
    <div class="chain-children">${children}</div>
  </div>`;
}
