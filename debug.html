<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Economy - Debug Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0a0e18}
::-webkit-scrollbar-thumb{background:#1a3050;border-radius:3px}
.nav{background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 16px;height:42px;gap:12px;flex-shrink:0}
.nav h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#ef5350;letter-spacing:2px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#66bb6a;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.nav a,.tab-btn{font-size:12px;color:#8aa0b8;text-decoration:none;padding:5px 12px;border:1px solid #1a2844;border-radius:3px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;background:none;transition:all .12s}
.tab-btn:hover,.nav a:hover{color:#4fc3f7;border-color:#4fc3f7}
.tab-btn.active{color:#4fc3f7;border-color:#4fc3f7;background:#0d1a2f}
.nuke-btn{margin-left:auto;color:#ef5350!important;border-color:#ef5350!important;background:#1a0a0a!important}
.nuke-btn:hover{background:#ef5350!important;color:#fff!important}
.tick-info{color:#8aa0b8;font-size:12px;margin-left:auto;margin-right:8px}
.main{flex:1;overflow:hidden;position:relative}
.view{display:none;height:100%;overflow-y:auto;padding:10px}
.view.active{display:block}
.panel{background:#0a0e18;border:1px solid #1a2844;border-radius:4px;padding:10px}
.panel-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8aa0b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #152238}
.stat-row{display:flex;justify-content:space-between;padding:2px 0}
.stat-row .label{color:#8aa0b8;flex:1}
.stat-row .value{color:#4fc3f7;font-weight:500;text-align:right;flex-shrink:0}
.badge{display:inline-block;font-size:12px;padding:1px 5px;border-radius:2px;letter-spacing:0.5px}
.badge-ok{background:#66bb6a22;color:#66bb6a}
.badge-halt{background:#ef535022;color:#ef5350}
.badge-high{background:#66bb6a22;color:#66bb6a}
.badge-medium{background:#4fc3f722;color:#4fc3f7}
.badge-low{background:#ffd54f22;color:#ffd54f}
.badge-none{background:#ef535022;color:#ef5350}
.overview-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));grid-auto-rows:min-content;gap:8px}
@media(max-width:1400px){.overview-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:1000px){.overview-grid{grid-template-columns:1fr 1fr}}
/* Tables with sticky headers */
.tbl-wrap{overflow:auto;max-height:calc(100vh - 120px)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8aa0b8;letter-spacing:1px;text-align:left;padding:4px 6px;border-bottom:1px solid #1a2844;position:sticky;top:0;background:#0a0e18;z-index:1}
.tbl td{padding:4px 6px;border-bottom:1px solid #0f1a28;font-size:12px;vertical-align:top}
.tbl tr:hover td{background:#0d1525}
/* Ships */
.ship-card{background:#0a0e18;border:1px solid #1a2844;border-radius:4px;padding:8px 10px;margin-bottom:4px;cursor:pointer;transition:border-color .1s}
.ship-card:hover{border-color:#4fc3f7}
.ship-card.selected{border-color:#4fc3f7;background:#0d1525}
.ship-header{display:flex;align-items:center;gap:8px}
.ship-name{color:#e0e8f0;font-weight:500}
.ship-class{color:#8aa0b8;font-size:12px}
.ship-detail{margin-top:6px;padding-top:6px;border-top:1px solid #152238}
.ship-detail .row{display:flex;gap:12px;padding:1px 0}
.ship-detail .row .k{color:#8aa0b8;width:80px}
.ship-detail .row .v{color:#c8d4e0}
.cargo-bar{height:6px;background:#152238;border-radius:3px;margin-top:3px;overflow:hidden}
.cargo-fill{height:100%;background:#4fc3f7;border-radius:3px}
/* System detail */
.sys-panel{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:900px){.sys-panel{grid-template-columns:1fr}}
/* Filters - persistent bar that doesn't get replaced */
.filter-bar{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-shrink:0;position:sticky;top:0;z-index:5;background:#0a0e18;padding:8px 0}
.filter-input{background:#0a1020;border:1px solid #1a3050;color:#c8d4e0;font-size:12px;padding:4px 8px;border-radius:3px;font-family:inherit;width:200px}
.filter-select{background:#0a1020;border:1px solid #1a3050;color:#c8d4e0;font-size:12px;padding:4px 8px;border-radius:3px;font-family:inherit}
</style>
</head>
<body>
<div class="nav">
  <div class="live-dot"></div>
  <h1>Dashboard</h1>
  <button class="tab-btn active" data-tab="overview">Overview</button>
  <button class="tab-btn" data-tab="stations">Stations</button>
  <button class="tab-btn" data-tab="ships">Ships</button>
  <button class="tab-btn" data-tab="market">Market</button>
  <button class="tab-btn" data-tab="systems">Systems</button>
  <span class="tick-info" id="tickInfo">T0</span>
  <select id="simSpeed" style="background:#0a1020;border:1px solid #1a3050;color:#8aa0b8;font-size:12px;padding:2px 6px;border-radius:3px;font-family:inherit">
    <option value="1">1x</option>
    <option value="5">5x</option>
    <option value="10">10x</option>
    <option value="30">30x</option>
    <option value="60">60x</option>
    <option value="120">120x</option>
  </select>
  <a href="/">Game</a>
  <a href="/docs">Docs</a>
  <button class="tab-btn nuke-btn" id="nukeBtn">Nuke</button>
</div>
<div class="main">
  <!-- Overview -->
  <div class="view active" id="view-overview"><div id="overviewContent"></div></div>
  <!-- Stations: filter bar is static, only data area updates -->
  <div class="view" id="view-stations">
    <div class="filter-bar">
      <input type="search" class="filter-input" id="stFilter" placeholder="Filter stations...">
      <select class="filter-select" id="stStatusFilter"><option value="">All</option><option value="active">Active</option><option value="halted">Halted</option></select>
      <select class="filter-select" id="stSortBy"><option value="system">Sort: System</option><option value="station">Sort: Station</option><option value="status">Sort: Status</option></select>
      <select class="filter-select" id="stGroupBy"><option value="none">Group: None</option><option value="faction">Group: Faction</option><option value="region">Group: Region</option><option value="type">Group: Type</option></select>
    </div>
    <div class="tbl-wrap"><table class="tbl"><thead id="stHead"><tr><th>System</th><th>Station</th><th>Sec</th><th>Production Lines</th><th>Buy Orders</th></tr></thead><tbody id="stBody"></tbody></table></div>
  </div>
  <!-- Ships: static filter bar -->
  <div class="view" id="view-ships">
    <div class="filter-bar">
      <input type="search" class="filter-input" id="shipFilter" placeholder="Filter ships...">
      <select class="filter-select" id="shipStateFilter">
        <option value="">All states</option>
        <option value="idle">Idle</option>
        <option value="traveling">Traveling</option>
        <option value="intra_traveling">Intra-travel</option>
        <option value="loading">Loading</option>
        <option value="unloading">Unloading</option>
        <option value="mining">Mining</option>
      </select>
      <select class="filter-select" id="shipRoleFilter">
        <option value="">All roles</option>
        <option value="hauler">Traders</option>
        <option value="miner">Miners</option>
      </select>
    </div>
    <div id="shipList"></div>
  </div>
  <!-- Market: static filter bar -->
  <div class="view" id="view-market">
    <div class="filter-bar">
      <input type="search" class="filter-input" id="mktSearch" placeholder="Search items...">
      <select class="filter-select" id="mktCommodityFilter"><option value="">All commodities</option></select>
      <select class="filter-select" id="mktSystemFilter"><option value="">All systems</option></select>
      <select class="filter-select" id="mktSortBy"><option value="commodity">Sort: Name</option><option value="price_asc">Sort: Price Low</option><option value="price_desc">Sort: Price High</option><option value="stock_desc">Sort: Stock High</option></select>
    </div>
    <div class="tbl-wrap" style="padding-right:8px"><table class="tbl" style="table-layout:fixed;width:100%"><thead><tr><th style="width:20%">Item</th><th style="width:16%">System</th><th style="width:18%">Station</th><th style="width:12%;text-align:right">Price</th><th style="width:10%;text-align:right">Stock</th><th style="width:12%;text-align:right">Buy Demand</th><th style="width:12%;text-align:right">Sell Supply</th></tr></thead><tbody id="mktBody"></tbody></table></div>
  </div>
  <!-- Systems: static dropdown -->
  <div class="view" id="view-systems">
    <div class="filter-bar">
      <select class="filter-select" id="sysSelect" style="width:250px"></select>
    </div>
    <div id="sysContent"></div>
  </div>
</div>
<script>
function fmtName(s){return s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
// ── Persistent UI state (survives re-renders) ───────────────────────────────
let D = null;
let selectedShip = null;
let selectedSystem = '';
let mktCommoditiesPopulated = false;
let mktSystemsPopulated = false;
let sysOptionsPopulated = false;

// ── Tabs ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.tab).classList.add('active');
    render();
  });
});

// ── Fetch (every 2s, only updates data, never touches filter DOM) ───────────
async function fetchData() {
  try {
    const r = await fetch('/api/debug');
    D = await r.json();
    document.getElementById('tickInfo').textContent = `T${D.tick} | ${D.npc_ships} ships | ${D.trade_volume} trades`;
    render();
  } catch(e) { console.error(e); }
}
fetchData();
setInterval(fetchData, 2000);

function render() {
  if (!D) return;
  const active = document.querySelector('.view.active');
  if (active.id === 'view-overview') renderOverview();
  else if (active.id === 'view-stations') renderStations();
  else if (active.id === 'view-ships') renderShips();
  else if (active.id === 'view-market') renderMarket();
  else if (active.id === 'view-systems') renderSystems();
}

// ── Overview ────────────────────────────────────────────────────────────────
function renderOverview() {
  const s = D.ships_by_state || {};
  const uptime = D.uptime_seconds;
  const h = Math.floor(uptime/3600), m = Math.floor((uptime%3600)/60), sec = uptime%60;
  let totalProducing = 0, totalHalted = 0;
  const haltedList = [];
  for (const [sid, sys] of Object.entries(D.systems || {})) {
    for (const st of sys.stations) {
      for (const p of st.production) {
        if (p.halted) { totalHalted++; haltedList.push({station: st.name, system: sys.name, output: p.name}); }
        else totalProducing++;
      }
    }
  }
  const inv = D.total_inventory || {};
  const topInv = Object.entries(inv).sort((a,b) => b[1]-a[1]).slice(0, 12);
  const events = (D.recent_events || []).slice().reverse().slice(0, 25);

  document.getElementById('overviewContent').innerHTML = `<div class="overview-grid">
    <div class="panel">
      <div class="panel-title">Simulation</div>
      <div class="stat-row"><span class="label">Tick</span><span class="value">${D.tick}</span></div>
      <div class="stat-row"><span class="label">Uptime</span><span class="value">${h}h ${m}m ${sec}s</span></div>
      <div class="stat-row"><span class="label">Systems</span><span class="value">${Object.keys(D.systems||{}).length}</span></div>
      <div class="stat-row"><span class="label">Ships</span><span class="value">${D.npc_ships}</span></div>
      <div class="stat-row"><span class="label">Trades</span><span class="value">${D.trade_volume}</span></div>
      <div class="stat-row" style="margin-top:6px;border-top:1px solid #152238;padding-top:4px"><span class="label">Idle</span><span class="value">${s.idle||0}</span></div>
      <div class="stat-row"><span class="label">Traveling</span><span class="value">${(s.traveling||0)+(s.intra_traveling||0)}</span></div>
      <div class="stat-row"><span class="label">Loading</span><span class="value">${(s.loading||0)+(s.unloading||0)}</span></div>
      <div class="stat-row"><span class="label">Mining</span><span class="value">${s.mining||0}</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">Production</div>
      <div class="stat-row"><span class="label">Active</span><span class="value" style="color:#66bb6a">${totalProducing}</span></div>
      <div class="stat-row"><span class="label">Halted</span><span class="value" style="color:#ef5350">${totalHalted}</span></div>
      ${haltedList.slice(0,8).map(h=>`<div class="stat-row"><span class="label">${h.station}</span><span class="value" style="color:#ef5350;font-size:12px">${h.output}</span></div>`).join('')}
    </div>
    <div class="panel">
      <div class="panel-title">Warfare</div>
      <div class="stat-row"><span class="label">Destroyed</span><span class="value" style="color:#ef5350">${(D.warfare||{}).ships_destroyed||0}</span></div>
      <div class="stat-row"><span class="label">Built</span><span class="value" style="color:#66bb6a">${(D.warfare||{}).ships_built||0}</span></div>
      <div class="stat-row"><span class="label">Ammo Used</span><span class="value">${(D.warfare||{}).ammo_consumed||0}</span></div>
      ${(()=>{const w=D.warfare||{};const fs=w.fleet_strength||{};return Object.entries(fs).map(([f,s])=>`<div class="stat-row"><span class="label">${fmtName(f)}</span><span class="value">${s}</span></div>`).join('');})()}
    </div>
    <div class="panel">
      <div class="panel-title">Inventory (Top)</div>
      ${topInv.map(([k,v])=>`<div class="stat-row"><span class="label">${fmtName(k)}</span><span class="value">${Math.round(v)}</span></div>`).join('')}
    </div>
    <div class="panel">
      <div class="panel-title">Demand Balance</div>
      ${(()=>{const dem=D.demand||{};const sorted=Object.entries(dem).sort((a,b)=>a[1].ticks_remaining-b[1].ticks_remaining);return sorted.slice(0,10).map(([k,v])=>{const col=v.ticks_remaining<10?'#ef5350':v.ticks_remaining<50?'#ffd54f':'#66bb6a';return `<div class="stat-row"><span class="label">${v.name||fmtName(k)}</span><span class="value" style="color:${col}">${v.ticks_remaining<9999?v.ticks_remaining+'t':'OK'}</span></div>`;}).join('');})()}
    </div>
    <div class="panel">
      <div class="panel-title">Buy Orders</div>
      ${(()=>{
        let allBuys=[];
        for(const sys of Object.values(D.systems||{})){for(const st of sys.stations){for(const b of (st.buy_orders||[])){allBuys.push({...b,station:st.name});}}}
        allBuys.sort((a,b)=>b.qty-a.qty);
        return allBuys.slice(0,8).map(b=>`<div class="stat-row"><span class="label">${fmtName(b.commodity)}</span><span class="value">${Math.round(b.qty)}</span></div>`).join('')||'<div style="color:#8aa0b8">None</div>';
      })()}
    </div>
    <div class="panel">
      <div class="panel-title">Battles</div>
      ${(()=>{const battles=(D.warfare||{}).recent_battles||[];return battles.slice(-5).map(b=>`<div style="padding:2px 0;font-size:12px;border-bottom:1px solid #0a1420"><span style="color:#ef5350">${b.attacker}</span> vs <span style="color:#4fc3f7">${b.defender}</span> ${b.a_losses}+${b.d_losses}</div>`).join('')||'<div style="color:#8aa0b8">No battles yet</div>';})()}
    </div>
    <div class="panel">
      <div class="panel-title">Events</div>
      ${events.slice(0,10).map(e=>`<div style="padding:1px 0;font-size:12px;border-bottom:1px solid #0a1420"><span style="color:#8aa0b8;margin-right:4px">T${e.tick}</span>${e.msg}</div>`).join('')}
    </div>
  </div>`;
}

// ── Stations ────────────────────────────────────────────────────────────────
function renderStations() {
  const stFilter = (document.getElementById('stFilter')?.value || '').toLowerCase();
  const stStatus = document.getElementById('stStatusFilter')?.value || '';
  const stSort = document.getElementById('stSortBy')?.value || 'system';
  const stGroup = document.getElementById('stGroupBy')?.value || 'none';

  let allRows = [];
  for (const [sid, sys] of Object.entries(D.systems || {})) {
    for (const st of sys.stations) {
      if (!st.production.length) continue;
      allRows.push({sys: sys.name, station: st.name, security: sys.security, faction: sys.faction||'unclaimed', region: sys.region||'', type: st.type||'', production: st.production, buyOrders: st.buy_orders || []});
    }
  }
  if (stFilter) allRows = allRows.filter(r => r.sys.toLowerCase().includes(stFilter) || r.station.toLowerCase().includes(stFilter) || r.faction.toLowerCase().includes(stFilter) || r.production.some(p=>p.name.toLowerCase().includes(stFilter)));
  if (stStatus === 'active') allRows = allRows.filter(r => r.production.some(p=>!p.halted));
  if (stStatus === 'halted') allRows = allRows.filter(r => r.production.every(p=>p.halted));
  if (stSort === 'station') allRows.sort((a,b) => a.station.localeCompare(b.station));
  else if (stSort === 'status') allRows.sort((a,b) => {const aH=a.production.filter(p=>p.halted).length; const bH=b.production.filter(p=>p.halted).length; return bH-aH;});
  else allRows.sort((a,b) => a.sys.localeCompare(b.sys));

  // Group
  let groups = {'': allRows};
  if (stGroup === 'faction') { groups = {}; allRows.forEach(r => { const k=r.faction; if(!groups[k])groups[k]=[]; groups[k].push(r); }); }
  else if (stGroup === 'region') { groups = {}; allRows.forEach(r => { const k=r.region||'Unknown'; if(!groups[k])groups[k]=[]; groups[k].push(r); }); }
  else if (stGroup === 'type') { groups = {}; allRows.forEach(r => { const k=r.type||'unknown'; if(!groups[k])groups[k]=[]; groups[k].push(r); }); }

  let rows = '';
  for (const [groupName, items] of Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0]))) {
    if (stGroup !== 'none') rows += `<tr><td colspan="5" style="background:#0a1828;color:#4fc3f7;font-weight:bold;padding:8px;text-transform:uppercase;letter-spacing:1px">${groupName} (${items.length})</td></tr>`;
    for (const r of items) {
      const prodLines = r.production.map(p => {
        const status = p.halted ? '<span class="badge badge-halt">HALT</span>' : `<span class="badge badge-ok">${p.actual.toFixed(1)}/t</span>`;
        const inputs = p.inputs.map(i => {
          const pct = Math.min(100, (i.have / Math.max(i.need, 0.1)) * 100);
          const col = pct > 50 ? '#66bb6a' : pct > 10 ? '#ffd54f' : '#ef5350';
          return `<span style="color:${col}" title="${i.name}: ${i.have}/${i.need}">${i.name.split(' ')[0]}:${Math.round(i.have)}</span>`;
        }).join(' ');
        return `<div style="padding:2px 0;border-bottom:1px solid #0a1420"><span style="color:#ffd54f">${p.name}</span> ${status} <span style="color:#4fc3f7;margin:0 6px">stk:${Math.round(p.stock)}</span><span style="font-size:12px">${inputs}</span></div>`;
      }).join('');
      const buys = r.buyOrders.slice(0,4).map(b => `<div style="font-size:12px;padding:1px 0"><span style="color:#ef5350">${fmtName(b.commodity)}</span> ${Math.round(b.qty)} @${b.price.toFixed(0)}</div>`).join('');
      rows += `<tr><td>${r.sys}</td><td>${r.station}</td><td><span class="badge badge-${r.security}">${r.security}</span></td><td style="vertical-align:top">${prodLines}</td><td style="vertical-align:top">${buys||'-'}</td></tr>`;
    }
  }
  document.getElementById('stBody').innerHTML = rows;
}
// Station filter handlers
document.getElementById('stFilter')?.addEventListener('input', () => renderStations());
document.getElementById('stStatusFilter')?.addEventListener('change', () => renderStations());
document.getElementById('stSortBy')?.addEventListener('change', () => renderStations());
document.getElementById('stGroupBy')?.addEventListener('change', () => renderStations());

// ── Ships (only updates shipList div, filter bar is static) ─────────────────
function renderShips() {
  const ships = D.ships || [];
  const stateColors = {idle:'#66bb6a',traveling:'#4fc3f7',intra_traveling:'#4fc3f7',loading:'#ffd54f',unloading:'#ff8a65',mining:'#ab47bc'};
  const textF = document.getElementById('shipFilter').value.toLowerCase();
  const stateF = document.getElementById('shipStateFilter').value;
  const roleF = document.getElementById('shipRoleFilter').value;

  let html = '';
  for (const s of ships) {
    // Apply filters
    if (textF && !s.name.toLowerCase().includes(textF) && !s.location.toLowerCase().includes(textF)) continue;
    if (stateF && s.state !== stateF) continue;
    if (roleF && s.role !== roleF) continue;

    const isSelected = selectedShip === s.id;
    const cargoPct = s.cargo_capacity > 0 ? (s.cargo_used / s.cargo_capacity * 100) : 0;
    const cargoStr = Object.entries(s.cargo).map(([k,v]) => `${Math.round(v)} ${k}`).join(', ') || 'empty';
    const col = stateColors[s.state] || '#8aa0b8';

    let detail = '';
    if (isSelected) {
      detail = `<div class="ship-detail">
        <div class="row"><span class="k">State</span><span class="v" style="color:${col}">${s.state}${s.timer ? ' ('+s.timer+'t)' : ''}</span></div>
        <div class="row"><span class="k">Location</span><span class="v">${s.location}</span></div>
        <div class="row"><span class="k">Destination</span><span class="v">${s.destination || '-'}</span></div>
        <div class="row"><span class="k">Route</span><span class="v">${s.route_path.length ? s.route_path.join(' > ') : '-'}</span></div>
        <div class="row"><span class="k">Risk</span><span class="v">${(s.risk_tolerance*100).toFixed(0)}%</span></div>
        <div class="row"><span class="k">Cargo</span><span class="v">${cargoStr}</span></div>
        <div class="cargo-bar"><div class="cargo-fill" style="width:${cargoPct}%"></div></div>
        <div style="font-size:12px;color:#8aa0b8;margin-top:2px">${Math.round(s.cargo_used)}/${s.cargo_capacity} capacity</div>
      </div>`;
    }
    html += `<div class="ship-card ${isSelected?'selected':''}" data-id="${s.id}">
      <div class="ship-header">
        <span class="badge" style="background:${col}22;color:${col}">${s.state}</span>
        <span class="badge" style="background:#1a284422;color:#8aa0b8">${s.role}</span>
        <span class="ship-name">${s.name}</span>
        <span class="ship-class">${s.ship_class}</span>
        <span style="margin-left:auto;color:#8aa0b8;font-size:12px">${s.location}</span>
      </div>${detail}
    </div>`;
  }
  document.getElementById('shipList').innerHTML = html;
}

// Ship click handler (delegated, won't break on re-render)
document.getElementById('shipList').addEventListener('click', e => {
  const card = e.target.closest('.ship-card');
  if (!card) return;
  const id = card.dataset.id;
  selectedShip = selectedShip === id ? null : id;
  renderShips();
});
// Filter change handlers (just re-render, state lives in DOM inputs which are static)
document.getElementById('shipFilter').addEventListener('input', () => renderShips());
document.getElementById('shipStateFilter').addEventListener('change', () => renderShips());
document.getElementById('shipRoleFilter').addEventListener('change', () => renderShips());

// ── Market (tabular, filterable by commodity and system) ────────────────────
const TIER_MAP = {}; // populated from API
fetch('/api/data/commodities').then(r=>r.json()).then(data=>{data.forEach(c=>{TIER_MAP[c.id]=c.tier;});});
function renderMarket() {
  const prices = D.prices || {};
  const commodities = Object.keys(prices).sort();
  const searchVal = (document.getElementById('mktSearch')?.value||'').toLowerCase();

  // Populate filters (once)
  if (!mktCommoditiesPopulated && commodities.length) {
    const sel = document.getElementById('mktCommodityFilter');
    for (const c of commodities) {
      const opt = document.createElement('option'); opt.value = c; opt.textContent = fmtName(c); sel.appendChild(opt);
    }
    mktCommoditiesPopulated = true;
  }
  if (!mktSystemsPopulated) {
    const systemNames = new Set();
    for (const entries of Object.values(prices)) entries.forEach(e => systemNames.add(e.system));
    if (systemNames.size) {
      const sel = document.getElementById('mktSystemFilter');
      for (const name of [...systemNames].sort()) {
        const opt = document.createElement('option'); opt.value = name; opt.textContent = name; sel.appendChild(opt);
      }
      mktSystemsPopulated = true;
    }
  }

  const comF = document.getElementById('mktCommodityFilter').value;
  const sysF = document.getElementById('mktSystemFilter').value;
  const sortBy = document.getElementById('mktSortBy')?.value || 'commodity';

  let allEntries = [];
  for (const c of commodities) {
    if (comF && c !== comF) continue;
    const name = fmtName(c);
    if (searchVal && !name.toLowerCase().includes(searchVal)) continue;
    for (const e of prices[c]) {
      if (sysF && e.system !== sysF) continue;
      // Find buy demand and sell supply from station data
      let buyDemand = 0, sellSupply = 0;
      const sysData = Object.values(D.systems||{}).find(s => s.name === e.system);
      if (sysData) {
        const st = sysData.stations.find(s => s.name === e.station);
        if (st) {
          const bo = (st.buy_orders||[]).find(b => b.commodity === c);
          if (bo) buyDemand = bo.qty;
          sellSupply = e.stock;
        }
      }
      allEntries.push({commodity: c, name, buyDemand, sellSupply, ...e});
    }
  }
  if (sortBy === 'price_asc') allEntries.sort((a,b) => a.price - b.price);
  else if (sortBy === 'price_desc') allEntries.sort((a,b) => b.price - a.price);
  else if (sortBy === 'stock_desc') allEntries.sort((a,b) => b.stock - a.stock);
  else allEntries.sort((a,b) => a.name.localeCompare(b.name));

  let rows = '';
  for (const e of allEntries) {
    rows += `<tr><td style="color:#ffd54f">${e.name}</td><td>${e.system}</td><td style="color:#8aa0b8">${e.station}</td><td style="color:#e0e8f0;text-align:right">${e.price.toFixed(0)}</td><td style="color:#4fc3f7;text-align:right">${Math.round(e.stock)}</td><td style="color:#ef5350;text-align:right">${Math.round(e.buyDemand)||'-'}</td><td style="color:#66bb6a;text-align:right">${Math.round(e.sellSupply)||'-'}</td></tr>`;
  }
  document.getElementById('mktBody').innerHTML = rows;
}

function getTier(commodity_id) {
  return TIER_MAP[commodity_id] || '?';
}

document.getElementById('mktCommodityFilter').addEventListener('change', () => renderMarket());
document.getElementById('mktSystemFilter').addEventListener('change', () => renderMarket());
document.getElementById('mktSearch').addEventListener('input', () => renderMarket());
document.getElementById('mktSortBy').addEventListener('change', () => renderMarket());
document.getElementById('mktSortBy')?.addEventListener('change', () => renderMarket());

// ── Systems ─────────────────────────────────────────────────────────────────
function renderSystems() {
  const systems = D.systems || {};
  const sids = Object.keys(systems).sort((a,b) => systems[a].name.localeCompare(systems[b].name));

  // Populate dropdown once
  const sel = document.getElementById('sysSelect');
  if (!sysOptionsPopulated && sids.length) {
    for (const sid of sids) {
      const opt = document.createElement('option'); opt.value = sid; opt.textContent = `${systems[sid].name} (${systems[sid].security})`; sel.appendChild(opt);
    }
    sysOptionsPopulated = true;
  }

  if (!selectedSystem) selectedSystem = sel.value || sids[0] || '';

  const sys = systems[selectedSystem];
  if (!sys) { document.getElementById('sysContent').innerHTML = ''; return; }

  const stationPanels = sys.stations.map(st => {
    const prodRows = st.production.map(p => {
      const status = p.halted ? '<span class="badge badge-halt">HALTED</span>' : `<span class="badge badge-ok">${p.actual.toFixed(1)}/t</span>`;
      const inputRows = p.inputs.map(i => {
        const pct = Math.min(100, (i.have / Math.max(i.need, 0.1)) * 100);
        const col = pct > 50 ? '#66bb6a' : pct > 10 ? '#ffd54f' : '#ef5350';
        return `<div class="stat-row"><span class="label" style="padding-left:12px">${i.name}</span><span class="value" style="color:${col}">${i.have.toFixed(1)} / ${i.need.toFixed(1)}</span></div>`;
      }).join('');
      return `<div class="stat-row"><span class="label" style="color:#ffd54f">${p.name}</span>${status}</div><div class="stat-row"><span class="label" style="padding-left:12px">Stock</span><span class="value">${p.stock}</span></div>${inputRows}`;
    }).join('');
    const invRows = Object.entries(st.inventory).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v])=>`<div class="stat-row"><span class="label">${fmtName(k)}</span><span class="value">${Math.round(v)}</span></div>`).join('');
    // Order book
    const sellRows = (st.sell_orders||[]).slice(0,5).map(o=>`<div class="stat-row"><span class="label" style="color:#66bb6a">${o.commodity}</span><span class="value">${Math.round(o.qty)} @ ${o.price.toFixed(0)}</span></div>`).join('');
    const buyRows = (st.buy_orders||[]).slice(0,5).map(o=>`<div class="stat-row"><span class="label" style="color:#ef5350">${o.commodity}</span><span class="value">${Math.round(o.qty)} @ ${o.price.toFixed(0)}</span></div>`).join('');
    return `<div class="panel"><div class="panel-title">${st.name} <span class="badge badge-${sys.security}">${st.type}</span></div>${prodRows||'<div style="color:#8aa0b8;font-size:12px">No production</div>'}
    <div style="margin-top:6px;border-top:1px solid #152238;padding-top:4px;font-size:12px;color:#8aa0b8">SELL ORDERS</div>${sellRows||'<div style="color:#8aa0b8;font-size:12px">None</div>'}
    <div style="margin-top:6px;border-top:1px solid #152238;padding-top:4px;font-size:12px;color:#8aa0b8">BUY ORDERS (DEMAND)</div>${buyRows||'<div style="color:#8aa0b8;font-size:12px">None</div>'}
    <div style="margin-top:6px;border-top:1px solid #152238;padding-top:4px;font-size:12px;color:#8aa0b8">INVENTORY</div>${invRows||'<div style="color:#8aa0b8">Empty</div>'}</div>`;
  }).join('');

  const shipsHere = (D.ships||[]).filter(s => s.location_id === selectedSystem);
  const shipList = shipsHere.map(s => `<div style="padding:2px 0;font-size:12px"><span class="badge" style="background:${s.role==='miner'?'#ab47bc22':'#4fc3f722'};color:${s.role==='miner'?'#ab47bc':'#4fc3f7'}">${s.role}</span> ${s.name} <span style="color:#8aa0b8">(${s.state})</span></div>`).join('');
  const beltInfo = sys.belts.map(b => `<div class="stat-row"><span class="label">${b.name}</span><span class="value">${b.yields.map(y=>fmtName(y)).join(', ')} (d:${b.density})</span></div>`).join('');

  document.getElementById('sysContent').innerHTML = `<div class="sys-panel"><div>${stationPanels}</div><div>
    <div class="panel"><div class="panel-title">System Info</div>
      <div class="stat-row"><span class="label">Cluster</span><span class="value">${sys.cluster}</span></div>
      <div class="stat-row"><span class="label">Security</span><span class="value"><span class="badge badge-${sys.security}">${sys.security}</span></span></div>
      <div class="stat-row"><span class="label">Type</span><span class="value">${sys.type}</span></div>
      <div class="stat-row"><span class="label">Connections</span><span class="value">${sys.connections.length}</span></div>
      <div class="stat-row"><span class="label">Ships here</span><span class="value">${sys.ships_count}</span></div>
    </div>
    <div class="panel"><div class="panel-title">Economic Status</div>
      ${(()=>{
        const totalProd = sys.stations.reduce((s,st)=>s+st.production.length, 0);
        const halted = sys.stations.reduce((s,st)=>s+st.production.filter(p=>p.halted).length, 0);
        const active = totalProd - halted;
        const totalBuys = sys.stations.reduce((s,st)=>s+(st.buy_orders||[]).length, 0);
        const totalSells = sys.stations.reduce((s,st)=>s+(st.sell_orders||[]).length, 0);
        const health = totalProd > 0 ? Math.round(active/totalProd*100) : 0;
        const hCol = health > 70 ? '#66bb6a' : health > 30 ? '#ffd54f' : '#ef5350';
        return `<div class="stat-row"><span class="label">Production Health</span><span class="value" style="color:${hCol}">${health}% (${active}/${totalProd})</span></div>
        <div class="stat-row"><span class="label">Active Buy Orders</span><span class="value" style="color:#ef5350">${totalBuys}</span></div>
        <div class="stat-row"><span class="label">Sell Orders</span><span class="value" style="color:#66bb6a">${totalSells}</span></div>`;
      })()}
    </div>
    <div class="panel"><div class="panel-title">Asteroid Fields</div>${beltInfo||'<div style="color:#8aa0b8">None</div>'}</div>
    <div class="panel"><div class="panel-title">Ships in System (${shipsHere.length})</div>${shipList||'<div style="color:#8aa0b8">None</div>'}</div>
  </div></div>`;
}

document.getElementById('sysSelect').addEventListener('change', e => {
  selectedSystem = e.target.value;
  renderSystems();
});

// ── Nuke ────────────────────────────────────────────────────────────────────
document.getElementById('nukeBtn').addEventListener('click', async () => {
  if (!confirm('NUKE: Reset the entire simulation to initial state?')) return;
  await fetch('/api/nuke', {method: 'POST'});
  fetchData();
});

// Sim speed control
const simSpeedSelect = document.getElementById('simSpeed');
simSpeedSelect.addEventListener('change', async () => {
  await fetch('/api/speed', {method: 'POST', body: JSON.stringify({multiplier: parseInt(simSpeedSelect.value)})});
});
// Load current speed
fetch('/api/speed').then(r=>r.json()).then(d=>{simSpeedSelect.value=d.multiplier;});
</script>
