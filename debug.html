<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Economy - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0a0e18}
::-webkit-scrollbar-thumb{background:#1a3050;border-radius:3px}
.nav{background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 16px;height:42px;gap:12px;flex-shrink:0}
.nav h1{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#ef5350;letter-spacing:2px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#66bb6a;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.nav a,.tab-btn{font-size:12px;color:#8aa0b8;text-decoration:none;padding:5px 12px;border:1px solid #1a2844;border-radius:3px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;background:none;transition:all .12s}
.tab-btn:hover,.nav a:hover{color:#4fc3f7;border-color:#4fc3f7}
.tab-btn.active{color:#4fc3f7;border-color:#4fc3f7;background:#0d1a2f}
.nuke-btn{margin-left:auto;color:#ef5350!important;border-color:#ef5350!important;background:#1a0a0a!important}
.nuke-btn:hover{background:#ef5350!important;color:#fff!important}
.tick-info{color:#8aa0b8;font-size:12px;margin-left:auto;margin-right:8px}
.main{flex:1;overflow:hidden;position:relative}
.view{display:none;height:100%;overflow:hidden;user-select:text}
.view.active{display:block}
#view-overview{overflow-y:auto;padding:10px}
#view-systems{overflow-y:auto;padding:10px}
.panel{background:#0a0e18;border:1px solid #1a2844;border-radius:4px;padding:10px}
.panel-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8aa0b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #152238}
.stat-row{display:flex;justify-content:space-between;padding:2px 0}
.stat-row .label{color:#8aa0b8;flex:1}
.stat-row .value{color:#4fc3f7;font-weight:500;text-align:right;flex-shrink:0}
.badge{display:inline-block;font-size:12px;padding:1px 5px;border-radius:2px;letter-spacing:0.5px}
.badge-ok{background:#66bb6a22;color:#66bb6a}
.badge-halt{background:#ef535022;color:#ef5350}
.badge-high{background:#66bb6a22;color:#66bb6a}
.badge-medium{background:#4fc3f722;color:#4fc3f7}
.badge-low{background:#ffd54f22;color:#ffd54f}
.badge-none{background:#ef535022;color:#ef5350}
.overview-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));grid-auto-rows:min-content;gap:8px}
@media(max-width:1400px){.overview-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:1000px){.overview-grid{grid-template-columns:1fr 1fr}}
/* Tables with sticky headers */
.tbl-wrap{overflow:auto;max-height:calc(100vh - 120px)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8aa0b8;letter-spacing:1px;text-align:left;padding:4px 6px;border-bottom:1px solid #1a2844;position:sticky;top:0;background:#0a0e18;z-index:1}
.tbl td{padding:4px 6px;border-bottom:1px solid #0f1a28;font-size:12px;vertical-align:top}
.tbl tr:hover td{background:#0d1525}
/* Ships */
.ship-card{background:#0a0e18;border:1px solid #1a2844;border-radius:4px;padding:8px 10px;margin-bottom:4px;cursor:pointer;transition:border-color .1s}
.ship-card:hover{border-color:#4fc3f7}
.ship-card.selected{border-color:#4fc3f7;background:#0d1525}
.ship-header{display:flex;align-items:center;gap:8px}
.ship-name{color:#e0e8f0;font-weight:500}
.ship-class{color:#8aa0b8;font-size:12px}
.ship-detail{margin-top:6px;padding-top:6px;border-top:1px solid #152238}
.ship-detail .row{display:flex;gap:12px;padding:1px 0}
.ship-detail .row .k{color:#8aa0b8;width:80px}
.ship-detail .row .v{color:#c8d4e0}
.cargo-bar{height:6px;background:#152238;border-radius:3px;margin-top:3px;overflow:hidden}
.cargo-fill{height:100%;background:#4fc3f7;border-radius:3px}
/* System detail */
.sys-panel{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:900px){.sys-panel{grid-template-columns:1fr}}
/* Filters - persistent bar that doesn't get replaced */
.filter-bar{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-shrink:0;position:sticky;top:0;z-index:5;background:#0a0e18;padding:8px 0}
.filter-input{background:#0a1020;border:1px solid #1a3050;color:#c8d4e0;font-size:12px;padding:4px 8px;border-radius:3px;font-family:inherit;width:200px}
.filter-select{background:#0a1020;border:1px solid #1a3050;color:#c8d4e0;font-size:12px;padding:4px 8px;border-radius:3px;font-family:inherit}
.mkt-cat{transition:all .1s}.mkt-cat:hover{background:#111a2a}.mkt-cat.active{background:#0d1a2f;color:#4fc3f7 !important}
.tree-panel{width:200px;overflow-y:auto;border-right:1px solid #1a2844;padding:4px;flex-shrink:0;font-size:11px}
.tree-region{padding:3px 6px;cursor:pointer;color:#4fc3f7;font-weight:bold;border-radius:3px}
.tree-region:hover{background:#111a2a}
.tree-region.active{background:#0d1a2f}
.tree-cluster{padding:2px 6px 2px 16px;cursor:pointer;color:#8aa0b8;border-radius:3px}
.tree-cluster:hover{background:#111a2a}
.tree-cluster.active{background:#0d1a2f;color:#4fc3f7}
.tree-system{padding:1px 6px 1px 26px;cursor:pointer;color:#6a8aaa;font-size:10px;border-radius:3px}
.tree-system:hover{background:#111a2a}
.tree-system.active{background:#0d1a2f;color:#4fc3f7}
.tarr{display:inline-block;width:10px;font-size:9px;color:#5a7a9a}
.tree-ch{margin-left:0}
</style>
</head>
<body>
<div class="nav">
  <div class="live-dot"></div>
  <h1>Dashboard</h1>
  <button class="tab-btn active" data-tab="overview">Overview</button>
  <button class="tab-btn" data-tab="factions">Factions</button>
  <button class="tab-btn" data-tab="stations">Stations</button>
  <button class="tab-btn" data-tab="ships">Ships</button>
  <button class="tab-btn" data-tab="combat">Combat</button>
  <button class="tab-btn" data-tab="market">Market</button>
  <button class="tab-btn" data-tab="systems">Systems</button>
  <span class="tick-info" id="tickInfo">T0</span>
  <select id="simSpeed" style="background:#0a1020;border:1px solid #1a3050;color:#8aa0b8;font-size:12px;padding:2px 6px;border-radius:3px;font-family:inherit">
    <option value="1">1x</option>
    <option value="5">5x</option>
    <option value="10">10x</option>
    <option value="30">30x</option>
    <option value="60">60x</option>
    <option value="120">120x</option>
    <option value="240">240x</option>
    <option value="480">480x</option>
  </select>
  <a href="/">Game</a>
  <a href="/docs">Docs</a>
  <a href="/combat">Combat Sim</a>
  <a href="/ship_designer">Ship Designer</a>
  <button class="tab-btn nuke-btn" id="nukeBtn">Nuke</button>
</div>
<div class="main">
  <!-- Overview -->
  <div class="view active" id="view-overview"><div id="overviewContent"></div></div>
  <!-- Factions -->
  <div class="view" id="view-factions"><div id="factionsContent" style="padding:12px;overflow-y:auto;height:100%"></div></div>
  <!-- Stations: aggregate dashboard -->
  <div class="view" id="view-stations">
    <div style="padding:10px;overflow-y:auto;height:100%">
      <div class="filter-bar" style="position:static;padding:0 0 8px 0">
        <input type="search" class="filter-input" id="stFilter" placeholder="Search stations...">
      </div>
      <div id="stSearchResults" style="display:none;margin-bottom:10px"></div>
      <div id="stationsContent"></div>
    </div>
  </div>
  <!-- Ships: aggregate dashboard -->
  <div class="view" id="view-ships">
    <div style="padding:10px;overflow-y:auto;height:100%">
      <div class="filter-bar" style="position:static;padding:0 0 8px 0">
        <input type="search" class="filter-input" id="shipFilter" placeholder="Search ships by name/faction...">
      </div>
      <div id="shipSearchResults" style="display:none;margin-bottom:10px"></div>
      <div id="shipsContent"></div>
    </div>
  </div>
  <!-- Combat Ships -->
  <div class="view" id="view-combat">
    <div style="display:flex;height:100%;overflow:hidden">
      <div id="combatTree" class="tree-panel"></div>
      <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <div class="filter-bar">
          <input type="search" class="filter-input" id="combatFilter" placeholder="Filter military ships...">
          <select class="filter-select" id="combatFactionFilter"><option value="">All factions</option></select>
        </div>
        <div class="tbl-wrap" style="flex:1"><table class="tbl"><thead><tr><th>Ship Class</th><th>Hull</th><th>Faction</th><th>Count</th><th>Target</th><th>Deficit</th><th>Status</th></tr></thead><tbody id="combatBody"></tbody></table></div>
      </div>
    </div>
  </div>
  <!-- Market: static filter bar -->
  <div class="view" id="view-market">
    <iframe src="/market?debug=1" style="width:100%;height:100%;border:none"></iframe>
  </div>
  <!-- Systems: static dropdown -->
  <div class="view" id="view-systems">
    <div class="filter-bar">
      <select class="filter-select" id="sysSelect" style="width:250px"></select>
    </div>
    <div id="sysContent"></div>
  </div>
</div>
<script>
function fmtName(s){return s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
// ── Persistent UI state (survives re-renders) ───────────────────────────────
let D = null;
let lastDebugTick = 0;
let selectedSystem = '';
let sysOptionsPopulated = false;

// ── Tabs ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.tab).classList.add('active');
    render();
  });
});

// ── Fetch (every 2s, only updates data, never touches filter DOM) ───────────
async function fetchData() {
  try {
    const r = await fetch('/api/debug');
    const text = await r.text();
    window._lastDebugSize = text.length;
    const data = JSON.parse(text);
    if (data.error) { console.warn(data.error); return; }
    D = data;
    lastDebugTick = data.tick;
    const _u=D.uptime_seconds||0,_h=Math.floor(_u/3600),_m=Math.floor((_u%3600)/60),_s=_u%60;
    document.getElementById('tickInfo').textContent = `T${D.tick} | ${_h}h${_m}m${_s}s | ${D.npc_ships} ships | ${D.trade_volume} trades`;
    render();
  } catch(e) { console.error(e); }
}
fetchData();
setInterval(fetchData, 2000);

function render() {
  if (!D) return;
  const sel = window.getSelection();
  if(sel && sel.toString().length > 0) return;
  const active = document.querySelector('.view.active');
  if (active.id === 'view-overview') renderOverview();
  else if (active.id === 'view-factions') renderFactions();
  else if (active.id === 'view-stations') renderStations();
  else if (active.id === 'view-ships') renderShips();
  else if (active.id === 'view-combat') renderCombat();
  else if (active.id === 'view-market') renderMarket();
  else if (active.id === 'view-systems') renderSystems();
}

// ── Overview ────────────────────────────────────────────────────────────────
function fmtTask(s){return s?s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()):'Idle';}

function renderFactions() {
  const factions = D.factions || {};
  const phaseColors = {scouting:'#ffd54f',staging:'#ff8a65',constructing:'#66bb6a',complete:'#4fc3f7',requisitioning:'#ffd54f',assembling:'#ff8a65',deployed:'#4fc3f7'};
  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:10px">';
  for (const [fid, f] of Object.entries(factions)) {
    html += '<div style="background:#0a1020;border:1px solid #1a2844;border-radius:6px;padding:12px;display:flex;flex-direction:column">';
    // Header
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-shrink:0">';
    if (f.emblem) html += '<img src="/static/faction_emblems/'+f.emblem+'" style="width:36px;height:36px;border-radius:4px;object-fit:contain">';
    html += '<div><div style="color:#4fc3f7;font-size:13px;font-weight:600">'+(f.name||fid)+'</div>';
    html += '<div style="font-size:10px;color:#8aa0b8">'+f.systems+' systems | Agg: '+f.aggression+' | Exp: '+f.expansion+' | Eco: '+f.economic+'</div></div></div>';
    // Policy Decisions (simple text block, current only)
    if (f.decisions && f.decisions.length) {
      const d = f.decisions[0];
      html += '<div style="color:#c8d4e0;font-size:11px;font-weight:600;letter-spacing:1px;margin-bottom:3px;flex-shrink:0">POLICY</div>';
      html += '<div style="font-size:11px;padding:4px 8px;background:#0d1420;border-radius:4px;margin-bottom:8px;flex-shrink:0;max-height:42px;overflow:hidden"><span style="color:#4fc3f7;font-weight:500">'+fmtTask(d.decision)+'</span> <span style="color:#8aa0b8">'+d.reasoning+'</span></div>';
    }
    // Projects
    if (f.projects && f.projects.length) {
      html += '<div style="color:#c8d4e0;font-size:11px;font-weight:600;letter-spacing:1px;margin-bottom:4px;flex-shrink:0">PROJECTS</div>';
      for (const p of f.projects) {
        const pc = phaseColors[p.phase]||'#8aa0b8';
        html += '<div style="margin-bottom:4px;flex-shrink:0"><div style="font-size:11px;color:#e0e8f0">'+p.name+' <span style="background:'+pc+'22;color:'+pc+';padding:1px 5px;border-radius:2px;font-size:9px;text-transform:uppercase">'+p.phase+'</span></div>';
        html += '<div style="display:flex;align-items:center;gap:6px;margin-top:2px"><div style="flex:1;height:5px;background:#1a2844;border-radius:3px;overflow:hidden"><div style="width:'+Math.min(100,p.progress)+'%;height:100%;background:'+pc+'"></div></div><span style="font-size:10px;color:#8aa0b8;min-width:30px;text-align:right">'+p.progress+'%</span></div></div>';
      }
    }
    // Fleet builds (scrollable)
    if (f.fleet_builds && f.fleet_builds.length) {
      html += '<div style="color:#c8d4e0;font-size:11px;font-weight:600;letter-spacing:1px;margin:4px 0;flex-shrink:0">FLEET BUILDS</div>';
      html += '<div style="max-height:80px;overflow-y:auto;flex-shrink:0">';
      for (const fb of f.fleet_builds) {
        const pc = phaseColors[fb.phase]||'#8aa0b8';
        html += '<div style="margin-bottom:4px"><div style="font-size:11px;color:#e0e8f0">'+fb.name+' <span style="background:'+pc+'22;color:'+pc+';padding:1px 5px;border-radius:2px;font-size:9px;text-transform:uppercase">'+fb.phase+'</span></div>';
        html += '<div style="display:flex;align-items:center;gap:6px;margin-top:2px"><div style="flex:1;height:5px;background:#1a2844;border-radius:3px;overflow:hidden"><div style="width:'+Math.min(100,fb.progress)+'%;height:100%;background:'+pc+'"></div></div><span style="font-size:10px;color:#8aa0b8;min-width:30px;text-align:right">'+fb.progress+'%</span></div></div>';
      }
      html += '</div>';
    }
    // Corporations
    if (f.corporations && f.corporations.length) {
      html += '<div style="color:#c8d4e0;font-size:11px;font-weight:600;letter-spacing:1px;margin:4px 0;flex-shrink:0">CORPORATIONS ('+f.corporations.length+')</div>';
      html += '<div id="corps_'+fid+'" style="max-height:100px;overflow-y:auto;border:1px solid #1a2844;border-radius:4px;padding:4px;flex-shrink:0">';
      for (const c of f.corporations) {
        html += '<div style="display:flex;align-items:center;padding:2px 6px;border-bottom:1px solid #0d1420;font-size:10px;gap:4px">';
        html += '<span style="color:#c8d4e0;flex:1">'+c.name+'</span>';
        html += '<span style="color:#8aa0b8;width:100px;text-align:right">'+fmtTask(c.specialty)+'</span>';
        html += '<span style="color:#4fc3f7;width:100px;text-align:right">'+fmtTask(c.activity)+'</span>';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  // Preserve scroll positions
  const scrolls = {};
  document.querySelectorAll('#factionsContent [id^="corps_"]').forEach(el => { scrolls[el.id] = el.scrollTop; });
  document.getElementById('factionsContent').innerHTML = html;
  // Restore scroll positions
  for (const [id, top] of Object.entries(scrolls)) {
    const el = document.getElementById(id);
    if (el) el.scrollTop = top;
  }
}

function renderOverview() {
  // Don't re-render if user is typing in a search box or has text selected
  const focused = document.activeElement;
  if(focused && (focused.id==='invSearch'||focused.id==='conSearch')) return;
  const sel = window.getSelection();
  if(sel && sel.toString().length > 0) return;
  const s = D.ships_by_state || {};
  const uptime = D.uptime_seconds;
  const h = Math.floor(uptime/3600), m = Math.floor((uptime%3600)/60), sec = uptime%60;
  const prod = D.production || {active:0, halted:0, total:0, bottlenecks:[]};
  const totalProducing = prod.active;
  const totalHalted = prod.halted;
  const topB = (prod.bottlenecks||[]).slice(0,5);
  const inv = D.total_inventory || {};
  const topInv = Object.entries(inv).sort((a,b) => b[1]-a[1]).slice(0, 12);
  const events = (D.recent_events || []).slice().reverse().slice(0, 25);

  document.getElementById('overviewContent').innerHTML = `<div class="overview-grid">
    <div class="panel">
      <div class="panel-title">Simulation</div>
      <div class="stat-row"><span class="label">Tick</span><span class="value">${D.tick}</span></div>
      <div class="stat-row"><span class="label">Uptime</span><span class="value">${h}h ${m}m ${sec}s</span></div>
      <div class="stat-row"><span class="label">Ticks/sec</span><span class="value" style="color:${(D.performance||{}).ticks_per_sec>=0.95?'#66bb6a':'#ef5350'}">${(D.performance||{}).ticks_per_sec||'?'}</span></div>
      <div class="stat-row"><span class="label">Data/update</span><span class="value">${window._lastDebugSize?((window._lastDebugSize/1024).toFixed(1)+'KB'):'?'}</span></div>
      <div class="stat-row"><span class="label">Systems</span><span class="value">${D.systems||0}</span></div>
      <div class="stat-row"><span class="label">Ships</span><span class="value">${D.npc_ships}</span></div>
      <div class="stat-row"><span class="label">Trades</span><span class="value">${D.trade_volume}</span></div>
      <div class="stat-row" style="margin-top:6px;border-top:1px solid #152238;padding-top:4px"><span class="label">Idle</span><span class="value">${s.idle||0}</span></div>
      <div class="stat-row"><span class="label">Traveling</span><span class="value">${(s.traveling||0)+(s.intra_traveling||0)}</span></div>
      <div class="stat-row"><span class="label">Loading</span><span class="value">${(s.loading||0)+(s.unloading||0)}</span></div>
      <div class="stat-row"><span class="label">Mining</span><span class="value">${s.mining||0}</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">Performance</div>
      ${(()=>{const p=D.performance||{};const wt=p.worker_times||{};return `
      <div class="stat-row"><span class="label">Tick total</span><span class="value">${p.tick_ms||0} ms</span></div>
      <div class="stat-row"><span class="label">Movement</span><span class="value">${p.movement_ms||0} ms</span></div>
      <div class="stat-row"><span class="label">Workers</span><span class="value">${p.workers_ms||0} ms</span></div>
      <div class="stat-row"><span class="label">Merge</span><span class="value">${p.merge_ms||0} ms</span></div>
      <div class="stat-row"><span class="label">Intents/tick</span><span class="value">${p.intents_per_tick||0}</span></div>
      <div style="margin-top:6px;border-top:1px solid #152238;padding-top:4px;font-size:11px;color:#5a7a9a">Worker breakdown:</div>
      ${Object.entries(wt).map(([n,ms])=>`<div class="stat-row"><span class="label" style="font-size:11px">${n}</span><span class="value" style="font-size:11px;color:${ms>200?'#ef5350':ms>50?'#ffa726':'#66bb6a'}">${ms} ms</span></div>`).join('')}
      `;})()}
    </div>
    <div class="panel">
      <div class="panel-title">Production</div>
      ${(()=>{
        const total=totalProducing+totalHalted;
        const pctActive=total?Math.round(totalProducing/total*100):100;
        return `<div style="display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:6px"><div style="width:${pctActive}%;background:#66bb6a"></div><div style="width:${100-pctActive}%;background:#ef5350"></div></div>
      <div class="stat-row"><span class="label">Active: ${totalProducing}</span><span class="value" style="color:#8aa0b8">Halted: <span style="color:#ef5350">${totalHalted}</span> | Total: ${total}</span></div>
      <div style="margin-top:6px;border-top:1px solid #152238;padding-top:4px;font-size:11px;color:#5a7a9a">Top Bottlenecks:</div>
      ${topB.length?topB.map(b=>`<div class="stat-row"><span class="label">${b.name}</span><span class="value" style="color:#ef5350">${b.count} stations</span></div>`).join(''):'<div style="color:#66bb6a;font-size:11px">None — all supplied</div>'}`;

// ── Region Tree Builder ──────────────────────────────────────────────────────
let shipTreeSelection = '';  // unused, kept for compat
let stTreeSelection = '';
let combatTreeSelection = '';

function buildRegionTree(containerId, systems, selectionVar, renderFn) {
  const tree = {};
  for (const [sid, sys] of Object.entries(systems)) {
    const region = sys.region || 'Unknown';
    const cluster = sys.cluster || 'Unknown';
    if (!tree[region]) tree[region] = {};
    if (!tree[region][cluster]) tree[region][cluster] = [];
    tree[region][cluster].push({id: sid, name: sys.name});
  }
  let html = '<div class="tree-region" data-sel="" style="color:#66bb6a">All Regions</div>';
  for (const [region, clusters] of Object.entries(tree).sort((a,b)=>a[0].localeCompare(b[0]))) {
    const sysCt = Object.values(clusters).reduce((s,c)=>s+c.length, 0);
    html += `<div class="tree-region" data-sel="r:${region}">${region} <span style="color:#5a7a9a">(${sysCt})</span></div>`;
  }
  const el = document.getElementById(containerId);
  el.innerHTML = html;
  el.querySelectorAll('.tree-region').forEach(n => n.addEventListener('click', () => {
    el.querySelectorAll('.tree-region,.tree-cluster').forEach(e=>e.classList.remove('active'));
    n.classList.add('active');
    if (containerId === 'shipTree') shipTreeSelection = n.dataset.sel;
    else if (containerId === 'stTree') stTreeSelection = n.dataset.sel;
    else combatTreeSelection = n.dataset.sel;
    renderFn();
  }));
}

function matchesTreeSelection(sys, selection) {
  if (!selection) return true;
  if (selection.startsWith('r:')) return sys.region === selection.slice(2);
  if (selection.startsWith('c:')) return sys.cluster === selection.slice(2);
  return true;
}

// ── Market (hierarchical tree-view) ───────────────────────────────────────
let mktItemData = [];  // [{id, name, category, subcategory, group_name, tier, ...}]
let mktTreeBuilt = false;
let mktSelectedGroup = '';  // "category|subcategory|group" or partial
let mktRegionsPopulated = false;

fetch('/api/data/commodities').then(r=>r.json()).then(data=>{
  if (!Array.isArray(data)) return;
  mktItemData = data;
  buildMktTree();
}).catch(()=>{});

function buildMktTree() {
  // Build hierarchy: category > subcategory > group_name
  const tree = {};
  for (const item of mktItemData) {
    const cat = item.category || 'Other';
    const sub = item.subcategory || 'General';
    const grp = item.group_name || 'Uncategorized';
    if (!tree[cat]) tree[cat] = {};
    if (!tree[cat][sub]) tree[cat][sub] = {};
    if (!tree[cat][sub][grp]) tree[cat][sub][grp] = 0;
    tree[cat][sub][grp]++;
  }

  const sb = document.getElementById('mktSidebar');
  let html = '<div class="tree-region active" data-sel="" style="color:#66bb6a;font-weight:bold;cursor:pointer">All Items</div>';
  for (const cat of Object.keys(tree).sort()) {
    const catCount = Object.values(tree[cat]).reduce((s, subs) => s + Object.values(subs).reduce((a, b) => a + b, 0), 0);
    html += `<div class="tree-cat" style="margin-top:4px">`;
    html += `<div class="tree-region" data-sel="${cat}" data-toggle="cat_${cat.replace(/\s/g,'_')}" style="cursor:pointer"><span class="tarr">&#9654;</span> ${cat} <span style="color:#5a7a9a">(${catCount})</span></div>`;
    html += `<div class="tree-ch" id="cat_${cat.replace(/\s/g,'_')}" style="display:none">`;
    for (const sub of Object.keys(tree[cat]).sort()) {
      const subCount = Object.values(tree[cat][sub]).reduce((a, b) => a + b, 0);
      const subId = `sub_${cat.replace(/\s/g,'_')}_${sub.replace(/\s/g,'_')}`;
      html += `<div class="tree-cluster" data-sel="${cat}|${sub}" data-toggle="${subId}" style="cursor:pointer"><span class="tarr" style="font-size:8px">&#9654;</span> ${sub} <span style="color:#5a7a9a">(${subCount})</span></div>`;
      html += `<div class="tree-ch" id="${subId}" style="display:none">`;
      for (const grp of Object.keys(tree[cat][sub]).sort()) {
        html += `<div class="tree-system" data-sel="${cat}|${sub}|${grp}" style="cursor:pointer">${grp} (${tree[cat][sub][grp]})</div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }

  sb.innerHTML = html;
  // Click handlers
  sb.querySelectorAll('[data-sel]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    // Toggle children if this has a toggle target
    const toggleId = el.dataset.toggle;
    if (toggleId) {
      const ch = document.getElementById(toggleId);
      if (ch) {
        const open = ch.style.display !== 'none';
        ch.style.display = open ? 'none' : 'block';
        const arr = el.querySelector('.tarr');
        if (arr) arr.innerHTML = open ? '&#9654;' : '&#9660;';
      }
    }
    // Set active and filter
    sb.querySelectorAll('[data-sel]').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    mktSelectedGroup = el.dataset.sel;
    renderMarket();
  }));
  mktTreeBuilt = true;
}

function renderMarket() {
  if (!D) return;
  const prices = D.prices || {};
  const systems = {};  // no longer sent in debug payload
  const searchVal = (document.getElementById('mktSearch')?.value || '').toLowerCase();
  const regionF = document.getElementById('mktRegionFilter')?.value || '';
  const sysF = document.getElementById('mktSystemFilter')?.value || '';
  const sortBy = document.getElementById('mktSortBy')?.value || 'commodity';

  // Populate region filter once
  if (!mktRegionsPopulated && Object.keys(systems).length) {
    const regions = new Set();
    for (const sys of Object.values(systems)) regions.add(sys.region || 'Unknown');
    const sel = document.getElementById('mktRegionFilter');
    for (const r of [...regions].sort()) {
      const opt = document.createElement('option'); opt.value = r; opt.textContent = r; sel.appendChild(opt);
    }
    mktRegionsPopulated = true;
  }

  // Build item lookup from loaded data
  const itemLookup = {};
  for (const item of mktItemData) itemLookup[item.id] = item;

  // Filter by tree selection
  const selParts = mktSelectedGroup.split('|');

  let allEntries = [];
  for (const [cid, entries] of Object.entries(prices)) {
    const item = itemLookup[cid];
    if (!item) continue;

    // Tree filter
    if (mktSelectedGroup) {
      if (selParts[0] && item.category !== selParts[0]) continue;
      if (selParts[1] && item.subcategory !== selParts[1]) continue;
      if (selParts[2] && item.group_name !== selParts[2]) continue;
    }

    // Search filter
    const name = item.name || fmtName(cid);
    if (searchVal && !name.toLowerCase().includes(searchVal)) continue;

    for (const e of entries) {
      // Region/system filter
      const sysd = systems[e.system_id];
      const region = sysd ? (sysd.region || '') : '';
      if (regionF && region !== regionF) continue;
      if (sysF && e.system !== sysF) continue;

      allEntries.push({id: cid, name, region, ...e});
    }
  }

  if (sortBy === 'price_asc') allEntries.sort((a, b) => a.price - b.price);
  else if (sortBy === 'price_desc') allEntries.sort((a, b) => b.price - a.price);
  else if (sortBy === 'stock_desc') allEntries.sort((a, b) => b.stock - a.stock);
  else allEntries.sort((a, b) => a.name.localeCompare(b.name));

  // Limit display to avoid DOM bloat
  const display = allEntries.slice(0, 500);
  let rows = '';
  for (const e of display) {
    rows += `<tr><td style="color:#ffd54f">${e.name}</td><td style="color:#8aa0b8;font-size:11px">${e.region}</td><td>${e.system}</td><td style="color:#8aa0b8">${e.station}</td><td style="text-align:right">${e.price.toFixed(0)}</td><td style="color:#4fc3f7;text-align:right">${Math.round(e.stock)}</td><td style="color:#ef5350;text-align:right">-</td><td style="color:#66bb6a;text-align:right">${Math.round(e.stock)}</td></tr>`;
  }
  if (!rows) rows = '<tr><td colspan="8" style="color:#8aa0b8;text-align:center;padding:20px">No market data. Select a category or wait for price data to populate.</td></tr>';
  else if (allEntries.length > 500) rows += `<tr><td colspan="8" style="color:#5a7a9a;text-align:center;padding:8px">Showing 500 of ${allEntries.length} entries</td></tr>`;
  document.getElementById('mktBody').innerHTML = rows;
}

document.getElementById('mktRegionFilter')?.addEventListener('change', () => renderMarket());
document.getElementById('mktSystemFilter')?.addEventListener('change', () => renderMarket());
document.getElementById('mktSearch')?.addEventListener('input', () => renderMarket());
document.getElementById('mktSortBy')?.addEventListener('change', () => renderMarket());

// ── Systems ─────────────────────────────────────────────────────────────────
function renderSystems() {
  // Populate dropdown from /api/state (once)
  if (!sysOptionsPopulated) {
    fetch('/api/state').then(r=>r.json()).then(data=>{
      const systems = data.systems || {};
      const sids = Object.keys(systems).sort((a,b)=>(systems[a].name||'').localeCompare(systems[b].name||''));
      const sel = document.getElementById('sysSelect');
      for (const sid of sids) {
        const opt = document.createElement('option'); opt.value = sid; opt.textContent = `${systems[sid].name} (${systems[sid].security})`; sel.appendChild(opt);
      }
      sysOptionsPopulated = true;
      if(sids.length) { selectedSystem = sids[0]; loadSystemDetail(); }
    });
    return;
  }
  loadSystemDetail();
}

function loadSystemDetail() {
  if (!selectedSystem) return;
  fetch(`/api/system/${selectedSystem}`).then(r=>r.json()).then(sys=>{
    if (sys.error) { document.getElementById('sysContent').innerHTML = '<div style="color:#ef5350;padding:20px">System not found</div>'; return; }
    const objects = sys.objects || [];
    const shipsHere = sys.ships || [];
    const stationObjs = objects.filter(o => o.type === 'station');
    let html = `<div class="sys-panel"><div>`;
    if (!stationObjs.length) html += '<div class="panel"><div class="panel-title">No stations</div></div>';
    html += `</div><div>
      <div class="panel"><div class="panel-title">System Info</div>
        <div class="stat-row"><span class="label">Type</span><span class="value">${sys.type||''}</span></div>
        <div class="stat-row"><span class="label">Security</span><span class="value"><span class="badge badge-${sys.security}">${sys.security}</span></span></div>
        <div class="stat-row"><span class="label">Objects</span><span class="value">${objects.length}</span></div>
        <div class="stat-row"><span class="label">Ships here</span><span class="value">${shipsHere.length}</span></div>
      </div>
      <div class="panel"><div class="panel-title">Ships in System (${shipsHere.length})</div>
        ${shipsHere.map(s=>`<div style="padding:2px 0;font-size:12px"><span class="badge" style="background:${s.role==='miner'?'#ab47bc22':'#4fc3f722'};color:${s.role==='miner'?'#ab47bc':'#4fc3f7'}">${s.role}</span> ${s.name} <span style="color:#8aa0b8">(${s.state})</span></div>`).join('')||'<div style="color:#8aa0b8">None</div>'}
      </div>
    </div></div>`;
    document.getElementById('sysContent').innerHTML = html;
  });
}

document.getElementById('sysSelect').addEventListener('change', e => {
  selectedSystem = e.target.value;
  loadSystemDetail();
});

// ── Nuke ────────────────────────────────────────────────────────────────────
document.getElementById('nukeBtn').addEventListener('click', async () => {
  if (!confirm('NUKE: Reset the entire simulation to initial state?')) return;
  await fetch('/api/nuke', {method: 'POST'});
  lastDebugTick = 0;
  D = null;
  fetchData();
});

// Sim speed control
const simSpeedSelect = document.getElementById('simSpeed');
simSpeedSelect.addEventListener('change', async () => {
  const r = await fetch('/api/speed', {method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({multiplier: parseInt(simSpeedSelect.value)})});
  const d = await r.json();
  console.log('Speed set to:', d.multiplier);
});
// Load current speed
fetch('/api/speed').then(r=>r.json()).then(d=>{simSpeedSelect.value=d.multiplier;});
</script>
