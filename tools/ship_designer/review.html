<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ship Review</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
.tab-bar{background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;gap:4px;padding:6px 12px;position:sticky;top:0;z-index:10}
.tab-bar a{padding:5px 14px;border:1px solid #1a2844;color:#5a7a9a;border-radius:3px;text-decoration:none;font-size:11px}
.tab-bar a.active{background:#0d1a2f;border-color:#4fc3f7;color:#4fc3f7;font-weight:600}
.controls{padding:8px 12px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #1a2844;position:sticky;top:38px;background:#05080f;z-index:9}
.controls label{font-size:11px;color:#8aa0b8}
.controls select,.controls input{background:#0a1020;border:1px solid #1a3050;color:#c8d4e0;padding:4px 8px;border-radius:3px;font-size:11px}
.controls button{padding:5px 12px;border:1px solid #4fc3f7;background:#0d1a2f;color:#4fc3f7;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600}
.controls button:hover{background:#4fc3f7;color:#05080f}
.controls .btn-green{border-color:#66bb6a;color:#66bb6a}
.controls .btn-green:hover{background:#66bb6a;color:#05080f}
.grid{padding:12px;display:flex;flex-wrap:wrap;gap:10px}
.card{background:#0a0e18;border:2px solid #1a2844;border-radius:6px;overflow:hidden;width:380px;transition:border-color .15s}
.card.kept{border-color:#66bb6a}
.card canvas{display:block;width:380px;height:260px}
.card-info{padding:6px 10px;border-top:1px solid #1a2844;display:flex;justify-content:space-between;align-items:center}
.card-info .name{color:#e0e8f0;font-weight:500;font-size:11px}
.card-info .seed{color:#5a7a9a;font-size:10px}
.card-actions{padding:6px 10px;border-top:1px solid #1a2844;display:flex;gap:6px}
.card-actions button{padding:4px 10px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;border:1px solid}
.btn-keep{border-color:#66bb6a;color:#66bb6a;background:#0a1a0a}
.btn-keep:hover,.btn-keep.active{background:#66bb6a;color:#05080f}
.btn-regen{border-color:#ffd54f;color:#ffd54f;background:#1a1a0a}
.btn-regen:hover{background:#ffd54f;color:#05080f}
</style>
</head>
<body>
<div class="tab-bar">
  <a href="/ship_designer">Ship Generator</a>
  <a href="/ship_designer/station.html">Station Generator</a>
  <a href="/ship_designer/gallery.html">Component Library</a>
  <a href="/ship_designer/review.html" class="active">Review</a>
  <a href="/ship_designer/lod_viewer.html">LOD Viewer</a>
</div>
<div class="controls">
  <label>Hull Class:</label>
  <select id="hullClass">
    <option value="fighter">Fighter</option>
    <option value="frigate">Frigate</option>
    <option value="destroyer">Destroyer</option>
    <option value="cruiser">Cruiser</option>
    <option value="battlecruiser">Battlecruiser</option>
    <option value="battleship">Battleship</option>
    <option value="carrier">Carrier</option>
    <option value="dreadnought">Dreadnought</option>
    <option value="industrial">Industrial</option>
    <option value="mining_barge">Mining Barge</option>
  </select>
  <label>Per faction:</label>
  <input type="number" id="count" value="4" min="1" max="10" style="width:50px">
  <button id="genBtn">Generate Ships</button>
  <span style="color:#1a2844;margin:0 8px">|</span>
  <label>Station Type:</label>
  <select id="stationType">
    <option value="trade_hub">Trade Hub</option>
    <option value="military_base">Military Base</option>
    <option value="shipyard">Shipyard</option>
    <option value="mining_colony">Mining Colony</option>
    <option value="refinery">Refinery</option>
    <option value="factory">Factory</option>
    <option value="component_works">Component Works</option>
  </select>
  <label>Faction:</label>
  <select id="stationFaction">
    <option value="terran">Terran</option>
    <option value="merchants">Merchants</option>
    <option value="science">Science</option>
    <option value="iron_compact">Iron Compact</option>
    <option value="frontier">Frontier</option>
  </select>
  <button id="genStationBtn">Generate Stations (6)</button>
  <button id="exportBtn" class="btn-green" style="margin-left:auto">Export Kept</button>
</div>
<div class="grid" id="grid"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const W=380,H=260;
const MATS={
  hull:()=>new THREE.MeshPhongMaterial({color:0x0a1428,emissive:0x0a1428,shininess:0,transparent:true,opacity:0.7}),
  engine:()=>new THREE.MeshPhongMaterial({color:0x0a1428,emissive:0x0a1020,shininess:0,transparent:true,opacity:0.7}),
};
const ECOL={hull:0x4fc3f7,engine:0x5a7a9a};

function buildParts(scene,parts){
  const g=new THREE.Group();
  for(const c of parts){
    const mat=(MATS[c.material]||MATS.hull)();
    const [px,py,pz]=c.pos;const [rx,ry,rz]=c.rot||[0,0,0];let m=null;
    switch(c.type){
      case'pod':{const{length,height,width}=c.params;const b=0.02,hw=width/2,hh=height/2;const s=new THREE.Shape();s.moveTo(-hw+b,-hh);s.lineTo(hw-b,-hh);s.lineTo(hw,-hh+b);s.lineTo(hw,hh-b);s.lineTo(hw-b,hh);s.lineTo(-hw+b,hh);s.lineTo(-hw,hh-b);s.lineTo(-hw,-hh+b);s.closePath();const geo=new THREE.ExtrudeGeometry(s,{depth:length,bevelEnabled:true,bevelThickness:0.005,bevelSize:0.005});geo.center();m=new THREE.Mesh(geo,mat);if(!rx&&!ry&&!rz)m.rotation.y=Math.PI/2;break;}
      case'cylinder':{const{r_top,r_bot,length}=c.params;m=new THREE.Mesh(new THREE.CylinderGeometry(r_top,r_bot,length,8),mat);if(!rx&&!ry&&!rz)m.rotation.z=Math.PI/2;break;}
      case'cone':{const{radius,length}=c.params;m=new THREE.Mesh(new THREE.ConeGeometry(radius,length,8),mat);if(!rx&&!ry&&!rz)m.rotation.z=Math.PI/2;break;}
      case'box':{const{x,y,z}=c.params;m=new THREE.Mesh(new THREE.BoxGeometry(x,y,z),mat);break;}
      case'sphere':{const{radius,half}=c.params;const geo=half?new THREE.SphereGeometry(radius,8,6,0,Math.PI*2,0,Math.PI/2):new THREE.SphereGeometry(radius,8,6);m=new THREE.Mesh(geo,mat);break;}
      case'torus':{const{radius,tube}=c.params;m=new THREE.Mesh(new THREE.TorusGeometry(radius,tube,6,12),mat);if(!rx&&!ry&&!rz)m.rotation.y=Math.PI/2;break;}
      case'spine':{const{length,radius,flange_r}=c.params;const sg=new THREE.Group();const s=new THREE.Shape();for(let i=0;i<=6;i++){const a=Math.PI*2*i/6;if(i===0)s.moveTo(Math.cos(a)*radius,Math.sin(a)*radius);else s.lineTo(Math.cos(a)*radius,Math.sin(a)*radius);}const bg=new THREE.ExtrudeGeometry(s,{depth:length,bevelEnabled:false});bg.center();const body=new THREE.Mesh(bg,mat);body.rotation.y=Math.PI/2;sg.add(body);sg.position.set(px,py,pz);g.add(sg);sg.traverse(ch=>{if(ch.isMesh)ch.add(new THREE.LineSegments(new THREE.EdgesGeometry(ch.geometry,15),new THREE.LineBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.5})));});continue;}
      default:continue;
    }
    if(m){m.position.set(px,py,pz);m.rotation.x+=rx;m.rotation.y+=ry;m.rotation.z+=rz;g.add(m);m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry,15),new THREE.LineBasicMaterial({color:ECOL[c.material]||0x4fc3f7,transparent:true,opacity:0.5})));}
  }
  scene.add(g);return g;
}

function renderCard(canvas,parts){
  canvas.width=W;canvas.height=H;
  if(!window._sharedRenderer){
    const off=document.createElement('canvas');off.width=W;off.height=H;
    window._sharedRenderer=new THREE.WebGLRenderer({canvas:off,antialias:true,preserveDrawingBuffer:true});
    window._sharedRenderer.setSize(W,H,false);
  }
  const renderer=window._sharedRenderer;
  renderer.setClearColor(0x060a12);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(40,W/H,0.001,100);
  scene.add(new THREE.AmbientLight(0x1a2a4a,0.6));
  const key=new THREE.DirectionalLight(0x4fc3f7,0.4);key.position.set(2,3,1);scene.add(key);
  const group=buildParts(scene,parts);
  const box=new THREE.Box3().setFromObject(group);
  const sz=box.getSize(new THREE.Vector3());
  const md=Math.max(sz.x,sz.y,sz.z)||0.2;
  const scale=1.0/md;
  group.scale.setScalar(scale);
  const box2=new THREE.Box3().setFromObject(group);
  const center=box2.getCenter(new THREE.Vector3());
  camera.position.set(center.x+1.2,center.y+0.8,center.z+1.2);
  camera.lookAt(center);
  group.rotation.y=0.4;
  renderer.render(scene,camera);
  const ctx=canvas.getContext('2d');
  ctx.drawImage(renderer.domElement,0,0);
}

let ships=[];
let kept=new Set();
let _mode='ship'; // 'ship' or 'station'

async function generateBatch(){
  _mode='ship';
  const hull_class=document.getElementById('hullClass').value;
  const count=parseInt(document.getElementById('count').value);
  const r=await fetch('/api/batch_generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hull_class,count})});
  ships=await r.json();
  kept.clear();
  renderGrid();
}

function cardLabel(s){
  if(s.station_type) return `${s.faction} / ${s.station_type.replace(/_/g,' ')}`;
  return `${s.faction} / ${s.hull_class||''}`;
}

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  for(let i=0;i<ships.length;i++){
    const s=ships[i];
    const card=document.createElement('div');
    card.className='card'+(kept.has(i)?' kept':'');
    card.dataset.i=i;
    const canvas=document.createElement('canvas');
    const info=document.createElement('div');info.className='card-info';
    info.innerHTML=`<span class="name">${cardLabel(s)}</span><span class="seed">seed: ${s.seed}</span>`;
    const actions=document.createElement('div');actions.className='card-actions';
    actions.innerHTML=`<button class="btn-keep ${kept.has(i)?'active':''}" data-i="${i}">Keep</button><button class="btn-regen" data-i="${i}">Regenerate</button>`;
    card.appendChild(canvas);card.appendChild(info);card.appendChild(actions);
    grid.appendChild(card);
    renderCard(canvas,s.components);
  }
  grid.onclick=async(e)=>{
    const btn=e.target.closest('button');
    if(!btn)return;
    const i=parseInt(btn.dataset.i);
    const card=btn.closest('.card');
    if(btn.classList.contains('btn-keep')){
      if(kept.has(i)){kept.delete(i);card.classList.remove('kept');btn.classList.remove('active');}
      else{kept.add(i);card.classList.add('kept');btn.classList.add('active');}
    }else if(btn.classList.contains('btn-regen')){
      await regenCard(i, card);
    }
  };
}

async function regenCard(i, card){
  const s=ships[i];
  let newData;
  if(s.station_type){
    const r=await fetch('/api/station/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({station_type:s.station_type,faction:s.faction})});
    newData=await r.json();
    ships[i]={name:`${s.faction}/${s.station_type}/${newData.meta.seed}`,faction:s.faction,station_type:s.station_type,seed:newData.meta.seed,components:newData.components,meta:newData.meta};
  } else {
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({faction:s.faction,hull_class:s.hull_class})});
    newData=await r.json();
    ships[i]={name:`${s.faction}/${s.hull_class}/${newData.meta.seed}`,faction:s.faction,hull_class:s.hull_class,seed:newData.meta.seed,components:newData.components,meta:newData.meta};
  }
  kept.delete(i);
  if(card){
    card.classList.remove('kept');
    card.querySelector('.card-info').innerHTML=`<span class="name">${cardLabel(ships[i])}</span><span class="seed">seed: ${ships[i].seed}</span>`;
    card.querySelector('.btn-keep').classList.remove('active');
    const oldCanvas=card.querySelector('canvas');
    const newCanvas=document.createElement('canvas');
    oldCanvas.replaceWith(newCanvas);
    renderCard(newCanvas,ships[i].components);
  }
  return ships[i];
}

document.getElementById('genBtn').addEventListener('click',generateBatch);
document.getElementById('genStationBtn').addEventListener('click', async()=>{
  _mode='station';
  const station_type=document.getElementById('stationType').value;
  const faction=document.getElementById('stationFaction').value;
  // Generate 6 variations for this type+faction
  ships=[];
  for(let i=0;i<6;i++){
    const r=await fetch('/api/station/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({station_type,faction})});
    const data=await r.json();
    ships.push({name:`${faction}/${station_type}/${data.meta.seed}`,faction,station_type,seed:data.meta.seed,components:data.components,meta:data.meta});
  }
  kept.clear();
  renderGrid();
});
document.getElementById('exportBtn').addEventListener('click',async()=>{
  const exported=ships.filter((_,i)=>kept.has(i));
  if(!exported.length){alert('Nothing kept yet');return;}
  // Build filename from content
  let filename = 'tagged_feedback';
  if(exported[0].station_type){
    filename = `stations_${exported[0].faction}_${exported[0].station_type}`;
  } else if(exported[0].hull_class){
    filename = `ships_${exported[0].faction}_${exported[0].hull_class}`;
  }
  const r=await fetch('/api/export_tagged',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename, items: exported})});
  const d=await r.json();
  alert(`Exported ${d.count} items to ${d.file}`);
});

// ── Interactive Viewer Overlay ──────────────────────────────────────────────
const overlay=document.createElement('div');
overlay.style.cssText='display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000';
overlay.innerHTML='<div style="position:absolute;top:10px;right:20px;display:flex;gap:12px;align-items:center"><button id="viewerRegen" style="padding:6px 14px;border:1px solid #4fc3f7;background:#0d1a2f;color:#4fc3f7;border-radius:3px;cursor:pointer;font-size:12px">Regenerate</button><span id="closeViewer" style="color:#4fc3f7;font-size:14px;cursor:pointer">✕ Close</span></div>';
const vCanvas=document.createElement('canvas');
vCanvas.style.cssText='width:100%;height:100%';
overlay.appendChild(vCanvas);
document.body.appendChild(overlay);

let vRenderer,vScene,vCamera,vControls,vGroup,vRaf;
let _viewerIdx = -1;
function openViewer(parts){
  overlay.style.display='block';
  if(!vRenderer){
    vRenderer=new THREE.WebGLRenderer({canvas:vCanvas,antialias:true});
    vCamera=new THREE.PerspectiveCamera(40,window.innerWidth/window.innerHeight,0.001,100);
    vControls=new OrbitControls(vCamera,vCanvas);
    vControls.enableDamping=true;
  }
  vRenderer.setSize(window.innerWidth,window.innerHeight);
  vCamera.aspect=window.innerWidth/window.innerHeight;
  vCamera.updateProjectionMatrix();
  vScene=new THREE.Scene();vScene.background=new THREE.Color(0x060a12);
  vScene.add(new THREE.AmbientLight(0x1a2a4a,0.6));
  const key=new THREE.DirectionalLight(0x4fc3f7,0.4);key.position.set(2,3,1);vScene.add(key);
  vGroup=buildParts(vScene,parts);
  const box=new THREE.Box3().setFromObject(vGroup);
  const sz=box.getSize(new THREE.Vector3());const md=Math.max(sz.x,sz.y,sz.z)||0.2;
  const scale=1.0/md;vGroup.scale.setScalar(scale);
  const box2=new THREE.Box3().setFromObject(vGroup);
  const center=box2.getCenter(new THREE.Vector3());
  vCamera.position.set(center.x+1.5,center.y+1,center.z+1.5);
  vControls.target.copy(center);vControls.update();
  function anim(){vRaf=requestAnimationFrame(anim);vControls.update();vRenderer.render(vScene,vCamera);}
  anim();
}
function closeViewer(){overlay.style.display='none';cancelAnimationFrame(vRaf);}
document.getElementById('closeViewer').addEventListener('click',closeViewer);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeViewer();});
document.getElementById('viewerRegen').addEventListener('click', async()=>{
  if(_viewerIdx<0) return;
  const card=document.querySelector(`.card[data-i="${_viewerIdx}"]`);
  const newShip=await regenCard(_viewerIdx, card);
  // Re-open viewer with new data
  openViewer(newShip.components);
});

// Click canvas in grid to open viewer
document.getElementById('grid').addEventListener('click',e=>{
  const canvas=e.target.closest('canvas');
  if(!canvas)return;
  const card=canvas.closest('.card');
  if(!card)return;
  const i=parseInt(card.dataset.i);
  if(ships[i]){_viewerIdx=i; openViewer(ships[i].components);}
});
</script>
</body>
