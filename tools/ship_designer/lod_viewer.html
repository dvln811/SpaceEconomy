<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LOD Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.tab-bar{background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;gap:4px;padding:6px 12px;flex-shrink:0}
.tab-bar a{padding:5px 14px;border:1px solid #1a2844;color:#5a7a9a;border-radius:3px;text-decoration:none;font-size:11px}
.tab-bar a.active{background:#0d1a2f;border-color:#4fc3f7;color:#4fc3f7;font-weight:600}
.controls{padding:8px 12px;display:flex;gap:12px;align-items:center;border-bottom:1px solid #1a2844;flex-shrink:0}
.controls label{font-size:11px;color:#8aa0b8}
.controls select{background:#0a1020;border:1px solid #1a3050;color:#c8d4e0;padding:4px 8px;border-radius:3px;font-size:11px}
.viewport{flex:1;position:relative}
.viewport canvas{width:100%;height:100%;display:block}
.info{position:absolute;top:10px;right:10px;background:#0a0e18cc;border:1px solid #1a2844;border-radius:4px;padding:8px 12px;font-size:11px;color:#8aa0b8}
.info span{color:#4fc3f7;font-weight:500}
</style>
</head>
<body>
<div class="tab-bar">
  <a href="/ship_designer">Ship Generator</a>
  <a href="/ship_designer/station.html">Station Generator</a>
  <a href="/ship_designer/gallery.html">Component Library</a>
  <a href="/ship_designer/review.html">Review</a>
  <a href="/ship_designer/lod_viewer.html" class="active">LOD Viewer</a>
</div>
<div class="controls">
  <label>Ship:</label>
  <select id="shipSelect"></select>
  <label>LOD:</label>
  <select id="lodSelect">
    <option value="auto">Auto (screen size)</option>
    <option value="0">LOD 0 - Full Mesh</option>
    <option value="1">LOD 1 - Bounding Box</option>
    <option value="2">LOD 2 - Billboard</option>
    <option value="3">LOD 3 - Dot</option>
  </select>
</div>
<div class="viewport" id="vp">
  <div class="info" id="info">Generate a ship to view LODs</div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { buildShipFromData } from '/static/ship_renderer.js';
import { createLOD1, createLOD2, createLOD3, getScreenSize, getLODLevel, LOD_THRESHOLDS } from '/static/ship_lod.js';

const container = document.getElementById('vp');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setClearColor(0x050810);
container.appendChild(renderer.domElement);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 10000);
camera.position.set(3,2,3);
scene.add(new THREE.AmbientLight(0x1a2a4a,0.6));
const key=new THREE.DirectionalLight(0x4fc3f7,0.4); key.position.set(2,3,1); scene.add(key);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true;

function resize(){
  const w=container.clientWidth, h=container.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();

let lodGroups = [null,null,null,null]; // LOD 0,1,2,3
let currentLOD = -1;
let shipRadius = 1;
let forcedLOD = 'auto';

function showLOD(level) {
  lodGroups.forEach((g,i) => { if(g) g.visible = (i===level); });
  currentLOD = level;
}

function animate(){
  requestAnimationFrame(animate);
  controls.update();

  if (forcedLOD === 'auto' && lodGroups[0]) {
    const dist = camera.position.distanceTo(controls.target);
    const fov = camera.fov * (Math.PI/180);
    const screenFrac = getScreenSize(shipRadius, dist, fov, container.clientHeight);
    const level = getLODLevel(screenFrac);
    if (level !== currentLOD) showLOD(level);
    document.getElementById('info').innerHTML = `Distance: <span>${dist.toFixed(1)}</span> | Screen: <span>${(screenFrac*100).toFixed(2)}%</span> | Active: <span>LOD ${currentLOD}</span>`;
  } else if (forcedLOD !== 'auto') {
    document.getElementById('info').innerHTML = `Forced: <span>LOD ${forcedLOD}</span> | Radius: <span>${shipRadius.toFixed(2)}</span>`;
  }

  renderer.render(scene,camera);
}
animate();

async function loadShip(hullClass) {
  const r = await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({faction:'terran',hull_class:hullClass,seed:42})});
  const data = await r.json();
  const bounds = {length:data.meta.length||2, height:data.meta.height||0.5, width:data.meta.beam||1};

  // Remove old
  lodGroups.forEach(g => { if(g) scene.remove(g); });

  // LOD 0: full mesh
  const g0 = new THREE.Group();
  buildShipFromData(g0, data, {showHardpoints:false});
  scene.add(g0); lodGroups[0] = g0;

  // LOD 1: bounding box
  const g1 = createLOD1(bounds, 1, 0x4fc3f7);
  scene.add(g1); lodGroups[1] = g1;

  // LOD 2: billboard
  const g2 = createLOD2(1, 0x4fc3f7);
  scene.add(g2); lodGroups[2] = g2;

  // LOD 3: dot
  const g3 = createLOD3(0x4fc3f7);
  scene.add(g3); lodGroups[3] = g3;

  // Compute radius
  const box = new THREE.Box3().setFromObject(g0);
  shipRadius = box.getSize(new THREE.Vector3()).length() / 2;

  // Frame camera
  const md = shipRadius * 2;
  const center = box.getCenter(new THREE.Vector3());
  camera.position.set(center.x+md*1.5, center.y+md, center.z+md*1.5);
  controls.target.copy(center);

  // Show based on current selection
  if (forcedLOD === 'auto') showLOD(0);
  else showLOD(parseInt(forcedLOD));
}

// UI
const sel = document.getElementById('shipSelect');
(async()=>{
  const r = await fetch('/api/hull_classes');
  const hulls = await r.json();
  for(const h of hulls) sel.innerHTML+=`<option value="${h}">${h}</option>`;
  loadShip(hulls[0]);
})();
sel.addEventListener('change', ()=>loadShip(sel.value));

document.getElementById('lodSelect').addEventListener('change', e=>{
  forcedLOD = e.target.value;
  if (forcedLOD !== 'auto') showLOD(parseInt(forcedLOD));
});
</script>
</body>
</html>
