<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ship Design - Multi-View</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:12px;padding:24px}
h1{font-family:'JetBrains Mono',monospace;font-size:16px;color:#4fc3f7;letter-spacing:3px;margin-bottom:8px}
h2{font-family:'JetBrains Mono',monospace;font-size:12px;color:#ffd54f;letter-spacing:1px;margin:32px 0 12px;text-transform:uppercase}
p{color:#8aa0b8;font-size:11px;margin-bottom:16px;max-width:800px;line-height:1.6}
.views{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;max-width:1400px;margin-bottom:32px}
.view-card{background:#0a0e18;border:1px solid #1a2844;border-radius:6px;padding:12px}
.view-card h3{font-family:'JetBrains Mono',monospace;font-size:9px;color:#6a9ab8;letter-spacing:1px;margin-bottom:6px}
svg.ship{width:100%;height:200px;display:block;background:#060a12;border-radius:4px;filter:brightness(1.4)}
</style>
</head>
<body>
<h1>Ship Design - Multi-View</h1>
<p>Testing top-down, side, and 3/4 perspective views derived from the same modular structure.</p>


<h2>Mule Freighter</h2>
<div class="views">

<!-- TOP DOWN (what we had, centered spine) -->
<div class="view-card">
<h3>Top View</h3>
<svg class="ship" viewBox="0 0 400 200" fill="none">
  <defs><pattern id="g1" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2844" stroke-width="0.3"/></pattern></defs>
  <rect width="400" height="200" fill="url(#g1)" opacity="0.3"/>
  <!-- Twin engines -->
  <rect x="42" y="68" width="26" height="20" rx="3" stroke="#8aa0b8" stroke-width="0.8" fill="none"/>
  <rect x="42" y="112" width="26" height="20" rx="3" stroke="#8aa0b8" stroke-width="0.8" fill="none"/>
  <rect x="32" y="72" width="10" height="12" rx="2" stroke="#ef5350" stroke-width="0.6" fill="#ef535010"/>
  <rect x="32" y="116" width="10" height="12" rx="2" stroke="#ef5350" stroke-width="0.6" fill="#ef535010"/>
  <line x1="32" y1="77" x2="18" y2="77" stroke="#ef5350" stroke-width="0.7" opacity="0.4"/>
  <line x1="32" y1="121" x2="18" y2="121" stroke="#ef5350" stroke-width="0.7" opacity="0.4"/>
  <!-- Spine (centered on Y=100) -->
  <path d="M68 92 L88 90 L90 94 L90 106 L88 110 L68 108 Z" stroke="#4fc3f7" stroke-width="0.6" fill="none" opacity="0.7"/>
  <!-- Pylon struts to engines -->
  <line x1="56" y1="88" x2="68" y2="94" stroke="#4fc3f7" stroke-width="0.5" opacity="0.5"/>
  <line x1="56" y1="112" x2="68" y2="106" stroke="#4fc3f7" stroke-width="0.5" opacity="0.5"/>
  <!-- Cargo hull (beveled) -->
  <path d="M90 58 L220 55 L227 62 L227 138 L220 145 L90 142 L84 135 L84 65 Z" stroke="#4fc3f7" stroke-width="0.9" fill="none"/>
  <line x1="125" y1="56" x2="125" y2="144" stroke="#4fc3f7" stroke-width="0.3" opacity="0.35"/>
  <line x1="160" y1="55" x2="160" y2="145" stroke="#4fc3f7" stroke-width="0.3" opacity="0.35"/>
  <line x1="195" y1="55" x2="195" y2="145" stroke="#4fc3f7" stroke-width="0.3" opacity="0.35"/>
  <line x1="90" y1="100" x2="227" y2="100" stroke="#4fc3f7" stroke-width="0.3" opacity="0.3"/>
  <!-- Spine to bridge (centered) -->
  <path d="M227 92 L240 90 L242 94 L242 106 L240 110 L227 108 Z" stroke="#4fc3f7" stroke-width="0.6" fill="none" opacity="0.7"/>
  <!-- Bridge (tapered) -->
  <path d="M242 76 L278 74 L292 84 L296 100 L292 116 L278 126 L242 124 Z" stroke="#4fc3f7" stroke-width="0.9" fill="none"/>
  <line x1="265" y1="75" x2="265" y2="125" stroke="#4fc3f7" stroke-width="0.3" opacity="0.4"/>
  <!-- Hardpoints -->
  <rect x="145" y="46" width="14" height="10" rx="2" stroke="#4fc3f7" stroke-width="0.6" fill="#4fc3f708"/>
  <circle cx="200" cy="50" r="5" stroke="#66bb6a" stroke-width="0.6" fill="#66bb6a08"/>
  <line x1="200" y1="45" x2="200" y2="38" stroke="#66bb6a" stroke-width="0.4"/>
  <text x="388" y="14" text-anchor="end" font-size="9" fill="#6a9ab8" font-family="Orbitron">MULE FREIGHTER</text>
  <text x="388" y="24" text-anchor="end" font-size="6" fill="#4a7a9a" font-family="JetBrains Mono">TOP VIEW</text>
</svg>
</div>

<!-- SIDE VIEW -->
<div class="view-card">
<h3>Side View</h3>
<svg class="ship" viewBox="0 0 400 200" fill="none">
  <defs><pattern id="g2" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2844" stroke-width="0.3"/></pattern></defs>
  <rect width="400" height="200" fill="url(#g2)" opacity="0.3"/>
  <!-- Engine (side: single visible, circular nozzle) -->
  <rect x="42" y="78" width="26" height="44" rx="3" stroke="#8aa0b8" stroke-width="0.8" fill="none"/>
  <circle cx="55" cy="100" r="8" stroke="#8aa0b8" stroke-width="0.5" fill="none"/>
  <circle cx="55" cy="100" r="4" stroke="#ef5350" stroke-width="0.5" fill="#ef535010"/>
  <line x1="42" y1="92" x2="28" y2="92" stroke="#ef5350" stroke-width="0.6" opacity="0.4"/>
  <line x1="42" y1="100" x2="24" y2="100" stroke="#ef5350" stroke-width="0.8" opacity="0.4"/>
  <line x1="42" y1="108" x2="28" y2="108" stroke="#ef5350" stroke-width="0.6" opacity="0.4"/>
  <!-- Spine connector -->
  <path d="M68 88 L84 86 L86 90 L86 110 L84 114 L68 112 Z" stroke="#4fc3f7" stroke-width="0.6" fill="none" opacity="0.7"/>
  <!-- Hull (side: taller, shows depth) -->
  <path d="M86 55 L222 52 L228 58 L228 142 L222 148 L86 145 L82 139 L82 61 Z" stroke="#4fc3f7" stroke-width="0.9" fill="none"/>
  <line x1="120" y1="53" x2="120" y2="147" stroke="#4fc3f7" stroke-width="0.3" opacity="0.3"/>
  <line x1="155" y1="52" x2="155" y2="148" stroke="#4fc3f7" stroke-width="0.3" opacity="0.3"/>
  <line x1="190" y1="52" x2="190" y2="148" stroke="#4fc3f7" stroke-width="0.3" opacity="0.3"/>
  <!-- Deck lines (horizontal) -->
  <line x1="86" y1="80" x2="222" y2="78" stroke="#4fc3f7" stroke-width="0.2" opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="86" y1="120" x2="222" y2="122" stroke="#4fc3f7" stroke-width="0.2" opacity="0.3" stroke-dasharray="4,3"/>
  <!-- Bridge (side: stepped superstructure) -->
  <path d="M228 62 L260 60 L270 66 L272 80 L272 120 L270 134 L260 140 L228 138 Z" stroke="#4fc3f7" stroke-width="0.8" fill="none"/>
  <!-- Bridge windows (row) -->
  <rect x="252" y="78" width="12" height="4" rx="1" stroke="#8ab4d4" stroke-width="0.5" fill="none" opacity="0.6"/>
  <rect x="252" y="86" width="12" height="4" rx="1" stroke="#8ab4d4" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- Turret (side profile) -->
  <rect x="155" y="44" width="12" height="8" rx="2" stroke="#66bb6a" stroke-width="0.6" fill="#66bb6a08"/>
  <line x1="161" y1="44" x2="161" y2="38" stroke="#66bb6a" stroke-width="0.4"/>
  <!-- Utility pod -->
  <rect x="120" y="148" width="16" height="8" rx="2" stroke="#4fc3f7" stroke-width="0.5" fill="#4fc3f708"/>
  <text x="388" y="14" text-anchor="end" font-size="9" fill="#6a9ab8" font-family="Orbitron">MULE FREIGHTER</text>
  <text x="388" y="24" text-anchor="end" font-size="6" fill="#4a7a9a" font-family="JetBrains Mono">SIDE VIEW</text>
</svg>
</div>

<!-- 3/4 VIEW -->
<div class="view-card">
<h3>3/4 View</h3>
<svg class="ship" viewBox="0 0 400 200" fill="none">
  <defs><pattern id="g3" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2844" stroke-width="0.3"/></pattern></defs>
  <rect width="400" height="200" fill="url(#g3)" opacity="0.3"/>
  <!-- 3/4 perspective: foreshortened depth, angled surfaces visible -->
  <!-- Engine (angled, shows top and side) -->
  <polygon points="50,95 68,88 76,92 76,108 68,112 50,105" stroke="#8aa0b8" stroke-width="0.8" fill="none"/>
  <polygon points="50,105 68,112 76,116 76,130 68,134 50,127" stroke="#8aa0b8" stroke-width="0.7" fill="none" opacity="0.6"/>
  <line x1="50" y1="98" x2="36" y2="96" stroke="#ef5350" stroke-width="0.7" opacity="0.4"/>
  <line x1="50" y1="108" x2="36" y2="110" stroke="#ef5350" stroke-width="0.6" opacity="0.3"/>
  <!-- Spine (3/4: parallelogram) -->
  <polygon points="76,94 92,88 96,92 96,108 92,112 76,106" stroke="#4fc3f7" stroke-width="0.6" fill="none" opacity="0.7"/>
  <!-- Hull top face (foreshortened) -->
  <polygon points="96,60 245,54 252,58 252,68 245,72 96,78" stroke="#4fc3f7" stroke-width="0.7" fill="none" opacity="0.5"/>
  <!-- Hull side face -->
  <polygon points="96,78 245,72 252,68 252,138 245,144 96,150 90,144 90,84" stroke="#4fc3f7" stroke-width="0.9" fill="none"/>
  <!-- Panel lines on side -->
  <line x1="135" y1="75" x2="135" y2="148" stroke="#4fc3f7" stroke-width="0.3" opacity="0.3"/>
  <line x1="175" y1="73" x2="175" y2="146" stroke="#4fc3f7" stroke-width="0.3" opacity="0.3"/>
  <line x1="215" y1="72" x2="215" y2="144" stroke="#4fc3f7" stroke-width="0.3" opacity="0.3"/>
  <!-- Panel lines on top -->
  <line x1="135" y1="58" x2="135" y2="75" stroke="#4fc3f7" stroke-width="0.2" opacity="0.3"/>
  <line x1="175" y1="56" x2="175" y2="73" stroke="#4fc3f7" stroke-width="0.2" opacity="0.3"/>
  <!-- Spine to bridge -->
  <polygon points="252,78 266,74 270,78 270,108 266,112 252,108" stroke="#4fc3f7" stroke-width="0.6" fill="none" opacity="0.7"/>
  <!-- Bridge (3/4: tapered with top face) -->
  <polygon points="270,68 300,64 312,72 314,100 312,120 300,128 270,124" stroke="#4fc3f7" stroke-width="0.9" fill="none"/>
  <polygon points="270,68 300,64 312,72 270,76" stroke="#4fc3f7" stroke-width="0.6" fill="none" opacity="0.4"/>
  <!-- Turret (3/4) -->
  <ellipse cx="180" cy="52" rx="5" ry="3" stroke="#66bb6a" stroke-width="0.6" fill="#66bb6a08"/>
  <line x1="180" y1="49" x2="180" y2="42" stroke="#66bb6a" stroke-width="0.4"/>
  <text x="388" y="14" text-anchor="end" font-size="9" fill="#6a9ab8" font-family="Orbitron">MULE FREIGHTER</text>
  <text x="388" y="24" text-anchor="end" font-size="6" fill="#4a7a9a" font-family="JetBrains Mono">3/4 VIEW</text>
</svg>
</div>

</div>


<h2>Warden Frigate</h2>
<div class="views">

<!-- TOP DOWN (shields fixed - full circles) -->
<div class="view-card">

<svg class="ship" viewBox="0 0 400 200" fill="none">
  <defs><pattern id="g4" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2844" stroke-width="0.3"/></pattern></defs>

  <!-- Engine nacelle frame -->
  <path d="M32 38 L54 36 L58 42 L58 158 L54 164 L32 162 L28 156 L28 44 Z" stroke="#ef5350" stroke-width="0.8" fill="none"/>
  <!-- 4 exhaust nozzles -->
  <rect x="18" y="44" width="10" height="14" rx="2" stroke="#ef5350" stroke-width="0.6" fill="#ef535010"/>
  <rect x="18" y="68" width="10" height="14" rx="2" stroke="#ef5350" stroke-width="0.6" fill="#ef535010"/>
  <rect x="18" y="118" width="10" height="14" rx="2" stroke="#ef5350" stroke-width="0.6" fill="#ef535010"/>
  <rect x="18" y="142" width="10" height="14" rx="2" stroke="#ef5350" stroke-width="0.6" fill="#ef535010"/>
  <line x1="18" y1="50" x2="6" y2="50" stroke="#ef5350" stroke-width="0.7" opacity="0.4"/>
  <line x1="18" y1="74" x2="6" y2="74" stroke="#ef5350" stroke-width="0.8" opacity="0.4"/>
  <line x1="18" y1="124" x2="6" y2="124" stroke="#ef5350" stroke-width="0.8" opacity="0.4"/>
  <line x1="18" y1="148" x2="6" y2="148" stroke="#ef5350" stroke-width="0.7" opacity="0.4"/>
  <!-- Heavy spine -->
  <path d="M58 75 L78 72 L82 78 L82 122 L78 128 L58 125 Z" stroke="#ef5350" stroke-width="0.7" fill="none" opacity="0.7"/>
  <line x1="62" y1="80" x2="78" y2="120" stroke="#ef5350" stroke-width="0.3" opacity="0.3"/>
  <line x1="78" y1="80" x2="62" y2="120" stroke="#ef5350" stroke-width="0.3" opacity="0.3"/>

  <path d="M82 42 L220 38 L228 48 L228 152 L220 162 L82 158 L76 148 L76 52 Z" stroke="#ef5350" stroke-width="1.0" fill="none"/>

  <line x1="150" y1="39" x2="150" y2="161" stroke="#ef5350" stroke-width="0.4" opacity="0.25"/>
  <line x1="185" y1="38" x2="185" y2="162" stroke="#ef5350" stroke-width="0.4" opacity="0.25"/>
  <!-- Spine to bridge -->
  <path d="M228 80 L244 78 L248 84 L248 116 L244 122 L228 120 Z" stroke="#ef5350" stroke-width="0.6" fill="none" opacity="0.7"/>
  <!-- Bridge (armored tapered) -->

  <line x1="268" y1="67" x2="268" y2="133" stroke="#ef5350" stroke-width="0.3" opacity="0.3"/>
  <path d="M280 80 L286 88 L286 112 L280 120" stroke="#8ab4d4" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Weapon turrets on pylons -->
  <line x1="115" y1="42" x2="115" y2="28" stroke="#ef5350" stroke-width="0.5"/>
  <circle cx="115" cy="24" r="6" stroke="#ef5350" stroke-width="0.7" fill="#ef535010"/>
  <line x1="115" y1="18" x2="115" y2="10" stroke="#ef5350" stroke-width="0.5"/>
  <line x1="175" y1="38" x2="175" y2="24" stroke="#ef5350" stroke-width="0.5"/>
  <circle cx="175" cy="20" r="6" stroke="#ef5350" stroke-width="0.7" fill="#ef535010"/>
  <line x1="175" y1="14" x2="175" y2="6" stroke="#ef5350" stroke-width="0.5"/>
  <line x1="115" y1="158" x2="115" y2="172" stroke="#ef5350" stroke-width="0.5"/>
  <circle cx="115" cy="176" r="6" stroke="#ef5350" stroke-width="0.7" fill="#ef535010"/>
  <line x1="115" y1="182" x2="115" y2="190" stroke="#ef5350" stroke-width="0.5"/>
  <line x1="175" y1="162" x2="175" y2="176" stroke="#ef5350" stroke-width="0.5"/>
  <circle cx="175" cy="180" r="6" stroke="#ef5350" stroke-width="0.7" fill="#ef535010"/>
  <line x1="175" y1="186" x2="175" y2="194" stroke="#ef5350" stroke-width="0.5"/>
  <!-- Shield emitters (FIXED: full circles) -->
  <circle cx="100" cy="164" r="4" stroke="#66bb6a" stroke-width="0.6" fill="#66bb6a08"/>
  <circle cx="145" cy="166" r="4" stroke="#66bb6a" stroke-width="0.6" fill="#66bb6a08"/>
  <circle cx="200" cy="166" r="4" stroke="#66bb6a" stroke-width="0.6" fill="#66bb6a08"/>
  <text x="388" y="14" text-anchor="end" font-size="9" fill="#6a9ab8" font-family="Orbitron">WARDEN FRIGATE</text>
  <text x="388" y="24" text-anchor="end" font-size="6" fill="#4a7a9a" font-family="JetBrains Mono">TOP VIEW</text>
</svg>
</div>

<!-- SIDE VIEW -->
<div class="view-card">
<h3>Side View</h3>
<svg class="ship" viewBox="0 0 400 200" fill="none">
  <defs><pattern id="g5" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2844" stroke-width="0.3"/></pattern></defs>
  <rect width="400" height="200" fill="url(#g5)" opacity="0.3"/>
  <!-- Engine block (side: stacked nozzles visible) -->
  <rect x="30" y="60" width="32" height="80" rx="4" stroke="#ef5350" stroke-width="0.8" fill="none"/>
  <circle cx="46" cy="75" r="5" stroke="#ef5350" stroke-width="0.5" fill="#ef535010"/>
  <circle cx="46" cy="100" r="6" stroke="#ef5350" stroke-width="0.5" fill="#ef535010"/>
  <circle cx="46" cy="125" r="5" stroke="#ef5350" stroke-width="0.5" fill="#ef535010"/>
  <line x1="30" y1="75" x2="14" y2="75" stroke="#ef5350" stroke-width="0.6" opacity="0.4"/>
  <line x1="30" y1="100" x2="10" y2="100" stroke="#ef5350" stroke-width="0.8" opacity="0.4"/>
  <line x1="30" y1="125" x2="14" y2="125" stroke="#ef5350" stroke-width="0.6" opacity="0.4"/>
  <!-- Spine -->
  <path d="M62 82 L78 78 L82 84 L82 116 L78 122 L62 118 Z" stroke="#ef5350" stroke-width="0.7" fill="none" opacity="0.7"/>
  <!-- Main hull (side: tall armored block) -->
  <path d="M82 42 L226 38 L234 46 L234 154 L226 162 L82 158 L76 150 L76 50 Z" stroke="#ef5350" stroke-width="1.0" fill="none"/>
  <line x1="120" y1="40" x2="120" y2="160" stroke="#ef5350" stroke-width="0.3" opacity="0.25"/>
  <line x1="155" y1="38" x2="155" y2="162" stroke="#ef5350" stroke-width="0.3" opacity="0.25"/>
  <line x1="190" y1="38" x2="190" y2="162" stroke="#ef5350" stroke-width="0.3" opacity="0.25"/>
  <!-- Deck lines -->
  <line x1="82" y1="75" x2="226" y2="73" stroke="#ef5350" stroke-width="0.2" opacity="0.25" stroke-dasharray="4,3"/>
  <line x1="82" y1="125" x2="226" y2="127" stroke="#ef5350" stroke-width="0.2" opacity="0.25" stroke-dasharray="4,3"/>
  <!-- Bridge superstructure (stepped above hull) -->
  <path d="M234 50 L270 48 L278 54 L278 78 L234 80 Z" stroke="#ef5350" stroke-width="0.8" fill="none"/>
  <path d="M234 120 L270 122 L278 128 L278 146 L270 152 L234 150 Z" stroke="#ef5350" stroke-width="0.7" fill="none" opacity="0.7"/>
  <!-- Bridge windows -->
  <rect x="262" y="56" width="10" height="4" rx="1" stroke="#8ab4d4" stroke-width="0.5" fill="none" opacity="0.6"/>
  <rect x="262" y="64" width="10" height="4" rx="1" stroke="#8ab4d4" stroke-width="0.4" fill="none" opacity="0.4"/>
  <!-- Turrets (side: profile view, 2 visible on top) -->
  <rect x="120" y="30" width="14" height="10" rx="2" stroke="#ef5350" stroke-width="0.6" fill="#ef535010"/>
  <line x1="127" y1="30" x2="127" y2="22" stroke="#ef5350" stroke-width="0.5"/>
  <rect x="175" y="28" width="14" height="10" rx="2" stroke="#ef5350" stroke-width="0.6" fill="#ef535010"/>
  <line x1="182" y1="28" x2="182" y2="20" stroke="#ef5350" stroke-width="0.5"/>
  <!-- Shield emitters (side: dome shapes) -->
  <path d="M110 158 Q 110 166 118 166 Q 126 166 126 158" stroke="#66bb6a" stroke-width="0.6" fill="#66bb6a08"/>
  <path d="M155 160 Q 155 168 163 168 Q 171 168 171 160" stroke="#66bb6a" stroke-width="0.6" fill="#66bb6a08"/>
  <text x="388" y="14" text-anchor="end" font-size="9" fill="#6a9ab8" font-family="Orbitron">WARDEN FRIGATE</text>
  <text x="388" y="24" text-anchor="end" font-size="6" fill="#4a7a9a" font-family="JetBrains Mono">SIDE VIEW</text>
</svg>
</div>

<!-- 3/4 VIEW -->
<div class="view-card">
<h3>3/4 View</h3>
<svg class="ship" viewBox="0 0 400 200" fill="none">
  <defs><pattern id="g6" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2844" stroke-width="0.3"/></pattern></defs>
  <rect width="400" height="200" fill="url(#g6)" opacity="0.3"/>
  <!-- Engine (3/4: shows top and side) -->
  <polygon points="34,72 56,66 62,72 62,128 56,134 34,128 30,122 30,78" stroke="#ef5350" stroke-width="0.8" fill="none"/>
  <!-- Top face of engine -->
  <polygon points="34,72 56,66 62,72 40,78" stroke="#ef5350" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- Nozzles -->
  <line x1="30" y1="82" x2="16" y2="80" stroke="#ef5350" stroke-width="0.6" opacity="0.4"/>
  <line x1="30" y1="100" x2="12" y2="98" stroke="#ef5350" stroke-width="0.8" opacity="0.4"/>
  <line x1="30" y1="118" x2="16" y2="116" stroke="#ef5350" stroke-width="0.6" opacity="0.4"/>
  <!-- Spine (3/4) -->
  <polygon points="62,80 78,76 82,80 82,120 78,124 62,120" stroke="#ef5350" stroke-width="0.6" fill="none" opacity="0.7"/>
  <!-- Hull top face -->
