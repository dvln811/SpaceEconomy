<style>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { buildShipFromData } from '/static/ship_renderer.js';

// ── State ──
let player = null;
let localState = null;  // from SSE stream
let shipGroup = null;
let hangarPedestal = null;
let stationModel = null;
let stationWorldPos = null;
let npcSprites = {};  // id -> THREE.Sprite
let objectSprites = {};  // id -> THREE.Sprite/label
let isDocked = true;
let lastTickTime = 0;
let displaySpeed = 0;

// Interpolated positions: {id: {x,y,z,vx,vy,vz}}
let interpShips = {};

// ── Three.js Setup ──
const container = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020305);
const camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.1, 50000);
camera.position.set(30, 20, 30);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 10;
controls.maxDistance = 500;
controls.mouseButtons = {LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null};
controls.enablePan = false;

scene.add(new THREE.AmbientLight(0x4fc3f7, 0.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight.position.set(50, 30, 20);
scene.add(dirLight);

// ── Hangar (docked view) ──
function buildHangar(){
  const floorGeo = new THREE.CylinderGeometry(25, 25, 0.5, 32);
  const floorMat = new THREE.MeshPhongMaterial({color:0x0a0e18, emissive:0x050810, shininess:0});
  hangarPedestal = new THREE.Mesh(floorGeo, floorMat);
  hangarPedestal.position.y = -8;
  const ringGeo = new THREE.TorusGeometry(25, 0.2, 8, 64);
  const ringMat = new THREE.MeshBasicMaterial({color:0x1a3050, transparent:true, opacity:0.6});
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI/2;
  ring.position.y = 0.3;
  hangarPedestal.add(ring);
  scene.add(hangarPedestal);
}

// ── Starfield ──
let starField = null;
function buildStarfield(){
  const geo = new THREE.BufferGeometry();
  const verts = new Float32Array(3000*3);
  for(let i=0;i<3000*3;i+=3){
    const r=5000+Math.random()*40000;
    const th=Math.random()*Math.PI*2;
    const ph=Math.acos(2*Math.random()-1);
    verts[i]=r*Math.sin(ph)*Math.cos(th);
    verts[i+1]=r*Math.sin(ph)*Math.sin(th);
    verts[i+2]=r*Math.cos(ph);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(verts,3));
  starField = new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:15,sizeAttenuation:true}));
}
buildStarfield();

// ── Scene Switching ──
function setDockedScene(){
  scene.background = new THREE.Color(0x020305);
  if(starField) starField.removeFromParent();
  if(!hangarPedestal) buildHangar();
  else scene.add(hangarPedestal);
  if(stationModel){ stationModel.removeFromParent(); stationModel=null; }
  // Remove NPC sprites and object sprites
  Object.values(npcSprites).forEach(s=>s.removeFromParent());
  npcSprites = {};
  Object.values(objectSprites).forEach(s=>s.removeFromParent());
  objectSprites = {};
  camera.position.set(30, 15, 30);
  controls.target.set(0, 0, 0);
  controls.maxDistance = 100;
  if(shipGroup) shipGroup.position.set(0,0,0);
  isDocked = true;
}

function setFlightScene(){
  scene.background = new THREE.Color(0x020308);
  if(hangarPedestal) hangarPedestal.removeFromParent();
  scene.add(starField);
  controls.maxDistance = 2000;
  // Position camera near player
  camera.position.set(playerPos.x + 30, playerPos.y + 15, playerPos.z + 30);
  controls.target.copy(playerPos);
  isDocked = false;
  loadNearbyStation();
}

// ── SSE Stream Connection ──
let evtSource = null;
function connectStream(){
  if(evtSource) evtSource.close();
  evtSource = new EventSource('/api/player/local_space/stream');
  evtSource.onmessage = (e) => {
    const state = JSON.parse(e.data);
    localState = state;
    lastTickTime = performance.now();
    // Update interpolation targets
    for(const ship of state.ships){
      interpShips[ship.id] = {
        x: ship.x, y: ship.y, z: ship.z,
        vx: ship.vx, vy: ship.vy, vz: ship.vz,
        speed: ship.speed, state: ship.state,
        heading: ship.heading, name: ship.name,
        is_player: ship.is_player, ship_class: ship.ship_class,
        max_speed: ship.max_speed, target_obj: ship.target_obj
      };
    }
    // Remove ships no longer in state
    const ids = new Set(state.ships.map(s=>s.id));
    for(const id of Object.keys(interpShips)){
      if(!ids.has(id)){
        delete interpShips[id];
        if(npcSprites[id]){ npcSprites[id].removeFromParent(); delete npcSprites[id]; }
      }
    }
    updateFromState(state);
  };
  evtSource.onerror = () => { setTimeout(()=>{ if(evtSource.readyState===2) connectStream(); }, 3000); };
}

// ── NPC Sprite Management ──
const NPC_COLORS = {trader:0x66bb6a, miner:0xffd54f, corsair:0xef5350, military:0x4fc3f7, patrol:0x4fc3f7};
function getOrCreateNpcSprite(ship){
  if(npcSprites[ship.id]) return npcSprites[ship.id];
  const canvas = document.createElement('canvas');
  canvas.width = 16; canvas.height = 16;
  const ctx = canvas.getContext('2d');
  const color = NPC_COLORS[ship.role] || 0x8aa0b8;
  const hex = '#' + new THREE.Color(color).getHexString();
  ctx.beginPath(); ctx.arc(8,8,6,0,Math.PI*2);
  ctx.fillStyle = hex; ctx.fill();
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1; ctx.stroke();
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, opacity:0.8});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3,3,1);
  scene.add(sprite);
  npcSprites[ship.id] = sprite;
  return sprite;
}

// ── System Object Sprites ──
const OBJ_COLORS = {station:'#4fc3f7', gate:'#ab47bc', planet:'#8aa0b8', moon:'#5a7a9a', asteroid_field:'#ffd54f', star:'#ffab40'};
function getOrCreateObjSprite(obj){
  if(objectSprites[obj.id]) return objectSprites[obj.id];
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 32;
  const ctx = canvas.getContext('2d');
  const color = OBJ_COLORS[obj.type] || '#8aa0b8';
  // Icon
  ctx.fillStyle = color;
  if(obj.type==='station'){ ctx.fillRect(2,10,12,12); }
  else if(obj.type==='gate'){ ctx.beginPath();ctx.moveTo(8,6);ctx.lineTo(14,16);ctx.lineTo(2,16);ctx.fill(); }
  else { ctx.beginPath();ctx.arc(8,16,5,0,Math.PI*2);ctx.fill(); }
  // Label
  ctx.font = '10px monospace'; ctx.fillStyle = color;
  ctx.fillText(obj.name.substring(0,14), 18, 18);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, opacity:0.9});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(20,5,1);
  scene.add(sprite);
  objectSprites[obj.id] = sprite;
  return sprite;
}

// ── Update from SSE State ──
function updateFromState(state){
  if(!state) return;
  const p = state.player;
  if(!p) return;

  // Update player ship stats from server
  if(p.max_speed) playerMaxSpeed = p.max_speed;

  // Set initial player position from server if not yet set
  if(playerPos.x === 0 && playerPos.y === 0 && playerPos.z === 0 && p.x !== 0){
    playerPos.set(p.x, p.y, p.z);
  }

  // Detect dock/undock transition
  const wasDockedBefore = isDocked;
  const isDockedNow = (p.state === 'docked');

  if(isDockedNow && !wasDockedBefore){
    setDockedScene();
  } else if(!isDockedNow && wasDockedBefore){
    setFlightScene();
  } else if(!isDockedNow && !stationModel){
    // Player already in flight on page load -- set up flight scene
    setFlightScene();
  }

  // Update UI
  updateUI(state);

  // Position system objects (only in flight)
  if(!isDockedNow && state.objects){
    // Position objects relative to player (player at origin)
    for(const obj of state.objects){
      if(obj.type === 'star') continue;
      const sprite = getOrCreateObjSprite(obj);
      const rx = (obj.x - p.x) * 0.1;  // Scale down for viewport
      const ry = (obj.y - p.y) * 0.1;
      const rz = (obj.z - p.z) * 0.1;
      sprite.position.set(rx, ry, rz);
    }
  }
}

// ── Player Ship Local Physics ──
let flyDirection = null;  // THREE.Vector3 or null
let playerSpeed = 0;
let playerMaxSpeed = 95;  // from ship stats, updated on load
let playerAlignTime = 5;
let playerPos = new THREE.Vector3(0, 0, 0);  // world position
let playerHeading = new THREE.Vector3(1, 0, 0);
let targetHeading = new THREE.Vector3(1, 0, 0);
let posReportTimer = 0;

// Engine trail
let trailLine = null;
let trailDrawCount = 0;
function createTrail(){
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(150*3), 3));
  geo.setDrawRange(0, 0);
  trailLine = new THREE.Line(geo, new THREE.LineBasicMaterial({color:0x2288ff, transparent:true, opacity:0.5}));
  trailLine.frustumCulled = false;
  trailLine.visible = false;
  scene.add(trailLine);
}
createTrail();

// ── Animation Loop ──
let lastFrameTime = 0;
function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min(0.1, (now - (lastFrameTime||now)) / 1000);
  lastFrameTime = now;

  if(!isDocked && shipGroup){
    // ── Player Ship Physics (CLIENT-AUTHORITATIVE, ship moves in world space) ──
    if(flyDirection){
      const lerpRate = 1.0 / (playerAlignTime * 60) * 3;
      playerHeading.lerp(flyDirection, lerpRate).normalize();
      const alignment = Math.max(0, playerHeading.dot(flyDirection));
      playerSpeed += (playerMaxSpeed * alignment - playerSpeed) * 0.03;
    } else {
      playerSpeed *= 0.95;
      if(playerSpeed < 0.5) playerSpeed = 0;
    }

    // Move ship in world space (1 unit = 1 meter, speed in m/s)
    if(playerSpeed > 0.1){
      const moveM = playerSpeed * dt; // meters this frame
      playerPos.addScaledVector(playerHeading, moveM);
    }

    // Position ship model at world pos
    shipGroup.position.copy(playerPos);
    // Rotate ship to face heading
    const lookTarget = playerPos.clone().add(playerHeading);
    const lookMat = new THREE.Matrix4().lookAt(shipGroup.position, lookTarget, new THREE.Vector3(0,1,0));
    const targetQuat = new THREE.Quaternion().setFromRotationMatrix(lookMat);
    const offsetQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), Math.PI/2);
    targetQuat.multiply(offsetQuat);
    shipGroup.quaternion.slerp(targetQuat, 0.15);

    // Camera follows ship (maintain relative offset) - skip during freelook
    if(!isFreelooking){
      const camOffset = camera.position.clone().sub(controls.target);
      controls.target.copy(playerPos);
      camera.position.copy(playerPos).add(camOffset);
    } else {
      // During freelook, still move camera position with ship but don't change lookAt
      const camOffset = camera.position.clone().sub(controls.target);
      controls.target.copy(playerPos);
      camera.position.copy(playerPos).add(camOffset);
    }

    // Trail
    if(playerSpeed > 1){
      trailLine.visible = true;
      const arr = trailLine.geometry.attributes.position.array;
      if(trailDrawCount < 150){
        arr[trailDrawCount*3] = playerPos.x;
        arr[trailDrawCount*3+1] = playerPos.y;
        arr[trailDrawCount*3+2] = playerPos.z;
        trailDrawCount++;
      } else {
        for(let i=0;i<149*3;i++) arr[i] = arr[i+3];
        arr[149*3]=playerPos.x; arr[149*3+1]=playerPos.y; arr[149*3+2]=playerPos.z;
      }
      trailLine.geometry.setDrawRange(0, trailDrawCount);
      trailLine.geometry.attributes.position.needsUpdate = true;
    } else {
      trailLine.visible = false;
      trailDrawCount = 0;
    }

    // Speed UI
    displaySpeed += (playerSpeed - displaySpeed) * 0.1;
    document.getElementById('speedBar').style.width = (displaySpeed / playerMaxSpeed * 100) + '%';
    document.getElementById('shipSpeed').textContent = Math.round(displaySpeed) + ' m/s';
    document.getElementById('shipState').textContent = flyDirection ? (displaySpeed > playerMaxSpeed*0.9 ? 'Full Speed' : 'Aligning') : (playerSpeed > 1 ? 'Decelerating' : 'Idle');

    // ── NPC Ships (SERVER-AUTHORITATIVE, interpolated, world space) ──
    const timeSinceTick = (now - lastTickTime) / 1000;
    for(const [id, ship] of Object.entries(interpShips)){
      if(ship.is_player) continue;
      const sx = ship.x + ship.vx * timeSinceTick;
      const sy = ship.y + ship.vy * timeSinceTick;
      const sz = ship.z + ship.vz * timeSinceTick;
      const sprite = getOrCreateNpcSprite(ship);
      sprite.position.set(sx, sy, sz);
    }

    // ── System Objects (fixed world positions, only render if within 50km) ──
    if(localState && localState.objects){
      for(const obj of localState.objects){
        if(obj.type==='star') continue;
        const dist = Math.sqrt((obj.x-playerPos.x)**2 + (obj.y-playerPos.y)**2 + (obj.z-playerPos.z)**2);
        if(dist > 50000){ // >50km, just nav marker
          if(objectSprites[obj.id]){ objectSprites[obj.id].visible = false; }
          continue;
        }
        const sprite = objectSprites[obj.id];
        if(!sprite) continue;
        sprite.visible = true;
        sprite.position.set(obj.x, obj.y, obj.z);
      }
    }
    // Station model at fixed world position (doesn't move)
    if(stationModel && stationWorldPos){
      stationModel.position.set(stationWorldPos.x, stationWorldPos.y, stationWorldPos.z);
    }

    // ── Report position to server every 3 seconds ──
    posReportTimer += dt;
    if(posReportTimer > 3){
      posReportTimer = 0;
      fetch('/api/player/position', {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({x:playerPos.x, y:playerPos.y, z:playerPos.z, speed:playerSpeed,
          hx:playerHeading.x, hy:playerHeading.y, hz:playerHeading.z,
          state: flyDirection?'flying':'idle'})
      }).catch(()=>{});
    }
  }

  if(!isFreelooking) controls.update();
  renderer.render(scene, camera);
}

// ── Input: Double-click to fly ──
container.addEventListener('dblclick', e=>{
  if(isDocked) return;
  const rect = renderer.domElement.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  flyDirection = raycaster.ray.direction.clone().normalize();
  targetHeading.copy(flyDirection);
  // Report to server
  fetch('/api/player/fly', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({dx:flyDirection.x, dy:flyDirection.y, dz:flyDirection.z})
  }).catch(()=>{});
});

// ── Input: S key to stop ──
document.addEventListener('keydown', e=>{
  if(e.key === 's' || e.key === 'S'){
    if(isDocked) return;
    flyDirection = null;
    fetch('/api/player/stop', {method:'POST'}).catch(()=>{});
  }
});

// ── Input: Right-click freelook ──
let isFreelooking = false;
let freelookStart = {x:0, y:0};
let freelookYaw = 0;
let freelookPitch = 0;
renderer.domElement.addEventListener('mousedown', e=>{
  if(e.button === 2){
    isFreelooking = true;
    freelookStart = {x:e.clientX, y:e.clientY};
    freelookYaw = 0;
    freelookPitch = 0;
    controls.enabled = false;
  }
});
window.addEventListener('mouseup', e=>{
  if(e.button === 2){
    isFreelooking = false;
    controls.enabled = true;
  }
});
window.addEventListener('mousemove', e=>{
  if(!isFreelooking) return;
  const dx = e.clientX - freelookStart.x;
  const dy = e.clientY - freelookStart.y;
  freelookStart = {x:e.clientX, y:e.clientY};
  freelookYaw += dx * 0.003;
  freelookPitch += dy * 0.003;
  freelookPitch = Math.max(-1.2, Math.min(1.2, freelookPitch));
  // Apply rotation to camera (camera stays in place, looks in new direction)
  const baseDir = playerPos.clone().sub(camera.position).normalize();
  const right = new THREE.Vector3().crossVectors(baseDir, new THREE.Vector3(0,1,0)).normalize();
  const up = new THREE.Vector3(0,1,0);
  const lookAt = playerPos.clone();
  lookAt.addScaledVector(right, Math.sin(freelookYaw) * 100);
  lookAt.addScaledVector(up, -Math.sin(freelookPitch) * 100);
  camera.lookAt(lookAt);
});

// ── Input: Scroll zoom ──
// OrbitControls handles this via MIDDLE mouse / scroll by default

// ── Warp command (called from nav list) ──
window.warpTo = function(objId){
  closeCtx();
  fetch('/api/player/warp', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({target: objId})
  });
};

// ── Context Menu ──
window.showCtx = function(e, objId, name, type){
  e.preventDefault();
  const menu = document.getElementById('ctxMenu');
  let items = '';
  items += `<div class="ctx-item" onclick="warpTo('${objId}')">Warp to ${name}</div>`;
  items += `<div class="ctx-item" onclick="closeCtx()">Cancel</div>`;
  menu.innerHTML = items;
  menu.style.left = e.clientX+'px';
  menu.style.top = e.clientY+'px';
  menu.classList.add('open');
};
window.closeCtx = function(){ document.getElementById('ctxMenu').classList.remove('open'); };
document.addEventListener('click',()=>closeCtx());

// ── UI Updates ──
function updateUI(state){
  if(!state || !state.player) return;
  const p = state.player;
  const layout = document.getElementById('layout');
  const isDockedNow = (p.state === 'docked');

  layout.className = 'layout ' + (isDockedNow ? 'docked' : 'flight');
  document.getElementById('dockedPanel').style.display = isDockedNow ? '' : 'none';
  document.getElementById('flightPanel').style.display = isDockedNow ? 'none' : '';
  document.getElementById('statusBar').style.display = isDockedNow ? 'none' : '';

  document.getElementById('sysName').textContent = state.system_id || '';
  document.getElementById('stationName').textContent = isDockedNow ? 'Docked' : '';

  // Nav list (flight only)
  if(!isDockedNow && state.objects){
    renderNavList(state.objects, p);
  }
}

function renderNavList(objects, playerShip){
  const nav = document.getElementById('navObjects');
  const px = playerShip.x, py = playerShip.y, pz = playerShip.z;
  nav.innerHTML = objects.filter(o=>o.type!=='star').map(o=>{
    const icon = o.type==='gate'?'&#9674;':o.type==='station'?'&#9632;':o.type==='planet'?'&#9679;':'&#8226;';
    const color = o.type==='gate'?'#ab47bc':o.type==='station'?'#4fc3f7':'#8aa0b8';
    const dx=o.x-px, dy=o.y-py, dz=o.z-pz;
    const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
    const distAU = dist / 1000;
    const distStr = distAU < 0.01 ? '<0.01 AU' : distAU.toFixed(2)+' AU';
    return `<div class="nav-obj" style="padding:3px 4px;cursor:pointer;border-bottom:1px solid #0f1520;display:flex;justify-content:space-between" data-id="${o.id}" data-name="${o.name}" data-type="${o.type}">
      <span><span style="color:${color}">${icon}</span> ${o.name}</span>
      <span style="color:#c8d4e0;font-size:10px">${distStr}</span>
    </div>`;
  }).join('');
  // Show dock button if near a station (dist < 5 units in local space)
  const nearStation = objects.find(o=>{
    if(o.type!=='station') return false;
    const dx=o.x-playerShip.x, dy=o.y-playerShip.y, dz=o.z-playerShip.z;
    return Math.sqrt(dx*dx+dy*dy+dz*dz) < 10;
  });
  document.getElementById('dockBtn').style.display = nearStation ? '' : 'none';
}

// ── Load Ship Model ──
async function loadShipModel(){
  const r = await fetch('/api/ship_model/all');
  if(!r.ok) return;
  const models = await r.json();
  // Get player ship class from player API
  const pr = await fetch('/api/player');
  if(!pr.ok) return;
  player = await pr.json();
  const geo = models[player.ship_class];
  if(!geo) return;
  if(shipGroup) scene.remove(shipGroup);
  shipGroup = new THREE.Group();
  buildShipFromData(shipGroup, geo, {showHardpoints:false});
  const box = new THREE.Box3().setFromObject(shipGroup);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  shipGroup.scale.setScalar(20/maxDim);
  scene.add(shipGroup);
  controls.target.set(0,0,0);

  // Update docked UI with player info
  updatePlayerUI();

  // Determine initial state
  if(player.docked){
    setDockedScene();
  } else {
    setFlightScene();
  }
}

function updatePlayerUI(){
  if(!player) return;
  const stats = player.ship_stats || {};
  const infoHtml = `
    <div class="stat-row"><span class="label">Ship</span><span class="val">${player.ship_name||player.ship_class}</span></div>
    <div class="stat-row"><span class="label">Class</span><span class="val">${stats.hull_class||''}</span></div>
    <div class="stat-row"><span class="label">Credits</span><span class="val">${(player.credits||0).toLocaleString()}</span></div>
  `;
  document.getElementById('shipInfo').innerHTML = infoHtml;
  document.getElementById('flightShipInfo').innerHTML = infoHtml;
  const cargo = player.cargo || {};
  const cargoGrid = document.getElementById('cargoGrid');
  if(Object.keys(cargo).length === 0){
    cargoGrid.innerHTML = '<div style="color:#5a7a9a">Empty</div>';
  } else {
    cargoGrid.innerHTML = Object.entries(cargo).map(([k,v])=>`<div class="cargo-item"><span>${k.replace(/_/g,' ')}</span><span>${v}</span></div>`).join('');
  }
}

// ── Load Station Model (flight view) ──
async function loadNearbyStation(){
  if(!player || !player.station_id) return;
  try{
    const r = await fetch('/api/station_model/'+player.station_id);
    if(!r.ok) return;
    const data = await r.json();
    if(stationModel) stationModel.removeFromParent();
    stationModel = new THREE.Group();
    const tempGroup = new THREE.Group();
    for(const comp of data.components){
      const [px,py,pz]=comp.pos;const [rx,ry,rz]=comp.rot||[0,0,0];let mesh=null;
      const mat=new THREE.MeshPhongMaterial({color:0x0a1428,emissive:0x0a1428,shininess:0,transparent:true,opacity:0.7});
      switch(comp.type){
        case'pod':{const{length,height,width}=comp.params;mesh=new THREE.Mesh(new THREE.BoxGeometry(length,height,width),mat);break;}
        case'cylinder':{const{r_top,r_bot,length}=comp.params;mesh=new THREE.Mesh(new THREE.CylinderGeometry(r_top,r_bot,length,6),mat);if(!rx&&!ry&&!rz)mesh.rotation.z=Math.PI/2;break;}
        case'cone':{const{radius,length}=comp.params;mesh=new THREE.Mesh(new THREE.ConeGeometry(radius,length,6),mat);if(!rx&&!ry&&!rz)mesh.rotation.z=Math.PI/2;break;}
        case'box':{const{x,y,z}=comp.params;mesh=new THREE.Mesh(new THREE.BoxGeometry(x,y,z),mat);break;}
        case'sphere':{const{radius,half}=comp.params;mesh=new THREE.Mesh(half?new THREE.SphereGeometry(radius,5,3,0,Math.PI*2,0,Math.PI/2):new THREE.SphereGeometry(radius,5,3),mat);break;}
        case'torus':{const{radius,tube}=comp.params;mesh=new THREE.Mesh(new THREE.TorusGeometry(radius,tube,5,10),mat);if(!rx&&!ry&&!rz)mesh.rotation.y=Math.PI/2;break;}
        case'spine':{const{length,radius}=comp.params;mesh=new THREE.Mesh(new THREE.CylinderGeometry(radius,radius,length,4),mat);mesh.rotation.z=Math.PI/2;break;}
        default:continue;
      }
      if(mesh){mesh.position.set(px,py,pz);mesh.rotation.x+=rx;mesh.rotation.y+=ry;mesh.rotation.z+=rz;tempGroup.add(mesh);}
    }
    tempGroup.updateMatrixWorld(true);
    const geos=[];
    tempGroup.traverse(c=>{if(c.isMesh&&c.geometry){const g=c.geometry.clone();g.applyMatrix4(c.matrixWorld);geos.push(g);}});
    if(geos.length){
      const allG=geos.map(g=>g.index?g.toNonIndexed():g);
      let tv=0;allG.forEach(g=>tv+=g.attributes.position.count);
      const pos=new Float32Array(tv*3);let off=0;
      for(const g of allG){pos.set(g.attributes.position.array,off*3);off+=g.attributes.position.count;}
      const merged=new THREE.BufferGeometry();
      merged.setAttribute('position',new THREE.BufferAttribute(pos,3));
      merged.computeVertexNormals();
      const m=new THREE.Mesh(merged,new THREE.MeshPhongMaterial({color:0x0a1428,emissive:0x0a1428,shininess:0,transparent:true,opacity:0.7}));
      m.add(new THREE.LineSegments(new THREE.EdgesGeometry(merged,15),new THREE.LineBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.4})));
      stationModel.add(m);
      allG.forEach(g=>g.dispose());geos.forEach(g=>g.dispose());
    }
    const box=new THREE.Box3().setFromObject(stationModel);
    const sz=box.getSize(new THREE.Vector3());
    const maxDim=Math.max(sz.x,sz.y,sz.z)||1;
    // Scale based on station type (meters)
    const typeScale = {'trade_hub':10000, 'military_base':8000, 'shipyard':12000, 'factory':6000, 'refinery':5000, 'component_works':4000, 'mining_colony':3000};
    const stationType = (localState && localState.player && localState.player.station_type) || 'trade_hub';
    const targetSize = typeScale[stationType] || 5000;
    stationModel.scale.setScalar(targetSize/maxDim);
    // Set world position from local state objects
    if(localState && localState.objects){
      const stObj = localState.objects.find(o=>o.station_id);
      if(stObj) stationWorldPos = {x:stObj.x, y:stObj.y, z:stObj.z};
    }
    if(!stationWorldPos) stationWorldPos = {x:2000, y:0, z:0};
    stationModel.position.set(stationWorldPos.x, stationWorldPos.y, stationWorldPos.z);
    scene.add(stationModel);
  }catch(e){}
}
