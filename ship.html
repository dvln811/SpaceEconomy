<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { buildShipFromData } from '/static/ship_renderer.js';

// ── State ──
let player = null;
let localState = null;  // from SSE stream
let shipGroup = null;
let hangarPedestal = null;
let stationModel = null;
let stationWorldPos = null;
let lsgGroup = null; // THREE.Group container for all LSG objects (moves during warp)
let npcMeshes = {};  // id -> THREE.Group (merged ship models)
let npcShipCache = {};  // ship_class -> {mesh: THREE.BufferGeometry, edges: THREE.EdgesGeometry}
let allShipGeos = null;  // loaded from /api/ship_model/all
let objectSprites = {};  // id -> THREE.Sprite/label
let isDocked = true;
let lastTickTime = 0;
let displaySpeed = 0;

// Interpolated positions: {id: {x,y,z,vx,vy,vz}}
let interpShips = {};

// ── Three.js Setup ──
const container = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020305);
const camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.01, 5000000);
camera.position.set(0.3, 0.2, 0.3);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// ── Custom Camera Controller (replaces OrbitControls) ──
let camTheta = Math.PI / 4;  // current horizontal orbit angle
let camPhi = Math.PI / 6;    // current vertical orbit angle
let camRadius = 0.8;           // current orbit distance
let camTargetTheta = Math.PI / 4;  // target (smoothed toward)
let camTargetPhi = Math.PI / 6;
let camTargetRadius = 0.8;
let camMinRadius = 0.1;
let camMaxRadius = 20;
let isOrbiting = false;
let orbitStart = {x:0, y:0};

function updateCameraOrbit() {
  // Smooth toward target values
  camTheta += (camTargetTheta - camTheta) * 0.12;
  camPhi += (camTargetPhi - camPhi) * 0.12;
  camRadius += (camTargetRadius - camRadius) * 0.12;
  // Spherical to cartesian offset from target
  const x = camRadius * Math.cos(camPhi) * Math.sin(camTheta);
  const y = camRadius * Math.sin(camPhi);
  const z = camRadius * Math.cos(camPhi) * Math.cos(camTheta);
  const target = isDocked ? new THREE.Vector3(0,0,0) : playerPos.clone();
  camera.position.set(target.x + x, target.y + y, target.z + z);
  if (!isFreelooking && freelookLerp >= 1.0) {
    camera.lookAt(target);
  }
}

// Left-click drag: orbit
let orbitDragged = false;
renderer.domElement.addEventListener('mousedown', e => {
  if (e.button === 0) {
    isOrbiting = true;
    orbitDragged = false;
    orbitStart = {x: e.clientX, y: e.clientY};
  }
});
window.addEventListener('mouseup', e => {
  if (e.button === 0) isOrbiting = false;
});
window.addEventListener('mousemove', e => {
  if (isOrbiting) {
    const dx = e.clientX - orbitStart.x;
    const dy = e.clientY - orbitStart.y;
    orbitStart = {x: e.clientX, y: e.clientY};
    if (Math.abs(dx) > 0 || Math.abs(dy) > 0) orbitDragged = true;
    camTargetTheta -= dx * 0.005;
    camTargetPhi += dy * 0.005;
    camTargetPhi = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, camTargetPhi));
  }
});

// Scroll: zoom
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  camTargetRadius *= 1 + e.deltaY * 0.001;
  camTargetRadius = Math.max(camMinRadius, Math.min(camMaxRadius, camTargetRadius));
}, {passive: false});

scene.add(new THREE.AmbientLight(0x8aa8cc, 0.4));
const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.5);
dirLight.position.set(0.5, 0.3, 0.2);
scene.add(dirLight);

// Sun/star visual (always visible in flight, emits light + lens flare)
let sunMesh = null;
let sunLight = null;
let sunInitialized = false;
let sunDirection = new THREE.Vector3(1, 0.3, 0).normalize();

function makeFlareTexture(size, r, g, b, falloff){
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  gradient.addColorStop(0, `rgba(${r},${g},${b},1)`);
  gradient.addColorStop(falloff, `rgba(${r},${g},${b},0.3)`);
  gradient.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(canvas);
}

function initSun(){
  if(sunInitialized || !localState || !localState.objects) return;
  const starObj = localState.objects.find(o => o.type === 'star');
  if(!starObj) return;
  sunInitialized = true;

  const starPos = new THREE.Vector3(starObj.x, starObj.y, starObj.z);
  sunDirection = starPos.clone().normalize();
  if(sunDirection.length() < 0.1) sunDirection.set(1, 0.2, 0);

  const sunDist = 20000;
  const sunPos = sunDirection.clone().multiplyScalar(sunDist);

  // Sun: flares only (no sphere)
  sunMesh = new THREE.Group(); // placeholder for cleanup tracking
  sunMesh.position.copy(sunPos);
  scene.add(sunMesh);

  // Bright lens flare sprites
  const flare1 = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeFlareTexture(256, 255, 255, 230, 0.15),
    transparent: true, opacity: 1.0, depthWrite: false, blending: THREE.AdditiveBlending
  }));
  flare1.scale.set(800, 800, 1);
  flare1.position.copy(sunPos);
  scene.add(flare1);

  const flare2 = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeFlareTexture(256, 255, 220, 120, 0.3),
    transparent: true, opacity: 0.7, depthWrite: false, blending: THREE.AdditiveBlending
  }));
  flare2.scale.set(2000, 2000, 1);
  flare2.position.copy(sunPos);
  scene.add(flare2);

  const flare3 = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeFlareTexture(128, 255, 180, 80, 0.5),
    transparent: true, opacity: 0.35, depthWrite: false, blending: THREE.AdditiveBlending
  }));
  flare3.scale.set(4500, 4500, 1);
  flare3.position.copy(sunPos);
  scene.add(flare3);

  sunMesh.userData.flares = [flare1, flare2, flare3];

  // Strong directional light from sun
  dirLight.position.copy(sunDirection.clone().multiplyScalar(1));
  dirLight.intensity = 2.0;

  // Point light at sun
  sunLight = new THREE.PointLight(0xfff0d0, 1.5, sunDist * 3);
  sunLight.position.copy(sunPos);
  scene.add(sunLight);
}

// ── Hangar (docked view) ──
function buildHangar(){
  const floorGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.005, 32);
  const floorMat = new THREE.MeshPhongMaterial({color:0x0a0e18, emissive:0x050810, shininess:0});
  hangarPedestal = new THREE.Mesh(floorGeo, floorMat);
  hangarPedestal.position.y = -0.08;
  const ringGeo = new THREE.TorusGeometry(0.25, 0.002, 8, 64);
  const ringMat = new THREE.MeshBasicMaterial({color:0x1a3050, transparent:true, opacity:0.6});
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI/2;
  ring.position.y = 0.003;
  hangarPedestal.add(ring);
  scene.add(hangarPedestal);
}

// ── Starfield (skybox-style: follows camera, no parallax) ──
let starField = null;
let starFieldBasePositions = null; // store base positions for warp jitter
function buildStarfield(){
  const geo = new THREE.BufferGeometry();
  const count = 4000;
  const verts = new Float32Array(count*3);
  for(let i=0;i<count*3;i+=3){
    const th=Math.random()*Math.PI*2;
    const ph=Math.acos(2*Math.random()-1);
    // All stars on a unit sphere, scaled by a large fixed radius
    verts[i]=Math.sin(ph)*Math.cos(th);
    verts[i+1]=Math.sin(ph)*Math.sin(th);
    verts[i+2]=Math.cos(ph);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(verts,3));
  starFieldBasePositions = new Float32Array(verts);
  // Use non-attenuating size so stars are always the same screen size
  starField = new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:1.5,sizeAttenuation:false}));
  starField.frustumCulled = false;
  starField.renderOrder = -1; // render behind everything
  starField.scale.setScalar(4500000); // stays inside far plane
}
buildStarfield();

// ── Scene Switching ──
function setDockedScene(){
  scene.background = new THREE.Color(0x020305);
  if(starField) starField.removeFromParent();
  if(!hangarPedestal) buildHangar();
  else scene.add(hangarPedestal);
  if(stationModel){ stationModel.removeFromParent(); stationModel=null; }
  // Remove all station models
  Object.values(stationModels).forEach(m => m.removeFromParent());
  stationModels = {};
  stationWorldPos = null;
  // Remove gate models
  Object.values(gateModels).forEach(m => m.removeFromParent());
  gateModels = {};
  // Remove asteroid models
  Object.values(asteroidModels).forEach(rocks => rocks.forEach(r => r.removeFromParent()));
  asteroidModels = {};
  // Remove planet/moon models
  Object.values(planetModels).forEach(m => m.removeFromParent());
  planetModels = {};
  // Remove sun
  if(sunMesh){
    if(sunMesh.userData.flares) sunMesh.userData.flares.forEach(f => f.removeFromParent());
    sunMesh.removeFromParent(); sunMesh = null;
  }
  if(sunLight){ sunLight.removeFromParent(); sunLight = null; }
  sunInitialized = false;
  // Remove NPC meshes and object sprites
  Object.values(npcMeshes).forEach(s=>s.removeFromParent());
  npcMeshes = {};
  Object.values(objectSprites).forEach(s=>s.removeFromParent());
  objectSprites = {};
  // Remove directional labels
  clearDirectionalLabels();
  // Reset warp state
  warpState = 'none';
  warpTargetId = null;
  warpTargetPos = null;
  warpSpeed = 0;
  camRadius = 0.8; camTargetRadius = 0.8;
  camTheta = Math.PI / 4; camTargetTheta = Math.PI / 4;
  camPhi = Math.PI / 6; camTargetPhi = Math.PI / 6;
  camMaxRadius = 1;
  if(shipGroup){
    shipGroup.position.set(0,0,0);
    shipGroup.quaternion.identity(); // reset rotation for hangar display
  }
  updateCameraOrbit();
  isDocked = true;
  // Fade in (overlay starts at opacity 1 on page load)
  const overlay = document.getElementById('fadeOverlay');
  overlay.style.transition = 'opacity 2s';
  setTimeout(()=>{ overlay.style.opacity = '0'; }, 100);
}

function setFlightScene(){
  scene.background = new THREE.Color(0x020308);
  if(hangarPedestal) hangarPedestal.removeFromParent();
  scene.add(starField);
  camMaxRadius = 20;
  camTargetRadius = Math.min(camTargetRadius, 2);
  camRadius = Math.min(camRadius, 2);
  updateCameraOrbit();
  isDocked = false;
  loadAllStations();
  loadAllGates();
  loadAsteroidFields();
  loadPlanetsAndMoons();
  initSun();
  // Fade in after 0.5s delay (let everything position first)
  const overlay = document.getElementById('fadeOverlay');
  overlay.style.opacity = '1';
  setTimeout(()=>{ overlay.style.opacity = '0'; }, 500);
}

// ── SSE Stream Connection ──
let evtSource = null;
function connectStream(){
  if(evtSource) evtSource.close();
  evtSource = new EventSource('/api/player/local_space/stream');
  evtSource.onmessage = (e) => {
    const state = JSON.parse(e.data);
    const firstState = !localState;
    localState = state;
    lastTickTime = performance.now();
    // On first state received, load 3D objects (they need localState to work)
    if(firstState && !isDocked){
      // Create LSG group for initial load
      if(!lsgGroup){ lsgGroup = new THREE.Group(); scene.add(lsgGroup); }
      loadAllStations();
      loadAllGates();
      loadAsteroidFields();
      loadPlanetsAndMoons();
      initSun();
    }
    // Update interpolation targets
    for(const ship of state.ships){
      interpShips[ship.id] = {
        x: ship.x, y: ship.y, z: ship.z,
        vx: ship.vx, vy: ship.vy, vz: ship.vz,
        speed: ship.speed, state: ship.state,
        heading: ship.heading, name: ship.name,
        is_player: ship.is_player, ship_class: ship.ship_class,
        max_speed: ship.max_speed, target_obj: ship.target_obj,
        role: ship.role
      };
    }
    // Remove ships no longer in state
    const ids = new Set(state.ships.map(s=>s.id));
    for(const id of Object.keys(interpShips)){
      if(!ids.has(id)){
        delete interpShips[id];
        if(npcMeshes[id]){ npcMeshes[id].removeFromParent(); delete npcMeshes[id]; }
      }
    }
    updateFromState(state);
  };
  evtSource.onerror = () => { setTimeout(()=>{ if(evtSource.readyState===2) connectStream(); }, 3000); };
}

// ── NPC Ship Model Management (merged geometry approach) ──
const NPC_COLORS = {trader:0x66bb6a, miner:0xffd54f, corsair:0xef5350, military:0x4fc3f7, patrol:0x4fc3f7};
const NPC_EDGE_COLORS = {trader:0x66bb6a, miner:0xffd54f, corsair:0xef5350, military:0x4fc3f7, patrol:0x4fc3f7};

function buildNpcShipMesh(shipClass, role) {
  // Check cache first
  const cacheKey = shipClass + '_' + (role || 'default');
  if (npcShipCache[cacheKey]) return npcShipCache[cacheKey].clone();
  if (!allShipGeos || !allShipGeos[shipClass]) {
    // Fallback: simple ship-like shape (cone + body)
    const edgeColor = NPC_EDGE_COLORS[role] || 0x8aa0b8;
    const body = new THREE.ConeGeometry(0.08, 0.35, 4);
    body.rotateZ(-Math.PI/2);  // nose forward along +X
    const mesh = new THREE.Mesh(body, new THREE.MeshPhongMaterial({color:0x0a1428, emissive:0x0a1428, shininess:0, transparent:true, opacity:0.7}));
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(body, 15), new THREE.LineBasicMaterial({color:edgeColor, transparent:true, opacity:0.7})));
    const grp = new THREE.Group();
    grp.add(mesh);
    npcShipCache[cacheKey] = grp;
    return grp.clone();
  }
  // Build from data using buildShipFromData into a temp scene, then merge
  const tempScene = new THREE.Scene();
  const inner = buildShipFromData(tempScene, allShipGeos[shipClass], {showHardpoints: false});
  tempScene.remove(inner);
  // Merge all geometries into one
  inner.updateMatrixWorld(true);
  const geos = [];
  inner.traverse(c => {
    if (c.isMesh && c.geometry) {
      const g = c.geometry.clone();
      g.applyMatrix4(c.matrixWorld);
      geos.push(g);
    }
  });
  const grp = new THREE.Group();
  if (geos.length) {
    const allG = geos.map(g => g.index ? g.toNonIndexed() : g);
    let totalVerts = 0;
    allG.forEach(g => totalVerts += g.attributes.position.count);
    const positions = new Float32Array(totalVerts * 3);
    let offset = 0;
    for (const g of allG) {
      positions.set(g.attributes.position.array, offset * 3);
      offset += g.attributes.position.count;
    }
    const merged = new THREE.BufferGeometry();
    merged.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    merged.computeVertexNormals();
    const edgeColor = NPC_EDGE_COLORS[role] || 0x4fc3f7;
    const mesh = new THREE.Mesh(merged, new THREE.MeshPhongMaterial({color:0x0a1428, emissive:0x0a1428, shininess:0, transparent:true, opacity:0.7}));
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(merged, 15), new THREE.LineBasicMaterial({color:edgeColor, transparent:true, opacity:0.5})));
    grp.add(mesh);
    allG.forEach(g => g.dispose());
    geos.forEach(g => g.dispose());
  }
  // Scale to ~50m (visible at reasonable distance)
  const box = new THREE.Box3().setFromObject(grp);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  grp.scale.setScalar(0.5 / maxDim);
  npcShipCache[cacheKey] = grp;
  return grp.clone();
}

function getOrCreateNpcMesh(ship) {
  if (npcMeshes[ship.id]) return npcMeshes[ship.id];
  const grp = buildNpcShipMesh(ship.ship_class, ship.role);
  scene.add(grp);
  npcMeshes[ship.id] = grp;
  return grp;
}

// ── System Object Sprites ──
const OBJ_COLORS = {station:'#4fc3f7', gate:'#ab47bc', planet:'#8aa0b8', moon:'#5a7a9a', asteroid_field:'#ffd54f', star:'#ffab40'};
function getOrCreateObjSprite(obj){
  if(objectSprites[obj.id]) return objectSprites[obj.id];
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 32;
  const ctx = canvas.getContext('2d');
  const color = OBJ_COLORS[obj.type] || '#8aa0b8';
  // Icon
  ctx.fillStyle = color;
  if(obj.type==='station'){ ctx.fillRect(2,10,12,12); }
  else if(obj.type==='gate'){ ctx.beginPath();ctx.moveTo(8,6);ctx.lineTo(14,16);ctx.lineTo(2,16);ctx.fill(); }
  else { ctx.beginPath();ctx.arc(8,16,5,0,Math.PI*2);ctx.fill(); }
  // Label
  ctx.font = '10px monospace'; ctx.fillStyle = color;
  ctx.fillText(obj.name.substring(0,14), 18, 18);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, opacity:0.9});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.2, 0.05, 1);
  scene.add(sprite);
  objectSprites[obj.id] = sprite;
  return sprite;
}

// ── Update from SSE State ──
function updateFromState(state){
  if(!state) return;
  const p = state.player;
  if(!p) return;

  // Update player ship stats from server
  if(p.max_speed) playerMaxSpeed = p.max_speed;
  if(p.align_time) playerAlignTime = p.align_time;

  // Set initial player position from server if not yet set
  // Restore player position from server on first connect (page switch recovery)

  // Set initial player position from server if not yet set
  if(!playerPosInitialized && p.x !== undefined){
    playerPos.set(p.x, p.y, p.z);
    playerPosInitialized = true;
    if(p.speed > 0 && p.state === 'flying'){
      playerSpeed = p.speed;
      const [hx,hy,hz] = p.heading || [1,0,0];
      playerHeading.set(hx, hy, hz);
      flyDirection = playerHeading.clone();
    }
    // Apply undock speed (25% max, heading away from station)
    if(window._undockSpeedPending){
      window._undockSpeedPending = false;
      const [hx,hy,hz] = p.heading || [1,0,0];
      playerHeading.set(hx, hy, hz);
      playerSpeed = playerMaxSpeed * 0.25;
      flyDirection = playerHeading.clone();
    }
  }

  // Detect dock/undock transition
  const wasDockedBefore = isDocked;
  const isDockedNow = (p.state === 'docked');

  if(isDockedNow && !wasDockedBefore){
    setDockedScene();
  } else if(!isDockedNow && wasDockedBefore){
    setFlightScene();
  }

  // Update UI
  updateUI(state);

  // Position system objects (only in flight)
  if(!isDockedNow && state.objects){
    // Old sprite system disabled - directional labels handle all display
  }
}

// ── Player Ship Local Physics ──
let flyDirection = null;  // THREE.Vector3 or null
let playerSpeed = 0;
let playerMaxSpeed = 0.95;  // from ship stats, updated on load
let playerAlignTime = 5;
let playerPos = new THREE.Vector3(0, 0, 0);
let playerPosInitialized = false;  // world position
let playerHeading = new THREE.Vector3(1, 0, 0);
let targetHeading = new THREE.Vector3(1, 0, 0);
let posReportTimer = 0;

// Warp state
let warpState = 'none'; // 'none', 'aligning', 'warping'
let warpLock = false; // blocks normal loaders during warp
let warpTargetId = null;
let warpTargetPos = null;  // THREE.Vector3 (real position for final placement)
let warpTargetType = null; // 'station', 'gate', 'planet', 'moon', etc.
let warpHeading = new THREE.Vector3(1, 0, 0);
let warpAlignTimer = 0;
let warpTravelTimer = 0;  // how long warp takes (based on AU distance)
let warpTravelDuration = 0; // total warp time in seconds
let warpSpeed = 0; // visual speed display
let warpBuildReady = false; // true when destination models are built
let warpGroup = null; // isolated THREE.Group for destination models during build

// Engine trail
let trailLine = null;
let trailDrawCount = 0;
function createTrail(){
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(150*3), 3));
  geo.setDrawRange(0, 0);
  trailLine = new THREE.Line(geo, new THREE.LineBasicMaterial({color:0x2288ff, transparent:true, opacity:0.5}));
  trailLine.frustumCulled = false;
  trailLine.visible = false;
  scene.add(trailLine);
}
createTrail();

// ── Animation Loop ──
let lastFrameTime = 0;
function animate(now){
  requestAnimationFrame(animate);
  resizeRenderer();
  const dt = Math.min(0.1, (now - (lastFrameTime||now)) / 1000);
  lastFrameTime = now;

  if(!isDocked && shipGroup){
    // ── Warp Logic (overrides normal flight when active) ──
    if(warpState === 'aligning'){
      // Turn ship toward warp target using ship's align_time spec
      const toTarget = warpTargetPos.clone().sub(playerPos).normalize();
      warpHeading.copy(toTarget);
      // Lerp rate: reach alignment within align_time seconds
      const alignLerp = (dt / playerAlignTime) * 8.0;
      playerHeading.lerp(toTarget, alignLerp).normalize();
      const alignment = playerHeading.dot(toTarget);
      // Accelerate toward warp trigger speed during alignment
      const warpTriggerSpeed = playerMaxSpeed * 0.75;
      if(playerSpeed < warpTriggerSpeed){
        playerSpeed += (warpTriggerSpeed - playerSpeed) * 0.04;
      }
      // Move along heading while aligning
      if(playerSpeed > 0.001){
        playerPos.addScaledVector(playerHeading, playerSpeed * dt);
      }
      flyDirection = null;
      warpAlignTimer += dt;
      // Enter warp ONLY when fully aligned AND at speed (no timeout shortcut)
      const atSpeed = playerSpeed >= warpTriggerSpeed * 0.95;
      if(alignment > 0.9995 && atSpeed){
        // Snap heading to exact target direction
        playerHeading.copy(warpHeading).normalize();
        warpState = 'warping';
        warpSpeed = 0;
        playerSpeed = 0;
        warpTravelTimer = 0;
        warpBuildReady = false;
        warpLock = false;
        window._approachStarted = false;
        window._objDepartTimer = 0;
        // Don't reset lsgGroup position - departure moves it from wherever it is
      }
    } else if(warpState === 'warping'){
      // ── CLEAN WARP FLOW: departure → fetch → transit → approach → finalize ──
      warpTravelTimer += dt;
      let progress = Math.min(1.0, warpTravelTimer / warpTravelDuration);

      // Pause at 85% if destination isn't built yet
      if(progress >= 0.85 && !warpBuildReady){
        progress = 0.85;
        warpTravelTimer = 0.85 * warpTravelDuration;
      }

      // Speed curve: ramp up 0-50%, hold 50-85%, decelerate 85-100%
      let speedFactor;
      if(progress < 0.5) speedFactor = progress / 0.5;
      else if(progress < 0.85) speedFactor = 1.0;
      else speedFactor = (1.0 - progress) / 0.15;
      warpSpeed = speedFactor * 4500;

      // ── DEPARTURE (0–10%): move current lsgGroup backward ──
      if(progress < 0.1){
        if(lsgGroup){
          lsgGroup.position.x -= warpHeading.x * warpSpeed * dt;
          lsgGroup.position.z -= warpHeading.z * warpSpeed * dt;
        }
      }

      // ── At 10%: hide departure, disconnect SSE, start fetch ──
      if(progress >= 0.1 && !warpLock){
        warpLock = true;
        // Hide departure group and disconnect SSE
        if(lsgGroup) lsgGroup.visible = false;
        if(evtSource){ evtSource.close(); evtSource = null; }
        // Keep localState alive (labels/nav need objects for SS coords during warp)
        // warpLock prevents any loaders from firing

        // Start building destination into isolated warpGroup
        warpGroup = new THREE.Group();
        buildWarpDestination(warpTargetId, warpGroup).then(result => {
          if(!result){
            console.error('[WARP] Build failed, aborting');
            warpBuildReady = false;
            return;
          }
          // Store the build result for the swap
          window._warpBuildResult = result;
          warpBuildReady = true;
          console.log('[WARP] Destination built:', warpGroup.children.length, 'objects');
        });
      }

      // ── APPROACH (85–100%): swap group in, interpolate toward player ──
      if(progress >= 0.85 && warpBuildReady){
        // First frame of approach: swap the group into the scene
        if(!window._approachStarted){
          window._approachStarted = true;
          const spawnDist = 5000; // spawn 5000 units ahead
          window._approachSpawnDist = spawnDist;

          // Remove old lsgGroup and all its contents
          if(lsgGroup){
            scene.remove(lsgGroup);
            lsgGroup.traverse(c => {
              if(c.geometry) c.geometry.dispose();
              if(c.material){
                if(c.material.map) c.material.map.dispose();
                c.material.dispose();
              }
            });
          }

          // Clear old model dictionaries
          stationModels = {};
          gateModels = {};
          asteroidModels = {};
          planetModels = {};

          // Swap in the new group
          lsgGroup = warpGroup;
          warpGroup = null;
          scene.add(lsgGroup);
          lsgGroup.position.set(warpHeading.x * spawnDist, 0, warpHeading.z * spawnDist);
          lsgGroup.visible = true;

          // Adopt the build result into module-level dicts
          const result = window._warpBuildResult;
          if(result){
            stationModels = result.stations;
            gateModels = result.gates;
            asteroidModels = result.asteroids;
            planetModels = result.planets;
            window._warpLsgData = result.lsgData;
          }
        }

        // Interpolate group from spawnDist to arrDist
        const approachT = Math.min(1.0, (progress - 0.85) / 0.15);
        const arrDist = (window._warpLsgData && window._warpLsgData.arrival_dist) || 100;
        const spawnDist = window._approachSpawnDist;
        const sx = warpHeading.x * spawnDist;
        const sz = warpHeading.z * spawnDist;
        const ex = warpHeading.x * arrDist;
        const ez = warpHeading.z * arrDist;
        // Ease-out for deceleration feel
        const eased = 1 - Math.pow(1 - approachT, 2);
        lsgGroup.position.x = sx + (ex - sx) * eased;
        lsgGroup.position.z = sz + (ez - sz) * eased;
      }

      // ── FINALIZE at 100% ──
      if(progress >= 1.0){
        // Group is already at heading*arrDist from approach interpolation.
        // Player is at origin (0,0,0) since ship stayed stationary during warp.
        // This means the anchor is arrDist units ahead of the player - correct!
        // Just set playerPos to origin and heading to warp direction.
        playerPos.set(0, 0, 0);
        playerHeading.copy(warpHeading);
        playerSpeed = 0;

        // Update localState from the fetched data
        const lsgData = window._warpLsgData;
        if(lsgData){
          localState = {system_id: lsgData.system_id, objects: lsgData.objects, ships: lsgData.ships, player: localState?.player};
        }

        // Clean up warp state
        warpState = 'none';
        warpTargetId = null;
        warpTargetPos = null;
        warpBuildReady = false;
        warpLock = false;
        window._approachStarted = false;
        window._warpBuildResult = null;
        window._warpLsgData = null;

        document.getElementById('warpTarget').textContent = '';

        // Tell server we arrived
        fetch('/api/player/position', {method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({x:playerPos.x, y:playerPos.y, z:playerPos.z, speed:0,
            hx:playerHeading.x, hy:playerHeading.y, hz:playerHeading.z, state:'idle'})
        }).catch(()=>{});

        // Reconnect SSE stream (warpLock is already false so firstState loaders are safe,
        // but models already exist in dicts so they won't re-create)
        connectStream();
      }

      // ── HUD ──
      displaySpeed = warpSpeed;
      document.getElementById('speedBar').style.width = (progress * 100) + '%';
      document.getElementById('shipSpeed').textContent = (warpSpeed*100) > 1000 ? ((warpSpeed*100)/1000).toFixed(1) + ' km/s' : Math.round(warpSpeed*100) + ' m/s';
      document.getElementById('warpTarget').textContent = warpBuildReady ? 'Arriving' : 'Warp ' + Math.round(progress * 100) + '%';
    }

    // ── Player Ship Physics (CLIENT-AUTHORITATIVE, ship moves in world space) ──
    if(warpState === 'none'){
      if(flyDirection){
        const lerpRate = 1.0 / (playerAlignTime * 60) * 3;
        playerHeading.lerp(flyDirection, lerpRate).normalize();
        const alignment = Math.max(0, playerHeading.dot(flyDirection));
        playerSpeed += (playerMaxSpeed * alignment - playerSpeed) * 0.03;
      } else {
        playerSpeed *= 0.95;
        if(playerSpeed < 0.005) playerSpeed = 0;
      }
    }

    // Move ship in world space (always, regardless of state)
    if(playerSpeed > 0.001){
      const moveM = playerSpeed * dt;
      playerPos.addScaledVector(playerHeading, moveM);
    }

    // Position ship model at world pos
    shipGroup.position.copy(playerPos);
    // Rotate ship to face heading
    const lookTarget = playerPos.clone().add(playerHeading);
    const lookMat = new THREE.Matrix4().lookAt(shipGroup.position, lookTarget, new THREE.Vector3(0,1,0));
    const targetQuat = new THREE.Quaternion().setFromRotationMatrix(lookMat);
    const offsetQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), Math.PI/2);
    targetQuat.multiply(offsetQuat);
    shipGroup.quaternion.slerp(targetQuat, 0.15);

    // Camera follows ship (maintain relative offset) - skip during freelook
    if(!isFreelooking){
      // Lerp freelook back to ship smoothly
      if(freelookLerp < 1.0){
        freelookLerp += dt * 0.5; // ~2 seconds to return
        if(freelookLerp >= 1.0) freelookLerp = 1.0;
      }
      freelookYaw *= 0.92;
      freelookPitch *= 0.92;
      if(Math.abs(freelookYaw) < 0.005 && Math.abs(freelookPitch) < 0.005){
        freelookYaw = 0; freelookPitch = 0;
      }
    }
    updateCameraOrbit();
    // Apply freelook rotation (look away from ship)
    if(Math.abs(freelookYaw) > 0.001 || Math.abs(freelookPitch) > 0.001){
      const baseDir = playerPos.clone().sub(camera.position).normalize();
      const right = new THREE.Vector3().crossVectors(baseDir, new THREE.Vector3(0,1,0)).normalize();
      const up = new THREE.Vector3(0,1,0);
      const lookAt = playerPos.clone();
      lookAt.addScaledVector(right, freelookYaw * 0.5);
      lookAt.addScaledVector(up, -freelookPitch * 0.5);
      camera.lookAt(lookAt);
    }

    // Trail
    if(playerSpeed > 0.01){
      trailLine.visible = true;
      const arr = trailLine.geometry.attributes.position.array;
      if(trailDrawCount < 150){
        arr[trailDrawCount*3] = playerPos.x;
        arr[trailDrawCount*3+1] = playerPos.y;
        arr[trailDrawCount*3+2] = playerPos.z;
        trailDrawCount++;
      } else {
        for(let i=0;i<149*3;i++) arr[i] = arr[i+3];
        arr[149*3]=playerPos.x; arr[149*3+1]=playerPos.y; arr[149*3+2]=playerPos.z;
      }
      trailLine.geometry.setDrawRange(0, trailDrawCount);
      trailLine.geometry.attributes.position.needsUpdate = true;
    } else {
      trailLine.visible = false;
      trailDrawCount = 0;
    }

    // Speed UI
    displaySpeed += (playerSpeed - displaySpeed) * 0.1;
    document.getElementById('speedBar').style.width = (displaySpeed / playerMaxSpeed * 100) + '%';
    document.getElementById('shipSpeed').textContent = Math.round(displaySpeed * 100) + ' m/s';
    document.getElementById('shipState').textContent = warpState === 'warping' ? 'Warping' : warpState === 'aligning' ? 'Aligning' : flyDirection ? (displaySpeed > playerMaxSpeed*0.9 ? 'Full Speed' : 'Aligning') : (playerSpeed > 0.01 ? 'Decelerating' : 'Idle');

    // ── Starfield: follow camera (skybox behavior, no parallax) ──
    if(starField){
      starField.position.copy(camera.position);
      // Warp jitter effect
      if(warpState === 'warping' && starFieldBasePositions){
        const arr = starField.geometry.attributes.position.array;
        const time = now * 0.01;
        for(let i=0; i<arr.length; i+=3){
          // Stretch stars along the warp direction
          const bx = starFieldBasePositions[i], by = starFieldBasePositions[i+1], bz = starFieldBasePositions[i+2];
          // Add a slight jitter/streak along warp heading
          const dot = bx*warpHeading.x + by*warpHeading.y + bz*warpHeading.z;
          const streak = 0.15 * Math.sin(time + i*0.1);
          arr[i] = bx + warpHeading.x * dot * streak;
          arr[i+1] = by + warpHeading.y * dot * streak;
          arr[i+2] = bz + warpHeading.z * dot * streak;
        }
        starField.geometry.attributes.position.needsUpdate = true;
        // Also scale star size during warp for motion blur feel
        starField.material.size = 1.5 + Math.abs(Math.sin(time*0.5))*1.5;
      } else {
        // Reset if not warping
        if(starField.material.size !== 1.5) starField.material.size = 1.5;
      }
    }

    // ── NPC Ships (SERVER-AUTHORITATIVE, interpolated, world space) ──
    const timeSinceTick = (now - lastTickTime) / 1000;
    for(const [id, ship] of Object.entries(interpShips)){
      if(ship.is_player) continue;
      // Hide docked ships
      if(ship.state === 'docked' || ship.state === 'idle' && ship.speed < 0.005){
        if(npcMeshes[id]) npcMeshes[id].visible = false;
        continue;
      }
      const sx = ship.x + ship.vx * timeSinceTick;
      const sy = ship.y + ship.vy * timeSinceTick;
      const sz = ship.z + ship.vz * timeSinceTick;
      const mesh = getOrCreateNpcMesh(ship);
      mesh.visible = true;
      mesh.position.set(sx, sy, sz);
      // Rotate ship to face heading
      if(ship.heading && (ship.heading[0]!==0 || ship.heading[1]!==0 || ship.heading[2]!==0)){
        const hx = ship.heading[0], hy = ship.heading[1], hz = ship.heading[2];
        const lookTarget = new THREE.Vector3(sx + hx, sy + hy, sz + hz);
        const lookMat = new THREE.Matrix4().lookAt(mesh.position, lookTarget, new THREE.Vector3(0,1,0));
        const targetQuat = new THREE.Quaternion().setFromRotationMatrix(lookMat);
        const offsetQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), Math.PI/2);
        targetQuat.multiply(offsetQuat);
        mesh.quaternion.slerp(targetQuat, 0.1);
      }
    }

    // ── Old sprite system disabled (directional labels handle all display now) ──
    // Station models positioned on load (no per-frame update needed)

    // ── Distance-based visibility for large objects ──
    if(localState && localState.objects){
      // During warp tunnel: handled by the warp block (hides everything)
      // During deceleration: only show objects near the WARP TARGET
      // Normal flight: show objects near PLAYER
      if(warpState !== 'warping'){
        const visCenter = (warpState === 'decelerating' && warpTargetPos) ? warpTargetPos : playerPos;
        const visDist = 500000; // 500k units = 50,000km - enough to see nearby planets
        // Reset scales from any previous warp departure (restore original scale)
        for(const [id, mesh] of Object.entries(stationModels)){
          if(mesh.userData._origScale) mesh.scale.setScalar(mesh.userData._origScale);
        }
        for(const [id, mesh] of Object.entries(gateModels)){
          if(mesh.userData._origScale) mesh.scale.setScalar(mesh.userData._origScale);
        }
        for(const [id, rocks] of Object.entries(asteroidModels)) rocks.forEach(r => {
          if(r.userData._origScale) r.scale.setScalar(r.userData._origScale);
        });
        for(const [id, mesh] of Object.entries(stationModels)){
          const obj = localState.objects.find(o => o.station_id === id);
          if(!obj){ mesh.visible = false; continue; }
          const dist = Math.sqrt((obj.x-visCenter.x)**2 + (obj.y-visCenter.y)**2 + (obj.z-visCenter.z)**2);
          mesh.visible = dist < visDist;
        }
        for(const [id, mesh] of Object.entries(gateModels)){
          const obj = localState.objects.find(o => o.id === id);
          if(!obj){ mesh.visible = false; continue; }
          const dist = Math.sqrt((obj.x-visCenter.x)**2 + (obj.y-visCenter.y)**2 + (obj.z-visCenter.z)**2);
          mesh.visible = dist < visDist;
        }
        for(const [id, rocks] of Object.entries(asteroidModels)){
          const obj = localState.objects.find(o => o.id === id);
          if(!obj){ rocks.forEach(r => r.visible = false); continue; }
          const dist = Math.sqrt((obj.x-visCenter.x)**2 + (obj.y-visCenter.y)**2 + (obj.z-visCenter.z)**2);
          rocks.forEach(r => r.visible = dist < 250);
        }
      } else {
        // During warping DEPARTURE ONLY: shrink all visible stations/gates/asteroids
        // Skip this during approach (when _approachStarted is true)
        if(!window._approachStarted){
          if(!window._objDepartTimer) window._objDepartTimer = 0;
          window._objDepartTimer += dt;
          const ot = Math.min(1.0, window._objDepartTimer / 1.5);
          const objScale = Math.max(0.02, 1.0 - ot * 0.98);
          for(const [id, mesh] of Object.entries(stationModels)){
            const os = mesh.userData._origScale || 1;
            mesh.scale.setScalar(os * objScale);
            if(ot >= 1.0) mesh.visible = false;
          }
          for(const [id, mesh] of Object.entries(gateModels)){
            const os = mesh.userData._origScale || 1;
            mesh.scale.setScalar(os * objScale);
            if(ot >= 1.0) mesh.visible = false;
          }
          for(const [id, rocks] of Object.entries(asteroidModels)){
            rocks.forEach(r => { const os = r.userData._origScale || 1; r.scale.setScalar(os * objScale); if(ot >= 1.0) r.visible = false; });
          }
        }
      }
      // Reset departure timer when not warping
      if(warpState !== 'warping') window._objDepartTimer = 0;
      // ── Planets are now placed like stations - no per-frame positioning needed ──
    }

    // ── Directional labels for distant objects ──
    updateDirectionalLabels();

    // ── Update nav card distances every 2s during flight ──
    if(!window._navRefreshTimer) window._navRefreshTimer = 0;
    window._navRefreshTimer += dt;
    if(window._navRefreshTimer > 0.5 && localState && localState.objects && !isDocked){
      window._navRefreshTimer = 0;
      // During warp, interpolate position toward target for distance display
      let navPos = {x: playerPos.x, y: playerPos.y, z: playerPos.z};
      if(warpState === 'warping' && warpTargetPos){
        const progress = Math.min(1.0, warpTravelTimer / warpTravelDuration);
        navPos = {
          x: playerPos.x + (warpTargetPos.x - playerPos.x) * progress,
          y: playerPos.y + (warpTargetPos.y - playerPos.y) * progress,
          z: playerPos.z + (warpTargetPos.z - playerPos.z) * progress
        };
      }
      renderNavList(localState.objects, navPos);
    }

    // ── Report position to server every 3 seconds ──
    posReportTimer += dt;
    if(posReportTimer > 3){
      posReportTimer = 0;
      fetch('/api/player/position', {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({x:playerPos.x, y:playerPos.y, z:playerPos.z, speed:playerSpeed,
          hx:playerHeading.x, hy:playerHeading.y, hz:playerHeading.z,
          state: flyDirection?'flying':'idle'})
      }).catch(()=>{});
    }
  }

  if(isDocked) updateCameraOrbit();
  renderer.render(scene, camera);
}

// ── Input: Double-click to fly ──
container.addEventListener('dblclick', e=>{
  if(isDocked) return;
  if(warpState !== 'none') return; // can't redirect during warp
  const rect = renderer.domElement.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  flyDirection = raycaster.ray.direction.clone().normalize();
  targetHeading.copy(flyDirection);
  // Report to server
  fetch('/api/player/fly', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({dx:flyDirection.x, dy:flyDirection.y, dz:flyDirection.z})
  }).catch(()=>{});
});

// ── Input: S key to stop ──
document.addEventListener('keydown', e=>{
  if(e.key === 's' || e.key === 'S'){
    if(isDocked) return;
    if(warpState !== 'none'){
      // Cancel warp
      warpState = 'none';
      warpSpeed = 0;
      warpTargetId = null;
      warpTargetPos = null;
      playerSpeed = 0;
      document.getElementById('warpTarget').textContent = '';
      fetch('/api/player/stop', {method:'POST'}).catch(()=>{});
      return;
    }
    flyDirection = null;
    fetch('/api/player/stop', {method:'POST'}).catch(()=>{});
  }
});

// ── Input: Right-click freelook ──
let isFreelooking = false;
let freelookStart = {x:0, y:0};
let freelookYaw = 0;
let freelookPitch = 0;
let freelookLerp = 1.0; // 1.0 = looking at ship, 0.0 = just released
renderer.domElement.addEventListener('mousedown', e=>{
  if(e.button === 2){
    isFreelooking = true;
    freelookStart = {x:e.clientX, y:e.clientY};
    freelookLerp = 0;
  }
});
window.addEventListener('mouseup', e=>{
  if(e.button === 2){
    isFreelooking = false;
    freelookLerp = 0; // will lerp back over ~2 seconds
  }
});
window.addEventListener('mousemove', e=>{
  if(!isFreelooking) return;
  const dx = e.clientX - freelookStart.x;
  const dy = e.clientY - freelookStart.y;
  freelookStart = {x:e.clientX, y:e.clientY};
  freelookYaw += dx * 0.003;
  freelookPitch += dy * 0.003;
  freelookPitch = Math.max(-1.5, Math.min(1.5, freelookPitch));
});

// ── Warp command (called from nav list) ──
window.warpTo = function(objId){
  closeCtx();
  if(warpState !== 'none') return;
  if(!localState || !localState.objects) return;
  const obj = localState.objects.find(o => o.id === objId);
  if(!obj) return;
  // Don't warp if this is the anchor (we're already here)
  if(obj.is_anchor) return;
  // Compute warp direction from SS coordinates (current anchor -> target)
  const anchorObj = localState.objects.find(o => o.is_anchor);
  if(!anchorObj) return;
  const ssDx = obj.ss_x - anchorObj.ss_x;
  const ssDz = obj.ss_z - anchorObj.ss_z;
  const ssLen = Math.sqrt(ssDx*ssDx + ssDz*ssDz) || 0.01;
  // Set warp heading from SS direction
  warpHeading.set(ssDx/ssLen, 0, ssDz/ssLen).normalize();
  // Set warp target position far away in that direction (for departure animation)
  warpTargetId = objId;
  warpTargetPos = new THREE.Vector3(warpHeading.x * 100000, 0, warpHeading.z * 100000);
  warpTargetType = obj.type;
  // Compute warp duration from AU distance between objects
  const auDist = ssLen;
  warpTravelDuration = Math.max(3, Math.min(15, auDist * 3));
  warpTravelTimer = 0;
  warpState = 'aligning';
  warpAlignTimer = 0;
  // Save departure SS coords for label interpolation throughout warp
  window._warpFromSS = {x: anchorObj.ss_x, z: anchorObj.ss_z};
  window._warpToSS = {x: obj.ss_x, z: obj.ss_z};
  document.getElementById('warpTarget').textContent = 'Aligning...';
};

// ── Jump Gate (system transition) ──
window.jumpGate = async function(gateId){
  closeCtx();
  // Show jump transition overlay
  const overlay = document.getElementById('fadeOverlay');
  overlay.style.transition = 'opacity 1s';
  overlay.style.opacity = '1';
  document.getElementById('shipState').textContent = 'Jumping...';

  try{
    const r = await fetch('/api/player/jump', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({gate_id: gateId})
    });
    const data = await r.json();
    if(data.status === 'jumped'){
      // Clear current scene objects
      Object.values(stationModels).forEach(m => m.removeFromParent());
      stationModels = {};
      Object.values(gateModels).forEach(m => m.removeFromParent());
      gateModels = {};
      Object.values(asteroidModels).forEach(rocks => rocks.forEach(r => r.removeFromParent()));
      asteroidModels = {};
      Object.values(planetModels).forEach(m => m.removeFromParent());
      planetModels = {};
      Object.values(npcMeshes).forEach(m => m.removeFromParent());
      npcMeshes = {};
      interpShips = {};
      Object.values(objectSprites).forEach(s => s.removeFromParent());
      objectSprites = {};
      clearDirectionalLabels();
      // Reset player position (server will provide new position via SSE)
      playerPosInitialized = false;
      playerSpeed = 0;
      flyDirection = null;
      warpState = 'none';
      // Update location bar
      document.getElementById('sysName').textContent = data.system_name || data.system_id;
      // Wait for SSE to deliver new state, then load objects
      setTimeout(()=>{
        loadAllStations();
        loadAllGates();
        loadAsteroidFields();
        loadPlanetsAndMoons();
        // Fade back in
        overlay.style.transition = 'opacity 2s';
        overlay.style.opacity = '0';
      }, 1500);
    } else {
      // Failed
      overlay.style.transition = 'opacity 0.5s';
      overlay.style.opacity = '0';
      document.getElementById('shipState').textContent = data.error || 'Jump failed';
    }
  }catch(e){
    overlay.style.transition = 'opacity 0.5s';
    overlay.style.opacity = '0';
  }
};

function renderNavList(objects, playerShip){
  const px = playerShip.x, py = playerShip.y, pz = playerShip.z;
  const nav = document.getElementById('navObjects');
  nav.innerHTML = objects.filter(o=>o.type!=='star').map(o=>{
    const icon = o.type==='gate'?'&#9674;':o.type==='station'?'&#9632;':o.type==='planet'?'&#9679;':'&#8226;';
    const color = o.type==='gate'?'#ab47bc':o.type==='station'?'#4fc3f7':'#8aa0b8';
    // Distance display: anchor objects use local LSG distance, others use SS AU distance
    let distStr;
    if(o.is_anchor){
      // Local distance from player to anchor (in LSG units, 1 unit = 1cm)
      const dx = o.x - px, dy = o.y - py, dz = o.z - pz;
      const distUnits = Math.sqrt(dx*dx + dy*dy + dz*dz);
      const distM = distUnits * 0.01; // convert cm units to meters for display
      if(distM < 1000) distStr = Math.round(distM) + ' m';
      else distStr = (distM / 1000).toFixed(1) + ' km';
    } else {
      // SS AU distance from current position (interpolated during warp)
      let curX = 0, curZ = 0;
      if((warpState === 'warping' || warpState === 'aligning') && window._warpFromSS){
        const progress = (warpState === 'warping') ? Math.min(1.0, warpTravelTimer / warpTravelDuration) : 0;
        curX = window._warpFromSS.x + (window._warpToSS.x - window._warpFromSS.x) * progress;
        curZ = window._warpFromSS.z + (window._warpToSS.z - window._warpFromSS.z) * progress;
      } else {
        const anchorObj = objects.find(a => a.is_anchor);
        curX = anchorObj ? anchorObj.ss_x : 0;
        curZ = anchorObj ? anchorObj.ss_z : 0;
      }
      const adx = o.ss_x - curX, adz = o.ss_z - curZ;
      const auDist = Math.sqrt(adx*adx + adz*adz);
      distStr = auDist.toFixed(2) + ' AU';
    }
    const distKm = o.is_anchor ? 0.01 : 999; // for atLocation check
    // Mark if player is at this object's LSG
    const atLocation = o.is_anchor;
    const destLabel = (o.type==='gate' && o.connects_to) ? ` &rarr; ${o.connects_to}` : '';
    const atStyle = atLocation ? 'opacity:0.5' : '';
    return `<div class="nav-obj" style="padding:3px 4px;cursor:pointer;border-bottom:1px solid #0f1520;display:flex;justify-content:space-between;${atStyle}" data-id="${o.id}" data-name="${o.name}" data-type="${o.type}">
      <span><span style="color:${color}">${icon}</span> ${o.name}<span style="color:#5a7a9a;font-size:9px">${destLabel}</span></span>
      <span style="color:${atLocation ? '#66bb6a' : '#c8d4e0'};font-size:10px">${atLocation ? 'HERE' : distStr}</span>
    </div>`;
  }).join('');
  // Show dock button if near a station (within ~3km of any station)
  const nearStation = objects.find(o=>{
    if(o.type!=='station' || !o.is_anchor) return false;
    const dx=o.x-px, dy=o.y-py, dz=o.z-pz;
    return Math.sqrt(dx*dx+dy*dy+dz*dz) < 30;
  });
  document.getElementById('dockBtn').style.display = nearStation ? '' : 'none';
  // Show jump button if near a gate with connection (within 10km)
  const nearGate = objects.find(o=>{
    if(o.type!=='gate' || !o.connects_to) return false;
    const dx=o.x-px, dy=o.y-py, dz=o.z-pz;
    return Math.sqrt(dx*dx+dy*dy+dz*dz) < 20;
  });
  let jumpBtn = document.getElementById('jumpBtn');
  if(!jumpBtn){
    jumpBtn = document.createElement('button');
    jumpBtn.id = 'jumpBtn';
    jumpBtn.className = 'btn';
    jumpBtn.style.cssText = 'margin-top:8px;border-color:#ab47bc;color:#ab47bc;display:none';
    jumpBtn.textContent = 'Jump';
    document.getElementById('dockBtn').parentNode.insertBefore(jumpBtn, document.getElementById('dockBtn').nextSibling);
  }
  if(nearGate){
    jumpBtn.style.display = '';
    jumpBtn.textContent = `Jump to ${nearGate.connects_to}`;
    jumpBtn.onclick = ()=> window.jumpGate(nearGate.id);
  } else {
    jumpBtn.style.display = 'none';
  }
}

// ── Build Warp Destination (isolated builder for warp approach) ──
// Fetches all models for the destination and builds them into the provided targetGroup.
// Does NOT touch module-level stationModels/gateModels/asteroidModels/planetModels until complete.
// Returns: {stations, gates, asteroids, planets, lsgData} on success, null on failure.
async function buildWarpDestination(targetId, targetGroup){
  try{
    const r = await fetch('/api/lsg_data/' + targetId);
    if(!r.ok) return null;
    const lsgData = await r.json();
    const objects = lsgData.objects || [];
    const newStations = {};
    const newGates = {};
    const newAsteroids = {};
    const newPlanets = {};

    // ── Stations ──
    const stationObjs = objects.filter(o => o.station_id && o.is_anchor);
    for(const obj of stationObjs){
      try{
        const sr = await fetch('/api/station_model/' + obj.station_id);
        if(!sr.ok) continue;
        const data = await sr.json();
        const model = buildStationMesh(data);
        if(!model) continue;
        const box = new THREE.Box3().setFromObject(model);
        const sz = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(sz.x, sz.y, sz.z) || 1;
        const typeScale = {'trade_hub':100, 'military_base':80, 'shipyard':120, 'factory':60, 'refinery':50, 'component_works':40, 'mining_colony':30};
        const targetSize = typeScale[data.station_type] || 5;
        model.scale.setScalar(targetSize / maxDim);
        model.userData._origScale = targetSize / maxDim;
        model.position.set(obj.x, obj.y, obj.z);
        targetGroup.add(model);
        newStations[obj.station_id] = model;
      }catch(e){}
    }

    // ── Gates ──
    const gateObjs = objects.filter(o => o.type === 'gate' && o.is_anchor);
    for(const obj of gateObjs){
      try{
        const sysId = lsgData.system_id || '';
        const gr = await fetch(`/api/gate_model/${sysId}/${obj.id}`);
        if(!gr.ok) continue;
        const data = await gr.json();
        const model = buildStationMesh(data);
        if(!model) continue;
        const box = new THREE.Box3().setFromObject(model);
        const sz = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(sz.x, sz.y, sz.z) || 1;
        model.scale.setScalar(10 / maxDim);
        model.userData._origScale = 10 / maxDim;
        model.position.set(obj.x, obj.y, obj.z);
        model.traverse(c => {
          if(c.isLineSegments && c.material){
            c.material.color.setHex(0xd066f0);
            c.material.opacity = 0.7;
          }
        });
        targetGroup.add(model);
        newGates[obj.id] = model;
      }catch(e){}
    }

    // ── Asteroid Fields ──
    const beltObjs = objects.filter(o => (o.type === 'asteroid_belt' || o.type === 'belt') && o.is_anchor);
    for(const obj of beltObjs){
      try{
        const fieldId = obj.connects_to || obj.id;
        const ar = await fetch('/api/asteroid_model/' + fieldId);
        if(!ar.ok) continue;
        const fieldData = await ar.json();
        const asteroids = fieldData.asteroids || fieldData;
        const rocks = [];
        let fieldSeed = 0;
        for(let c = 0; c < fieldId.length; c++) fieldSeed = ((fieldSeed << 5) - fieldSeed) + fieldId.charCodeAt(c);
        const seededRand = (function(s){return function(){s=(s*1664525+1013904223)&0xFFFFFFFF;return(s>>>0)/4294967296;};})(Math.abs(fieldSeed));
        for(let i = 0; i < asteroids.length; i++){
          const data = asteroids[i];
          const mesh = buildAsteroidMesh(data);
          if(!mesh) continue;
          if(data.color){
            mesh.material.color.setHex(data.color);
            mesh.material.emissive.setHex(data.color).multiplyScalar(0.1);
          }
          const angle = seededRand() * Math.PI * 2;
          const dist = seededRand() * 150;
          const vert = (seededRand() - 0.5) * 30;
          mesh.position.set(obj.x + Math.cos(angle) * dist, obj.y + vert, obj.z + Math.sin(angle) * dist);
          mesh.rotation.set(seededRand()*6.28, seededRand()*6.28, seededRand()*6.28);
          targetGroup.add(mesh);
          rocks.push(mesh);
        }
        newAsteroids[obj.id] = rocks;
      }catch(e){}
    }

    // ── Planets & Moons ──
    const bodies = objects.filter(o => (o.type === 'planet' || o.type === 'moon') && (o.x !== 0 || o.z !== 0 || o.is_anchor));
    for(const obj of bodies){
      const isPlanet = obj.type === 'planet';
      const radius = isPlanet ? 5000 + Math.abs(hash(obj.id)) % 25000 : 1000 + Math.abs(hash(obj.id)) % 4000;
      const colors = PLANET_COLORS[obj.type] || PLANET_COLORS['planet'];
      const color = colors[Math.abs(hash(obj.id)) % colors.length];
      const geo = new THREE.SphereGeometry(radius, isPlanet ? 32 : 16, isPlanet ? 24 : 12);
      const tex = generatePlanetTexture(obj.id, color, isPlanet);
      const mat = new THREE.MeshPhongMaterial({map: tex, shininess: isPlanet ? 15 : 5});
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(obj.x, obj.y, obj.z);
      mesh.userData = {radius, type: obj.type};
      targetGroup.add(mesh);
      newPlanets[obj.id] = mesh;
    }

    return {stations: newStations, gates: newGates, asteroids: newAsteroids, planets: newPlanets, lsgData};
  }catch(e){
    console.error('[WARP] buildWarpDestination failed:', e);
    return null;
  }
}

let stationModels = {}; // station_id -> THREE.Group

async function loadAllStations(){
  if(warpLock) return;
  if(!localState || !localState.objects) return;
  const stationObjs = localState.objects.filter(o => o.station_id && o.is_anchor);
  for(const obj of stationObjs){
    if(stationModels[obj.station_id]) continue; // already loaded
    try{
      const r = await fetch('/api/station_model/'+obj.station_id);
      if(!r.ok) continue;
      const data = await r.json();
      const model = buildStationMesh(data);
      if(!model) continue;
      // Scale based on station type
      const box = new THREE.Box3().setFromObject(model);
      const sz = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(sz.x, sz.y, sz.z) || 1;
      const typeScale = {'trade_hub':100, 'military_base':80, 'shipyard':120, 'factory':60, 'refinery':50, 'component_works':40, 'mining_colony':30};
      const targetSize = typeScale[data.station_type] || 5;
      model.scale.setScalar(targetSize / maxDim);
      model.userData._origScale = targetSize / maxDim;
      // Position at object world coords
      model.position.set(obj.x, obj.y, obj.z);
      (lsgGroup||scene).add(model);
      stationModels[obj.station_id] = model;
    }catch(e){}
  }
  // Set legacy references for compatibility
  if(player && player.station_id && stationModels[player.station_id]){
    stationModel = stationModels[player.station_id];
    stationWorldPos = stationModel.position;
  }
}

function buildStationMesh(data){
  const tempGroup = new THREE.Group();
  for(const comp of data.components){
    const [px,py,pz]=comp.pos;const [rx,ry,rz]=comp.rot||[0,0,0];let mesh=null;
    const mat=new THREE.MeshPhongMaterial({color:0x0a1428,emissive:0x0a1428,shininess:0,transparent:true,opacity:0.7});
    switch(comp.type){
      case'pod':{const{length,height,width}=comp.params;mesh=new THREE.Mesh(new THREE.BoxGeometry(length,height,width),mat);break;}
      case'cylinder':{const{r_top,r_bot,length}=comp.params;mesh=new THREE.Mesh(new THREE.CylinderGeometry(r_top,r_bot,length,6),mat);if(!rx&&!ry&&!rz)mesh.rotation.z=Math.PI/2;break;}
      case'cone':{const{radius,length}=comp.params;mesh=new THREE.Mesh(new THREE.ConeGeometry(radius,length,6),mat);if(!rx&&!ry&&!rz)mesh.rotation.z=Math.PI/2;break;}
      case'box':{const{x,y,z}=comp.params;mesh=new THREE.Mesh(new THREE.BoxGeometry(x,y,z),mat);break;}
      case'sphere':{const{radius,half}=comp.params;mesh=new THREE.Mesh(half?new THREE.SphereGeometry(radius,5,3,0,Math.PI*2,0,Math.PI/2):new THREE.SphereGeometry(radius,5,3),mat);break;}
      case'torus':{const{radius,tube}=comp.params;mesh=new THREE.Mesh(new THREE.TorusGeometry(radius,tube,5,10),mat);if(!rx&&!ry&&!rz)mesh.rotation.y=Math.PI/2;break;}
      case'spine':{const{length,radius}=comp.params;mesh=new THREE.Mesh(new THREE.CylinderGeometry(radius,radius,length,4),mat);mesh.rotation.z=Math.PI/2;break;}
      default:continue;
    }
    if(mesh){mesh.position.set(px,py,pz);mesh.rotation.x+=rx;mesh.rotation.y+=ry;mesh.rotation.z+=rz;tempGroup.add(mesh);}
  }
  tempGroup.updateMatrixWorld(true);
  const geos=[];
  tempGroup.traverse(c=>{if(c.isMesh&&c.geometry){const g=c.geometry.clone();g.applyMatrix4(c.matrixWorld);geos.push(g);}});
  if(!geos.length) return null;
  const allG=geos.map(g=>g.index?g.toNonIndexed():g);
  let tv=0;allG.forEach(g=>tv+=g.attributes.position.count);
  const pos=new Float32Array(tv*3);let off=0;
  for(const g of allG){pos.set(g.attributes.position.array,off*3);off+=g.attributes.position.count;}
  const merged=new THREE.BufferGeometry();
  merged.setAttribute('position',new THREE.BufferAttribute(pos,3));
  merged.computeVertexNormals();
  const m=new THREE.Mesh(merged,new THREE.MeshPhongMaterial({color:0x0a1428,emissive:0x0a1428,shininess:0,transparent:true,opacity:0.7}));
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(merged,15),new THREE.LineBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.4})));
  const grp = new THREE.Group();
  grp.add(m);
  allG.forEach(g=>g.dispose());geos.forEach(g=>g.dispose());
  return grp;
}

// ── Gate Models ──
let gateModels = {}; // obj_id -> THREE.Group
async function loadAllGates(){
  if(warpLock) return;
  if(!localState || !localState.objects) return;
  const gateObjs = localState.objects.filter(o => o.type === 'gate' && o.is_anchor);
  for(const obj of gateObjs){
    if(gateModels[obj.id]) continue;
    try{
      const sysId = localState.system_id || '';
      const r = await fetch(`/api/gate_model/${sysId}/${obj.id}`);
      if(!r.ok) continue;
      const data = await r.json();
      const model = buildStationMesh(data);
      if(!model) continue;
      // Scale gate to ~1000m
      const box = new THREE.Box3().setFromObject(model);
      const sz = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(sz.x, sz.y, sz.z) || 1;
      model.scale.setScalar(10 / maxDim);
      model.userData._origScale = 10 / maxDim;
      model.position.set(obj.x, obj.y, obj.z);
      // Give gates a bright purple/magenta edge color
      model.traverse(c => {
        if(c.isLineSegments && c.material){
          c.material.color.setHex(0xd066f0);
          c.material.opacity = 0.7;
        }
      });
      (lsgGroup||scene).add(model);
      gateModels[obj.id] = model;
    }catch(e){}
  }
}

// ── Asteroid Field Models (single-mesh displaced icospheres) ──
let asteroidModels = {}; // obj_id -> [THREE.Mesh]
async function loadAsteroidFields(){
  if(warpLock) return;
  if(!localState || !localState.objects) return;
  const beltObjs = localState.objects.filter(o => (o.type === 'asteroid_belt' || o.type === 'belt') && o.is_anchor);
  for(const obj of beltObjs){
    if(asteroidModels[obj.id]) continue;
    try{
      // Use field_id from connects_to, or fall back to obj.id
      const fieldId = obj.connects_to || obj.id;
      const r = await fetch('/api/asteroid_model/' + fieldId);
      if(!r.ok) continue;
      const fieldData = await r.json();
      const asteroids = fieldData.asteroids || fieldData;
      const rocks = [];
      // Seeded random for consistent field layout (based on field_id hash)
      let fieldSeed = 0;
      for(let c = 0; c < fieldId.length; c++) fieldSeed = ((fieldSeed << 5) - fieldSeed) + fieldId.charCodeAt(c);
      const seededRand = (function(s){return function(){s=(s*1664525+1013904223)&0xFFFFFFFF;return(s>>>0)/4294967296;};})(Math.abs(fieldSeed));
      
      for(let i = 0; i < asteroids.length; i++){
        const data = asteroids[i];
        const mesh = buildAsteroidMesh(data);
        if(!mesh) continue;
        // Apply ore-specific color if provided
        if(data.color){
          mesh.material.color.setHex(data.color);
          mesh.material.emissive.setHex(data.color).multiplyScalar(0.1);
        }
        // Spread asteroids in a 150-unit radius disk, 30-unit vertical
        const angle = seededRand() * Math.PI * 2;
        const dist = seededRand() * 150;
        const vert = (seededRand() - 0.5) * 30;
        mesh.position.set(
          obj.x + Math.cos(angle) * dist,
          obj.y + vert,
          obj.z + Math.sin(angle) * dist
        );
        mesh.rotation.set(seededRand()*6.28, seededRand()*6.28, seededRand()*6.28);
        (lsgGroup||scene).add(mesh);
        rocks.push(mesh);
      }
      asteroidModels[obj.id] = rocks;
    }catch(e){}
  }
}

function buildAsteroidMesh(data){
  // data has: vertices (flat [x,y,z,...]), faces (flat [i,j,k,...]), radius
  if(!data.vertices || !data.faces) return null;
  const verts = new Float32Array(data.vertices);
  const indices = new Uint16Array(data.faces);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  geo.setIndex(new THREE.BufferAttribute(indices, 1));
  geo.computeVertexNormals();
  // Scale to actual radius (vertices are unit-scale)
  const radius = (data.radius || 100) / 100; // scale to cm-units
  const mat = new THREE.MeshPhongMaterial({color:0x2a2018, emissive:0x0a0805, shininess:2, transparent:true, opacity:0.85});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.scale.setScalar(radius);
  mesh.userData._origScale = radius;
  // Add edge wireframe for the low-poly look
  const edgeMat = new THREE.LineBasicMaterial({color:0x8d6e4a, transparent:true, opacity:0.4});
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo, 25), edgeMat));
  return mesh;
}

// ── Planet/Moon Models (simple spheres with color) ──
let planetModels = {}; // obj_id -> THREE.Group
const PLANET_COLORS = {
  // Realistic planet base colors (earth-like, gas giant, rocky, ice, desert)
  'planet': [0x1a5c3a, 0x2a4a6b, 0x8b6b3a, 0x6b8baa, 0xc4956a, 0x4a7a4a],
  'moon': [0x6a6a6a, 0x7a7a7a, 0x5a5a5a, 0x606060],
};

// Generate procedural planet texture (noise-based canvas)
function generatePlanetTexture(id, baseColor, isPlanet){
  const size = isPlanet ? 256 : 128;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Seeded random from id
  let s = Math.abs(hash(id));
  const rand = ()=>{ s=(s*1664525+1013904223)&0xFFFFFFFF; return(s>>>0)/4294967296; };
  
  // Base color components
  const r = (baseColor >> 16) & 0xFF;
  const g = (baseColor >> 8) & 0xFF;
  const b = baseColor & 0xFF;
  
  // Fill with base
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, size, size);
  
  if(isPlanet){
    // Horizontal bands (gas giant style or climate zones)
    const numBands = 4 + Math.floor(rand() * 6);
    for(let i = 0; i < numBands; i++){
      const y = rand() * size;
      const h = 5 + rand() * 30;
      const variation = Math.floor((rand() - 0.5) * 40);
      ctx.fillStyle = `rgba(${Math.max(0,Math.min(255,r+variation))},${Math.max(0,Math.min(255,g+variation))},${Math.max(0,Math.min(255,b+variation))},0.4)`;
      ctx.fillRect(0, y, size, h);
    }
    // Continent/cloud patches
    const numPatches = 8 + Math.floor(rand() * 15);
    for(let i = 0; i < numPatches; i++){
      const px = rand() * size, py = rand() * size;
      const pr = 10 + rand() * 40;
      const variation = Math.floor((rand() - 0.5) * 60);
      const gradient = ctx.createRadialGradient(px, py, 0, px, py, pr);
      gradient.addColorStop(0, `rgba(${Math.max(0,Math.min(255,r+variation))},${Math.max(0,Math.min(255,g+variation))},${Math.max(0,Math.min(255,b+variation))},0.5)`);
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(px-pr, py-pr, pr*2, pr*2);
    }
    // Polar caps (for rocky/earth-like)
    if(rand() > 0.4){
      ctx.fillStyle = 'rgba(220,230,240,0.3)';
      ctx.fillRect(0, 0, size, 10 + rand()*15);
      ctx.fillRect(0, size - 10 - rand()*15, size, 20);
    }
  } else {
    // Moon: craters and grey variation
    const numCraters = 5 + Math.floor(rand() * 10);
    for(let i = 0; i < numCraters; i++){
      const cx = rand() * size, cy = rand() * size;
      const cr = 3 + rand() * 15;
      const dark = Math.floor(rand() * 30);
      ctx.beginPath();
      ctx.arc(cx, cy, cr, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${Math.max(0,r-dark)},${Math.max(0,g-dark)},${Math.max(0,b-dark)},0.6)`;
      ctx.fill();
      // Crater rim
      ctx.beginPath();
      ctx.arc(cx, cy, cr, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(${Math.min(255,r+15)},${Math.min(255,g+15)},${Math.min(255,b+15)},0.4)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
  
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

function loadPlanetsAndMoons(){
  if(warpLock) return;
  if(!localState || !localState.objects) return;
  const bodies = localState.objects.filter(o => (o.type === 'planet' || o.type === 'moon') && (o.x !== 0 || o.z !== 0 || o.is_anchor));
  for(const obj of bodies){
    if(planetModels[obj.id]) continue;
    const isPlanet = obj.type === 'planet';
    // Planet radius: 5000-30000 units (500-3000km). Moon: 1000-5000 units (100-500km).
    const radius = isPlanet ? 5000 + Math.abs(hash(obj.id)) % 25000 : 1000 + Math.abs(hash(obj.id)) % 4000;
    const colors = PLANET_COLORS[obj.type] || PLANET_COLORS['planet'];
    const color = colors[Math.abs(hash(obj.id)) % colors.length];
    const geo = new THREE.SphereGeometry(radius, isPlanet ? 32 : 16, isPlanet ? 24 : 12);
    const tex = generatePlanetTexture(obj.id, color, isPlanet);
    const mat = new THREE.MeshPhongMaterial({map: tex, shininess: isPlanet ? 15 : 5});
    const mesh = new THREE.Mesh(geo, mat);
    // Place at LSG position (like stations/gates)
    mesh.position.set(obj.x, obj.y, obj.z);
    mesh.userData = {radius, type: obj.type};
    (lsgGroup||scene).add(mesh);
    planetModels[obj.id] = mesh;
  }
}

// Simple string hash for deterministic planet sizing/coloring
function hash(str){
  let h = 0;
  for(let i = 0; i < str.length; i++){
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return h;
}

// ── Directional Labels for Distant Solar Bodies ──
let dirLabelContainer = null;
let dirLabels = []; // {el, objId, name, type}

function initDirectionalLabels(){
  dirLabelContainer = document.createElement('div');
  dirLabelContainer.style.cssText = 'position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:10';
  container.appendChild(dirLabelContainer);
}
initDirectionalLabels();

function clearDirectionalLabels(){
  if(dirLabelContainer) dirLabelContainer.innerHTML = '';
  dirLabels = [];
}

const DIR_LABEL_COLORS = {station:'#4fc3f7', gate:'#d080f0', planet:'#a0c0d8', moon:'#8aaaba', asteroid_field:'#ffd54f', star:'#ffab40'};
const DIR_LABEL_ICONS = {station:'◼', gate:'◇', planet:'●', moon:'○', asteroid_field:'✦', star:'★'};

function updateDirectionalLabels(){
  if(isDocked || !localState || !localState.objects) {
    if(dirLabelContainer) dirLabelContainer.style.display = 'none';
    return;
  }
  dirLabelContainer.style.display = '';
  const w = container.clientWidth;
  const h = container.clientHeight;
  const margin = 30;

  // Ensure we have label elements for each object
  const objs = localState.objects.filter(o => o.type !== 'star');
  while(dirLabels.length < objs.length){
    const el = document.createElement('div');
    el.style.cssText = 'position:absolute;font-family:JetBrains Mono,monospace;font-size:10px;white-space:nowrap;transition:opacity 0.3s';
    dirLabelContainer.appendChild(el);
    dirLabels.push({el, objId:'', name:'', type:''});
  }
  // Hide excess labels
  for(let i = objs.length; i < dirLabels.length; i++){
    dirLabels[i].el.style.display = 'none';
  }

  // Get camera forward vector for behind-camera detection
  const camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  // Reference position for distance calc (interpolated during warp)
  let labelRefPos = camera.position;
  if(warpState === 'warping' && warpTargetPos){
    const progress = Math.min(1.0, warpTravelTimer / warpTravelDuration);
    labelRefPos = new THREE.Vector3(
      playerPos.x + (warpTargetPos.x - playerPos.x) * progress,
      playerPos.y + (warpTargetPos.y - playerPos.y) * progress,
      playerPos.z + (warpTargetPos.z - playerPos.z) * progress
    );
  }

  for(let i = 0; i < objs.length; i++){
    const obj = objs[i];
    const label = dirLabels[i];
    label.el.style.display = '';
    const color = DIR_LABEL_COLORS[obj.type] || '#8aa0b8';
    const icon = DIR_LABEL_ICONS[obj.type] || '\u2022';

    // Direction from current SS position to this object's SS position
    // During warp, interpolate our SS position toward the warp target
    // Current SS position: interpolate from departure to destination during warp
    let curSSx = 0, curSSz = 0;
    if((warpState === 'warping' || warpState === 'aligning') && window._warpFromSS){
      const progress = (warpState === 'warping') ? Math.min(1.0, warpTravelTimer / warpTravelDuration) : 0;
      curSSx = window._warpFromSS.x + (window._warpToSS.x - window._warpFromSS.x) * progress;
      curSSz = window._warpFromSS.z + (window._warpToSS.z - window._warpFromSS.z) * progress;
    } else {
      const anchorSS = localState.objects.find(o => o.is_anchor);
      curSSx = anchorSS ? anchorSS.ss_x : 0;
      curSSz = anchorSS ? anchorSS.ss_z : 0;
    }
    const ssDirX = obj.ss_x - curSSx, ssDirZ = obj.ss_z - curSSz;
    const ssDirLen = Math.sqrt(ssDirX*ssDirX + ssDirZ*ssDirZ);
    
    // For anchor object (when NOT warping), use its LSG position. Otherwise project from SS direction.
    let labelX, labelY, labelZ;
    const useLocal = obj.is_anchor && warpState !== 'warping' && warpState !== 'aligning';
    if(useLocal){
      labelX = obj.x; labelY = obj.y; labelZ = obj.z;
    } else if(ssDirLen > 0.001){
      // Place label point very far away in the SS direction (effectively at infinity)
      labelX = (ssDirX / ssDirLen) * 100000;
      labelY = 0;
      labelZ = (ssDirZ / ssDirLen) * 100000;
    } else {
      label.el.style.display = 'none'; continue;
    }
    const toObj = new THREE.Vector3(labelX - camera.position.x, labelY - camera.position.y, labelZ - camera.position.z);
    // Distance in AU for display
    const dist = useLocal ? new THREE.Vector3(obj.x - labelRefPos.x, obj.y - labelRefPos.y, obj.z - labelRefPos.z).length() : ssDirLen;
    if(dist < 0.001 && !useLocal) { label.el.style.display = 'none'; continue; }
    toObj.normalize();

    // Dot product: positive = in front of camera, negative = behind
    const dotForward = toObj.dot(camForward);

    // Project to screen
    const projPoint = new THREE.Vector3(labelX, labelY, labelZ).project(camera);

    let sx = (projPoint.x * 0.5 + 0.5) * w;
    let sy = (-projPoint.y * 0.5 + 0.5) * h;

    const behind = dotForward < 0;

    if(behind){
      // Object is behind camera. Compute screen-space direction from center
      // and project to edge. When directly behind, use camera-relative direction.
      // Project the direction vector onto the camera's right/up plane
      const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
      const camUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
      const screenX = toObj.dot(camRight);
      const screenY = toObj.dot(camUp);
      // Normalize to get direction on screen (if both ~0, default to bottom)
      const mag = Math.sqrt(screenX*screenX + screenY*screenY);
      let dirX, dirY;
      if(mag < 0.001){
        // Directly behind center: push to bottom of screen
        dirX = 0;
        dirY = 1;
      } else {
        dirX = screenX / mag;
        dirY = -screenY / mag; // flip Y for screen coords
      }
      // Place at edge of viewport along this direction
      // Find intersection with viewport rectangle from center
      const cx = w / 2, cy = h / 2;
      const halfW = cx - margin - 30, halfH = cy - margin - 7;
      let t = Infinity;
      if(Math.abs(dirX) > 0.001) t = Math.min(t, halfW / Math.abs(dirX));
      if(Math.abs(dirY) > 0.001) t = Math.min(t, halfH / Math.abs(dirY));
      sx = cx + dirX * t;
      sy = cy + dirY * t;
    }

    // Determine if truly on-screen (in frustum and within margins)
    const onScreen = !behind && sx >= margin && sx <= w - margin && sy >= margin && sy <= h - margin;

    if(!onScreen){
      // Clamp to viewport edges with room for text
      sx = Math.max(margin, Math.min(w - margin - 120, sx));
      sy = Math.max(margin, Math.min(h - margin - 14, sy));
    }

    // Arrow indicator when off-screen
    let arrow = '';
    if(!onScreen){
      if(sx <= margin + 1) arrow = '\u25C0 ';
      else if(sx >= w - margin - 121) arrow = ' \u25B6';
      else if(sy <= margin + 1) arrow = '\u25B2 ';
      else arrow = '\u25BC ';
    }

    // Full name + distance
    const displayName = obj.name;
    // Format distance
    let distLabel;
    if(useLocal){
      // Local distance in meters (dist is in cm-scale units)
      const distM = dist * 100;
      distLabel = distM < 1000 ? Math.round(distM) + 'm' : (distM/1000).toFixed(1) + 'km';
    } else {
      // dist is AU
      distLabel = dist.toFixed(2) + 'AU';
    }

    label.el.style.left = sx + 'px';
    label.el.style.top = sy + 'px';
    label.el.style.color = color;
    label.el.style.opacity = onScreen ? '0.85' : '1.0';
    label.el.style.textShadow = '0 0 4px rgba(0,0,0,0.9)';
    label.el.innerHTML = `${arrow}${icon} ${displayName} <span style="opacity:0.9">${distLabel}</span>`;
  }
}

// ── Resize Handler ──
window.addEventListener('resize',()=>{
  resizeRenderer();
});
function resizeRenderer(){
  const w = container.clientWidth, h = container.clientHeight;
  if(w > 0 && h > 0 && (renderer.domElement.width !== w * (window.devicePixelRatio||1) || renderer.domElement.height !== h * (window.devicePixelRatio||1))){
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
}

// ── Init ──
loadShipModel().then(()=>{
  connectStream();
});
requestAnimationFrame(animate);
