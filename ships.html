<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Economy - Ship Designs</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:15px;line-height:1.7}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0a0e18}
::-webkit-scrollbar-thumb{background:#1a3050;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a4a70}
*{scrollbar-width:thin;scrollbar-color:#1a3050 #0a0e18}
.nav{position:sticky;top:0;z-index:100;background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 24px;height:48px;gap:20px}
.nav h1{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#4fc3f7;letter-spacing:3px;text-transform:uppercase}
.nav a{font-size:12px;color:#8aa0b8;text-decoration:none;padding:6px 14px;border:1px solid #1a2844;border-radius:3px;transition:all .15s;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.nav a:hover{color:#4fc3f7;border-color:#4fc3f7}
.content{margin:0;padding:16px 24px 96px}
h2{font-family:'JetBrains Mono',monospace;font-size:16px;color:#4fc3f7;letter-spacing:2px;text-transform:uppercase;margin:32px 0 16px}
.ship-grid{display:grid;grid-template-columns:220px 1fr 280px;gap:12px;height:calc(100vh - 120px)}
.ship-list{overflow-y:auto;display:flex;flex-direction:column;gap:2px;padding-right:4px}
.tree-cat{font-size:11px;color:#ffd54f;letter-spacing:1px;text-transform:uppercase;padding:10px 0 4px;cursor:pointer;user-select:none}
.tree-cat:before{content:'▸ ';color:#6a8aaa}
.tree-cat.open:before{content:'▾ '}
.tree-sub{display:none;padding-left:8px}
.tree-cat.open + .tree-sub{display:block}
.ship-btn{display:block;width:100%;padding:6px 10px;background:#0a0e18;border:1px solid transparent;border-radius:3px;color:#8aa0b8;font-family:inherit;font-size:11px;cursor:pointer;text-align:left;transition:all .12s}
.ship-btn:hover{border-color:#2a4060;background:#0d1a2f}
.ship-btn.active{border-color:#4fc3f7;background:#0d1a2f;color:#e0e8f0}
.ship-btn .name{color:#c8d4e0;font-weight:500;display:block;font-size:12px}
.ship-btn .meta{font-size:10px;color:#6a9ab8;text-transform:uppercase;margin-top:1px}
.viewer-area{display:flex;flex-direction:column}
.viewer-3d{flex:1;background:#060a12;border:1px solid #1a2844;border-radius:6px;min-height:400px}
.spec-panel{overflow-y:auto;background:#0a0e18;border:1px solid #1a2844;border-radius:6px;padding:16px}
.spec-panel h3{font-size:11px;color:#4fc3f7;letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #1a2844}
.spec-panel h3:first-child{margin-top:0}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.stat-row .label{color:#6a8aaa}
.stat-row .val{color:#e0e8f0;text-align:right}
.hp-tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;margin:2px 2px}
.hp-defense{background:#66bb6a22;color:#66bb6a;border:1px solid #66bb6a44}
.hp-utility{background:#4fc3f722;color:#4fc3f7;border:1px solid #4fc3f744}
.hp-industrial{background:#ffd54f22;color:#ffd54f;border:1px solid #ffd54f44}
.hp-mining{background:#ab47bc22;color:#ab47bc;border:1px solid #ab47bc44}
.hp-weapon{background:#ef535022;color:#ef5350;border:1px solid #ef535044}
.hp-shield{background:#66bb6a22;color:#66bb6a;border:1px solid #66bb6a44}

</style>
</head>
<body>
<div class="content">
<div class="ship-grid">
  <div class="ship-list" id="shipList"></div>
  <div class="viewer-area">
    <div class="viewer-3d" id="viewer3d"></div>
  </div>
  <div class="spec-panel" id="specPanel"></div>
</div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {buildShipFromData} from '/static/ship_renderer.js';

let renderer, scene, camera, controls, animId;
let allShips = {};
let dbLookup = {};
let currentShip = null;

async function init() {
  const [modelResp, civResp, milResp] = await Promise.all([
    fetch('/api/ship_model/all'),
    fetch('/api/data/ship_types'),
    fetch('/api/data/military_ships')
  ]);
  allShips = await modelResp.json();
  const civShips = await civResp.json();
  const milShips = await milResp.json();
  // Build DB lookup by id
  dbLookup = {};
  [...civShips, ...milShips].forEach(s => { dbLookup[s.id] = s; });

  // Build ship list
  const list = document.getElementById('shipList');
  // Categorize by hull_class then tier
  const categories = {};
  for (const [id, data] of Object.entries(allShips)) {
    const cat = data.hull_class || data.role || 'Other';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push([id, data]);
  }
  // Sort categories, sort ships within by tier then name
  const catOrder = ['Fighter','Frigate','Destroyer','Cruiser','Battlecruiser','Battleship','Industrial','Mining Barge'];
  const sortedCats = Object.keys(categories).sort((a,b) => {
    const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
    return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
  });
  for (const cat of sortedCats) {
    const ships = categories[cat].sort((a,b) => (a[1].tier||1) - (b[1].tier||1) || a[1].name.localeCompare(b[1].name));
    const header = document.createElement('div');
    header.className = 'tree-cat open';
    header.textContent = cat + ' (' + ships.length + ')';
    header.addEventListener('click', () => header.classList.toggle('open'));
    list.appendChild(header);
    const sub = document.createElement('div');
    sub.className = 'tree-sub';
    for (const [id, data] of ships) {
      const btn = document.createElement('button');
      btn.className = 'ship-btn';
      btn.dataset.id = id;
      btn.innerHTML = `<span class="name">${data.name}</span><span class="meta">${data.hull_class || ''} T${data.tier}</span>`;
      btn.addEventListener('click', () => loadShip(id));
      sub.appendChild(btn);
    }
    list.appendChild(sub);
  }
  // Load first
  loadShip(Object.keys(allShips)[0]);
}

function loadShip(id) {
  const data = allShips[id];
  if (!data) return;
  currentShip = id;

  // Update active button
  document.querySelectorAll('.ship-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));

  // 3D viewer
  const el = document.getElementById('viewer3d');
  if (renderer) { el.removeChild(renderer.domElement); cancelAnimationFrame(animId); renderer.dispose(); }

  const w = el.clientWidth, h = el.clientHeight;
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, w/h, 0.1, 100);
  const bounds = data.bounds || {length:4, height:1, width:1.5};
  const dist = Math.max(bounds.length, bounds.width, bounds.height) * 1.1;
  camera.position.set(dist*0.6, dist*0.4, dist*0.7);
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(w, h); renderer.setClearColor(0x060a12);
  el.appendChild(renderer.domElement);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.1;
  scene.add(new THREE.AmbientLight(0x4fc3f7, 0.3));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(3, 4, 2); scene.add(dir);

  buildShipFromData(scene, data);

  function animate(){animId=requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
  animate();

  // Spec panel
  const db = dbLookup[id] || {};
  const hp = db.hardpoints || {};
  document.getElementById('specPanel').innerHTML = `
    <h3>Identification</h3>
    <div class="stat-row"><span class="label">Name</span><span class="val">${data.name}</span></div>
    <div class="stat-row"><span class="label">Hull Class</span><span class="val">${data.hull_class || '—'}</span></div>
    <div class="stat-row"><span class="label">Role</span><span class="val">${data.role}</span></div>
    <div class="stat-row"><span class="label">Tier</span><span class="val">${data.tier}</span></div>
    <div class="stat-row"><span class="label">Faction</span><span class="val">${data.faction || 'Universal'}</span></div>
    <div class="stat-row"><span class="label">Manufacturer</span><span class="val">${db.manufacturer||'—'}</span></div>
    <h3>Fitting</h3>
    <div class="stat-row"><span class="label">CPU</span><span class="val">${db.cpu||'—'} tf</span></div>
    <div class="stat-row"><span class="label">Power Grid</span><span class="val">${db.powergrid||'—'} MW</span></div>
    <div class="stat-row"><span class="label">Capacitor</span><span class="val">${db.fuel_capacity||'—'} GJ</span></div>
    <div class="stat-row"><span class="label">Cap Recharge</span><span class="val">${db.cap_recharge||'—'} GJ/s</span></div>
    <h3>Slots</h3>
    <div class="stat-row"><span class="label">High</span><span class="val" style="color:#ef5350">${hp.high_slots||'—'}</span></div>
    <div class="stat-row"><span class="label">Mid</span><span class="val" style="color:#ffd54f">${hp.mid_slots||'—'}</span></div>
    <div class="stat-row"><span class="label">Low</span><span class="val" style="color:#66bb6a">${hp.low_slots||'—'}</span></div>
    <div class="stat-row"><span class="label">Turret HP</span><span class="val">${hp.turret_hardpoints||0}</span></div>
    <div class="stat-row"><span class="label">Launcher HP</span><span class="val">${hp.launcher_hardpoints||0}</span></div>
    <h3>Defense</h3>
    <div class="stat-row"><span class="label">Shield</span><span class="val">${db.shield_hp||0}</span></div>
    <div class="stat-row"><span class="label">Armor</span><span class="val">${db.armor_hp||0}</span></div>
    <div class="stat-row"><span class="label">Hull</span><span class="val">${db.hull_hp||0}</span></div>
    <div class="stat-row"><span class="label">Signature</span><span class="val">${db.signature||'—'} m</span></div>
    <h3>Navigation</h3>
    <div class="stat-row"><span class="label">Speed</span><span class="val">${db.speed||'—'} m/s</span></div>
    <div class="stat-row"><span class="label">Cargo</span><span class="val">${db.cargo_capacity||0} m3</span></div>
    <h3>Sensors</h3>
    <div class="stat-row"><span class="label">Scan Res</span><span class="val">${db.scan_res||'—'} mm</span></div>
    <div class="stat-row"><span class="label">Target Range</span><span class="val">${db.target_range||'—'} km</span></div>
    <div class="stat-row"><span class="label">Max Targets</span><span class="val">${db.max_targets||'—'}</span></div>
    <h3>Dimensions</h3>
    <div class="stat-row"><span class="label">Length</span><span class="val">${bounds.length.toFixed(1)}m</span></div>
    <div class="stat-row"><span class="label">Height</span><span class="val">${bounds.height.toFixed(1)}m</span></div>
    <div class="stat-row"><span class="label">Width</span><span class="val">${bounds.width.toFixed(1)}m</span></div>
    <div class="stat-row"><span class="label">Components</span><span class="val">${data.components.length}</span></div>
  `;
}

// Handle resize
window.addEventListener('resize', () => {
  if (!renderer) return;
  const el = document.getElementById('viewer3d');
  const w = el.clientWidth, h = el.clientHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

init();
</script>
</body>
</html>
