<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Economy - Ship Designs</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.7}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0e18}
::-webkit-scrollbar-thumb{background:#1a3050;border-radius:3px}
.nav{position:sticky;top:0;z-index:100;background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 24px;height:48px;gap:20px}
.nav h1{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#4fc3f7;letter-spacing:3px;text-transform:uppercase}
.nav a{font-size:11px;color:#8aa0b8;text-decoration:none;padding:6px 14px;border:1px solid #1a2844;border-radius:3px;transition:all .15s;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',sans-serif}
.nav a:hover{color:#4fc3f7;border-color:#4fc3f7}
.content{max-width:1100px;margin:0 auto;padding:32px 24px 96px}
h2{font-family:'Orbitron',sans-serif;font-size:16px;color:#4fc3f7;letter-spacing:2px;text-transform:uppercase;margin:32px 0 16px}
.ship-grid{display:grid;grid-template-columns:200px 1fr;gap:16px;height:calc(100vh - 120px)}
.ship-list{overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.ship-btn{display:block;width:100%;padding:10px 12px;background:#0a0e18;border:1px solid #1a2844;border-radius:4px;color:#8aa0b8;font-family:inherit;font-size:11px;cursor:pointer;text-align:left;transition:all .15s}
.ship-btn:hover{border-color:#2a4060;background:#0d1a2f}
.ship-btn.active{border-color:#4fc3f7;background:#0d1a2f}
.ship-btn .name{color:#e0e8f0;font-weight:500;display:block}
.ship-btn .meta{font-size:9px;color:#6a9ab8;text-transform:uppercase;margin-top:2px}
.viewer-area{display:flex;flex-direction:column;gap:12px}
.viewer-3d{flex:1;background:#060a12;border:1px solid #1a2844;border-radius:6px;min-height:350px}
.ship-stats{background:#0a0e18;border:1px solid #1a2844;border-radius:6px;padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.stat-group h3{font-family:'Orbitron',sans-serif;font-size:9px;color:#6a9ab8;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.stat-row{display:flex;justify-content:space-between;padding:2px 0;font-size:11px}
.stat-row .label{color:#6a8aaa}
.stat-row .val{color:#e0e8f0}
.hp-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;margin:1px}
.hp-defense{background:#66bb6a22;color:#66bb6a;border:1px solid #66bb6a44}
.hp-utility{background:#4fc3f722;color:#4fc3f7;border:1px solid #4fc3f744}
.hp-industrial{background:#ffd54f22;color:#ffd54f;border:1px solid #ffd54f44}
.hp-mining{background:#ab47bc22;color:#ab47bc;border:1px solid #ab47bc44}
.hp-weapon{background:#ef535022;color:#ef5350;border:1px solid #ef535044}
.hp-shield{background:#66bb6a22;color:#66bb6a;border:1px solid #66bb6a44}

#docnav .dnl{font-size:10px;color:#8aa0b8;text-decoration:none;padding:5px 12px;border:1px solid #1a2844;border-radius:3px;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',sans-serif;transition:all .15s}
#docnav .dnl:hover{color:#4fc3f7;border-color:#4fc3f7;background:#0d1a2f}
#docnav .dnl.active{color:#4fc3f7;border-color:#4fc3f7}
</style>
</head>
<body>
<div id="docnav" style="position:sticky;top:0;z-index:100;background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 24px;height:48px;gap:12px;flex-wrap:wrap">
<a href="/" class="dnl">Game</a>
<a href="/docs" class="dnl">Hub</a>
<span style="color:#1a2844">|</span>
<a href="/design" class="dnl" id="dn-design">Design</a>
<a href="/universe" class="dnl" id="dn-universe">Universe</a>
<a href="/factions" class="dnl" id="dn-factions">Factions</a>
<a href="/ships" class="dnl" id="dn-ships" class="dnl active">Ships</a>
<a href="/fitting" class="dnl" id="dn-fitting">Fitting</a>
<span style="color:#1a2844">|</span>
<a href="/economy" class="dnl" id="dn-economy">Economy</a>
<a href="/resources" class="dnl" id="dn-resources">Resources</a>
<a href="/materials" class="dnl" id="dn-materials">Materials</a>
<a href="/products" class="dnl" id="dn-products">Products</a>
<a href="/items" class="dnl" id="dn-items">Items DB</a><a href="/chain" class="dnl">Chain Calc</a>
</div>
<div class="content">
<div class="ship-grid">
  <div class="ship-list" id="shipList"></div>
  <div class="viewer-area">
    <div class="viewer-3d" id="viewer3d"></div>
    <div class="ship-stats" id="shipStats"></div>
  </div>
</div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {buildShipFromData} from '/static/ship_renderer.js';

let renderer, scene, camera, controls, animId;
let allShips = {};
let currentShip = null;

async function init() {
  const resp = await fetch('/api/ship_model/all');
  allShips = await resp.json();

  // Build ship list
  const list = document.getElementById('shipList');
  const roles = {hauler:[], miner:[], military:[]};
  for (const [id, data] of Object.entries(allShips)) {
    (roles[data.role] || roles.hauler).push([id, data]);
  }
  for (const [role, ships] of Object.entries(roles)) {
    if (!ships.length) continue;
    const header = document.createElement('div');
    header.style.cssText = 'font-family:Orbitron;font-size:8px;color:#ffd54f;letter-spacing:1px;text-transform:uppercase;padding:8px 0 4px';
    header.textContent = role + 's';
    list.appendChild(header);
    for (const [id, data] of ships) {
      const btn = document.createElement('button');
      btn.className = 'ship-btn';
      btn.dataset.id = id;
      btn.innerHTML = `<span class="name">${data.name}</span><span class="meta">T${data.tier} ${data.role}</span>`;
      btn.addEventListener('click', () => loadShip(id));
      list.appendChild(btn);
    }
  }
  // Load first
  loadShip(Object.keys(allShips)[0]);
}

function loadShip(id) {
  const data = allShips[id];
  if (!data) return;
  currentShip = id;

  // Update active button
  document.querySelectorAll('.ship-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));

  // 3D viewer
  const el = document.getElementById('viewer3d');
  if (renderer) { el.removeChild(renderer.domElement); cancelAnimationFrame(animId); renderer.dispose(); }

  const w = el.clientWidth, h = el.clientHeight;
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, w/h, 0.1, 100);
  const bounds = data.bounds || {length:4, height:1, width:1.5};
  const dist = Math.max(bounds.length, bounds.width, bounds.height) * 1.1;
  camera.position.set(dist*0.6, dist*0.4, dist*0.7);
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(w, h); renderer.setClearColor(0x060a12);
  el.appendChild(renderer.domElement);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.1;
  scene.add(new THREE.AmbientLight(0x4fc3f7, 0.3));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(3, 4, 2); scene.add(dir);

  buildShipFromData(scene, data);

  function animate(){animId=requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
  animate();

  // Stats panel
  const hardpoints = data.components.filter(c => c.type === 'hardpoint');
  const hpHtml = hardpoints.map(h => `<span class="hp-tag hp-${h.params.slot_type}">${h.params.slot_type}</span>`).join('');
  document.getElementById('shipStats').innerHTML = `
    <div class="stat-group">
      <h3>Specifications</h3>
      <div class="stat-row"><span class="label">Name</span><span class="val">${data.name}</span></div>
      <div class="stat-row"><span class="label">Role</span><span class="val">${data.role}</span></div>
      <div class="stat-row"><span class="label">Tier</span><span class="val">${data.tier}</span></div>
      <div class="stat-row"><span class="label">Components</span><span class="val">${data.components.length}</span></div>
    </div>
    <div class="stat-group">
      <h3>Dimensions</h3>
      <div class="stat-row"><span class="label">Length</span><span class="val">${bounds.length}m</span></div>
      <div class="stat-row"><span class="label">Height</span><span class="val">${bounds.height}m</span></div>
      <div class="stat-row"><span class="label">Width</span><span class="val">${bounds.width}m</span></div>
    </div>
    <div class="stat-group">
      <h3>Hardpoints (${hardpoints.length})</h3>
      <div>${hpHtml || '<span style="color:#8aa0b8">None</span>'}</div>
    </div>
  `;
}

// Handle resize
window.addEventListener('resize', () => {
  if (!renderer) return;
  const el = document.getElementById('viewer3d');
  const w = el.clientWidth, h = el.clientHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

init();
</script>
</body>
</html>
