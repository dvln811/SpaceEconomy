// Generate procedural planet texture (noise-based canvas)
// ── Planet Shader Materials (GLSL) ──
// Shared noise functions (simplex 3D noise)
const PLANET_NOISE_GLSL = `
  vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
  vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
  vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
  float snoise(vec3 v){
    const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
    vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
    vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
    vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
    vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
    i=mod289(i);
    vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
    float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
    vec4 j=p-49.0*floor(p*ns.z*ns.z);
    vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
    vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;
    vec4 h=1.0-abs(x)-abs(y);
    vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
    vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;
    vec4 sh=-step(h,vec4(0.0));
    vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
    vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);
    vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
    vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
    vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
    m=m*m;return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }
  float fbm(vec3 p, int octaves){
    float val=0.0;float amp=0.5;float freq=1.0;
    for(int i=0;i<8;i++){
      if(i>=octaves)break;
      val+=amp*snoise(p*freq);
      freq*=2.0;amp*=0.5;
    }
    return val;
  }
`;

const PLANET_VERTEX = `
  varying vec3 vNormal;
  varying vec3 vPosition;
  varying vec2 vUv;
  void main(){
    vNormal = normalize(normalMatrix * normal);
    vPosition = position;
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

function makePlanetShaderMaterial(planetType, seed){
  const seedF = (seed % 1000) / 1000.0;
  
  let fragmentBody = '';
  let baseColor1 = 'vec3(0.3, 0.25, 0.15)';
  let baseColor2 = 'vec3(0.5, 0.4, 0.25)';
  
  switch(planetType){
    case 'gas_giant':
      fragmentBody = `
        // Gas giant: horizontal bands with turbulence
        float lat = vPosition.y / radius;
        float bands = sin(lat * 20.0 + fbm(vPosition * 0.003 + seed, 4) * 3.0) * 0.5 + 0.5;
        float turb = fbm(vPosition * 0.005 + vec3(seed * 10.0), 5) * 0.3;
        float storm = smoothstep(0.7, 1.0, fbm(vPosition * 0.01 + vec3(seed * 5.0, 0.0, 0.0), 6));
        vec3 col1 = vec3(0.8, 0.55, 0.25); // warm band
        vec3 col2 = vec3(0.6, 0.4, 0.2);   // dark band
        vec3 col3 = vec3(0.9, 0.6, 0.3);   // storm
        vec3 color = mix(col1, col2, bands) + turb * 0.2 + storm * col3 * 0.4;
      `;
      break;
    case 'ice_giant':
      fragmentBody = `
        float lat = vPosition.y / radius;
        float bands = sin(lat * 12.0 + fbm(vPosition * 0.004 + seed, 3) * 2.0) * 0.5 + 0.5;
        float turb = fbm(vPosition * 0.006 + vec3(seed * 7.0), 4) * 0.2;
        vec3 col1 = vec3(0.3, 0.5, 0.7);
        vec3 col2 = vec3(0.2, 0.4, 0.6);
        vec3 color = mix(col1, col2, bands) + turb;
      `;
      break;
    case 'terrestrial':
    case 'ocean':
      fragmentBody = `
        float n = fbm(vPosition * 0.008 + seed, 6);
        float ocean = smoothstep(-0.05, 0.05, n);
        vec3 waterCol = vec3(0.05, 0.15, 0.4);
        vec3 landCol = vec3(0.15, 0.35, 0.1) + fbm(vPosition * 0.02 + seed, 3) * vec3(0.1, 0.05, 0.0);
        vec3 snowCol = vec3(0.85, 0.9, 0.95);
        float lat = abs(vPosition.y / radius);
        float snow = smoothstep(0.7, 0.85, lat);
        vec3 color = mix(waterCol, landCol, ocean);
        color = mix(color, snowCol, snow * ocean);
        // Clouds
        float clouds = smoothstep(0.2, 0.6, fbm(vPosition * 0.012 + seed * 3.0, 4));
        color = mix(color, vec3(0.9, 0.92, 0.95), clouds * 0.4);
      `;
      break;
    case 'desert':
      fragmentBody = `
        float n = fbm(vPosition * 0.006 + seed, 5);
        float dunes = sin(vPosition.x * 0.02 + n * 5.0) * 0.5 + 0.5;
        vec3 col1 = vec3(0.7, 0.5, 0.3);
        vec3 col2 = vec3(0.5, 0.35, 0.2);
        vec3 darkRegion = vec3(0.3, 0.2, 0.1);
        float dark = smoothstep(0.3, 0.7, fbm(vPosition * 0.004 + seed * 2.0, 4));
        vec3 color = mix(col1, col2, dunes);
        color = mix(color, darkRegion, dark * 0.5);
        float lat = abs(vPosition.y / radius);
        color = mix(color, vec3(0.8, 0.82, 0.85), smoothstep(0.85, 0.95, lat) * 0.3);
      `;
      break;
    case 'volcanic':
      fragmentBody = `
        float n = fbm(vPosition * 0.007 + seed, 5);
        float lava = smoothstep(0.5, 0.7, fbm(vPosition * 0.015 + seed * 4.0, 4));
        vec3 rockCol = vec3(0.2, 0.12, 0.08);
        vec3 lavaCol = vec3(1.0, 0.4, 0.0);
        vec3 sulfurCol = vec3(0.7, 0.6, 0.1);
        float sulfur = smoothstep(0.3, 0.6, fbm(vPosition * 0.01 + seed * 2.0, 3));
        vec3 color = mix(rockCol, sulfurCol, sulfur * 0.4);
        color = mix(color, lavaCol, lava * 0.8);
      `;
      break;
    case 'ice':
      fragmentBody = `
        float n = fbm(vPosition * 0.005 + seed, 5);
        float cracks = abs(fbm(vPosition * 0.02 + seed, 3));
        cracks = smoothstep(0.0, 0.15, cracks);
        vec3 iceCol = vec3(0.7, 0.8, 0.9);
        vec3 crackCol = vec3(0.2, 0.3, 0.5);
        vec3 smoothIce = vec3(0.8, 0.88, 0.95);
        float smooth2 = smoothstep(0.3, 0.6, fbm(vPosition * 0.008 + seed * 3.0, 3));
        vec3 color = mix(crackCol, iceCol, cracks);
        color = mix(color, smoothIce, smooth2 * 0.3);
      `;
      break;
    case 'rocky':
      fragmentBody = `
        float n = fbm(vPosition * 0.008 + seed, 6);
        float craters = 1.0 - smoothstep(0.0, 0.1, abs(fbm(vPosition * 0.03 + seed, 4) - 0.3));
        vec3 baseCol = vec3(0.4, 0.35, 0.3);
        vec3 highCol = vec3(0.5, 0.45, 0.4);
        vec3 craterCol = vec3(0.25, 0.22, 0.18);
        float height = fbm(vPosition * 0.005 + seed, 5) * 0.5 + 0.5;
        vec3 color = mix(baseCol, highCol, height);
        color = mix(color, craterCol, craters * 0.6);
      `;
      break;
    default: // super_earth or unknown
      fragmentBody = `
        float n = fbm(vPosition * 0.006 + seed, 5);
        float bands = sin(vPosition.y / radius * 8.0 + n * 2.0) * 0.5 + 0.5;
        vec3 col1 = vec3(0.3, 0.4, 0.3);
        vec3 col2 = vec3(0.2, 0.3, 0.25);
        vec3 color = mix(col1, col2, bands);
        float clouds = smoothstep(0.2, 0.5, fbm(vPosition * 0.01 + seed * 2.0, 4));
        color = mix(color, vec3(0.8), clouds * 0.25);
      `;
      break;
  }
  
  const fragmentShader = `
    ${PLANET_NOISE_GLSL}
    varying vec3 vNormal;
    varying vec3 vPosition;
    varying vec2 vUv;
    uniform float seed;
    uniform float radius;
    uniform vec3 lightDir;
    void main(){
      ${fragmentBody}
      // Lighting
      float diffuse = max(0.0, dot(vNormal, lightDir)) * 0.7 + 0.3;
      // Rim/atmosphere glow
      float rim = 1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0)));
      rim = pow(rim, 3.0) * 0.3;
      vec3 final = color * diffuse + vec3(0.4, 0.6, 0.8) * rim;
      gl_FragColor = vec4(final, 1.0);
    }
  `;
  
  return new THREE.ShaderMaterial({
    vertexShader: PLANET_VERTEX,
    fragmentShader: fragmentShader,
    uniforms: {
      seed: {value: seedF * 100.0},
      radius: {value: 1.0}, // will be set per-planet
      lightDir: {value: sunDirection.clone().normalize()}
    }
  });
}

function generatePlanetTexture(id, baseColor, isPlanet, planetType){
  // Legacy fallback - returns a canvas texture for cases where shader isn't used
  const size = isPlanet ? 256 : 128;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const r = (baseColor >> 16) & 0xFF, g = (baseColor >> 8) & 0xFF, b = baseColor & 0xFF;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

function hash(str){
  let h = 0;
  for(let i = 0; i < str.length; i++){
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return h;
}

let ssgPlanetMeshes = {}; // id -> THREE.Mesh
let ssgPlanetGroup = null;
function initSSGPlanets(){
  if(ssgPlanetGroup){ scene.remove(ssgPlanetGroup); }
  ssgPlanetGroup = new THREE.Group();
  scene.add(ssgPlanetGroup);
  ssgPlanetMeshes = {};

function buildSSGPlanetMeshes(){
  // Create meshes for all planets/moons in localState
  if(!localState || !localState.objects) return;
  const bodies = localState.objects.filter(o => (o.type === 'planet' || o.type === 'moon'));
  console.log('[SSG] Building planet meshes:', bodies.length, 'bodies');
  for(const obj of bodies){
    if(ssgPlanetMeshes[obj.id]) continue;
    const isPlanet = obj.type === 'planet';
    // Create sphere with unit radius 1, scaled at render time
    const geo = new THREE.SphereGeometry(1, isPlanet ? 48 : 24, isPlanet ? 36 : 18);
    const tex = genPlanetTex(THREE, obj.id, obj.planet_type || '', isPlanet);
    const mat = new THREE.MeshPhongMaterial({map: tex, shininess: isPlanet ? 15 : 5});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.visible = false;
    ssgPlanetGroup.add(mesh);
    ssgPlanetMeshes[obj.id] = mesh; // just the mesh, data comes from localState
  }
}

function updateSSGPlanets(){
  if(!localState || !localState.objects) return;
  // Build meshes if needed (init ssgPlanetGroup if null)
  const planetCount = localState.objects.filter(o => o.type === 'planet' || o.type === 'moon').length;
  if(!ssgPlanetGroup || Object.keys(ssgPlanetMeshes).length === 0 || window._ssgLastPlanetCount !== planetCount){
    window._ssgLastPlanetCount = planetCount;
    clearSSGPlanets(); initSSGPlanets(); buildSSGPlanetMeshes();
  }
  
  // Player SS position
  let playerSSx, playerSSy = 0, playerSSz;
  if(window._playerSS){
    playerSSx = window._playerSS.x;
    playerSSy = window._playerSS.y || 0;
    playerSSz = window._playerSS.z;
  } else {
    const anchorSS = localState.objects.find(o => o.is_anchor);
    playerSSx = anchorSS ? anchorSS.ss_x : 0;
    playerSSy = anchorSS ? (anchorSS.ss_y || 0) : 0;
    playerSSz = anchorSS ? anchorSS.ss_z : 0;
  }
  
  for(const [id, mesh] of Object.entries(ssgPlanetMeshes)){
    const obj = localState.objects.find(o => o.id === id);
    if(!obj){ mesh.visible = false; continue; }
    // Skip anchor planet (is_anchor && warpState === 'none')
    // Planet always renders based on distance (even if anchor - we're at orbit offset, not center)
    
    const radiusKm = obj.radius_km || 5000;
    const dxAU = obj.ss_x - playerSSx;
    const dyAU = (obj.ss_y || 0) - playerSSy;
    const dzAU = obj.ss_z - playerSSz;
    const distAU = Math.sqrt(dxAU*dxAU + dyAU*dyAU + dzAU*dzAU);
    const distKm = distAU * AU_KM;
    
    // visibleDistKm = radius_km * 100
    const visibleDistKm = radiusKm * 100;
    
    if(distKm > visibleDistKm){
      mesh.visible = false;
    } else {
      mesh.visible = true;
      const dirX = (distAU > 0.00001) ? dxAU / distAU : 0;
      const dirY = (distAU > 0.00001) ? dyAU / distAU : 0;
      const dirZ = (distAU > 0.00001) ? dzAU / distAU : 1;
      // renderDist = distKm / SCALE_FACTOR
      const renderDist = distKm / WARP_SCALE_FACTOR;
      mesh.position.set(dirX * renderDist, dirY * renderDist, dirZ * renderDist);
      // scale = radius_km / SCALE_FACTOR
      mesh.scale.setScalar(radiusKm / WARP_SCALE_FACTOR);
    }
  }
}

function clearSSGPlanets(){
  if(ssgPlanetGroup){
    ssgPlanetGroup.clear();
  }
  ssgPlanetMeshes = {};
}

const DIR_LABEL_COLORS = {station:'#4fc3f7', gate:'#d080f0', planet:'#a0c0d8', moon:'#8aaaba', asteroid_field:'#ffd54f', star:'#ffab40'};
const DIR_LABEL_ICONS = {station:'◼', gate:'◇', planet:'●', moon:'○', asteroid_field:'✦', star:'★'};

function updateDirectionalLabels(){
  if(isDocked || !localState || !localState.objects) {
    if(dirLabelContainer) dirLabelContainer.style.display = 'none';
    return;
  }
  dirLabelContainer.style.display = '';
  const w = container.clientWidth;
  const h = container.clientHeight;
  const margin = 30;

  // Ensure we have label elements for each object
  const objs = localState.objects.filter(o => o.type !== 'star');
  while(dirLabels.length < objs.length){
    const el = document.createElement('div');
    el.style.cssText = 'position:absolute;font-family:JetBrains Mono,monospace;font-size:10px;white-space:nowrap;transition:opacity 0.3s;pointer-events:auto;cursor:default';
    el.addEventListener('contextmenu', function(ev){
      ev.preventDefault(); ev.stopPropagation();
      const d = this._labelData;
      if(d) window.showCtx(ev, d.id, d.name, d.type);
    });
    dirLabelContainer.appendChild(el);
    dirLabels.push({el, objId:'', name:'', type:''});
  }
  // Hide excess labels
  for(let i = objs.length; i < dirLabels.length; i++){
    dirLabels[i].el.style.display = 'none';
  }

  // Get camera forward vector for behind-camera detection
  const camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  // Reference position for distance calc (interpolated during warp)
  let labelRefPos = camera.position;
  if(warpState === 'warping' && warpTargetPos){
    const progress = Math.min(1.0, warpTravelTimer / warpTravelDuration);
    labelRefPos = new THREE.Vector3(
      playerPos.x + (warpTargetPos.x - playerPos.x) * progress,
      playerPos.y + (warpTargetPos.y - playerPos.y) * progress,
      playerPos.z + (warpTargetPos.z - playerPos.z) * progress
    );
  }

  for(let i = 0; i < objs.length; i++){
    const obj = objs[i];
    const label = dirLabels[i];
    label.el.style.display = '';
    const color = DIR_LABEL_COLORS[obj.type] || '#8aa0b8';
    const icon = DIR_LABEL_ICONS[obj.type] || '\u2022';

    // Direction from current SS position to this object's SS position
    // Use _playerSS (analytical position - single source of truth)
    let curSSx = 0, curSSy = 0, curSSz = 0;
    if(window._playerSS){
      curSSx = window._playerSS.x;
      curSSy = window._playerSS.y || 0;
      curSSz = window._playerSS.z;
    } else {
      const anchorSS = localState.objects.find(o => o.is_anchor);
      curSSx = anchorSS ? anchorSS.ss_x : 0;
      curSSy = anchorSS ? (anchorSS.ss_y || 0) : 0;
      curSSz = anchorSS ? anchorSS.ss_z : 0;
    }
    const ssDirX = obj.ss_x - curSSx, ssDirY = (obj.ss_y || 0) - curSSy, ssDirZ = obj.ss_z - curSSz;
    const ssDirLen = Math.sqrt(ssDirX*ssDirX + ssDirY*ssDirY + ssDirZ*ssDirZ);
    
    // For anchor object (when NOT warping), use its actual model position + group offset. Otherwise project from SS direction.
    let labelX, labelY, labelZ;
    // Use local model position for stations/gates that have a visible model in lsgGroup
    const hasVisibleModel = (obj.station_id && stationModels[obj.station_id] && stationModels[obj.station_id].visible && stationModels[obj.station_id].parent === lsgGroup) ||
                           (obj.type === 'gate' && gateModels[obj.id] && gateModels[obj.id].visible && gateModels[obj.id].parent === lsgGroup);
    const isApproachTarget = window._approachStarted && obj.id === warpTargetId;
    const useLocal = (hasVisibleModel || isApproachTarget) && obj.type !== 'planet' && obj.type !== 'moon';
    if(obj.id === warpTargetId && window._approachStarted && !window._labelDbg2){window._labelDbg2=true; console.log('[LABEL-APPROACH] target:', obj.id, 'hasVisibleModel:', hasVisibleModel, 'isApproachTarget:', isApproachTarget, 'useLocal:', useLocal);}
    if(useLocal){
      // Find the actual model position from the dicts (more reliable than localState.objects)
      const gOff = lsgGroup ? lsgGroup.position : new THREE.Vector3(0,0,0);
      let modelPos = null;
      if(obj.station_id && stationModels[obj.station_id]) modelPos = stationModels[obj.station_id].position;
      else if(gateModels[obj.id]) modelPos = gateModels[obj.id].position;
      else if(planetModels[obj.id]) modelPos = planetModels[obj.id].position;
      if(modelPos){
        labelX = modelPos.x + gOff.x; labelY = modelPos.y + gOff.y; labelZ = modelPos.z + gOff.z;
      } else {
        labelX = obj.x + gOff.x; labelY = obj.y + gOff.y; labelZ = obj.z + gOff.z;
      }
    } else if(ssDirLen > 0){
      // Place label at planet mesh position if visible, otherwise at far direction
      const ssgMesh = ssgPlanetMeshes[obj.id];
      if(ssgMesh && ssgMesh.visible){
        labelX = ssgMesh.position.x;
        labelY = ssgMesh.position.y;
        labelZ = ssgMesh.position.z;
      } else {
        labelX = (ssDirX / ssDirLen) * 100000;
        labelY = (ssDirY / ssDirLen) * 100000;
        labelZ = (ssDirZ / ssDirLen) * 100000;
      }
    } else {
      label.el.style.display = 'none'; continue;
    }
    const toObj = new THREE.Vector3(labelX - camera.position.x, labelY - camera.position.y, labelZ - camera.position.z);
    // Distance: for local anchors, measure from player position to anchor world position
    const dist = useLocal ? new THREE.Vector3(labelX - playerPos.x, labelY - playerPos.y, labelZ - playerPos.z).length() : ssDirLen;
    toObj.normalize();

    // Dot product: positive = in front of camera, negative = behind
    const dotForward = toObj.dot(camForward);

    // Project to screen
    const projPoint = new THREE.Vector3(labelX, labelY, labelZ).project(camera);

    let sx = (projPoint.x * 0.5 + 0.5) * w;
    let sy = (-projPoint.y * 0.5 + 0.5) * h;

    const behind = dotForward < 0;

    if(behind){
      // Object is behind camera. Compute screen-space direction from center
      // and project to edge. When directly behind, use camera-relative direction.
      // Project the direction vector onto the camera's right/up plane
      const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
      const camUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
      const screenX = toObj.dot(camRight);
      const screenY = toObj.dot(camUp);
      // Normalize to get direction on screen (if both ~0, default to bottom)
      const mag = Math.sqrt(screenX*screenX + screenY*screenY);
      let dirX, dirY;
      if(mag < 0.001){
        // Directly behind center: push to bottom of screen
        dirX = 0;
        dirY = 1;
      } else {
        dirX = screenX / mag;
        dirY = -screenY / mag; // flip Y for screen coords
      }
      // Place at edge of viewport along this direction
      // Find intersection with viewport rectangle from center
      const cx = w / 2, cy = h / 2;
      const halfW = cx - margin - 30, halfH = cy - margin - 7;
      let t = Infinity;
      if(Math.abs(dirX) > 0.001) t = Math.min(t, halfW / Math.abs(dirX));
      if(Math.abs(dirY) > 0.001) t = Math.min(t, halfH / Math.abs(dirY));
      sx = cx + dirX * t;
      sy = cy + dirY * t;
    }

    // Determine if truly on-screen (in frustum and within margins)
    const onScreen = !behind && sx >= margin && sx <= w - margin && sy >= margin && sy <= h - margin;

    if(!onScreen){
      // Clamp to viewport edges with room for text
      sx = Math.max(margin, Math.min(w - margin - 120, sx));
      sy = Math.max(margin, Math.min(h - margin - 14, sy));
    }

    // Arrow indicator when off-screen
    let arrow = '';
    if(!onScreen){
      if(sx <= margin + 1) arrow = '\u25C0 ';
      else if(sx >= w - margin - 121) arrow = ' \u25B6';
      else if(sy <= margin + 1) arrow = '\u25B2 ';
      else arrow = '\u25BC ';
    }

    // Full name + distance
    const displayName = obj.name;
    // Format distance
    let distLabel;
    if(useLocal){
      // Local distance in meters (dist is in cm-scale units)
      const distM = dist * 100;
      distLabel = distM < 1000 ? Math.round(distM) + 'm' : (distM/1000).toFixed(1) + 'km';
    } else {
      // dist is AU - format adaptively
      const dKm = dist * 150000000;
      if(dist > 0.1) distLabel = dist.toFixed(2) + ' AU';
      else if(dKm > 1000000) distLabel = (dKm/1000000).toFixed(1) + 'M km';
      else if(dKm > 1000) distLabel = Math.round(dKm/1000) + 'k km';
      else distLabel = Math.round(dKm) + ' km';
    }

    label.el.style.left = sx + 'px';
    label.el.style.top = sy + 'px';
    label.el.style.color = color;
    label.el.style.opacity = onScreen ? '0.85' : '1.0';
    label.el.style.textShadow = '0 0 4px rgba(0,0,0,0.9)';
    label.el.innerHTML = `${arrow}${icon} ${displayName} <span style="opacity:0.9">${distLabel}</span>`;
    label.el._labelData = {id: obj.id, name: obj.name, type: obj.type};
  }

  // ── LABEL CLUSTERING: detect overlaps and group ──
  const CLUSTER_DIST = 25; // px threshold for overlap detection
  const labelPositions = [];
  for(let i = 0; i < objs.length; i++){
    const el = dirLabels[i].el;
    if(el.style.display === 'none') continue;
    labelPositions.push({idx: i, x: parseFloat(el.style.left), y: parseFloat(el.style.top), el});
  }
  // Find clusters using simple distance grouping
  const clustered = new Set();
  const clusters = [];
  for(let i = 0; i < labelPositions.length; i++){
    if(clustered.has(i)) continue;
    const cluster = [labelPositions[i]];
    clustered.add(i);
    for(let j = i+1; j < labelPositions.length; j++){
      if(clustered.has(j)) continue;
      const dx = labelPositions[i].x - labelPositions[j].x;
      const dy = labelPositions[i].y - labelPositions[j].y;
      if(Math.sqrt(dx*dx+dy*dy) < CLUSTER_DIST){
        cluster.push(labelPositions[j]);
        clustered.add(j);
      }
    }
    if(cluster.length > 1) clusters.push(cluster);
  }
  // For each cluster: hide individual labels, show a cluster indicator
  // Only remove clusters that aren't being hovered
  dirLabelContainer.querySelectorAll('.label-cluster').forEach(el => {
    if(!el._hovered && !el._warpExpanded) el.remove();
  });
  for(const cluster of clusters){
    // Hide individual labels in this cluster (but never hide anchor)
    cluster.forEach(lp => { 
      const obj = objs[lp.idx];
      if(obj && obj.is_anchor) return; // never hide anchor label
      lp.el.style.display = 'none'; 
    });
    // Skip creating new cluster element if one is currently hovered at similar position
    const avgX = cluster.reduce((s,lp)=>s+lp.x, 0) / cluster.length;
    const avgY = cluster.reduce((s,lp)=>s+lp.y, 0) / cluster.length;
    const existing = dirLabelContainer.querySelector('.label-cluster._hovered');
    if(existing){
      const ex = parseFloat(existing.style.left), ey = parseFloat(existing.style.top);
      if(Math.abs(ex-avgX)<40 && Math.abs(ey-avgY)<40) continue; // skip, existing hovered one covers this
    }
    const clusterEl = document.createElement('div');
    clusterEl.className = 'label-cluster';
    clusterEl.style.cssText = `position:absolute;left:${avgX}px;top:${avgY}px;font-family:JetBrains Mono,monospace;font-size:10px;color:#4fc3f7;white-space:nowrap;text-shadow:0 0 4px rgba(0,0,0,0.9);z-index:20;pointer-events:auto;cursor:default;user-select:none`;
    clusterEl.textContent = `▪ ${cluster.length} objects`;
    // Build expanded list content
    const listItems = cluster.map(lp => {
      const obj = objs[lp.idx];
      const col = DIR_LABEL_COLORS[obj.type] || '#8aa0b8';
      const ic = DIR_LABEL_ICONS[obj.type] || '\u2022';
      return `<div class="cluster-item" data-id="${obj.id}" data-name="${obj.name}" data-type="${obj.type}" style="padding:2px 0;color:${col};cursor:default">${ic} ${obj.name}</div>`;
    }).join('');
    // Hover: show expanded vertical list
    const expandEl = document.createElement('div');
    expandEl.style.cssText = 'display:none;position:absolute;left:0;top:14px;background:rgba(10,14,24,0.95);border:1px solid #1a2844;border-radius:3px;padding:4px 8px;white-space:nowrap;z-index:25;pointer-events:auto;cursor:default;user-select:none';
    expandEl.innerHTML = listItems;
    expandEl.addEventListener('contextmenu', ev=>{
      const item = ev.target.closest('.cluster-item');
      if(item){ ev.preventDefault(); ev.stopPropagation(); window.showCtx(ev, item.dataset.id, item.dataset.name, item.dataset.type); }
    });
    clusterEl.appendChild(expandEl);
    clusterEl.addEventListener('mouseenter', ()=>{ expandEl.style.display = ''; clusterEl._hovered = true; clusterEl.classList.add('_hovered'); });
    clusterEl.addEventListener('mouseleave', ()=>{ expandEl.style.display = 'none'; clusterEl._hovered = false; clusterEl.classList.remove('_hovered'); });
    // Auto-expand if cluster contains warp target
    if(warpState === 'warping' && warpTargetId){
      const containsTarget = cluster.some(lp => objs[lp.idx].id === warpTargetId);
      if(containsTarget){
        // Just show individual labels stacked vertically instead of clustered
        cluster.forEach((lp, ci) => {
          lp.el.style.display = '';
          lp.el.style.top = (lp.y + ci * 16) + 'px'; // stack with 16px spacing
          // Add distance to label text
          const obj = objs[lp.idx];
          const dx = obj.ss_x - (window._playerSS?window._playerSS.x:0);
          const dy = (obj.ss_y||0) - (window._playerSS?window._playerSS.y||0:0);
          const dz = obj.ss_z - (window._playerSS?window._playerSS.z:0);
          const distKm = Math.sqrt(dx*dx+dy*dy+dz*dz) * 150000000;
          let ds;
          if(distKm>15000000) ds=(distKm/150000000).toFixed(2)+' AU';
          else if(distKm>1000000) ds=(distKm/1000000).toFixed(1)+'M km';
          else if(distKm>1000) ds=Math.round(distKm/1000)+'k km';
          else ds=Math.round(distKm)+' km';
          const marker = obj.id===warpTargetId?'► ':'  ';
          lp.el.textContent = marker + obj.name + '  ' + ds;
        });
        clusterEl.remove();
        continue; // skip adding cluster element
      }
    }
    dirLabelContainer.appendChild(clusterEl);
  }
}

// ── Panel Resize (left-edge drag handle) ──
(function(){
  const layout = document.getElementById('layout');
  const handle = document.getElementById('panelHandle');
  let panelW = 260;
  let dragging = false, startX, startW;

  function updateGrid(){
    const mode = isDocked ? 'docked' : 'flight';
    layout.style.gridTemplateColumns = `1fr 4px ${panelW}px`;
    window.dispatchEvent(new Event('resize'));
  }

  handle.addEventListener('mousedown', (e)=>{
    dragging = true;
    startX = e.clientX;
    startW = panelW;
    document.body.style.cursor = 'ew-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e)=>{
    if(!dragging) return;
    panelW = Math.max(180, Math.min(500, startW - (e.clientX - startX)));
    updateGrid();
  });
  document.addEventListener('mouseup', ()=>{
    if(dragging){ dragging = false; document.body.style.cursor = ''; }
  });
})();

// ── Resize Handler ──
window.addEventListener('resize',()=>{
  resizeRenderer();
});
function resizeRenderer(){
  const w = container.clientWidth, h = container.clientHeight;
  if(w > 0 && h > 0 && (renderer.domElement.width !== w * (window.devicePixelRatio||1) || renderer.domElement.height !== h * (window.devicePixelRatio||1))){
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
}

// ── Init ──
loadShipModel().then(()=>{
  connectStream();
});
requestAnimationFrame(animate);

</script></body></html>
