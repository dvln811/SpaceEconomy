function renderFitting(){
  const s=(document.getElementById('fitSearch').value||'').toLowerCase();
  const rows=fitting.filter(i=>!s||i.name.toLowerCase().includes(s)||i.category.toLowerCase().includes(s)||i.description.toLowerCase().includes(s));
  document.getElementById('fitBody').innerHTML=rows.map(i=>{
    const sc=i.security==='High'?'sec-high':i.security==='Low'?'sec-low':'sec-null';
    return `<tr><td>${i.name}</td><td>${i.category}</td><td class="${sc}">${i.security}-sec</td><td>${i.price.toLocaleString()}</td><td>${i.volume}m3</td><td class="desc">${i.description}</td></tr>`;
  }).join('');
}
function renderCivilian(){
  document.getElementById('civBody').innerHTML=civilian.map(s=>
    `<tr><td>${s.name}</td><td>${s.role}</td><td>T${s.tier}</td><td>${s.cargo}m3</td><td>${s.speed}x</td><td>${s.hull_hp}</td><td>${s.align}s</td><td class="desc">${s.description}</td></tr>`
  ).join('');
}
function renderMilitary(){
  const s=(document.getElementById('milSearch').value||'').toLowerCase();
  const rows=military.filter(i=>!s||i.name.toLowerCase().includes(s)||i.faction.toLowerCase().includes(s)||i.hull_class.includes(s));
  document.getElementById('milBody').innerHTML=rows.map(m=>
    `<tr><td>${m.name}</td><td>${m.hull_class}</td><td>${m.faction}</td><td>${m.hull_hp}</td><td>${m.armor_hp}</td><td>${m.shield_hp}</td><td>${m.crew}</td><td style="font-size:9px">${m.weapons.join(', ')}</td><td class="desc">${m.description}</td></tr>`
  ).join('');
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('sec-'+t.dataset.section).classList.add('active');
  });
});
document.getElementById('fitSearch').addEventListener('input',renderFitting);
document.getElementById('milSearch').addEventListener('input',renderMilitary);
renderFitting();renderCivilian();renderMilitary();
