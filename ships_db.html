<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ships & Fitting Database - Hauler's Almanac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:13px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0e18}
::-webkit-scrollbar-thumb{background:#1a3050;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a4060}
.app{display:grid;grid-template-rows:48px 40px 1fr;height:100vh}
#docnav{position:sticky;top:0;z-index:100;background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 24px;height:48px;gap:12px;flex-wrap:wrap}
#docnav .dnl{font-size:10px;color:#8aa0b8;text-decoration:none;padding:5px 12px;border:1px solid #1a2844;border-radius:3px;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',sans-serif;transition:all .15s}
#docnav .dnl:hover{color:#4fc3f7;border-color:#4fc3f7;background:#0d1a2f}
#docnav .dnl.active{color:#4fc3f7;border-color:#4fc3f7}
.tabs{display:flex;background:#0a0e18;border-bottom:1px solid #1a2844;padding:0 24px;gap:4px;align-items:flex-end}
.tab{padding:8px 20px;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#8aa0b8;background:#0f1520;border:1px solid #1a2844;border-bottom:none;border-radius:4px 4px 0 0;cursor:pointer;transition:all .15s}
.tab.active{color:#4fc3f7;border-color:#4fc3f7;background:#0d1a2f}
.tab:hover{color:#4fc3f7}
.main{display:grid;grid-template-columns:280px 1fr;overflow:hidden}
.sidebar{background:#0a0e18;border-right:1px solid #1a2844;overflow-y:auto;padding:12px;display:flex;flex-direction:column}
.search-box{width:100%;padding:6px 10px;background:#0f1520;border:1px solid #1a2844;border-radius:3px;color:#c8d4e0;font-family:inherit;font-size:12px;margin-bottom:10px}
.search-box:focus{outline:none;border-color:#4fc3f7}
.tree-cat{margin-bottom:2px}
.tree-cat-label{display:flex;align-items:center;gap:6px;padding:6px 8px;cursor:pointer;color:#4fc3f7;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-radius:3px;transition:background .1s}
.tree-cat-label:hover{background:#0d1a2f}
.tree-cat-label .arrow{transition:transform .15s;font-size:8px}
.tree-cat-label.open .arrow{transform:rotate(90deg)}
.tree-sub{display:none;margin-left:12px}
.tree-sub.open{display:block}
.tree-sub-label{padding:4px 8px;cursor:pointer;color:#66bb6a;font-size:11px;border-radius:3px;transition:background .1s}
.tree-sub-label:hover{background:#0d1a2f}
.tree-sub-label.active{background:#0d1a2f;color:#4fc3f7}
.tree-items{display:none;margin-left:12px}
.tree-items.open{display:block}
.tree-item{padding:3px 8px;cursor:pointer;color:#a0b4c8;font-size:11px;border-radius:3px;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-item:hover{background:#0d1a2f;color:#fff}
.tree-item.active{background:#1a3050;color:#4fc3f7}
.detail{overflow-y:auto;padding:24px;background:#05080f}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:#5a7090;font-size:14px}
.detail h2{font-family:'Orbitron',sans-serif;font-size:16px;color:#4fc3f7;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.detail .desc{color:#a0b4c8;margin-bottom:20px;line-height:1.6}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#0a0e18;border:1px solid #1a2844;border-radius:4px;padding:12px}
.stat-card .label{font-size:9px;color:#5a7090;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'Orbitron',sans-serif}
.stat-card .value{color:#fff;font-size:14px;font-weight:500}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.recipe-item{background:#0a0e18;border:1px solid #1a2844;border-radius:3px;padding:8px 12px;display:flex;justify-content:space-between}
.recipe-item .rname{color:#a0b4c8}
.recipe-item .rqty{color:#ffd54f;font-weight:600}
.section-title{font-family:'Orbitron',sans-serif;font-size:11px;color:#7a9ab8;letter-spacing:2px;text-transform:uppercase;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid #152238}
.ship-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:24px}
.ship-card{background:#0a0e18;border:1px solid #1a2844;border-radius:6px;padding:16px;cursor:pointer;transition:all .15s}
.ship-card:hover{border-color:#4fc3f7;transform:translateY(-2px)}
.ship-card h3{font-family:'Orbitron',sans-serif;font-size:12px;color:#4fc3f7;letter-spacing:1px;margin-bottom:6px}
.ship-card .role{font-size:10px;color:#66bb6a;text-transform:uppercase;margin-bottom:8px}
.ship-card .stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;color:#8aa0b8}
.ship-detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.ship-detail-overlay.show{display:flex}
.ship-detail-box{background:#0a0e18;border:1px solid #1a2844;border-radius:8px;padding:32px;max-width:700px;width:90%;max-height:85vh;overflow-y:auto}
.ship-detail-box h2{font-family:'Orbitron',sans-serif;font-size:18px;color:#4fc3f7;margin-bottom:4px}
.ship-detail-box .sub{font-size:11px;color:#66bb6a;margin-bottom:16px}
.close-btn{position:absolute;top:16px;right:24px;color:#8aa0b8;font-size:20px;cursor:pointer;background:none;border:none;font-family:inherit}
.close-btn:hover{color:#ef5350}
.wpn-list,.mod-list{margin:8px 0;padding-left:16px;color:#a0b4c8;font-size:12px;line-height:1.8}
.hidden{display:none!important}
</style>
</head>

// Tabs
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('fittingPanel').classList.toggle('hidden',t.dataset.tab!=='fitting');
  document.getElementById('civilianPanel').classList.toggle('hidden',t.dataset.tab!=='civilian');
  document.getElementById('militaryPanel').classList.toggle('hidden',t.dataset.tab!=='military');
}));

// Tree
const tree=document.getElementById('treeContainer');
function buildTree(){
  tree.innerHTML='';
  for(const[cat,subs] of Object.entries(CATEGORIES)){
    const catDiv=document.createElement('div');catDiv.className='tree-cat';
    const catLabel=document.createElement('div');catLabel.className='tree-cat-label';
    catLabel.innerHTML=`<span class="arrow">▶</span> ${cat}`;
    catDiv.appendChild(catLabel);
    const subContainer=document.createElement('div');subContainer.className='tree-sub';
    for(const[sub,ids] of Object.entries(subs)){
      if(!ids.length)continue;
      const subDiv=document.createElement('div');
      const subLabel=document.createElement('div');subLabel.className='tree-sub-label';
      subLabel.textContent=sub;
      subDiv.appendChild(subLabel);
      const itemsDiv=document.createElement('div');itemsDiv.className='tree-items';
      ids.forEach(id=>{
        if(!ITEMS[id])return;
        const el=document.createElement('div');el.className='tree-item';el.dataset.id=id;
        el.textContent=ITEMS[id].name;
        el.addEventListener('click',()=>selectItem(id,el));
        itemsDiv.appendChild(el);
      });
      subLabel.addEventListener('click',()=>{
        subLabel.classList.toggle('active');
        itemsDiv.classList.toggle('open');
      });
      subDiv.appendChild(itemsDiv);
      subContainer.appendChild(subDiv);
    }
    catLabel.addEventListener('click',()=>{
      catLabel.classList.toggle('open');
      subContainer.classList.toggle('open');
    });
    catDiv.appendChild(subContainer);
    tree.appendChild(catDiv);
  }
}
buildTree();

// Search
document.getElementById('searchBox').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.tree-cat').forEach(cat=>{
    let catVisible=false;
    cat.querySelectorAll('.tree-item').forEach(item=>{
      const match=!q||item.textContent.toLowerCase().includes(q);
      item.style.display=match?'':'none';
      if(match)catVisible=true;
    });
    cat.style.display=catVisible?'':'none';
    if(q&&catVisible){
      cat.querySelector('.tree-cat-label').classList.add('open');
      cat.querySelector('.tree-sub').classList.add('open');
      cat.querySelectorAll('.tree-items').forEach(i=>i.classList.add('open'));
      cat.querySelectorAll('.tree-sub-label').forEach(s=>s.classList.add('active'));
    }
  });
});

// Detail
function selectItem(id,el){
  document.querySelectorAll('.tree-item.active').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  const item=ITEMS[id];if(!item)return;
  const s=item.stats;
  let statsHtml='';
  const statLabels={"cpu":"CPU","pg":"Power Grid","dps":"DPS","rof":"Rate of Fire (s)","range":"Range (km)","tracking":"Tracking","size":"Size","damage_type":"Damage Type","slot":"Slot","shield_hp":"Shield HP","regen":"Regen/s","armor_hp":"Armor HP","mass_penalty":"Mass Penalty","repair_rate":"Repair/s","intercept_rate":"Intercept Rate","jam_strength":"Jam Strength","jam_range":"Jam Range (km)","speed_bonus":"Speed Bonus","scan_range":"Scan Range","scan_strength":"Scan Strength","cargo_bonus":"Cargo Bonus","pull_speed":"Pull Speed","bandwidth":"Bandwidth","mining_yield":"Mining Yield","cycle_time":"Cycle Time (s)","damage":"Damage/Round"};
  for(const[k,v] of Object.entries(s)){
    statsHtml+=`<div class="stat-card"><div class="label">${statLabels[k]||k}</div><div class="value">${v}</div></div>`;
  }
  statsHtml+=`<div class="stat-card"><div class="label">Price</div><div class="value">₡ ${item.price.toLocaleString()}</div></div>`;
  statsHtml+=`<div class="stat-card"><div class="label">Volume</div><div class="value">${item.volume} m³</div></div>`;
  let recipeHtml='';
  if(Object.keys(item.recipe).length){
    recipeHtml='<div class="section-title">Recipe</div><div class="recipe-grid">';
    for(const[rn,rq] of Object.entries(item.recipe)){
      recipeHtml+=`<div class="recipe-item"><span class="rname">${rn}</span><span class="rqty">x${rq}</span></div>`;
    }
    recipeHtml+='</div>';
  }
  document.getElementById('detailPanel').innerHTML=`<h2>${item.name}</h2><div class="desc">${item.description}</div><div class="stat-grid">${statsHtml}</div>${recipeHtml}`;
}

// Civilian ships
function renderCivilian(){
  const grid=document.getElementById('civilianGrid');grid.innerHTML='';
  for(const[id,s] of Object.entries(CIVILIAN)){
    const card=document.createElement('div');card.className='ship-card';
    card.innerHTML=`<h3>${s.name}</h3><div class="role">${s.role} · Tier ${s.tier}</div><div class="stats"><span>Cargo: ${s.cargo_capacity}</span><span>Speed: ${s.speed}</span><span>Hull: ${s.hull_hp}</span><span>Fuel: ${s.fuel_capacity}</span></div>`;
    card.addEventListener('click',()=>showShipDetail(s,'civilian'));
    grid.appendChild(card);
  }
}
renderCivilian();

// Military ships
function renderMilitary(){
  const grid=document.getElementById('militaryGrid');grid.innerHTML='';
  for(const[id,s] of Object.entries(MILITARY)){
    const card=document.createElement('div');card.className='ship-card';
    card.innerHTML=`<h3>${s.name}</h3><div class="role">${s.hull_class} · ${s.faction}</div><div class="stats"><span>Hull: ${s.hull_hp}</span><span>Armor: ${s.armor_hp}</span><span>Shield: ${s.shield_hp}</span><span>Crew: ${s.crew}</span></div>`;
    card.addEventListener('click',()=>showShipDetail(s,'military'));
    grid.appendChild(card);
  }
}
renderMilitary();

function showShipDetail(s,type){
  let html='';
  if(type==='civilian'){
    html=`<h2>${s.name}</h2><div class="sub">${s.role} · Tier ${s.tier}</div><div class="desc">${s.description}</div><div class="stat-grid"><div class="stat-card"><div class="label">Cargo</div><div class="value">${s.cargo_capacity} m³</div></div><div class="stat-card"><div class="label">Fuel</div><div class="value">${s.fuel_capacity}</div></div><div class="stat-card"><div class="label">Speed</div><div class="value">${s.speed}</div></div><div class="stat-card"><div class="label">Intra Speed</div><div class="value">${s.intra_speed}</div></div><div class="stat-card"><div class="label">Hull HP</div><div class="value">${s.hull_hp}</div></div><div class="stat-card"><div class="label">Align Time</div><div class="value">${s.align_time}s</div></div></div><div class="section-title">Hardpoints</div><div class="stat-grid">${Object.entries(s.hardpoints).map(([k,v])=>`<div class="stat-card"><div class="label">${k}</div><div class="value">${v}</div></div>`).join('')}</div>`;
  } else {
    html=`<h2>${s.name}</h2><div class="sub">${s.hull_class} · ${s.faction}</div><div class="desc">${s.description}</div><div class="stat-grid"><div class="stat-card"><div class="label">Hull HP</div><div class="value">${s.hull_hp}</div></div><div class="stat-card"><div class="label">Armor HP</div><div class="value">${s.armor_hp}</div></div><div class="stat-card"><div class="label">Shield HP</div><div class="value">${s.shield_hp}</div></div><div class="stat-card"><div class="label">Crew</div><div class="value">${s.crew}</div></div></div><div class="section-title">Weapons</div><ul class="wpn-list">${s.weapons.map(w=>`<li>${w}</li>`).join('')}</ul><div class="section-title">Modules</div><ul class="mod-list">${s.modules.map(m=>`<li>${m}</li>`).join('')}</ul><div class="section-title">Build Cost</div><div class="recipe-grid">${Object.entries(s.build_cost).map(([k,v])=>`<div class="recipe-item"><span class="rname">${k}</span><span class="rqty">x${v}</span></div>`).join('')}</div>`;
  }
  document.getElementById('shipDetailContent').innerHTML=html;
  document.getElementById('shipOverlay').classList.add('show');
}
function closeShipDetail(){document.getElementById('shipOverlay').classList.remove('show')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeShipDetail()});
</script>
