<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Economy - Ships Database</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:12px;display:flex;flex-direction:column;height:100vh}
#docnav .dnl{font-size:12px;color:#8aa0b8;text-decoration:none;padding:5px 12px;border:1px solid #1a2844;border-radius:3px;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;transition:all .15s}
#docnav .dnl:hover{color:#4fc3f7;border-color:#4fc3f7;background:#0d1a2f}
#docnav .dnl.active{color:#4fc3f7;border-color:#4fc3f7}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:180px;background:#0a0e18;border-right:1px solid #1a2844;overflow-y:auto;padding:8px;flex-shrink:0}
.side-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8aa0b8;letter-spacing:1px;padding:6px 4px 4px;text-transform:uppercase}
.side-item{display:block;padding:5px 8px;margin:1px 0;border-radius:3px;cursor:pointer;color:#8aa0b8;transition:all .1s;border:none;background:none;width:100%;text-align:left;font:inherit;font-size:12px}
.side-item:hover{background:#111a2a;color:#c8d4e0}
.side-item.active{background:#0d1a2f;color:#4fc3f7}
.side-item.sub{padding-left:16px;font-size:12px}
.content{flex:1;overflow:auto;padding:0 12px 12px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8aa0b8;letter-spacing:1px;text-align:left;padding:6px 8px;border-bottom:1px solid #1a2844;position:sticky;top:0;background:#05080f;cursor:pointer;z-index:2;box-shadow:0 1px 0 #1a2844;overflow:hidden}
th:hover{color:#4fc3f7}
td{padding:5px 8px;border-bottom:1px solid #0f1a28;vertical-align:top;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:#0d1525}
.desc{color:#8aa0b8;font-size:12px;max-width:250px}
.faction-tf{color:#4fc3f7}.faction-nc{color:#ab47bc}.faction-mg{color:#ffd54f}.faction-fs{color:#66bb6a}.faction-ic{color:#ff8a65}.faction-crs{color:#ef5350}
.loading{color:#8aa0b8;padding:24px;text-align:center}
</style>
</head>
<body>
<div id="docnav" style="position:sticky;top:0;z-index:100;background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 24px;height:48px;gap:12px;flex-wrap:wrap">
<a href="/" class="dnl">Game</a><a href="/docs" class="dnl">Hub</a><span style="color:#1a2844">|</span>
<a href="/items" class="dnl">Items DB</a><a href="/ships_db" class="dnl active">Ships DB</a><a href="/chain" class="dnl">Chain Calc</a><a href="/factions" class="dnl">Factions</a><a href="/ships" class="dnl">Ships 3D</a><a href="/fitting" class="dnl">Fitting</a><span style="color:#1a2844">|</span>
<a href="/design" class="dnl">Design</a><a href="/universe" class="dnl">Universe</a><a href="/economy" class="dnl">Economy</a><a href="/resources" class="dnl">Resources</a><a href="/materials" class="dnl">Materials</a><a href="/products" class="dnl">Products</a><span style="color:#1a2844">|</span>
<a href="/debug" class="dnl">Dashboard</a>
</div>
<div class="main">
<div class="sidebar" id="sidebar"></div>
<div class="content" id="content"><div class="loading">Loading ships...</div></div>
</div>
<script>
let civilian = [];
let military = [];
let factions = {};
let nameMap = {};
const factionColors = {terran_fed:'faction-tf',science_collective:'faction-nc',merchants_guild:'faction-mg',free_states:'faction-fs',iron_compact:'faction-ic',corsairs:'faction-crs'};

async function init() {
  const [shipRes, milRes, facRes, comRes] = await Promise.all([
    fetch('/api/data/ship_types'),
    fetch('/api/data/military_ships'),
    fetch('/api/data/factions'),
    fetch('/api/data/commodities')
  ]);
  civilian = await shipRes.json();
  military = await milRes.json();
  factions = await facRes.json();
  const commodities = await comRes.json();
  commodities.forEach(c => { nameMap[c.id] = c.name; });

  // Parse JSON fields if needed
  civilian = civilian.map(s => ({
    ...s,
    hardpoints: typeof s.hardpoints === 'string' ? JSON.parse(s.hardpoints) : s.hardpoints,
    build_cost: typeof s.build_cost === 'string' ? JSON.parse(s.build_cost) : s.build_cost
  }));
  military = military.map(s => ({
    ...s,
    weapons: typeof s.weapons === 'string' ? JSON.parse(s.weapons) : s.weapons,
    modules: typeof s.modules === 'string' ? JSON.parse(s.modules) : s.modules,
    build_cost: typeof s.build_cost === 'string' ? JSON.parse(s.build_cost) : s.build_cost
  }));

  buildSidebar();
  show('all_civ');
  document.getElementById('shipSearch').addEventListener('input', () => show(lastFilter));
  document.getElementById('shipSearch').addEventListener('search', () => show(lastFilter));
}
let lastFilter = 'all_civ';

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<input type="search" id="shipSearch" placeholder="Search ships..." style="width:calc(100% - 8px);margin:4px;background:#0a1020;border:1px solid #1a2844;color:#c8d4e0;padding:5px 8px;border-radius:3px;font:inherit;font-size:12px">';
  html += '<div class="side-title">Civilian</div>';
  html += '<button class="side-item active" onclick="show(\'all_civ\',this)">All Civilian</button>';
  html += '<button class="side-item sub" onclick="show(\'haulers\',this)">Haulers</button>';
  html += '<button class="side-item sub" onclick="show(\'miners\',this)">Miners</button>';
  html += '<div class="side-title" style="margin-top:12px">Military</div>';
  html += '<button class="side-item" onclick="show(\'all_mil\',this)">All Military</button>';
  for (const [fid, f] of Object.entries(factions)) {
    html += `<button class="side-item sub" onclick="show('mil_${fid}',this)">${f.name}</button>`;
  }
  // Hull classes
  const classes = [...new Set(military.map(s => s.hull_class))];
  html += '<div class="side-title" style="margin-top:12px">By Class</div>';
  for (const cls of classes) {
    html += `<button class="side-item sub" onclick="show('class_${cls}',this)">${cls.charAt(0).toUpperCase()+cls.slice(1)}s</button>`;
  }
  sb.innerHTML = html;
}

function show(filter, btn) {
  lastFilter = filter;
  if (btn) {
    document.querySelectorAll('.side-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const el = document.getElementById('content');
  const n = id => nameMap[id] || id;
  const q = (document.getElementById('shipSearch')?.value || '').toLowerCase();
  const match = s => !q || s.name.toLowerCase().includes(q) || (s.role||'').toLowerCase().includes(q) || (s.hull_class||'').toLowerCase().includes(q) || (s.faction_id||'').toLowerCase().includes(q) || Object.keys(s.build_cost||{}).some(k=>(nameMap[k]||k).toLowerCase().includes(q)) || (s.weapons||[]).some(w=>(nameMap[w]||w).toLowerCase().includes(q));

  if (q && filter !== 'all_mil' && !filter.startsWith('mil_') && !filter.startsWith('class_')) {
    // When searching, show matching from ALL ships (civilian + military)
    const civMatched = civilian.filter(match);
    const milMatched = military.filter(match);
    let html = '';
    if (civMatched.length) {
      html += `<table><colgroup><col style="width:110px"><col style="width:60px"><col style="width:35px"><col style="width:65px"><col style="width:40px"><col style="width:50px"><col style="width:55px"><col style="width:55px"><col style="width:120px"><col style="width:200px"><col style="width:250px"></colgroup><thead><tr><th>Name</th><th>Role</th><th>Tier</th><th>Cargo (m3)</th><th>Fuel</th><th>Speed</th><th>Hull HP</th><th>Align (s)</th><th>Hardpoints</th><th>Build Cost</th><th>Description</th></tr></thead><tbody>${civMatched.map(s => `<tr><td style="color:#e0e8f0">${s.name}</td><td>${s.role}</td><td>T${s.tier}</td><td style="color:#ffd54f">${s.cargo_capacity}</td><td>${s.fuel_capacity}</td><td>${s.speed}x</td><td>${s.hull_hp}</td><td>${s.align_time}</td><td style="font-size:12px;line-height:1.6">${Object.entries(s.hardpoints).map(([k,v])=>v+'x '+k).join('<br>')}</td><td style="font-size:12px;line-height:1.6;color:#66bb6a">${Object.entries(s.build_cost).map(([k,v])=>v+'x '+n(k)).join('<br>')}</td><td class="desc">${s.description}</td></tr>`).join('')}</tbody></table>`;
    }
    if (milMatched.length) {
      html += `<table style="margin-top:12px"><colgroup><col style="width:100px"><col style="width:95px"><col style="width:120px"><col style="width:45px"><col style="width:45px"><col style="width:45px"><col style="width:55px"><col style="width:35px"><col style="width:170px"><col style="width:180px"><col style="width:250px"></colgroup><thead><tr><th>Name</th><th>Class</th><th>Faction</th><th>Hull</th><th>Armor</th><th>Shield</th><th>Total HP</th><th>Crew</th><th>Weapons</th><th>Build Cost</th><th>Description</th></tr></thead><tbody>${milMatched.map(s => {const fname=factions[s.faction_id]?factions[s.faction_id].name:s.faction_id;return `<tr><td style="color:#e0e8f0">${s.name}</td><td>${s.hull_class}</td><td class="${factionColors[s.faction_id]||''}">${fname}</td><td>${s.hull_hp}</td><td>${s.armor_hp}</td><td>${s.shield_hp}</td><td style="color:#ffd54f">${s.hull_hp+s.armor_hp+s.shield_hp}</td><td>${s.crew}</td><td style="font-size:12px;line-height:1.6">${s.weapons.map(w=>n(w)).join('<br>')}</td><td style="font-size:12px;line-height:1.6;color:#66bb6a">${Object.entries(s.build_cost).map(([k,v])=>v+'x '+n(k)).join('<br>')}</td><td class="desc">${s.description}</td></tr>`;}).join('')}</tbody></table>`;
    }
    if (!html) html = '<div style="color:#8aa0b8;padding:24px">No matches</div>';
    el.innerHTML = html;
    return;
  }

  if (filter === 'all_civ' || filter === 'haulers' || filter === 'miners') {
    let ships = civilian;
    if (filter === 'haulers') ships = civilian.filter(s => s.role === 'hauler');
    if (filter === 'miners') ships = civilian.filter(s => s.role === 'miner');
    ships = ships.filter(match);
    el.innerHTML = `<table><colgroup><col style="width:110px"><col style="width:60px"><col style="width:35px"><col style="width:65px"><col style="width:40px"><col style="width:50px"><col style="width:55px"><col style="width:55px"><col style="width:120px"><col style="width:200px"><col style="width:250px"></colgroup><thead><tr>
      <th>Name</th><th>Role</th><th>Tier</th><th>Cargo (m3)</th><th>Fuel</th><th>Speed</th><th>Hull HP</th><th>Align (s)</th><th>Hardpoints</th><th>Build Cost</th><th>Description</th>
    </tr></thead><tbody>${ships.map(s => `<tr>
      <td style="color:#e0e8f0">${s.name}</td>
      <td>${s.role}</td>
      <td>T${s.tier}</td>
      <td style="color:#ffd54f">${s.cargo_capacity}</td>
      <td>${s.fuel_capacity}</td>
      <td>${s.speed}x</td>
      <td>${s.hull_hp}</td>
      <td>${s.align_time}</td>
      <td style="font-size:12px;line-height:1.6">${Object.entries(s.hardpoints).map(([k,v])=>v+'x '+k).join('<br>')}</td>
      <td style="font-size:12px;line-height:1.6;color:#66bb6a">${Object.entries(s.build_cost).map(([k,v])=>v+'x '+n(k)).join('<br>')}</td>
      <td class="desc">${s.description}</td>
    </tr>`).join('')}</tbody></table>`;
  } else {
    let ships = military;
    if (filter.startsWith('mil_')) ships = military.filter(s => s.faction_id === filter.replace('mil_',''));
    if (filter.startsWith('class_')) ships = military.filter(s => s.hull_class === filter.replace('class_',''));
    ships = ships.filter(match);
    el.innerHTML = `<table><colgroup><col style="width:100px"><col style="width:95px"><col style="width:120px"><col style="width:45px"><col style="width:45px"><col style="width:45px"><col style="width:55px"><col style="width:35px"><col style="width:170px"><col style="width:180px"><col style="width:250px"></colgroup><thead><tr>
      <th>Name</th><th>Class</th><th>Faction</th><th>Hull</th><th>Armor</th><th>Shield</th><th>Total HP</th><th>Crew</th><th>Weapons</th><th>Build Cost</th><th>Description</th>
    </tr></thead><tbody>${ships.map(s => {
      const fname = factions[s.faction_id] ? factions[s.faction_id].name : s.faction_id;
      return `<tr>
      <td style="color:#e0e8f0">${s.name}</td>
      <td>${s.hull_class}</td>
      <td class="${factionColors[s.faction_id]||''}">${fname}</td>
      <td>${s.hull_hp}</td>
      <td>${s.armor_hp}</td>
      <td>${s.shield_hp}</td>
      <td style="color:#ffd54f">${s.hull_hp+s.armor_hp+s.shield_hp}</td>
      <td>${s.crew}</td>
      <td style="font-size:12px;line-height:1.6">${s.weapons.map(w=>n(w)).join('<br>')}</td>
      <td style="font-size:12px;line-height:1.6;color:#66bb6a">${Object.entries(s.build_cost).map(([k,v])=>v+'x '+n(k)).join('<br>')}</td>
      <td class="desc">${s.description}</td>
    </tr>`;}).join('')}</tbody></table>`;
  }
}

init();
</script>
</body>
</html>
