function show(filter) {
  document.querySelectorAll('.side-item').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const el = document.getElementById('content');

  if (filter === 'all_civ' || filter === 'haulers' || filter === 'miners') {
    let ships = civilian;
    if (filter === 'haulers') ships = civilian.filter(s => s.role === 'hauler');
    if (filter === 'miners') ships = civilian.filter(s => s.role === 'miner');
    el.innerHTML = `<table><thead><tr>
      <th>Name</th><th>Role</th><th>Tier</th><th>Cargo (m3)</th><th>Fuel</th><th>Speed</th><th>Hull HP</th><th>Align (s)</th><th>Hardpoints</th><th>Build Cost</th><th>Description</th>
    </tr></thead><tbody>${ships.map(s => `<tr>
      <td style="color:#e0e8f0">${s.name}</td>
      <td>${s.role}</td>
      <td>T${s.tier}</td>
      <td style="color:#ffd54f">${s.cargo}</td>
      <td>${s.fuel}</td>
      <td>${s.speed}x</td>
      <td>${s.hull_hp}</td>
      <td>${s.align}</td>
      <td style="font-size:9px;line-height:1.6">${Object.entries(s.hardpoints).map(([k,v])=>v+'x '+k).join('<br>')}</td>
      <td style="font-size:9px;line-height:1.6;color:#66bb6a">${s.build_cost?Object.entries(s.build_cost).map(([k,v])=>v+'x '+k).join('<br>'):'-'}</td>
      <td class="desc">${s.description}</td>
    </tr>`).join('')}</tbody></table>`;
  } else if (filter.startsWith('mil_') || filter === 'all_mil' || filter.startsWith('class_')) {
    let ships = military;
    if (filter.startsWith('mil_')) {
      const fid = filter.replace('mil_','');
      ships = military.filter(s => s.faction_id === fid);
    }
    if (filter.startsWith('class_')) {
      const cls = filter.replace('class_','');
      ships = military.filter(s => s.hull_class === cls);
    }
    el.innerHTML = `<table><thead><tr>
      <th>Name</th><th>Class</th><th>Faction</th><th>Hull</th><th>Armor</th><th>Shield</th><th>Total HP</th><th>Crew</th><th>Weapons</th><th>Build Cost</th><th>Description</th>
    </tr></thead><tbody>${ships.map(s => `<tr>
      <td style="color:#e0e8f0">${s.name}</td>
      <td>${s.hull_class}</td>
      <td class="${factionColors[s.faction]||''}">${s.faction}</td>
      <td>${s.hull_hp}</td>
      <td>${s.armor_hp}</td>
      <td>${s.shield_hp}</td>
      <td style="color:#ffd54f">${s.hull_hp+s.armor_hp+s.shield_hp}</td>
      <td>${s.crew}</td>
      <td style="font-size:9px;line-height:1.6">${s.weapons.join('<br>')}</td>
      <td style="font-size:9px;line-height:1.6;color:#66bb6a">${s.build_cost?Object.entries(s.build_cost).map(([k,v])=>v+'x '+k).join('<br>'):'-'}</td>
      <td class="desc">${s.description}</td>
    </tr>`).join('')}</tbody></table>`;
  }
}
