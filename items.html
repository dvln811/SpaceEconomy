const catColors={'Raw Materials':'cat-raw','Refined Materials':'cat-refined','Manufactured':'cat-mfg','Components':'cat-comp','Weapons':'cat-wpn','Defense':'cat-def','Propulsion':'cat-prop','Drones':'cat-drone','Mining Equipment':'cat-mine','Ammunition':'cat-ammo','Equipment':'cat-equip','Trade Goods':'cat-trade'};
let sortCol='name',sortDir=1;
function render(){
  const search=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  let filtered=items.filter(i=>{
    if(cat&&i.category!==cat)return false;
    if(search&&!i.name.toLowerCase().includes(search)&&!i.recipe.toLowerCase().includes(search))return false;
    return true;
  });
  filtered.sort((a,b)=>{
    let va=a[sortCol],vb=b[sortCol];
    if(typeof va==='number')return (va-vb)*sortDir;
    return String(va).localeCompare(String(vb))*sortDir;
  });
  document.getElementById('count').textContent=filtered.length+' items';
  document.getElementById('tbody').innerHTML=filtered.map(i=>
    `<tr><td>${i.name}</td><td class="${catColors[i.category]||''}">${i.category}</td><td>${i.price.toLocaleString()}</td><td>${i.volume} m3</td><td class="recipe">${i.recipe||'-'}</td></tr>`
  ).join('');
}
document.getElementById('search').addEventListener('input',render);
document.getElementById('catFilter').addEventListener('change',render);
document.querySelectorAll('th').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.col;
    if(sortCol===col)sortDir*=-1; else{sortCol=col;sortDir=1;}
    document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
    th.classList.add('sorted');
    render();
  });
});
render();
</script>
