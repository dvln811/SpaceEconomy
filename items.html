<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Economy - Items Database</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;flex-direction:column;height:100vh}
#docnav .dnl{font-size:10px;color:#8aa0b8;text-decoration:none;padding:5px 12px;border:1px solid #1a2844;border-radius:3px;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',sans-serif;transition:all .15s}
#docnav .dnl:hover{color:#4fc3f7;border-color:#4fc3f7;background:#0d1a2f}
#docnav .dnl.active{color:#4fc3f7;border-color:#4fc3f7}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:180px;background:#0a0e18;border-right:1px solid #1a2844;overflow-y:auto;padding:8px;flex-shrink:0}
.side-title{font-family:'Orbitron',sans-serif;font-size:8px;color:#8aa0b8;letter-spacing:1px;padding:8px 4px 4px;text-transform:uppercase}
.side-item{display:block;padding:5px 8px;margin:1px 0;border-radius:3px;cursor:pointer;color:#8aa0b8;transition:all .1s;border:none;background:none;width:100%;text-align:left;font:inherit;font-size:11px}
.side-item:hover{background:#111a2a;color:#c8d4e0}
.side-item.active{background:#0d1a2f;color:#4fc3f7}
.content{flex:1;overflow:auto;padding:12px}
table{width:100%;border-collapse:collapse}
th{font-family:'Orbitron',sans-serif;font-size:9px;color:#8aa0b8;letter-spacing:1px;text-align:left;padding:6px 8px;border-bottom:1px solid #1a2844;position:sticky;top:0;background:#0a0e18;z-index:2}
td{padding:8px;border-bottom:1px solid #0f1a28;vertical-align:top}
tr:hover td{background:#0d1525}
.recipe{color:#66bb6a;font-size:9px;line-height:1.5}
.desc{color:#8aa0b8;font-size:10px}
.stat{color:#4fc3f7}
.loading{color:#8aa0b8;padding:24px;text-align:center}
</style>
</head>
<body>
<div id="docnav" style="position:sticky;top:0;z-index:100;background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 24px;height:48px;gap:12px;flex-wrap:wrap">
<a href="/" class="dnl">Game</a><a href="/docs" class="dnl">Hub</a><span style="color:#1a2844">|</span>
<a href="/design" class="dnl">Design</a><a href="/universe" class="dnl">Universe</a><a href="/factions" class="dnl">Factions</a>
<a href="/ships" class="dnl">Ships</a><a href="/fitting" class="dnl">Fitting</a><span style="color:#1a2844">|</span>
<a href="/economy" class="dnl">Economy</a>
<span style="color:#1a2844">|</span>
<a href="/ships_db" class="dnl">Ships DB</a>
<a href="/items" class="dnl active">Items DB</a><a href="/chain" class="dnl">Chain Calc</a>
</div>
<div class="main">
<div class="sidebar" id="sidebar"></div>
<div class="content" id="content"><div class="loading">Loading items...</div></div>
</div>
<script>
let items = [];
let nameMap = {};
const categories = ['Weapons','Ammunition','Defense','Propulsion','Drones','Mining','Utility','Raw Materials','Refined Materials','Manufactured','Components','Trade Goods'];

async function init() {
  const r = await fetch('/api/data/commodities');
  const raw = await r.json();
  nameMap = {};
  raw.forEach(c => { nameMap[c.id] = c.name; });
  items = raw.map(c => ({
    id: c.id, name: c.name, category: c.category, subcategory: c.subcategory,
    price: c.base_price, volume: c.volume, description: c.description,
    recipe: formatRecipe(c.recipe), stats: typeof c.stats === 'string' ? JSON.parse(c.stats) : c.stats
  }));
  buildSidebar();
}

function formatRecipe(recipe) {
  if (!recipe || !Object.keys(recipe).length) return '';
  return Object.entries(recipe).map(([id, qty]) => `${qty}x ${nameMap[id]||id}`).join('<br>');
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  let first = true;
  categories.forEach(cat => {
    const catItems = items.filter(i => i.category === cat);
    if (!catItems.length) return;
    const btn = document.createElement('button');
    btn.className = 'side-item' + (first ? ' active' : '');
    btn.textContent = cat + ' (' + catItems.length + ')';
    btn.onclick = () => { showCat(cat); setActive(btn); };
    sb.appendChild(btn);
    const subs = [...new Set(catItems.map(i => i.subcategory).filter(Boolean))];
    subs.forEach(sub => {
      const sbtn = document.createElement('button');
      sbtn.className = 'side-item';
      sbtn.style.paddingLeft = '16px';
      sbtn.style.fontSize = '10px';
      sbtn.textContent = sub + ' (' + catItems.filter(i => i.subcategory === sub).length + ')';
      sbtn.onclick = () => { showSub(cat, sub); setActive(sbtn); };
      sb.appendChild(sbtn);
    });
    if (first) { showCat(cat); first = false; }
  });
}

function setActive(el) { document.querySelectorAll('.side-item').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
function showCat(cat) { render(items.filter(i => i.category === cat), cat); }
function showSub(cat, sub) { render(items.filter(i => i.category === cat && i.subcategory === sub), cat); }

function render(filtered, cat) {
  const el = document.getElementById('content');
  let cols = '', rowFn = null;
  if (cat === 'Weapons') {
    cols = '<th>Name</th><th>Size</th><th>DPS</th><th>ROF</th><th>Range</th><th>Tracking</th><th>Dmg Type</th><th>CPU</th><th>PG</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.size||'-'}</td><td class="stat">${i.stats.dps||'-'}</td><td>${i.stats.rof||'-'}s</td><td>${i.stats.range||'-'}km</td><td>${i.stats.tracking||'-'}</td><td>${i.stats.damage_type||'-'}</td><td>${i.stats.cpu||'-'}</td><td>${i.stats.pg||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td class="desc">${i.description}</td>`;
  } else if (cat === 'Ammunition') {
    cols = '<th>Name</th><th>Size</th><th>Damage</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.size||'-'}</td><td class="stat">${i.stats.damage||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td class="desc">${i.description}</td>`;
  } else if (cat === 'Defense') {
    cols = '<th>Name</th><th>Size</th><th>Shield HP</th><th>Armor HP</th><th>Regen/Rep</th><th>CPU</th><th>PG</th><th>Slot</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.size||'-'}</td><td class="stat">${i.stats.shield_hp||'-'}</td><td class="stat">${i.stats.armor_hp||'-'}</td><td class="stat">${i.stats.regen||i.stats.repair_rate||'-'}</td><td>${i.stats.cpu||'-'}</td><td>${i.stats.pg||'-'}</td><td>${i.stats.slot||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td class="desc">${i.description}</td>`;
  } else if (cat === 'Propulsion') {
    cols = '<th>Name</th><th>Bonus</th><th>CPU</th><th>PG</th><th>Slot</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.speed_bonus||'-'}</td><td>${i.stats.cpu||'-'}</td><td>${i.stats.pg||'-'}</td><td>${i.stats.slot||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td class="desc">${i.description}</td>`;
  } else if (cat === 'Drones') {
    cols = '<th>Name</th><th>DPS</th><th>Mining</th><th>Repair</th><th>BW</th><th>CPU</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.dps||'-'}</td><td class="stat">${i.stats.mining_yield||'-'}</td><td class="stat">${i.stats.repair_rate||'-'}</td><td>${i.stats.bandwidth||'-'}</td><td>${i.stats.cpu||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td class="desc">${i.description}</td>`;
  } else if (cat === 'Mining') {
    cols = '<th>Name</th><th>Yield</th><th>Cycle</th><th>CPU</th><th>PG</th><th>Slot</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.mining_yield||'-'}</td><td>${i.stats.cycle_time||'-'}s</td><td>${i.stats.cpu||'-'}</td><td>${i.stats.pg||'-'}</td><td>${i.stats.slot||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td class="desc">${i.description}</td>`;
  } else if (cat === 'Utility') {
    cols = '<th>Name</th><th>CPU</th><th>PG</th><th>Slot</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td>${i.stats.cpu||'-'}</td><td>${i.stats.pg||'-'}</td><td>${i.stats.slot||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td class="desc">${i.description}</td>`;
  } else {
    cols = '<th>Name</th><th>Price</th><th>Volume</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume} m3</td><td class="recipe">${i.recipe||'-'}</td><td class="desc">${i.description}</td>`;
  }
  el.innerHTML = `<table><thead><tr>${cols}</tr></thead><tbody>${filtered.map(i => '<tr>' + rowFn(i) + '</tr>').join('')}</tbody></table>`;
}

init();
</script>
</body>
</html>
