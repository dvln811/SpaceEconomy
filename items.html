<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Economy - Items Database</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:12px;display:flex;flex-direction:column;height:100vh}
#docnav .dnl{font-size:12px;color:#8aa0b8;text-decoration:none;padding:5px 12px;border:1px solid #1a2844;border-radius:3px;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;transition:all .15s}
#docnav .dnl:hover{color:#4fc3f7;border-color:#4fc3f7;background:#0d1a2f}
#docnav .dnl.active{color:#4fc3f7;border-color:#4fc3f7}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:180px;background:#0a0e18;border-right:1px solid #1a2844;overflow-y:auto;padding:8px;flex-shrink:0}
.side-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8aa0b8;letter-spacing:1px;padding:8px 4px 4px;text-transform:uppercase}
.side-item{display:block;padding:5px 8px;margin:1px 0;border-radius:3px;cursor:pointer;color:#8aa0b8;transition:all .1s;border:none;background:none;width:100%;text-align:left;font:inherit;font-size:12px}
.side-item:hover{background:#111a2a;color:#c8d4e0}
.side-item.active{background:#0d1a2f;color:#4fc3f7}
.tree-arrow{display:inline-block;width:10px;font-size:9px;color:#5a7a9a;transition:transform .1s}
.tree-children{margin-left:0}
.content{flex:1;overflow:auto;padding:0 12px 12px}
table{width:100%;border-collapse:collapse}
th{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8aa0b8;letter-spacing:1px;text-align:left;padding:4px 6px;border-bottom:1px solid #1a2844;position:sticky;top:0;background:#05080f;z-index:2;box-shadow:0 1px 0 #1a2844;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:#4fc3f7}
td{padding:4px 6px;border-bottom:1px solid #0f1a28;vertical-align:top;white-space:nowrap}
tr:hover td{background:#0d1525}
.recipe{color:#66bb6a;font-size:12px;line-height:1.5}
.desc{color:#8aa0b8;font-size:11px;white-space:normal;width:100%}
.stat{color:#4fc3f7}
.loading{color:#8aa0b8;padding:24px;text-align:center}
</style>
</head>
<body>
<div id="docnav" style="position:sticky;top:0;z-index:100;background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 24px;height:48px;gap:12px;flex-wrap:wrap">
<a href="/" class="dnl">Game</a><a href="/docs" class="dnl">Hub</a><span style="color:#1a2844">|</span>
<a href="/items" class="dnl active">Items DB</a><a href="/ships_db" class="dnl">Ships DB</a><a href="/chain" class="dnl">Chain Calc</a><a href="/factions" class="dnl">Factions</a><a href="/ships" class="dnl">Ships 3D</a><a href="/fitting" class="dnl">Fitting</a><span style="color:#1a2844">|</span>
<a href="/design" class="dnl">Design</a><a href="/universe" class="dnl">Universe</a><a href="/economy" class="dnl">Economy</a><a href="/resources" class="dnl">Resources</a><a href="/materials" class="dnl">Materials</a><a href="/products" class="dnl">Products</a><span style="color:#1a2844">|</span>
<a href="/debug" class="dnl">Dashboard</a>
</div>
<div class="main">
<div class="sidebar" id="sidebar"></div>
<div class="content" id="content"><div class="loading">Loading items...</div></div>
</div>
<script>
let items = [];
let nameMap = {};
let currentFilter = '';
function tierToCategory(t){return {0:'Trade Goods',1:'Raw Materials',2:'Refined Materials',3:'Manufactured',4:'Components'}[t]||'Utility';}

async function init() {
  try {
    const r = await fetch('/api/data/commodities');
    const raw = await r.json();
    nameMap = {};
    raw.forEach(c => { nameMap[c.id] = c.name; });
    items = raw.map(c => ({
      id: c.id, name: c.name,
      category: c.category || tierToCategory(c.tier),
      subcategory: c.subcategory || '',
      group_name: c.group_name || '',
      price: c.base_price, volume: c.volume, description: c.description,
      build_time: c.build_time || 0,
      recipe: formatRecipe(c.recipe), stats: typeof c.stats === 'string' ? JSON.parse(c.stats) : (c.stats || {})
    }));
    buildSidebar();
    document.getElementById('itemSearch').addEventListener('input', searchAll);
    document.getElementById('itemSearch').addEventListener('search', searchAll);
  } catch(e) { document.getElementById('content').innerHTML = '<div class="loading">Error: '+e.message+'</div>'; }
}

function formatRecipe(recipe) {
  if (!recipe || !Object.keys(recipe).length) return '';
  return Object.entries(recipe).map(([id, qty]) => `${qty}x ${nameMap[id]||id}`).join('<br>');
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<input type="search" id="itemSearch" placeholder="Search items..." style="width:calc(100% - 8px);margin:4px;background:#0a1020;border:1px solid #1a2844;color:#c8d4e0;padding:5px 8px;border-radius:3px;font:inherit;font-size:12px">';

  // Build 3-level tree: category > subcategory > group_name
  const tree = {};
  for (const item of items) {
    const cat = item.category;
    const sub = item.subcategory || 'General';
    const grp = item.group_name || '';
    if (!tree[cat]) tree[cat] = {};
    if (!tree[cat][sub]) tree[cat][sub] = new Set();
    if (grp) tree[cat][sub].add(grp);
  }

  let first = true;
  for (const cat of Object.keys(tree).sort()) {
    const catItems = items.filter(i => i.category === cat);
    // Category level (collapsible)
    const catDiv = document.createElement('div');
    catDiv.style.cssText = 'margin-top:4px;';
    const btn = document.createElement('button');
    btn.className = 'side-item' + (first ? ' active' : '');
    btn.innerHTML = `<span class="tree-arrow">&#9654;</span> ${cat} (${catItems.length})`;
    const childContainer = document.createElement('div');
    childContainer.className = 'tree-children';
    childContainer.style.display = first ? 'block' : 'none';
    btn.onclick = () => {
      const open = childContainer.style.display !== 'none';
      childContainer.style.display = open ? 'none' : 'block';
      btn.querySelector('.tree-arrow').innerHTML = open ? '&#9654;' : '&#9660;';
      currentFilter = ''; document.getElementById('itemSearch').value = '';
      showCat(cat); setActive(btn);
    };
    catDiv.appendChild(btn);

    // Subcategory level
    for (const sub of Object.keys(tree[cat]).sort()) {
      const subItems = catItems.filter(i => (i.subcategory || 'General') === sub);
      const subDiv = document.createElement('div');
      const sbtn = document.createElement('button');
      sbtn.className = 'side-item';
      sbtn.style.paddingLeft = '16px';
      sbtn.style.fontSize = '11px';
      const groups = [...tree[cat][sub]].sort();
      if (groups.length > 0) {
        sbtn.innerHTML = `<span class="tree-arrow" style="font-size:8px">&#9654;</span> ${sub} (${subItems.length})`;
        const grpContainer = document.createElement('div');
        grpContainer.className = 'tree-children';
        grpContainer.style.display = 'none';
        sbtn.onclick = () => {
          const open = grpContainer.style.display !== 'none';
          grpContainer.style.display = open ? 'none' : 'block';
          sbtn.querySelector('.tree-arrow').innerHTML = open ? '&#9654;' : '&#9660;';
          currentFilter = ''; document.getElementById('itemSearch').value = '';
          showSub(cat, sub); setActive(sbtn);
        };
        for (const grp of groups) {
          const grpItems = subItems.filter(i => i.group_name === grp);
          const gbtn = document.createElement('button');
          gbtn.className = 'side-item';
          gbtn.style.cssText = 'padding-left:28px;font-size:10px;color:#6a8aaa;';
          gbtn.textContent = `${grp} (${grpItems.length})`;
          gbtn.onclick = (e) => { e.stopPropagation(); currentFilter=''; document.getElementById('itemSearch').value=''; showGroup(cat,sub,grp); setActive(gbtn); };
          grpContainer.appendChild(gbtn);
        }
        subDiv.appendChild(sbtn);
        subDiv.appendChild(grpContainer);
      } else {
        sbtn.textContent = `${sub} (${subItems.length})`;
        sbtn.onclick = () => { currentFilter=''; document.getElementById('itemSearch').value=''; showSub(cat,sub); setActive(sbtn); };
        subDiv.appendChild(sbtn);
      }
      childContainer.appendChild(subDiv);
    }

    catDiv.appendChild(childContainer);
    sb.appendChild(catDiv);
    if (first) { showCat(cat); first = false; btn.querySelector('.tree-arrow').innerHTML = '&#9660;'; }
  }
}

function setActive(el) { document.querySelectorAll('.side-item').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
function showCat(cat) { render(items.filter(i => i.category === cat), cat); }
function showSub(cat, sub) { render(items.filter(i => i.category === cat && (i.subcategory || 'General') === sub), cat); }
function showGroup(cat, sub, grp) { render(items.filter(i => i.category === cat && (i.subcategory || 'General') === sub && i.group_name === grp), cat); }
function searchAll() {
  const q = (document.getElementById('itemSearch').value || '').toLowerCase();
  if (!q) { document.querySelector('.side-item.active')?.click(); return; }
  const matched = items.filter(i => i.name.toLowerCase().includes(q) || i.category.toLowerCase().includes(q) || i.subcategory.toLowerCase().includes(q) || i.recipe.toLowerCase().includes(q) || Object.keys(i.stats).some(k => String(i.stats[k]).toLowerCase().includes(q) || k.toLowerCase().includes(q)));
  render(matched, matched.length > 0 ? (matched.find(i=>i.stats.dps) ? 'Weapons' : matched[0].category) : 'Raw Materials');
}

function fmtTime(s){if(!s)return'-';if(s>=3600)return(s/3600).toFixed(1)+'h';if(s>=60)return Math.round(s/60)+'m';return s+'s';}

function render(filtered, cat) {
  const el = document.getElementById('content');
  let cols = '', rowFn = null;
  if (cat === 'Weapons') {
    cols = '<th>Name</th><th>Size</th><th>Quality</th><th>Optimal Range</th><th>ROF Bonus</th><th>Tracking</th><th>Dmg Type</th><th>Class</th><th>Slot</th><th>Price</th><th>Recipe</th><th>Build</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.size||'-'}</td><td class="stat">${i.stats.quality||'-'}</td><td>${i.stats.optimal_range||'-'}</td><td>+${i.stats.rof_bonus||0}%</td><td>${i.stats.tracking||'-'}</td><td>${i.stats.damage_type||'-'}</td><td>${i.stats.weapon_class||'-'}</td><td>${i.stats.slot||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td class="recipe">${i.recipe}</td><td>${fmtTime(i.build_time)}</td>`;
  } else if (cat === 'Ammunition') {
    cols = '<th>Name</th><th>Size</th><th>Quality</th><th>Damage Type</th><th>For Weapon</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Build</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.size||'-'}</td><td class="stat">${i.stats.quality||'-'}</td><td>${i.stats.damage_type||'-'}</td><td>${i.stats.for_weapon||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td>${fmtTime(i.build_time)}</td>`;
  } else if (cat === 'Ship Equipment') {
    cols = '<th>Name</th><th>Size</th><th>Quality</th><th>Slot</th><th>HP Bonus</th><th>Price</th><th>Recipe</th><th>Build</th><th>Description</th>';
    const slotLabel = s => ({'weapon_mount':'Weapon Mount','utility_bay':'Utility Bay','core_slot':'Core Slot'}[s]||s||'-');
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.size||'-'}</td><td class="stat">${i.stats.quality||'-'}</td><td>${slotLabel(i.stats.slot)}</td><td class="stat">${i.stats.hp_bonus||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td class="recipe">${i.recipe}</td><td>${fmtTime(i.build_time)}</td><td class="desc">${i.description}</td>`;
  } else if (cat === 'Drones') {
    cols = '<th>Name</th><th>Size</th><th>Quality</th><th>Damage Type</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Build</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.size||i.stats.drone_size||'-'}</td><td class="stat">${i.stats.quality||'-'}</td><td>${i.stats.damage_type||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td>${fmtTime(i.build_time)}</td><td class="desc">${i.description}</td>`;
  } else {
    cols = '<th>Name</th><th>Price</th><th>Volume</th><th>Recipe</th><th>Build</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume} m3</td><td class="recipe">${i.recipe||'-'}</td><td>${fmtTime(i.build_time)}</td><td class="desc">${i.description}</td>`;
  }
  el.innerHTML = `<table><thead><tr>${cols}</tr></thead><tbody>${filtered.map(i => '<tr>' + rowFn(i) + '</tr>').join('')}</tbody></table>`;
}

// Column sorting
document.getElementById('content').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th) return;
  const table = th.closest('table');
  const idx = [...th.parentNode.children].indexOf(th);
  const tbody = table.querySelector('tbody');
  const rows = [...tbody.querySelectorAll('tr')];
  const dir = th.dataset.sort === 'asc' ? 'desc' : 'asc';
  th.parentNode.querySelectorAll('th').forEach(h => { h.dataset.sort = ''; const a = h.querySelector('.sa'); if(a) a.remove(); });
  th.dataset.sort = dir;
  const arrow = document.createElement('span');
  arrow.className = 'sa';
  arrow.style.cssText = 'font-size:9px;margin-left:3px;color:#4fc3f7';
  arrow.textContent = dir === 'asc' ? ' \u25B2' : ' \u25BC';
  th.appendChild(arrow);
  rows.sort((a, b) => {
    let av = a.children[idx]?.textContent.trim() || '';
    let bv = b.children[idx]?.textContent.trim() || '';
    const an = parseFloat(av.replace(/[^0-9.-]/g, ''));
    const bn = parseFloat(bv.replace(/[^0-9.-]/g, ''));
    if (!isNaN(an) && !isNaN(bn)) return dir === 'asc' ? an - bn : bn - an;
    return dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  rows.forEach(r => tbody.appendChild(r));
});

init();
</script>
</body>
</html>
