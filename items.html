const categories = [...new Set(items.map(i=>i.category))].sort();

// Build sidebar
const sb = document.getElementById('sidebar');
categories.forEach((cat,idx) => {
  const btn = document.createElement('button');
  btn.className = 'side-item' + (idx===0?' active':'');
  btn.textContent = cat + ' (' + items.filter(i=>i.category===cat).length + ')';
  btn.onclick = () => { show(cat); document.querySelectorAll('.side-item').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); };
  sb.appendChild(btn);
});

function show(cat) {
  const filtered = items.filter(i => i.category === cat);
  const el = document.getElementById('content');
  // Determine columns based on category
  let cols = '';
  let rowFn = null;

  if (cat === 'Weapons') {
    cols = '<th>Name</th><th>Size</th><th>DPS</th><th>ROF (s)</th><th>Range (km)</th><th>Tracking</th><th>Dmg Type</th><th>CPU</th><th>PG</th><th>Slot</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';

    cols = '<th>Name</th><th>Size</th><th>Damage</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';

  } else if (cat === 'Defense') {
    cols = '<th>Name</th><th>Size</th><th>Shield HP</th><th>Armor HP</th><th>Regen/Rep</th><th>CPU</th><th>PG</th><th>Slot</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.size||'-'}</td><td class="stat">${i.stats.shield_hp||'-'}</td><td class="stat">${i.stats.armor_hp||'-'}</td><td class="stat">${i.stats.regen||i.stats.repair_rate||'-'}</td><td>${i.stats.cpu||'-'}</td><td>${i.stats.pg||'-'}</td><td>${i.stats.slot||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td class="desc">${i.description}</td>`;

    cols = '<th>Name</th><th>Speed Bonus</th><th>CPU</th><th>PG</th><th>Slot</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';
    rowFn = i => `<td style="color:#e0e8f0">${i.name}</td><td class="stat">${i.stats.speed_bonus||'-'}</td><td>${i.stats.cpu||'-'}</td><td>${i.stats.pg||'-'}</td><td>${i.stats.slot||'-'}</td><td style="color:#ffd54f">${i.price.toLocaleString()}</td><td>${i.volume}</td><td class="recipe">${i.recipe}</td><td class="desc">${i.description}</td>`;

  } else if (cat === 'Mining') {
    cols = '<th>Name</th><th>Yield</th><th>Cycle (s)</th><th>CPU</th><th>PG</th><th>Slot</th><th>Price</th><th>Vol</th><th>Recipe</th><th>Description</th>';

  el.innerHTML = `<table><thead><tr>${cols}</tr></thead><tbody>${filtered.map(i=>'<tr>'+rowFn(i)+'</tr>').join('')}</tbody></table>`;
