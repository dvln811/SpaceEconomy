const catColors={'Raw Materials':'cat-raw','Refined Materials':'cat-refined','Manufactured':'cat-mfg','Components':'cat-comp','Weapons':'cat-wpn','Defense':'cat-def','Propulsion':'cat-prop','Drones':'cat-drone','Mining Equipment':'cat-mine','Ammunition':'cat-ammo','Equipment':'cat-equip','Trade Goods':'cat-trade'};
const categories=['Raw Materials','Refined Materials','Manufactured','Components','Weapons','Ammunition','Defense','Propulsion','Drones','Mining Equipment','Equipment','Trade Goods'];
let activeCat='';

// Build sidebar
const sidebar=document.getElementById('sidebar');
const allBtn=document.createElement('button');allBtn.className='cat-btn active';allBtn.textContent='All Items';
allBtn.innerHTML=`All Items <span class="cat-count">${items.length}</span>`;
allBtn.addEventListener('click',()=>{activeCat='';render();});
sidebar.appendChild(allBtn);
for(const cat of categories){
  const count=items.filter(i=>i.category===cat).length;
  if(!count)continue;
  const btn=document.createElement('button');btn.className='cat-btn';
  btn.innerHTML=`<span class="${catColors[cat]||''}">${cat}</span> <span class="cat-count">${count}</span>`;
  btn.addEventListener('click',()=>{activeCat=cat;render();});
  sidebar.appendChild(btn);
}

function render(){
  const search=document.getElementById('search').value.toLowerCase();
  let filtered=items.filter(i=>{
    if(activeCat&&i.category!==activeCat)return false;
    if(search&&!i.name.toLowerCase().includes(search)&&!i.description.toLowerCase().includes(search))return false;
    return true;
  });
  document.getElementById('count').textContent=filtered.length+' items';
  // Update active button
  sidebar.querySelectorAll('.cat-btn').forEach((b,idx)=>b.classList.toggle('active',idx===0?!activeCat:b.textContent.includes(activeCat)));
  const list=document.getElementById('list');
  list.innerHTML=filtered.map(i=>`
    <div class="item" onclick="this.classList.toggle('expanded')">
      <div class="item-header">
        <span class="item-name">${i.name}</span>
        <span class="item-cat ${catColors[i.category]||''}">${i.category}</span>
        <span class="item-vol">${i.volume} m3</span>
        <span class="item-price">${i.price.toLocaleString()} cr</span>
      </div>
      <div class="item-detail">
        <div class="item-desc">${i.description}</div>
        ${i.recipe?`<div class="item-recipe">Recipe: ${i.recipe}</div>`:''}
      </div>
    </div>
  `).join('');
}
document.getElementById('search').addEventListener('input',render);
render();
</script>
