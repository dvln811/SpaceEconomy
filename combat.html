  <line x1="24" y1="0" x2="24" y2="8" stroke="#ffa726" stroke-width="1"/>
  <line x1="24" y1="40" x2="24" y2="48" stroke="#ffa726" stroke-width="1"/>
  <line x1="0" y1="24" x2="8" y2="24" stroke="#ffa726" stroke-width="1"/>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { buildShipFromData } from '/static/ship_renderer.js';

// --- State ---
const ships = {};        // id -> {data, mesh, pos:{x,y,vx,vy}}
const shipMeshes = {};   // id -> THREE.Group
let followShipId = null;
let selectedShipId = null;
let clientPaused = false;
let scene, camera, renderer;
let mouseDown = false, lastMouse = {x:0, y:0};
let camDist = 300;

// --- Three.js Setup ---
function initScene() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 200000);
  camera.position.set(0, 200, 500);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000005);
  document.getElementById('viewport').appendChild(renderer.domElement);

  // Lighting
  scene.add(new THREE.AmbientLight(0x4fc3f7, 0.4));
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(500, 300, 200);
  scene.add(dir);
  const dir2 = new THREE.DirectionalLight(0x4488ff, 0.3);
  dir2.position.set(-300, -100, -400);
  scene.add(dir2);

  // Starfield as skybox (moves with camera so always visible)
  const starGeo = new THREE.BufferGeometry();
  const starVerts = new Float32Array(9000);
  for (let i = 0; i < 9000; i += 3) {
    const r = 50000 + Math.random() * 30000;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    starVerts[i] = r * Math.sin(ph) * Math.cos(th);
    starVerts[i+1] = r * Math.sin(ph) * Math.sin(th);
    starVerts[i+2] = r * Math.cos(ph);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starVerts, 3));
  const starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 20, sizeAttenuation: true }));
  scene.add(starField);

  // Selection reticule is a 2D overlay (see #reticule in CSS), not a 3D object

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// --- Ship Model Loading ---
let shipGeometries = null;
async function loadGeometries() {
  const resp = await fetch('/api/ship_model/all');
  shipGeometries = await resp.json();
}

function createShipMesh(shipId, geometryId, faction) {
  const geoData = shipGeometries[geometryId];
  if (!geoData) {
    // Fallback: simple triangle
    const geo = new THREE.ConeGeometry(5, 15, 4);
    const mat = new THREE.MeshPhongMaterial({ color: factionColor(faction), transparent: true, opacity: 0.7 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.z = -Math.PI / 2;
    const group = new THREE.Group();
    group.add(mesh);
    scene.add(group);
    return group;
  }
  const group = new THREE.Group();
  buildShipFromData(group, geoData, { showHardpoints: false });
  // Scale by hull class - GRAND scale (dread ~80x fighter)
  const classScale = {'Fighter':0.5,'Frigate':1.2,'Destroyer':2.5,'Cruiser':5.0,'Battlecruiser':10.0,'Battleship':15.0,'Dreadnought':40.0,'Carrier':45.0};
  const baseSize = geoData.bounds ? Math.max(geoData.bounds.length, geoData.bounds.width) : 2;
  const hullMult = classScale[geoData.hull_class] || classScale[geoData.role] || 1.0;
  const scale = (25 / baseSize) * hullMult;
  group.scale.set(scale, scale, scale);
  // Debug: forward axis line (red = +X local)
  const axisGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(2,0,0)]);
  const axisLine = new THREE.Line(axisGeo, new THREE.LineBasicMaterial({color: 0xff0000}));
  group.add(axisLine);
  scene.add(group);
  return group;
}

function factionColor(faction) {
  if (faction.includes('Terran')) return 0x4caf50;
  if (faction.includes('Free')) return 0x42a5f5;
  if (faction.includes('Iron')) return 0xce93d8;
  return 0x888888;
}

// --- Weapon Effects ---
const beamLines = [];  // {line, ttl}
const missileMeshes = []; // THREE.Mesh[]

function addBeam(srcId, tgtId, dmgType) {
  const src = ships[srcId], tgt = ships[tgtId];
  if (!src || !tgt) return;
  const colors = { 'EM': 0x6666ff, 'Thermal': 0xff8800, 'Kinetic': 0xaaaaaa, 'Explosive': 0xff4444 };
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(src.pos.x, 0, src.pos.y),
    new THREE.Vector3(tgt.pos.x, 0, tgt.pos.y)
  ]);
  const mat = new THREE.LineBasicMaterial({ color: colors[dmgType] || 0xffffff, transparent: true, opacity: 0.8 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  beamLines.push({ line, ttl: 1.0 });
}

function updateBeams(dt) {
  for (let i = beamLines.length - 1; i >= 0; i--) {
    beamLines[i].ttl -= dt * 2;
    beamLines[i].line.material.opacity = beamLines[i].ttl;
    if (beamLines[i].ttl <= 0) {
      scene.remove(beamLines[i].line);
      beamLines[i].line.geometry.dispose();
      beamLines[i].line.material.dispose();
      beamLines.splice(i, 1);
    }
  }
}

function updateMissiles(msls) {
  // Remove excess
  while (missileMeshes.length > msls.length) {
    const m = missileMeshes.pop();
    scene.remove(m);
  }
  // Add new
  while (missileMeshes.length < msls.length) {
    const geo = new THREE.SphereGeometry(3, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff6644 });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    missileMeshes.push(mesh);
  }
  // Update positions
  for (let i = 0; i < msls.length; i++) {
    missileMeshes[i].position.set(msls[i].x, 0, msls[i].y);
  }
}

// --- Camera (spherical orbit + WASD free fly) ---
let camTheta = 0.8;
let camPhi = 0.4;
let camTarget = new THREE.Vector3(0, 0, 0);
let freeCamera = true; // start in free mode
const keys = {};

function updateCamera() {
  // WASD movement - only when keys pressed, speed scales with distance, shift for boost
  const anyMove = keys['w']||keys['W']||keys['s']||keys['S']||keys['a']||keys['A']||keys['d']||keys['D']||keys['q']||keys['Q']||keys['e']||keys['E']||keys['r']||keys['R']||keys['f']||keys['F'];
  if (anyMove && freeCamera) {
    const boost = keys['Shift'] ? 5 : 1;
    const speed = camDist * 0.03 * boost;
    const fwd = new THREE.Vector3();
    camera.getWorldDirection(fwd);
    const fwdXZ = fwd.clone(); fwdXZ.y = 0; fwdXZ.normalize();
    const right = new THREE.Vector3().crossVectors(fwdXZ, new THREE.Vector3(0,1,0)).normalize();
    if (keys['w'] || keys['W']) camTarget.addScaledVector(fwdXZ, speed);
    if (keys['s'] || keys['S']) camTarget.addScaledVector(fwdXZ, -speed);
    if (keys['a'] || keys['A']) camTarget.addScaledVector(right, -speed);
    if (keys['d'] || keys['D']) camTarget.addScaledVector(right, speed);
    if (keys['q'] || keys['Q']) camTarget.y += speed;
    if (keys['e'] || keys['E']) camTarget.y -= speed;
    if (keys['r'] || keys['R']) camTarget.addScaledVector(fwd, speed);
    if (keys['f'] || keys['F']) camTarget.addScaledVector(fwd, -speed);
  }

  if (!freeCamera && followShipId && ships[followShipId]) {
    const s = ships[followShipId];
    camTarget.set(s.pos.x, 0, s.pos.y);
  }

  const x = camDist * Math.cos(camPhi) * Math.sin(camTheta);
  const y = camDist * Math.sin(camPhi);
  const z = camDist * Math.cos(camPhi) * Math.cos(camTheta);
  camera.position.set(camTarget.x + x, camTarget.y + y, camTarget.z + z);
  camera.up.set(0, Math.cos(camPhi) >= 0 ? 1 : -1, 0);
  camera.lookAt(camTarget);
}

// Keyboard
window.addEventListener('keydown', e => { keys[e.key] = true; if ('wasdqerfWASDQERF'.includes(e.key)) { if (!freeCamera && followShipId) { selectedShipId = followShipId; } freeCamera = true; } });
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Mouse controls
const vp = document.getElementById('viewport');
vp.addEventListener('mousedown', e => { if (e.button === 0) { mouseDown = true; lastMouse = {x: e.clientX, y: e.clientY}; } });
window.addEventListener('mouseup', () => { mouseDown = false; });
window.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  lastMouse = {x: e.clientX, y: e.clientY};
  camTheta -= dx * 0.005;
  camPhi += dy * 0.005;
});
vp.addEventListener('wheel', e => { camDist = Math.max(50, Math.min(5000, camDist + e.deltaY * 0.5)); e.preventDefault(); }, {passive:false});

// --- Animation Loop ---
let lastFrame = performance.now();
let missileDataCurrent = [];

function animate(now) {
  requestAnimationFrame(animate);
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;

  // Extrapolate ship positions (skip dead ships)
  if (!clientPaused) {
  for (const [id, s] of Object.entries(ships)) {
    if (!s.pos || s.dead) continue;
    s.pos.x += s.pos.vx * dt;
    s.pos.y += s.pos.vy * dt;
    const mesh = shipMeshes[id];
    if (mesh) {
      mesh.position.set(s.pos.x, 0, s.pos.y);
      // Ship model: +X is forward (red axis in designer).
      // Three.js: rotation.y=0 means facing +X. 
      // Velocity in Three.js is (vx, 0, vy_engine).
      // Angle to rotate +X toward velocity = atan2(vz, vx) but we want negative for CW
      if (Math.abs(s.pos.vx) + Math.abs(s.pos.vy) > 1) {
        const targetRot = Math.atan2(-s.pos.vy, s.pos.vx);
        let diff = targetRot - mesh.rotation.y;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        mesh.rotation.y += diff * Math.min(1, dt * 3);
      }
    }
  }

  // Extrapolate missiles + client-side removal on proximity to target
  for (let i = missileDataCurrent.length - 1; i >= 0; i--) {
    const md = missileDataCurrent[i];
    md.x += md.vx * dt;
    md.y += md.vy * dt;
    if (missileMeshes[i]) missileMeshes[i].position.set(md.x, 0, md.y);
    // Check proximity to any ship - remove if within 50 units
    for (const [sid, s] of Object.entries(ships)) {
      if (!s.pos) continue;
      const dx = md.x - s.pos.x, dy = md.y - s.pos.y;
      if (dx*dx + dy*dy < 2500) { // 50^2
        scene.remove(missileMeshes[i]);
        missileMeshes.splice(i, 1);
        missileDataCurrent.splice(i, 1);
        break;
      }
    }
  }

  }
  updateBeams(dt);
  // Update reticule - project selected ship to 2D screen, clamp to viewport edges
  const retEl = document.getElementById('reticule');
  if (selectedShipId && ships[selectedShipId] && ships[selectedShipId].pos) {
    const s = ships[selectedShipId];
    const sidebarW = document.getElementById('sidebar').offsetWidth;
    const vpW = window.innerWidth - sidebarW;
    const vpH = window.innerHeight;
    let sx, sy;
    // Always project - only pin to center if following AND selected is the same AND not free camera
    if (selectedShipId === followShipId && !freeCamera) {
      sx = sidebarW + vpW / 2;
      sy = vpH / 2;
    } else {
      const vec = new THREE.Vector3(s.pos.x, 0, s.pos.y);
      vec.project(camera);
      // Map NDC to viewport pixel coords (viewport starts at sidebarW)
      sx = sidebarW + (vec.x * 0.5 + 0.5) * vpW;
      sy = (-vec.y * 0.5 + 0.5) * vpH;
      const behind = vec.z >= 1;
      if (behind) { sx = window.innerWidth - sx; sy = vpH - sy; }
      sx = Math.max(sidebarW + 24, Math.min(window.innerWidth - 24, sx));
      sy = Math.max(24, Math.min(vpH - 24, sy));
      // Smooth for non-followed ships
      const cur = retEl._pos || {x: sx, y: sy};
      cur.x += (sx - cur.x) * 0.6;
      cur.y += (sy - cur.y) * 0.6;
      retEl._pos = cur;
      sx = cur.x; sy = cur.y;
    }
    retEl.style.display = 'block';
    retEl.style.left = (sx - 24) + 'px';
    retEl.style.top = (sy - 24) + 'px';
  } else { retEl.style.display = 'none'; }
  // Render to viewport area only (right of sidebar)
  const sbW = document.getElementById('sidebar').offsetWidth;
  const vpW2 = window.innerWidth - sbW;
  const vpH2 = window.innerHeight;
  renderer.setViewport(sbW, 0, vpW2, vpH2);
  renderer.setScissor(sbW, 0, vpW2, vpH2);
  renderer.setScissorTest(true);
  camera.aspect = vpW2 / vpH2;
  camera.updateProjectionMatrix();
  updateCamera();
  renderer.render(scene, camera);
}

// --- SSE Connection ---
const log = document.getElementById('log');

function connect() {
  const es = new EventSource('/combat/stream');
  es.onmessage = function(e) {
    const data = JSON.parse(e.data);
    if (data.type === 'init') {
      initFleets(data.fleets);
    } else if (data.type === 'tick') {
      onTick(data);
    } else if (data.type === 'event') {
      onEvent(data.event);
    } else if (data.type === 'end') {
      document.getElementById('status').textContent = 'OVER: ' + data.winner + ' wins (T' + data.ticks + ')';
      es.close();
    }
  };
}

function initFleets(fleets) {
  const fleetsEl = document.getElementById('fleets');
  fleetsEl.innerHTML = '';
  fleets.forEach((f, fi) => {
    const hdr = document.createElement('div');
    hdr.className = 'fleet-hdr f' + fi;
    hdr.textContent = f.faction + ' (' + f.count + ')' + (f.ally ? ' + ' + f.ally : '');
    fleetsEl.appendChild(hdr);
    const cards = document.createElement('div');
    cards.className = 'ship-cards';
    f.ships.forEach(s => {
      ships[s.id] = { data: s, pos: {x:0, y:0, vx:0, vy:0} };
      // Determine geometry ID from ship name/class
      const geoId = s.geometry_id || s.id;
      const mesh = createShipMesh(s.id, geoId, f.faction);
      shipMeshes[s.id] = mesh;

      const card = document.createElement('div');
      card.className = 'ship-card';
      card.id = 'card-' + s.id;
      const wpnList = s.weapons.map(w => w.name + '[' + w.size + ']').join(', ');
      const modList = s.modules.length ? s.modules.map(m => m.name).join(', ') : '';
      card.innerHTML = `<div class="sname">${s.name}</div><div class="sclass">${s.hull_class} | ${wpnList}</div>
        <div class="bars">
        <div class="bar-row bs"><span class="bl">S</span><div class="bt"><div class="bf" id="bar-s-${s.id}" style="width:100%"></div></div></div>
        <div class="bar-row ba"><span class="bl">A</span><div class="bt"><div class="bf" id="bar-a-${s.id}" style="width:100%"></div></div></div>
        <div class="bar-row bh"><span class="bl">H</span><div class="bt"><div class="bf" id="bar-h-${s.id}" style="width:100%"></div></div></div>
        <div class="bar-row bc"><span class="bl">C</span><div class="bt"><div class="bf" id="bar-c-${s.id}" style="width:100%"></div></div></div>
        </div>`;
      card.addEventListener('click', (e) => { e.stopPropagation(); selectedShipId = s.id; document.querySelectorAll('.ship-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); });
      card.addEventListener('dblclick', (e) => { e.stopPropagation(); followShipId = s.id; freeCamera = false; camDist = 150; });
      card.addEventListener('mouseenter', ev => showTooltip(ev, s));
      card.addEventListener('mouseleave', () => { document.getElementById('tooltip').style.display = 'none'; });
      cards.appendChild(card);
    });
    fleetsEl.appendChild(cards);
  });
  document.getElementById('status').textContent = 'Battle started';
}

function onTick(data) {
  document.getElementById('status').textContent = 'T' + data.tick;
  // Update positions
  if (data.pos) {
    for (const [id, p] of Object.entries(data.pos)) {
      if (ships[id] && !ships[id].dead) {
        ships[id].pos = {x: p[0], y: p[1], vx: p[2], vy: p[3]};
        // Correct mesh position
        if (shipMeshes[id]) shipMeshes[id].position.set(p[0], 0, p[1]);
      }
    }
  }
  // Update caps
  if (data.ship_caps) {
    for (const [id, cap] of Object.entries(data.ship_caps)) {
      const s = ships[id];
      if (s) {
        const el = document.getElementById('bar-c-' + id);
        if (el) el.style.width = (cap / s.data.cap * 100) + '%';
      }
    }
  }
  // Missiles
  if (data.msls) {
    missileDataCurrent = data.msls.map(m => ({...m}));
    updateMissiles(missileDataCurrent);
  }
}

function onEvent(e) {
  let msg = '';
  if (e.event === 'hit') {
    const src = ships[e.source_id], tgt = ships[e.target_id];
    msg = `<span class="lh">${src?src.data.name:'?'} -> ${tgt?tgt.data.name:'?'} [${e.weapon}] ${Math.round(e.damage)} ${e.damage_type}</span>`;
    addBeam(e.source_id, e.target_id, e.damage_type);
    updateHP(e.target_id, e.remaining_hp);
  } else if (e.event === 'miss') {
    const src = ships[e.source_id], tgt = ships[e.target_id];
    msg = `<span class="lm">${src?src.data.name:'?'} -> ${tgt?tgt.data.name:'?'} MISS</span>`;
  } else if (e.event === 'destroyed') {
    const tgt = ships[e.target_id], src = ships[e.source_id];
    msg = `<span class="ld">** ${tgt?tgt.data.name:'?'} DESTROYED **</span>`;
    if (tgt) tgt.dead = true;
    const card = document.getElementById('card-' + e.target_id);
    if (card) card.classList.add('dead');
    // Gray out the ship mesh instead of removing
    if (shipMeshes[e.target_id]) {
      shipMeshes[e.target_id].traverse(child => {
        if (child.material) {
          child.material = new THREE.MeshBasicMaterial({color: 0x333333, transparent: true, opacity: 0.4});
        }
      });
    }
  } else if (e.event === 'module_disabled') {
    msg = `<span class="lmod">${ships[e.target_id]?ships[e.target_id].data.name:'?'} MODULE OFFLINE: ${e.detail}</span>`;
  } else if (e.event === 'cap_empty') {
    msg = `<span class="lcap">${ships[e.target_id]?ships[e.target_id].data.name:'?'} CAP EMPTY</span>`;
  }
  if (msg) { log.innerHTML += msg + '<br>'; log.scrollTop = log.scrollHeight; }
}

function updateHP(id, hpStr) {
  const m = hpStr.match(/S:(-?\d+)\/(\d+) A:(-?\d+)\/(\d+) H:(-?\d+)\/(\d+)/);
  if (!m) return;
  const s=Math.max(0,+m[1]),sM=+m[2],a=Math.max(0,+m[3]),aM=+m[4],h=Math.max(0,+m[5]),hM=+m[6];
  const se=document.getElementById('bar-s-'+id), ae=document.getElementById('bar-a-'+id), he=document.getElementById('bar-h-'+id);
  if(se) se.style.width=(sM>0?s/sM*100:0)+'%';
  if(ae) ae.style.width=(aM>0?a/aM*100:0)+'%';
  if(he) he.style.width=(hM>0?h/hM*100:0)+'%';
}

function showTooltip(ev, s) {
  const tt = document.getElementById('tooltip');
  let html = `<h3>${s.name} [${s.hull_class}]</h3>`;
  html += `<div class="tt-s"><span class="tt-l">Shield:</span> ${s.shield} | <span class="tt-l">Armor:</span> ${s.armor} | <span class="tt-l">Hull:</span> ${s.hull}</div>`;
  html += `<div class="tt-s"><span class="tt-l">Cap:</span> ${s.cap} (rech: ${s.cap_recharge.toFixed(1)}/t)</div>`;
  html += `<div class="tt-s"><span class="tt-l">Weapons:</span></div>`;
  s.weapons.forEach(w => { html += `<div>  ${w.name}[${w.size}] ${w.dmg} cyc:${w.cycle}t cap:${w.cap_use}${w.ammo ? ' ammo:'+w.ammo : ''}</div>`; });
  if (s.modules.length) { html += `<div class="tt-s"><span class="tt-l">Modules:</span> ${s.modules.map(m=>m.name).join(', ')}</div>`; }
  if (Object.keys(s.ammo).length) {
    html += `<div class="tt-s"><span class="tt-l">Ammo:</span></div>`;
    for (const [k,v] of Object.entries(s.ammo)) { html += `<div>  ${k}: ${v}${v<=20?' <span class="tt-w">LOW</span>':''}</div>`; }
  }
  tt.innerHTML = html;
  tt.style.display = 'block';
  tt.style.left = (ev.clientX + 15) + 'px';
  tt.style.top = (ev.clientY + 10) + 'px';
}

function sendCmd(cmd) {
  fetch('/combat/control?cmd=' + cmd);
  if (cmd === 'pause') clientPaused = !clientPaused;
  if (cmd === 'restart') { clientPaused = false; location.reload(); }
}
window.sendCmd = sendCmd;

// --- Init ---
async function main() {
  initScene();
  await loadGeometries();
  connect();
  animate(performance.now());
}
main();
</script></body></html>
