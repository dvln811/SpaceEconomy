<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { buildShipFromData } from '/static/ship_renderer.js';

// --- State ---
const ships = {};        // id -> {data, mesh, pos:{x,y,vx,vy}}
const shipMeshes = {};   // id -> THREE.Group
const shipTrails = {};   // id -> {positions: [], line: THREE.Line}
let followShipId = null;
let selectedShipId = null;
let clientPaused = false;
let scene, camera, renderer;
let mouseDown = false, lastMouse = {x:0, y:0};
let camDist = 300;
const MAX_RENDERED_SHIPS = parseInt(new URLSearchParams(window.location.search).get('max_ships') || '1000');  // viewport cap, configurable via ?max_ships=
const HULL_PRIORITY = {'Dreadnought':100,'Carrier':90,'Battleship':80,'Battlecruiser':70,'Cruiser':60,'Destroyer':50,'Frigate':40,'Fighter':30,'Industrial':20,'Mining Barge':10};

// --- Three.js Setup ---
function initScene() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 200000);
  camera.position.set(0, 200, 500);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000005);
  document.getElementById('viewport').appendChild(renderer.domElement);

  // Lighting
  scene.add(new THREE.AmbientLight(0x4fc3f7, 0.4));
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(500, 300, 200);
  scene.add(dir);
  const dir2 = new THREE.DirectionalLight(0x4488ff, 0.3);
  dir2.position.set(-300, -100, -400);
  scene.add(dir2);

  // Starfield - large scale to match battle area
  const starGeo = new THREE.BufferGeometry();
  const starCount = 6000;
  const starVerts = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i += 3) {
    const r = 80000 + Math.random() * 120000;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    starVerts[i] = r * Math.sin(ph) * Math.cos(th);
    starVerts[i+1] = r * Math.sin(ph) * Math.sin(th);
    starVerts[i+2] = r * Math.cos(ph);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starVerts, 3));
  const starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 40, sizeAttenuation: true }));
  scene.add(starField);

  // Selection reticule is a 2D overlay (see #reticule in CSS), not a 3D object

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// --- Ship Model Loading ---
let shipGeometries = null;
async function loadGeometries() {
  const resp = await fetch('/api/ship_model/all');
  shipGeometries = await resp.json();
}

function createShipMesh(shipId, geometryId, faction) {
  const geoData = shipGeometries[geometryId];
  if (!geoData) {
    const geo = new THREE.ConeGeometry(5, 15, 4);
    const mat = new THREE.MeshPhongMaterial({ color: factionColor(faction), transparent: true, opacity: 0.7 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.z = -Math.PI / 2;
    const group = new THREE.Group();
    group.add(mesh);
    scene.add(group);
    return group;
  }
  // Build full mesh, then merge all child geometries into one for fewer draw calls
  const tempGroup = new THREE.Group();
  buildShipFromData(tempGroup, geoData, { showHardpoints: false });

  const classScale = {'Fighter':0.5,'Frigate':1.2,'Destroyer':2.5,'Cruiser':5.0,'Battlecruiser':10.0,'Battleship':25.0,'Carrier':32.0,'Dreadnought':100.0};
  const baseSize = geoData.bounds ? Math.max(geoData.bounds.length, geoData.bounds.width) : 100;
  const hullMult = classScale[geoData.hull_class] || classScale[geoData.role] || 1.0;
  const scale = (2500 / baseSize) * hullMult;

  // Merge all mesh geometries into one
  const geometries = [];
  tempGroup.updateMatrixWorld(true);
  tempGroup.traverse(child => {
    if (child.isMesh && child.geometry) {
      const cloned = child.geometry.clone();
      cloned.applyMatrix4(child.matrixWorld);
      geometries.push(cloned);
    }
  });

  const group = new THREE.Group();
  if (geometries.length > 0) {
    const merged = mergeBufferGeometries(geometries);
    if (merged) {
      const mat = new THREE.MeshPhongMaterial({color:0x0a1428, emissive:0x0a1428, shininess:0, transparent:true, opacity:0.7});
      const mesh = new THREE.Mesh(merged, mat);
      // Edge wireframe on merged mesh
      const edges = new THREE.EdgesGeometry(merged, 15);
      mesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x4fc3f7, transparent:true, opacity:0.5})));
      group.add(mesh);
    }
  }
  group.scale.set(scale, scale, scale);
  scene.add(group);

  // Dispose temp
  geometries.forEach(g => g.dispose());
  return group;
}

// Simple buffer geometry merge (avoids importing BufferGeometryUtils)
function mergeBufferGeometries(geos) {
  let totalVerts = 0, totalIdx = 0;
  const indexed = geos.filter(g => g.index);
  const nonIndexed = geos.filter(g => !g.index);
  // Convert all to non-indexed for simplicity
  const all = geos.map(g => {
    if (g.index) { return g.toNonIndexed(); }
    return g;
  });
  all.forEach(g => { totalVerts += g.attributes.position.count; });
  if (totalVerts === 0) return null;
  const positions = new Float32Array(totalVerts * 3);
  const normals = new Float32Array(totalVerts * 3);
  let offset = 0;
  for (const g of all) {
    const pos = g.attributes.position.array;
    positions.set(pos, offset * 3);
    if (g.attributes.normal) normals.set(g.attributes.normal.array, offset * 3);
    offset += g.attributes.position.count;
  }
  const merged = new THREE.BufferGeometry();
  merged.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  merged.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
  return merged;
}

function factionColor(faction) {
  if (faction.includes('Terran')) return 0x4caf50;
  if (faction.includes('Free')) return 0x42a5f5;
  if (faction.includes('Iron')) return 0xce93d8;
  return 0x888888;
}

// --- Weapon Effects ---
const beamLines = [];  // {line, ttl}
const missileMeshes = []; // THREE.Mesh[]

function addBeam(srcId, tgtId, dmgType) {
  const src = ships[srcId], tgt = ships[tgtId];
  if (!src || !tgt) return;
  const colors = { 'EM': 0x6666ff, 'Thermal': 0xff8800, 'Kinetic': 0xaaaaaa, 'Explosive': 0xff4444 };
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(src.pos.x, src.pos.z||0, src.pos.y),
    new THREE.Vector3(tgt.pos.x, tgt.pos.z||0, tgt.pos.y)
  ]);
  const mat = new THREE.LineBasicMaterial({ color: colors[dmgType] || 0xffffff, transparent: true, opacity: 0.8 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  beamLines.push({ line, ttl: 1.0 });
}

function updateBeams(dt) {
  for (let i = beamLines.length - 1; i >= 0; i--) {
    beamLines[i].ttl -= dt * 2;
    beamLines[i].line.material.opacity = beamLines[i].ttl;
    if (beamLines[i].ttl <= 0) {
      scene.remove(beamLines[i].line);
      beamLines[i].line.geometry.dispose();
      beamLines[i].line.material.dispose();
      beamLines.splice(i, 1);
    }
  }
}

function updateMissiles(msls) {
  // Remove excess
  while (missileMeshes.length > msls.length) {
    const m = missileMeshes.pop();
    scene.remove(m);
  }
  // Add new
  while (missileMeshes.length < msls.length) {
    const geo = new THREE.SphereGeometry(3, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff6644 });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    missileMeshes.push(mesh);
  }
  // Update positions
  for (let i = 0; i < msls.length; i++) {
    missileMeshes[i].position.set(msls[i].x, msls[i].z||0, msls[i].y);
  }
}

// --- Camera (spherical orbit + WASD free fly) ---
let camTheta = 0.8;
let camPhi = 0.4;
let camTarget = new THREE.Vector3(0, 0, 0);
let freeCamera = true; // start in free mode
const keys = {};

function updateCamera() {
  // WASD movement - only when keys pressed, speed scales with distance, shift for boost
  const anyMove = keys['w']||keys['s']||keys['a']||keys['d']||keys[' ']||keys['c']||keys['r']||keys['f'];
  if (anyMove && freeCamera) {
    const boost = keys['shift'] ? 5 : 1;
    const speed = camDist * 0.03 * boost;
    const fwd = new THREE.Vector3();
    camera.getWorldDirection(fwd);
    const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
    const up = new THREE.Vector3(0,1,0);
    if (keys['w']) camTarget.addScaledVector(fwd, speed);
    if (keys['s']) camTarget.addScaledVector(fwd, -speed);
    if (keys['a']) camTarget.addScaledVector(right, -speed);
    if (keys['d']) camTarget.addScaledVector(right, speed);
    if (keys[' ']) camTarget.addScaledVector(up, speed);
    if (keys['c']) camTarget.addScaledVector(up, -speed);
    if (keys['r']) camTarget.addScaledVector(fwd, speed * 2);
    if (keys['f']) camTarget.addScaledVector(fwd, -speed * 2);
  }

  if (!freeCamera && followShipId && ships[followShipId]) {
    const s = ships[followShipId];
    camTarget.set(s.pos.x, s.pos.z||0, s.pos.y);
  }

  const x = camDist * Math.cos(camPhi) * Math.sin(camTheta);
  const y = camDist * Math.sin(camPhi);
  const z = camDist * Math.cos(camPhi) * Math.cos(camTheta);
  camera.position.set(camTarget.x + x, camTarget.y + y, camTarget.z + z);
  camera.up.set(0, Math.cos(camPhi) >= 0 ? 1 : -1, 0);
  camera.lookAt(camTarget);
}

// Keyboard
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.shiftKey) keys['shift'] = true;
  if ('wasdcrf'.includes(e.key.toLowerCase()) || e.key === ' ') { if (!freeCamera && followShipId) { selectedShipId = followShipId; } freeCamera = true; }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; if (!e.shiftKey) keys['shift'] = false; });

// Mouse controls
const vp = document.getElementById('viewport');
vp.addEventListener('mousedown', e => { if (e.button === 0) { mouseDown = true; lastMouse = {x: e.clientX, y: e.clientY}; } });
window.addEventListener('mouseup', () => { mouseDown = false; });
window.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  lastMouse = {x: e.clientX, y: e.clientY};
  camTheta -= dx * 0.005;
  camPhi += dy * 0.005;
});
vp.addEventListener('wheel', e => { camDist = Math.max(50, Math.min(5000, camDist + e.deltaY * 0.5)); e.preventDefault(); }, {passive:false});

// --- Animation Loop ---
let lastFrame = performance.now();
let missileDataCurrent = [];
// FPS stats
const _statsEl = document.createElement('div');
_statsEl.style.cssText = 'position:fixed;top:5px;right:5px;color:#4fc3f7;font:11px monospace;background:#000a;padding:4px 8px;border-radius:3px;z-index:9999;pointer-events:none';
document.body.appendChild(_statsEl);
let _sf=0, _st=performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  _sf++; if(now-_st>500){_statsEl.textContent=`${Math.round(_sf*1000/(now-_st))} FPS | ${renderer.info.render.calls} draws | ${renderer.info.render.triangles} tris`;_sf=0;_st=now;}

  // Viewport cap: only show MAX_RENDERED_SHIPS, prioritize by hull size
  const aliveIds = Object.keys(ships).filter(id => !ships[id].dead && shipMeshes[id]);
  if (aliveIds.length > MAX_RENDERED_SHIPS) {
    aliveIds.sort((a,b) => (HULL_PRIORITY[ships[b].data?.hull_class]||0) - (HULL_PRIORITY[ships[a].data?.hull_class]||0));
    for (let i = 0; i < aliveIds.length; i++) {
      if (shipMeshes[aliveIds[i]]) shipMeshes[aliveIds[i]].visible = (i < MAX_RENDERED_SHIPS);
    }
  }

  // Extrapolate ship positions (skip dead ships)
  if (!clientPaused) {
  for (const [id, s] of Object.entries(ships)) {
    if (!s.pos || s.dead) continue;
    // Pure lerp from start to predicted end over 1 second
    s.pos.t = Math.min((s.pos.t||0) + dt, 1.2);
    const t = Math.min(s.pos.t, 1.0);
    if (s.pos.sx !== undefined) {
      s.pos.x = s.pos.sx + (s.pos.ex - s.pos.sx) * t;
      s.pos.y = s.pos.sy + (s.pos.ey - s.pos.sy) * t;
      s.pos.z = s.pos.sz + (s.pos.ez - s.pos.sz) * t;
    }
    const mesh = shipMeshes[id];
    if (mesh) {
      mesh.position.set(s.pos.x, s.pos.z||0, s.pos.y);
      // Ship model: +X is forward (red axis in designer).
      // Three.js: rotation.y=0 means facing +X. 
      // Velocity in Three.js is (vx, 0, vy_engine).
      // Angle to rotate +X toward velocity = atan2(vz, vx) but we want negative for CW
      if (Math.abs(s.pos.vx) + Math.abs(s.pos.vy) > 1) {
        const targetRot = Math.atan2(-s.pos.vy, s.pos.vx);
        let diff = targetRot - mesh.rotation.y;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        mesh.rotation.y += diff * Math.min(1, dt * 2);
      }
    }
    // Update engine trail (skip dreadnoughts)
    const shipHullClass = ships[id].data ? ships[id].data.hull_class : '';
    if (shipHullClass === 'Dreadnought') continue;
    if (!shipTrails[id]) {
      const trailGeo = new THREE.BufferGeometry();
      const positions = new Float32Array(90 * 3); // 30 trail points
      trailGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      trailGeo.setDrawRange(0, 0);
      const trailMat = new THREE.LineBasicMaterial({ color: 0x2288ff, transparent: true, opacity: 0.4 });
      const trailLine = new THREE.Line(trailGeo, trailMat);
      trailLine.frustumCulled = false;
      scene.add(trailLine);
      shipTrails[id] = { points: [], line: trailLine, timer: 0 };
    }
    const trail = shipTrails[id];
    trail.timer += dt;
    if (trail.timer > 0.1) { // add point every 100ms
      trail.timer = 0;
      // Offset trail origin to rear of ship (capped so it doesn't go too far for large ships)
      const mesh = shipMeshes[id];
      const rearOffset = mesh ? Math.min(mesh.scale.x * 0.4, 80) : 5;
      const angle = mesh ? mesh.rotation.y : 0;
      const tx = s.pos.x - Math.cos(angle) * rearOffset;
      const tz = s.pos.y + Math.sin(angle) * rearOffset;
      trail.points.push(tx, s.pos.z||0, tz);
      if (trail.points.length > 90) trail.points.splice(0, 3);
      const arr = trail.line.geometry.attributes.position.array;
      for (let j = 0; j < trail.points.length; j++) arr[j] = trail.points[j];
      trail.line.geometry.attributes.position.needsUpdate = true;
      trail.line.geometry.setDrawRange(0, trail.points.length / 3);
    }
  }

  // Extrapolate missiles + client-side removal on proximity to target
  for (let i = missileDataCurrent.length - 1; i >= 0; i--) {
    const md = missileDataCurrent[i];
    md.x += md.vx * dt;
    md.y += md.vy * dt;
    md.z = (md.z||0) + (md.vz||0) * dt;
    if (missileMeshes[i]) missileMeshes[i].position.set(md.x, md.z||0, md.y);
    // Check proximity to any ship - remove if within 50 units
    for (const [sid, s] of Object.entries(ships)) {
      if (!s.pos) continue;
      const dx = md.x - s.pos.x, dy = md.y - s.pos.y, dz = (md.z||0) - (s.pos.z||0);
      if (dx*dx + dy*dy + dz*dz < 2500) { // 50^2
        scene.remove(missileMeshes[i]);
        missileMeshes.splice(i, 1);
        missileDataCurrent.splice(i, 1);
        break;
      }
    }
  }

  }
  updateBeams(dt);
  updateRegroup(dt);
  // Update reticule - project selected ship to 2D screen, clamp to viewport edges
  const retEl = document.getElementById('reticule');
  if (selectedShipId && ships[selectedShipId] && ships[selectedShipId].pos) {
    const s = ships[selectedShipId];
    const sidebarW = document.getElementById('sidebar').offsetWidth;
    const vpW = window.innerWidth - sidebarW;
    const vpH = window.innerHeight;
    let sx, sy;
    // Always project - only pin to center if following AND selected is the same AND not free camera
    if (selectedShipId === followShipId && !freeCamera) {
      sx = sidebarW + vpW / 2;
      sy = vpH / 2;
    } else {
      const vec = new THREE.Vector3(s.pos.x, s.pos.z||0, s.pos.y);
      vec.project(camera);
      // Map NDC to viewport pixel coords (viewport starts at sidebarW)
      sx = sidebarW + (vec.x * 0.5 + 0.5) * vpW;
      sy = (-vec.y * 0.5 + 0.5) * vpH;
      const behind = vec.z >= 1;
      if (behind) { sx = window.innerWidth - sx; sy = vpH - sy; }
      sx = Math.max(sidebarW + 24, Math.min(window.innerWidth - 24, sx));
      sy = Math.max(24, Math.min(vpH - 24, sy));
      // Smooth for non-followed ships
      const cur = retEl._pos || {x: sx, y: sy};
      cur.x += (sx - cur.x) * 0.6;
      cur.y += (sy - cur.y) * 0.6;
      retEl._pos = cur;
      sx = cur.x; sy = cur.y;
    }
    retEl.style.display = 'block';
    retEl.style.left = (sx - 24) + 'px';
    retEl.style.top = (sy - 24) + 'px';
  } else { retEl.style.display = 'none'; }
  // Render to viewport area only (right of sidebar)
  const sbW = document.getElementById('sidebar').offsetWidth;
  const vpW2 = window.innerWidth - sbW;
  const vpH2 = window.innerHeight;
  renderer.setViewport(sbW, 0, vpW2, vpH2);
  renderer.setScissor(sbW, 0, vpW2, vpH2);
  renderer.setScissorTest(true);
  camera.aspect = vpW2 / vpH2;
  camera.updateProjectionMatrix();
  updateCamera();
  renderer.render(scene, camera);
}

// --- SSE Connection ---
const log = document.getElementById('log');

function connect() {
  const params = new URLSearchParams(window.location.search);
  const sz = params.get('fleet_size') || 22;
  document.getElementById('fleetSize').value = sz;
  const es = new EventSource('/combat/stream?fleet_size=' + sz);
  es.onmessage = function(e) {
    const data = JSON.parse(e.data);
    if (data.type === 'init') {
      initFleets(data.fleets);
    } else if (data.type === 'tick') {
      onTick(data);
    } else if (data.type === 'event') {
      onEvent(data.event);
    } else if (data.type === 'end') {
      document.getElementById('status').textContent = 'OVER: ' + data.winner + ' wins (T' + data.ticks + ')';
      es.close();
      // Regroup survivors to largest ship, then orbit
      startRegroupOrbit();
    }
  };
}

function startRegroupOrbit() {
  // Hold position: just zero out velocities so ships stay where they are
  for (const [id, s] of Object.entries(ships)) {
    if (s.dead || !s.pos) continue;
    s.pos.vx = 0;
    s.pos.vy = 0;
    s.pos.vz = 0;
  }
}

function updateRegroup(dt) {}

function initFleets(fleets) {
  const fleetsEl = document.getElementById('fleets');
  fleetsEl.innerHTML = '';
  fleets.forEach((f, fi) => {
    const hdr = document.createElement('div');
    hdr.className = 'fleet-hdr f' + fi;
    hdr.textContent = f.faction + ' (' + f.count + ')';
    fleetsEl.appendChild(hdr);
    f.ships.forEach(s => {
      ships[s.id] = { data: s, pos: {x:0, y:0, z:0, vx:0, vy:0, vz:0} };
      const geoId = s.geometry_id || s.id;
      const mesh = createShipMesh(s.id, geoId, f.faction);
      shipMeshes[s.id] = mesh;

      const item = document.createElement('div');
      item.className = 'list-item';
      item.id = 'card-' + s.id;
      item.dataset.id = s.id;
      item.dataset.type = 'ship';
      const fColor = ['#4caf50','#42a5f5','#ce93d8'][fi] || '#888';
      item.innerHTML = `<div class="li-icon" style="background:${fColor}"></div><span class="li-name">${s.name}</span><span class="li-class">${s.hull_class}</span><span class="li-dist">--</span>`;
      item.addEventListener('click', (e) => { e.stopPropagation(); selectedShipId = s.id; document.querySelectorAll('.list-item').forEach(c=>c.classList.remove('selected')); item.classList.add('selected'); });
      item.addEventListener('dblclick', (e) => { e.stopPropagation(); followShipId = s.id; freeCamera = false; camDist = 150; });
      item.addEventListener('mouseenter', ev => showTooltip(ev, s));
      item.addEventListener('mouseleave', () => { document.getElementById('tooltip').style.display = 'none'; });
      fleetsEl.appendChild(item);
    });
  });
  // Filter dropdown
  document.getElementById('filterBtn').addEventListener('click', () => {
    document.getElementById('filter-dropdown').classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#filters')) document.getElementById('filter-dropdown').classList.remove('open');
  });
  document.querySelectorAll('#filter-dropdown input').forEach(cb => {
    cb.addEventListener('change', () => {
      const checked = {};
      document.querySelectorAll('#filter-dropdown input').forEach(c => { checked[c.dataset.class] = c.checked; });
      document.querySelectorAll('.list-item').forEach(item => {
        const id = item.dataset.id;
        const s = ships[id];
        if (!s) return;
        if (s.dead) {
          item.style.display = checked['Wreck'] ? '' : 'none';
        } else {
          const hc = s.data ? s.data.hull_class : '';
          item.style.display = checked[hc] !== false ? '' : 'none';
        }
      });
    });
  });
  document.getElementById('status').textContent = 'Battle started';
}

function onTick(data) {
  document.getElementById('status').textContent = 'T' + data.tick;
  // Update positions
  if (data.pos) {
    for (const [id, p] of Object.entries(data.pos)) {
      if (ships[id] && !ships[id].dead) {
        const s = ships[id];
        const serverX = p[0], serverY = p[1], serverZ = p[4]||0;
        const serverVx = p[2], serverVy = p[3], serverVz = p[5]||0;
        const errX = serverX - s.pos.x, errY = serverY - s.pos.y, errZ = serverZ - (s.pos.z||0);
        const errDist = Math.sqrt(errX*errX + errY*errY + errZ*errZ);
        if (errDist > 800) {
          s.pos.x = serverX; s.pos.y = serverY; s.pos.z = serverZ;
        }
        // Lerp endpoints: start from current pos, end at predicted next-tick pos
        s.pos.sx = s.pos.x; s.pos.sy = s.pos.y; s.pos.sz = s.pos.z||0;
        s.pos.ex = serverX + serverVx * 0.92;
        s.pos.ey = serverY + serverVy * 0.92;
        s.pos.ez = serverZ + serverVz * 0.92;
        s.pos.vx = serverVx; s.pos.vy = serverVy; s.pos.vz = serverVz;
        s.pos.t = 0;
      }
    }
  }
  // Update caps
  if (data.ship_caps) {
    for (const [id, cap] of Object.entries(data.ship_caps)) {
      const s = ships[id];
      if (s) {
        const el = document.getElementById('bar-c-' + id);
        if (el) el.style.width = (cap / s.data.cap * 100) + '%';
      }
    }
  }
  // Missiles
  if (data.msls) {
    missileDataCurrent = data.msls.map(m => ({...m}));
    updateMissiles(missileDataCurrent);
  }
  // Handle batched events
  if (data.events) { for (const e of data.events) onEvent(e); }
}

function onEvent(e) {
  let msg = '';
  if (e.event === 'hit') {
    const src = ships[e.source_id], tgt = ships[e.target_id];
    msg = `<span class="lh">${src?src.data.name:'?'} -> ${tgt?tgt.data.name:'?'} [${e.weapon}] ${Math.round(e.damage)} ${e.damage_type}</span>`;
    addBeam(e.source_id, e.target_id, e.damage_type);
    updateHP(e.target_id, e.remaining_hp);
  } else if (e.event === 'miss') {
    const src = ships[e.source_id], tgt = ships[e.target_id];
    msg = `<span class="lm">${src?src.data.name:'?'} -> ${tgt?tgt.data.name:'?'} MISS</span>`;
  } else if (e.event === 'destroyed') {
    const tgt = ships[e.target_id], src = ships[e.source_id];
    msg = `<span class="ld">** ${tgt?tgt.data.name:'?'} DESTROYED **</span>`;
    if (tgt) { tgt.dead = true; tgt.pos.vx = 0; tgt.pos.vy = 0; }
    const card = document.getElementById('card-' + e.target_id);
    if (card) { card.classList.add('dead'); card.dataset.type = 'wreck'; card.querySelector('.li-name').textContent = 'Loot Container'; }
    // Replace mesh with billboard or gray wreck based on hull class
    if (shipMeshes[e.target_id]) {
      const mesh = shipMeshes[e.target_id];
      const hullClass = tgt ? tgt.data.hull_class : '';
      const bigShip = ['Battlecruiser','Battleship','Carrier','Dreadnought'].includes(hullClass);
      if (bigShip) {
        // Large ships: keep geometry, gray out
        mesh.traverse(child => {
          if (child.material) child.material = new THREE.MeshBasicMaterial({color:0x333333,transparent:true,opacity:0.4});
        });
        // Remove engine trail
        if (shipTrails[e.target_id]) {
          scene.remove(shipTrails[e.target_id].line);
          shipTrails[e.target_id].line.geometry.dispose();
          shipTrails[e.target_id].line.material.dispose();
          delete shipTrails[e.target_id];
        }
      } else {
        // Small ships: dispose geometry and replace with gray billboard
        mesh.traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) { if (child.material.map) child.material.map.dispose(); child.material.dispose(); }
        });
        scene.remove(mesh);
        // Clean up trail
        if (shipTrails[e.target_id]) {
          scene.remove(shipTrails[e.target_id].line);
          shipTrails[e.target_id].line.geometry.dispose();
          shipTrails[e.target_id].line.material.dispose();
          delete shipTrails[e.target_id];
        }
        const size = ({'Fighter':8,'Frigate':12,'Destroyer':18,'Cruiser':25}[hullClass]) || 12;
        const canvas2d = document.createElement('canvas');
        canvas2d.width=16; canvas2d.height=16;
        const ctx=canvas2d.getContext('2d');
        ctx.fillStyle='#444'; ctx.globalAlpha=0.7; ctx.fillRect(2,2,12,12);
        const tex = new THREE.CanvasTexture(canvas2d);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
        sprite.scale.set(size,size,1);
        sprite.position.copy(mesh.position);
        scene.add(sprite);
        shipMeshes[e.target_id] = sprite;
      }
      // Add loot marker
      const lootCanvas = document.createElement('canvas');
      lootCanvas.width=8; lootCanvas.height=8;
      const lctx=lootCanvas.getContext('2d');
      lctx.fillStyle='#ffd54f'; lctx.globalAlpha=0.9;
      lctx.beginPath(); lctx.arc(4,4,3,0,Math.PI*2); lctx.fill();
      const lootTex = new THREE.CanvasTexture(lootCanvas);
      const lootSprite = new THREE.Sprite(new THREE.SpriteMaterial({map:lootTex,transparent:true}));
      lootSprite.scale.set(10,10,1);
      lootSprite.position.set(mesh.position.x, mesh.position.y + 5, mesh.position.z);
      scene.add(lootSprite);
    }
  } else if (e.event === 'module_disabled') {
    msg = `<span class="lmod">${ships[e.target_id]?ships[e.target_id].data.name:'?'} MODULE OFFLINE: ${e.detail}</span>`;
  } else if (e.event === 'cap_empty') {
    msg = `<span class="lcap">${ships[e.target_id]?ships[e.target_id].data.name:'?'} CAP EMPTY</span>`;
  }
  if (msg) { log.insertAdjacentHTML('beforeend', msg + '<br>'); while (log.childNodes.length > 50) log.removeChild(log.firstChild); log.scrollTop = log.scrollHeight; }
}

function updateHP(id, hpStr) {
  const m = hpStr.match(/S:(-?\d+)\/(\d+) A:(-?\d+)\/(\d+) H:(-?\d+)\/(\d+)/);
  if (!m) return;
  const s=Math.max(0,+m[1]),sM=+m[2],a=Math.max(0,+m[3]),aM=+m[4],h=Math.max(0,+m[5]),hM=+m[6];
  const se=document.getElementById('bar-s-'+id), ae=document.getElementById('bar-a-'+id), he=document.getElementById('bar-h-'+id);
  if(se) se.style.width=(sM>0?s/sM*100:0)+'%';
  if(ae) ae.style.width=(aM>0?a/aM*100:0)+'%';
  if(he) he.style.width=(hM>0?h/hM*100:0)+'%';
}

function showTooltip(ev, s) {
  const tt = document.getElementById('tooltip');
  let html = `<h3>${s.name} [${s.hull_class}]</h3>`;
  html += `<div class="tt-s"><span class="tt-l">Shield:</span> ${s.shield} | <span class="tt-l">Armor:</span> ${s.armor} | <span class="tt-l">Hull:</span> ${s.hull}</div>`;
  html += `<div class="tt-s"><span class="tt-l">Cap:</span> ${s.cap} (rech: ${s.cap_recharge.toFixed(1)}/t)</div>`;
  html += `<div class="tt-s"><span class="tt-l">Weapons:</span></div>`;
  s.weapons.forEach(w => { html += `<div>  ${w.name}[${w.size}] ${w.dmg} cyc:${w.cycle}t cap:${w.cap_use}${w.ammo ? ' ammo:'+w.ammo : ''}</div>`; });
  if (s.modules.length) { html += `<div class="tt-s"><span class="tt-l">Modules:</span> ${s.modules.map(m=>m.name).join(', ')}</div>`; }
  if (Object.keys(s.ammo).length) {
    html += `<div class="tt-s"><span class="tt-l">Ammo:</span></div>`;
    for (const [k,v] of Object.entries(s.ammo)) { html += `<div>  ${k}: ${v}${v<=20?' <span class="tt-w">LOW</span>':''}</div>`; }
  }
  tt.innerHTML = html;
  tt.style.display = 'block';
  // Position aware of screen edges
  const ttRect = tt.getBoundingClientRect();
  let x = ev.clientX + 15;
  let y = ev.clientY + 10;
  if (x + 260 > window.innerWidth) x = ev.clientX - 265;
  if (y + ttRect.height > window.innerHeight) y = ev.clientY - ttRect.height - 10;
  if (y < 0) y = 10;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function sendCmd(cmd) {
  fetch('/combat/control?cmd=' + cmd);
  if (cmd === 'pause') clientPaused = !clientPaused;
  if (cmd === 'restart') { clientPaused = false; const sz = document.getElementById('fleetSize').value || 22; window.location.href = '/combat?fleet_size=' + sz; }
}
window.sendCmd = sendCmd;

// --- Init ---
async function main() {
  initScene();
  await loadGeometries();
  connect();
  animate(performance.now());
}
main();
