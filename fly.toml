app = 'spaceeconomy'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'se_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
