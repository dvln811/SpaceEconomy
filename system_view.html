<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Economy - System View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#05080f;color:#c8d4e0;font-family:'JetBrains Mono',monospace;font-size:13px}
.app{display:grid;grid-template-columns:1fr 280px;grid-template-rows:48px 1fr;height:100vh;gap:1px;background:#1a2030}
.header{grid-column:1/-1;background:#0a0f1a;border-bottom:1px solid #1a2844;display:flex;align-items:center;padding:0 20px;gap:16px}
.header h1{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#4fc3f7;letter-spacing:3px;text-transform:uppercase}
.header .system-name{font-family:'Orbitron',sans-serif;font-size:12px;color:#ffd54f;letter-spacing:1px}
.header .meta{font-size:11px;color:#5a7a9a;margin-left:auto}
.header a{font-size:10px;color:#5a7a9a;text-decoration:none;padding:5px 12px;border:1px solid #1a2844;border-radius:3px;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',sans-serif;transition:all .15s}
.header a:hover{color:#4fc3f7;border-color:#4fc3f7}
.map-area{background:#05080f;position:relative;overflow:hidden}
.map-area canvas{width:100%;height:100%}
.panel{background:#0a0e18;overflow-y:auto;padding:12px;border-left:1px solid #1a2844}
.panel-title{font-family:'Orbitron',sans-serif;font-size:10px;color:#4a6a8a;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #152238}
.obj-item{padding:6px 8px;border-radius:4px;margin-bottom:4px;border:1px solid transparent;font-size:11px;cursor:pointer;transition:all .15s}
.obj-item:hover{background:#111a2a;border-color:#1a3050}
.obj-item.active{background:#0d1a2f;border-color:#4fc3f7}
.obj-type{font-size:9px;color:#5a7a9a;text-transform:uppercase;letter-spacing:1px}
.obj-name{color:#e0e8f0;font-size:11px}
.ship-item{padding:5px 8px;margin-bottom:3px;font-size:10px;border-left:2px solid #4fc3f7;padding-left:8px}
.ship-item.miner{border-color:#ffd54f}
.ship-state{color:#5a7a9a;font-size:9px}
.legend{margin-top:16px;padding-top:12px;border-top:1px solid #152238}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:10px;color:#6a8aa0}
.legend-dot{width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1>System View</h1>
  <span class="system-name" id="system-title">Loading...</span>
  <span class="meta" id="system-meta"></span>
  <a href="/" id="back-link">Galaxy Map</a>
</div>
<div class="map-area">
  <canvas id="radar"></canvas>
</div>
<div class="panel">
  <div class="panel-title">Objects</div>
  <div id="objects-list"></div>
  <div class="panel-title" style="margin-top:16px">Ships In System</div>
  <div id="ships-list"></div>
  <div class="legend">
    <div class="panel-title">Legend</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffd54f"></div>Star</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ab47bc"></div>Jump Gate</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4fc3f7"></div>Station</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff8a65"></div>Asteroid Belt</div>
    <div class="legend-item"><div class="legend-dot" style="background:#66bb6a"></div>Planet</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef5350;width:6px;height:6px"></div>Ship</div>
  </div>
</div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const systemId = params.get('id') || 'cygnus';
const debugMode = params.get('debug') === '1';

const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');
let systemData = null;
let selectedObj = null;

const COLORS = {
  star: '#ffd54f',
  gate: '#ab47bc',
  station: '#4fc3f7',
  asteroid_belt: '#ff8a65',
  planet: '#66bb6a',
  ship: '#ef5350',
};

function resize() {
  const parent = canvas.parentElement;
  canvas.width = parent.clientWidth * devicePixelRatio;
  canvas.height = parent.clientHeight * devicePixelRatio;
  canvas.style.width = parent.clientWidth + 'px';
  canvas.style.height = parent.clientHeight + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

function polarToScreen(distance, angle, cx, cy, scale) {
  return {
    x: cx + distance * scale * Math.cos(angle),
    y: cy + distance * scale * Math.sin(angle),
  };
}

function draw() {
  if (!systemData) return;
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  const cx = w / 2;
  const cy = h / 2;
  const maxDist = Math.max(...systemData.objects.map(o => o.distance), 5);
  const scale = Math.min(w, h) * 0.4 / maxDist;

  // Draw orbital rings (faint)
  const rings = new Set(systemData.objects.map(o => o.distance).filter(d => d > 0));
  rings.forEach(r => {
    ctx.beginPath();
    ctx.arc(cx, cy, r * scale, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(26,40,68,0.5)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Draw grid lines (radar style)
  ctx.strokeStyle = 'rgba(26,40,68,0.3)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * maxDist * scale * 1.2, cy + Math.sin(angle) * maxDist * scale * 1.2);
    ctx.stroke();
  }

  // Draw objects
  systemData.objects.forEach(obj => {
    const pos = polarToScreen(obj.distance, obj.angle, cx, cy, scale);
    const color = COLORS[obj.type] || '#5a7a9a';
    const isSelected = selectedObj === obj.id;

    // Glow
    const grd = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, obj.type === 'star' ? 20 : 12);
    grd.addColorStop(0, color + '44');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, obj.type === 'star' ? 20 : 12, 0, Math.PI * 2);
    ctx.fill();

    // Object marker
    ctx.beginPath();
    let size = obj.type === 'star' ? 8 : obj.type === 'planet' ? 5 : obj.type === 'gate' ? 6 : 4;
    if (obj.type === 'gate') {
      // Diamond shape for gates
      ctx.moveTo(pos.x, pos.y - size);
      ctx.lineTo(pos.x + size, pos.y);
      ctx.lineTo(pos.x, pos.y + size);
      ctx.lineTo(pos.x - size, pos.y);
      ctx.closePath();
    } else if (obj.type === 'asteroid_belt') {
      // Dashed arc for belts
      ctx.setLineDash([3, 4]);
      ctx.arc(cx, cy, obj.distance * scale, obj.angle - 0.3, obj.angle + 0.3);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);
      // Small dot at center of arc
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
    } else {
      ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
    }
    ctx.fillStyle = color;
    ctx.fill();

    // Selection ring
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, size + 5, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Label
    ctx.fillStyle = 'rgba(200,212,224,0.7)';
    ctx.font = '600 9px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    if (obj.type !== 'planet') {
      ctx.fillText(obj.name, pos.x, pos.y + size + 12);
    }
  });

  // Draw ships (if debug mode or present in system)
  if (systemData.ships && (debugMode || systemData.ships.length > 0)) {
    systemData.ships.forEach(ship => {
      let pos;
      if (ship.intra_position && ship.intra_destination && ship.intra_progress > 0) {
        // Ship is in transit between two objects
        const fromObj = systemData.objects.find(o => o.id === ship.intra_position);
        const toObj = systemData.objects.find(o => o.id === ship.intra_destination);
        if (fromObj && toObj) {
          const p1 = polarToScreen(fromObj.distance, fromObj.angle, cx, cy, scale);
          const p2 = polarToScreen(toObj.distance, toObj.angle, cx, cy, scale);
          pos = {
            x: p1.x + (p2.x - p1.x) * ship.intra_progress,
            y: p1.y + (p2.y - p1.y) * ship.intra_progress,
          };
          // Draw travel line
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = 'rgba(239,83,80,0.2)';
          ctx.lineWidth = 1;
          ctx.setLineDash([2, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      } else if (ship.intra_position) {
        // Ship is at an object
        const atObj = systemData.objects.find(o => o.id === ship.intra_position);
        if (atObj) {
          pos = polarToScreen(atObj.distance, atObj.angle, cx, cy, scale);
          // Offset slightly so it doesn't overlap the object
          pos.x += 8;
          pos.y -= 8;
        }
      }
      if (pos) {
        const shipColor = ship.role === 'miner' ? '#ffd54f' : '#ef5350';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = shipColor;
        ctx.fill();
        // Tiny label
        ctx.fillStyle = 'rgba(200,212,224,0.5)';
        ctx.font = '8px JetBrains Mono, monospace';
        ctx.textAlign = 'left';
        ctx.fillText(ship.name, pos.x + 6, pos.y + 3);
      }
    });
  }
}

function updatePanel() {
  if (!systemData) return;
  const objList = document.getElementById('objects-list');
  objList.innerHTML = systemData.objects
    .filter(o => o.type !== 'star')
    .map(o => `<div class="obj-item ${selectedObj === o.id ? 'active' : ''}" data-id="${o.id}">
      <div class="obj-type">${o.type.replace('_', ' ')}${o.connects_to ? ' → ' + o.connects_to : ''}</div>
      <div class="obj-name">${o.name}</div>
    </div>`).join('');

  objList.querySelectorAll('.obj-item').forEach(el => {
    el.addEventListener('click', () => { selectedObj = el.dataset.id; updatePanel(); draw(); });
  });

  const shipList = document.getElementById('ships-list');
  if (systemData.ships && systemData.ships.length) {
    shipList.innerHTML = systemData.ships.map(s =>
      `<div class="ship-item ${s.role === 'miner' ? 'miner' : ''}">${s.name} <span class="ship-state">[${s.state}]</span></div>`
    ).join('');
  } else {
    shipList.innerHTML = '<div style="color:#3a5a7a;font-size:10px">No ships detected</div>';
  }
}

async function fetchSystem() {
  try {
    const res = await fetch(`/api/system/${systemId}`);
    if (!res.ok) return;
    systemData = await res.json();
    document.getElementById('system-title').textContent = systemData.name;
    document.getElementById('system-meta').textContent = `${systemData.type} | ${systemData.security}-sec | ${systemData.objects.length} objects`;
    updatePanel();
    draw();
  } catch (e) { console.error(e); }
}

// Back link
const backLink = document.getElementById('back-link');
if (params.get('from') === 'debug') {
  backLink.href = '/debug';
  backLink.textContent = 'Debug';
}

resize();
window.addEventListener('resize', () => { resize(); draw(); });
fetchSystem();
setInterval(fetchSystem, 2000); // refresh every 2s
</script>
</body>
</html>
